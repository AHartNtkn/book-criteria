# Fiction Style Questionnaire
# Answers determine which criteria and sentinels are active.
# Default: everything ON except genre-specific items.
# Each answer DISABLES items that don't apply to the chosen approach.
# Genre answers ENABLE items that default to OFF.

questions:

  # ============================================================
  # Q1: Fiction Tradition
  # ============================================================
  # The primary axis. Commercial fiction prioritizes forward momentum,
  # reader compulsion, structural precision, and genre satisfaction.
  # Literary fiction prioritizes artistic ambition, thematic depth,
  # prose as art, and interpretive richness. This question affects
  # pacing expectations, structural model strictness, thematic
  # requirements, and hook/engagement mechanics.

  - id: fiction_tradition
    text: "What fiction tradition is this project targeting?"
    options:
      - id: commercial
        label: "Commercial/genre fiction -- prioritize reader compulsion, genre satisfaction, forward momentum"
        disables:
          # --- Literary prose criteria ---
          # Prose stress pattern awareness -- primarily valued in literary/poetic prose
          - SC-185
          # Sound and Euphony -- primarily valued in literary prose
          - SC-247
          # Defamiliarization -- literary technique
          - SC-054
          - SC-055
          # Maximalist Density and Accumulation -- literary description technique
          - SC-137
          # Temporal Complexity -- literary structural technique
          - SC-024
          # Synesthesia and Cross-Sensory Imagery -- literary technique
          - SC-267
          # Extended/Controlling Metaphor Craft -- literary technique
          - SC-097
          # --- Literary thematic criteria ---
          # Theme as Question vs Theme as Answer -- literary tradition
          - CC-192
          # Interpretive Richness and Ambiguity -- literary tradition
          - ML-112
          # Meaning Inseparable from Form -- O'Connor/New Critical tradition
          - ML-113
          # Reader Agency in Meaning-Making -- Chekhov tradition
          - ML-115
          # Philosophical Depth Without Didacticism -- literary tradition
          - CC-120
          # Thematic Complexity (Multiple/Competing Themes) -- literary tradition
          - CC-188
          # --- Literary structural criteria ---
          # Kishotenketsu Structural Awareness -- non-Western/literary structure
          - NC-016
          # Circular/Chiastic Structural Resonance -- literary structure
          - NC-004
          # Dramatica Completeness of Argument -- literary/analytical framework
          - NC-010
          # Frame Narrative and Nested Structure Coherence -- literary technique
          - NC-012
          # --- Specialized narration modes less common in commercial ---
          # Second Person Narration Craft
          - SC-222
          # Stream of Consciousness Craft
          - SC-252
          # Epistolary/Document Narration Craft
          - SC-092
          # Unreliable Narrator Cognitive Engagement
          - SC-286

      - id: literary
        label: "Literary fiction -- prioritize artistic ambition, thematic depth, prose as art"
        disables:
          # --- Commercial structural models ---
          # Save the Cat Beat Completeness -- commercial structural template
          - NC-028
          # Dan Harmon Story Circle Completeness -- commercial template
          - NC-007
          # Story Grid Five Commandments Per Unit -- commercial analytical model
          - CC-177
          # Five Commandments Completeness -- commercial structural model
          - CC-073
          # Scene-Level Causal Structure (Swain/Bickham rigid model)
          - CC-153
          # Pixar Causal Spine -- commercial template
          - CC-121
          # The But/Therefore Test -- commercial diagnostic
          - CC-185
          # Scene-Sequel Structure (rigid Swain/Bickham alternation)
          - CC-160
          # Four Throughline Completeness -- commercial analytical model
          - CC-079
          # Seven-Point Symmetry -- commercial template
          - NC-030
          # Three-Act Proportional Balance -- rigid structural proportions
          - NC-035
          # --- Commercial pacing criteria ---
          # Hook Placement and Density -- commercial pacing mechanic
          - SC-120
          # Every Chapter Ends with a Cliffhanger sentinel -- still relevant but
          # hooks-as-primary-mechanism less applicable
          # Ticking Clock / Narrative Urgency -- thriller/commercial pacing
          - SC-280
          # Boredom Prevention (maximizing interaction/discovery) -- commercial framing
          - SC-014
          # POV Switch Pacing as Hook -- commercial multi-POV technique
          - SC-168
          # --- Commercial engagement framing ---
          # High-Concept Pitchability -- commercial premise criterion
          - IC-005
          # Cliffhanger Distribution and Trust -- commercial chapter craft
          - CC-026

      - id: hybrid
        label: "Literary genre fiction -- genre structure with literary ambition"
        disables: []

  # ============================================================
  # Q2: Genre
  # ============================================================
