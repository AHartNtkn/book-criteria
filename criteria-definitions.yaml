criteria:
  CC-001:
    name: "Action/Spectacle Meaning (Space Opera)"
    measures: "Whether action sequences and spectacle serve story and character rather than existing for their own sake"
    score_0: "Action is pure spectacle without narrative function. Space battles happen because it's a space opera. Fights don't change anyone's situation or understanding. The same battle could be cut without affecting the story. Action is interchangeable — one fight scene could be swapped with another."
    score_5: "\"Action scenes advance plot or character.\" Each confrontation either moves plot forward, develops character through forced choices, or explores thematic territory. A fleet battle examines warfare ethics. A chase reveals character under pressure. \"Spectacle explores ideas.\" Stakes are clear and personal within every action sequence."

  CC-002:
    name: "Antagonist Complexity"
    measures: "Whether opposing forces have their own coherent worldview, motivations, and internal logic rather than being purely evil or obstructive."
    score_0: "The antagonist exists solely to oppose the protagonist with no independent motivation; they are evil for evil's sake; or the opposing force is a generic obstacle with no internal logic."
    score_5: "The antagonist has a coherent worldview and believes their actions are justified; they care intensely about something; their opposition to the protagonist arises from genuine philosophical, personal, or practical differences; they are the hero of their own story."

  CC-004:
    name: "Antagonist Goal Clarity"
    measures: "Whether the antagonistic force has a specific, understandable goal and plan that directly opposes the protagonist's goal, making the conflict measurable."
    score_0: "The antagonist's intentions are unclear or undefined; the \"bad guy\" simply wants to be evil without a specific plan; readers can't measure antagonist progress; the antagonistic force is vague or abstract without concrete manifestation."
    score_5: "The antagonist has a specific, concrete goal and plan that readers can understand; the antagonist's goal directly opposes the protagonist's goal such that both cannot succeed; antagonist progress is visible and measurable; the antagonist is formidable enough to justify the protagonist's costs and struggles."

  CC-005:
    name: "Antagonistic Force Credibility"
    measures: "Whether the opposition is believable, motivated, and poses a genuine threat that the protagonist might not overcome."
    score_0: "The antagonist is a cardboard villain with no motivation; opposition is trivially weak; or the antagonist opposes the protagonist for no discernible reason; there is no credible threat."
    score_5: "The antagonist is at least as clever, powerful, and determined as the protagonist; their motivations are comprehensible and even sympathetic; they have clear justifications for their actions; the reader genuinely worries the protagonist might lose."

  CC-006:
    name: "Anti-Episodic Integration"
    measures: "Whether scenes are causally connected to adjacent scenes through multiple threads (emotional, informational, physical, character) rather than functioning as self-contained episodes."
    score_0: "Each scene functions as a self-contained ministory; problems introduced in one scene are fully resolved before the next begins; removing any scene would require no rewriting of subsequent scenes; the story reads as a collection of loosely linked vignettes."
    score_5: "Scenes connect through multiple mechanisms: unresolved questions carry forward, objects link disparate moments, emotional continuity persists across scene breaks, characters reference prior events, problems accumulate rather than resolving completely, dialogue echoes across chapters; removing any scene would require significant rewriting."

  CC-007:
    name: "Anticipation and Dread Construction"
    measures: "Whether the narrative builds anticipation of coming conflict or consequences, creating emotional investment before events occur."
    score_0: "Events arrive without anticipatory buildup; there is no foreshadowing of coming conflict; the reader is neither hoping nor fearing about future events; everything is reactive rather than anticipatory."
    score_5: "The reader is in a constant state of anticipation about what will happen next; threats are established before they materialize; promises of conflict are set up and paid off; the reader's brain is activated by uncertainty about outcomes they care about."

  CC-008:
    name: "Avoidance of Monocultures (Planet of Hats)"
    measures: "Whether civilizations, races, and societies contain internal diversity rather than being defined by a single characteristic."
    score_0: "Every member of a race, nation, or culture shares identical traits, values, and behaviors. \"All dwarves are miners, all elves are archers, all Klingons are warriors.\" Entire planets or civilizations are defined by a single characteristic with no internal dissent, subcultures, or individuality."
    score_5: "Cultures contain internal factions, dissenting voices, regional variations, class differences, generational gaps, and individual exceptions. Members of the same culture disagree about their own values and traditions. Social complexity reflects the fact that Earth's single species has \"almost two hundred sovereign states with an estimated 5,000 ethnicities and 7,000 living languages.\""

  CC-010:
    name: "Backstory Distribution"
    measures: "Whether background information and world-building are delivered in appropriate doses at appropriate times"
    score_0: "Large exposition dumps front-load all background information; \"as you know, Bob\" dialogue delivers information unnaturally; backstory chapters halt the narrative; or critical information is never provided, leaving readers confused; exposition is delivered when convenient for the author rather than when the reader needs it"
    score_5: "Background is delivered in \"bite sizes when stakes rise, not chapters early\"; exposition is woven into action and dialogue through fact-dependent choices; no paragraph contains more than three sentences of pure information without dramatic context; critical world-building is revealed through character experience rather than narration; the reader learns what they need exactly when they need it"

  CC-011:
    name: "Backstory-Tension Balance"
    measures: "Whether backstory and exposition are distributed so as not to interrupt or deflate moments of tension."
    score_0: "Backstory dumps interrupt tense sequences; exposition arrives at the worst possible moments; flashbacks or info-dumps kill momentum at critical junctures; the reader is pulled out of engagement by untimely context."
    score_5: "Backstory is woven into the narrative without breaking tension; exposition arrives when the reader needs it, not when it's convenient for the author; tense moments are never interrupted by flashbacks or information delivery; context enriches rather than deflates engagement."

  CC-014:
    name: "Catharsis"
    measures: "Whether the narrative builds to emotional release through accumulated investment in characters, producing the cleansing of emotions (pity, fear, grief, joy) that Aristotle identified as the purpose of dramatic art"
    score_0: "No emotional build-up occurs, so no release is possible. Characters undergo events without accumulated reader investment. Endings arrive without emotional weight. The reader closes the book feeling nothing."
    score_5: "The narrative accumulates emotional investment through deep character identification, then delivers catharsis through reversal (peripeteia) and recognition (anagnorisis). Readers experience the cleansing of powerful emotions — pity for characters, fear for their fate — and emerge feeling they have been through something genuinely transformative."

  CC-015:
    name: "Causal Chain Integrity"
    measures: "Whether each plot event logically follows from preceding events through cause-and-effect rather than arbitrary sequence."
    score_0: "Events occur in sequence without causal connection; \"and then\" plotting where scenes could be rearranged without affecting the story; no discernible reason one event leads to the next."
    score_5: "Every plot beat functions as both effect of prior action and cause of subsequent action; the story forms an interlocking causal web where removing any event would require rewriting subsequent events; passes the \"therefore/but\" test at every beat transition."

  CC-016:
    name: "Central Conflict Clarity"
    measures: "Whether the story has a clearly identifiable central conflict that drives the narrative forward."
    score_0: "No identifiable central conflict; events happen without meaningful opposition; the story is a sequence of occurrences without a unifying struggle."
    score_5: "A single, clearly defined central conflict anchors the story, is introduced early, escalates progressively, and is resolved (or deliberately left unresolved) in a way that feels complete."

  CC-017:
    name: "Chapter Architecture"
    measures: "Whether chapters function as effective structural units with hooks, development, and purposeful endings"
    score_0: "Chapters are arbitrary divisions with no internal arc; chapter endings land at random points with no hook or sense of completion; chapters begin without establishing what's at stake; no variation in chapter function or intensity"
    score_5: "Each chapter has its own mini-arc; chapter openings hook the reader into the new section; chapter endings look both backward (providing some satisfaction) and forward (creating anticipation); the balance of chapter ending types follows approximately 60-70% moderate-to-high tension hooks, 20-30% medium tension, and 10-20% resolution/calmer moments"

  CC-018:
    name: "Chapter Length Variation"
    measures: "Whether chapter lengths vary purposefully to serve the story's pacing needs"
    score_0: "All chapters are approximately the same length regardless of content; no relationship between chapter length and dramatic intensity; long chapters are used for action sequences that need speed; short chapters are used for reflective passages that need space"
    score_5: "Chapter length varies in response to content; shorter chapters create urgency and acceleration during tense sequences; longer chapters slow pace for deeper character development or complex scenes; variation is purposeful rather than random; after action-heavy short chapters, longer reflective chapters provide respite; medium chapters serve transitions and momentum-building"

  CC-019:
    name: "Chapter-Level Forward Momentum"
    measures: "Whether chapter endings and beginnings create sufficient forward momentum — through unresolved questions, cliffhangers, character reactions, or escalation — to sustain reading across structural breaks"
    score_0: "Chapters end at natural stopping points with all questions resolved. The reader has no reason to begin the next chapter. Every chapter boundary is a convenient place to put the book down."
    score_5: "Chapter endings create forward momentum through varied techniques — unresolved questions, cliffhangers, revelations, emotional reactions that demand exploration, or escalation of stakes. The reader cannot stop at chapter boundaries. Multiple layers of mystery operate at different timescales."

  CC-021:
    name: "Character Agency in Conflict"
    measures: "Whether the protagonist actively drives the story through choices rather than passively receiving conflict."
    score_0: "The protagonist is a passive recipient of events; things happen to them but they make no meaningful choices; they are moved around by the plot like a chess piece; their actions have no causal relationship to outcomes."
    score_5: "The protagonist drives story events through active choices; conflict arises from their decisions and their consequences; even when constrained by overwhelming forces, they find ways to act with agency; the 3C cycle (Conflict-Choice-Consequence) operates in every scene."

  CC-023:
    name: "Character Continuity"
    measures: "Whether characters who are prominent in the opening remain significant throughout, or have their diminished role adequately explained."
    score_0: "Characters introduced as important in the opening vanish from the story without explanation, leaving readers wondering what happened to them and feeling their investment was wasted."
    score_5: "Every character given significant screen time in the opening either remains important throughout the story or has their departure meaningfully explained. No character introduced as important is silently abandoned."

  CC-024:
    name: "Character Desire Specificity"
    measures: "Whether character desires are concrete and specific enough that success or failure is unambiguous by the end of each scene and the story."
    score_0: "Character desires are vague (\"wants to be happy,\" \"wants things to be better\"); it's impossible to tell whether the character got what they wanted; goals are abstract and unmeasurable."
    score_5: "Character desires are specific, concrete, and measurable; \"wants to get their estranged brother to attend their wedding\" rather than \"wants family reconciliation\"; every scene has a clear objective whose success or failure is identifiable."

  CC-025:
    name: "Chekhov's Gun Compliance"
    measures: "Whether every significant element introduced in the story serves a purpose, and every significant payoff was set up"
    score_0: "Significant elements are introduced and abandoned. Weapons described in detail are never used. Characters with apparent importance vanish. Subplots evaporate. Conversely, critical plot resolutions depend on elements never introduced. The story is littered with broken promises and deus ex machina."
    score_5: "Every significant element introduced pays off. Every payoff was set up. The setup-payoff chain is invisible on first read and satisfying on reread. Red herrings (in mystery) are the only intentional violation, and even they have their own resolution. Nothing feels wasted; nothing feels conjured from thin air."

  CC-026:
    name: "Cliffhanger Distribution and Trust"
    measures: "Whether chapter-ending hooks are varied and sustainable rather than relying on constant cliffhangers"
    score_0: "Every chapter ends on a cliffhanger; many cliffhangers are \"false\" (resolved immediately in the next chapter's opening with no real consequence); the reader experiences fatigue from constant artificial tension spikes; the author's hooks have become predictable and untrustworthy; the story's credibility erodes because every crisis is a wolf-cry"
    score_5: "Approximately 60% of chapters end with a genuine hook or soft cliff; approximately 40% end with satisfying mini-resolutions or character breathing moments; the mix is purposeful — calmer endings make the tense ones more effective; hooks are honest (they promise real consequences and deliver); the reader trusts that when the author creates tension, it will pay off"

  CC-027:
    name: "Climax Effectiveness and Earned Resolution"
    measures: "Whether the climax resolves the central conflict in a way that feels earned rather than arbitrary"
    score_0: "The climax resolves through coincidence, deus ex machina, or previously unestablished abilities; the climax doesn't address the central conflict; the resolution feels anticlimactic relative to the buildup; the protagonist doesn't drive the resolution through their own choices and growth; the ending feels either rushed or padded"
    score_5: "The climax converges all internal and external conflict; the resolution is driven by the protagonist's choices and transformation; the outcome feels both surprising and inevitable because it was earned through foreshadowing; the climactic moment is commensurate with the buildup; all prior plot setups pay off; the resolution satisfies the core promise made in the opening"

  CC-028:
    name: "Climax Pacing (Sufficient Buildup and Space)"
    measures: "Whether the climactic sequence receives adequate space and buildup to feel earned and impactful, rather than being rushed or anticlimactic."
    score_0: "The climax resolves in a few paragraphs after hundreds of pages of buildup. Conflicts are resolved too easily. The emotional payoff falls flat because the resolution was too quick. Or: the climax is overextended past its natural breaking point."
    score_5: "The climax receives proportionate space. Pacing slows briefly before the climax (descriptive details, inner thought) to heighten suspense, then accelerates during the climactic action (short sentences, rapid events). The contrast between buildup and release creates maximum impact."

  CC-029:
    name: "Clue Architecture (Mystery)"
    measures: "Whether clues are planted with technical skill — visible enough to be fair, hidden enough to be surprising"
    score_0: "Clues are either absent (unfair) or blazingly obvious (no puzzle). Important evidence is discovered by accident rather than investigation. Clues are presented in isolation rather than embedded in context. The reader can solve the mystery in chapter two or cannot solve it at all."
    score_5: "Clues are buried within ordinary scenes so naturally they don't look like clues. Information is layered — multiple threads connect simultaneously at the revelation. Each clue makes sense in its immediate context for an innocent reason while serving a different function for the mystery's solution. The mystery can be solved by an attentive reader but requires piecing together information from multiple scenes."

  CC-030:
    name: "Commensurate Cause and Effect"
    measures: "Whether the magnitude and nature of causes match the magnitude and nature of their effects throughout the narrative."
    score_0: "Tiny causes produce enormous effects without justification, or enormous causes produce negligible effects; character reactions are wildly disproportionate to stimuli; the story relies on butterfly-effect logic without establishing why."
    score_5: "Every cause produces an effect whose magnitude is proportional and believable; character responses match the gravity of events; when small causes do produce large effects, the amplification mechanism is clearly established."

  CC-031:
    name: "Completeness and Illusion of Depth (Iceberg Principle)"
    measures: "Whether the world feels like it extends beyond what is shown on the page -- that it existed before the story began and contains unexplored regions, histories, and cultures."
    score_0: "The world feels like a flat cardboard cutout that exists only for the immediate plot. There is no sense of history, no offhand references to places or events beyond the story, no implication that life continues outside the protagonist's view. The world begins and ends with what the story directly addresses."
    score_5: "Casual references to events, places, and histories not central to the plot create a sense of a vast, lived-in world. The reader infers complex systems and deep history from breadcrumbs. The author clearly knows far more than is shown, and this knowledge permeates the writing with authority and specificity. Unexplored corners invite the reader's imagination."

  CC-032:
    name: "Conflict Escalation Variety"
    measures: "Whether the story presents diverse types of conflict and obstacles rather than repeating the same pattern, and whether conflicts produce genuine consequences rather than recycling the same confrontation."
    score_0: "The same conflict recurs without resolution or progression; arguments happen repeatedly but lead nowhere; the protagonist faces identical types of obstacles throughout; \"conflict without consequences is disguised filler.\""
    score_5: "Each new conflict is distinct in type and approach; conflicts produce lasting consequences that alter the situation; the story never \"circles\" the same confrontation; obstacles combine internal and external dimensions; variety in conflict type enables varied character growth."

  CC-035:
    name: "Conflict Organicism"
    measures: "Whether conflicts arise naturally from character traits, desires, and circumstances rather than being imposed artificially by the author."
    score_0: "Conflicts feel manufactured, imposed from outside the story's logic, or exist solely because the author needs something to happen. Characters act out of character to create conflict."
    score_5: "Every conflict emerges organically from established character desires, flaws, relationships, and worldbuilding. Opposition feels inevitable given who the characters are and what they want."

  CC-036:
    name: "Conflict Resolution Earnedness"
    measures: "Whether resolutions arise from within the story's established logic through character effort, or arrive through convenience and contrivance."
    score_0: "Resolution arrives through deus ex machina, coincidence, or previously unknown abilities/resources; the protagonist does not earn their victory; conflicts dissolve rather than being solved; or resolution is trivially easy."
    score_5: "Resolution emerges from the protagonist's choices, growth, and effort; every tool used in the resolution was established earlier in the narrative; the resolution feels simultaneously surprising and inevitable; character transformation was necessary to achieve it."

  CC-037:
    name: "Conflict Resolution Promise"
    measures: "Whether every instance of conflict introduced in the story ends with an appropriate climax—confrontation, disaster, or triumph rather than fizzling out."
    score_0: "Conflicts are introduced and abandoned without resolution. Story threads fizzle, confrontations are avoided, and tension dissipates without payoff."
    score_5: "Every conflict introduced is resolved through appropriate confrontation, disaster, or triumph. No thread is dropped, and each resolution feels proportionate to the buildup."

  CC-038:
    name: "Conflict Variety"
    measures: "Whether the story uses multiple types of conflict (character vs. character, self, society, nature, fate, technology, supernatural) rather than relying on a single mode."
    score_0: "Only one type of conflict exists throughout (typically character vs. character through argument/fight); the same mode of opposition repeats without variation."
    score_5: "Multiple conflict types operate throughout the narrative, each appropriate to the scene and story moment; the protagonist faces different kinds of opposition (interpersonal, internal, environmental, societal) that require different skills and create different emotional registers."

  CC-039:
    name: "Conflict as Character Revelation"
    measures: "Whether conflict functions to reveal who characters truly are under pressure, stripping away pretense to expose authentic nature."
    score_0: "Conflict exists as pure plot machinery; characters respond to obstacles without revealing anything new about themselves; behavior under pressure is indistinguishable from behavior in comfort."
    score_5: "Each conflict systematically strips away layers of pretense, forcing characters to reveal who they are when comfort and safety are gone; choices under pressure expose values, fears, and authentic nature that were previously hidden."

  CC-040:
    name: "Conflict-Driven Escalation vs. Forced Escalation"
    measures: "Whether escalation emerges from character actions and their consequences (organic) or from the author arbitrarily imposing worse situations (forced)."
    score_0: "Escalation is imposed from outside the story's logic; new obstacles appear without causal connection to character actions; the author simply makes things worse by fiat; events don't connect logically."
    score_5: "Each escalation is a direct consequence of the protagonist's previous choices or failures; the character's attempts to solve problems create new, larger problems; the reader can trace the causal chain from inciting incident to climax through character decisions."

  CC-041:
    name: "Consequence Persistence"
    measures: "Whether actions and events produce lasting consequences that persist and accumulate throughout the narrative rather than being forgotten or reset."
    score_0: "Actions produce no lasting effects; characters suffer injuries that vanish, make decisions that are easily reversed, face crises that leave no mark; the status quo resets between scenes; consequences exist only within the scene where they occur."
    score_5: "Every significant action produces consequences that ripple forward through the narrative; injuries affect later capabilities; decisions close off options permanently; the world state changes in ways that constrain future possibilities; characters carry forward what they gain and lose in earlier scenes."

  CC-042:
    name: "Consequences Permanence"
    measures: "Whether character choices and conflict outcomes have lasting consequences that alter the story's trajectory."
    score_0: "Choices have no lasting consequences; damage is immediately reversed; status quo is restored after each conflict; the story operates on a reset button."
    score_5: "Every significant choice produces permanent consequences that alter the story's trajectory; victories come at costs that cannot be undone; the world and relationships are permanently changed by conflict outcomes; there is no returning to how things were."

  CC-043:
    name: "Contrivance Avoidance"
    measures: "Whether plot events emerge from character actions and established world logic rather than from authorial manipulation to force convenient outcomes."
    score_0: "Events happen because the author needs them to, not because characters or world logic generate them; the protagonist is \"incredibly lucky\" with whatever needs to happen for the plot simply occurring; information arrives at precisely the moment it's needed without established reason; characters happen to be in exactly the right place at the right time."
    score_5: "Every plot advancement emerges from character motivation, established world mechanics, or previously planted information; the protagonist earns every advantage through action; when characters converge, their independent motivations explain the convergence; nothing feels \"forced\" or \"convenient.\""

  CC-044:
    name: "Convention Delivery — Hardboiled/Noir"
    measures: "Whether a hardboiled or noir detective story delivers the specific conventions of that tradition"
    score_0: "Claims noir/hardboiled aesthetics but is actually a cozy mystery with cynical narration bolted on. No moral complexity. The world is not corrupt — it is merely inconvenient. The detective has no inner life or moral code. Violence is consequence-free."
    score_5: "The detective embodies Chandler's ideal: \"a man who is not himself mean\" walking \"mean streets.\" The world is recognizably corrupt in ways that feel systemic rather than plot-convenient. The detective's moral code is tested by the case. The prose has the clipped, ironic quality that both reveals and conceals. Murder has been given \"back to the kind of people that commit it for reasons.\""

  CC-045:
    name: "Convention Delivery — High Fantasy"
    measures: "Whether a high fantasy delivers the specific conventions of that genre"
    score_0: "The \"fantasy world\" is medieval Europe with changed names. No magic system or entirely arbitrary magic. No sense of history, culture, or geography. The Secondary World has no internal logic. One could search-and-replace the setting with any other without affecting the story."
    score_5: "A fully realized Secondary World that feels like it existed before the story and will continue after. Magic has consistent rules (whether hard or soft) that create real constraints. Cultures have distinct beliefs, customs, and conflicts. The world's history shapes current events. The reader experiences genuine wonder and transportation. The world feels discovered rather than invented."

  CC-046:
    name: "Convention Delivery — Mystery/Detective"
    measures: "Whether a mystery/detective story delivers the specific conventions of that genre"
    score_0: "No investigation structure. Clues are absent or impossible for the reader to interpret. The solution relies on information never presented. The criminal appears from nowhere. There is no detection — problems are solved by coincidence, confession, or deus ex machina."
    score_5: "The mystery is a perfectly constructed puzzle. Every clue is fairly presented yet artfully disguised. Red herrings are plausible but ultimately distinguishable from real clues. The reader has a genuine chance to solve the mystery but is unlikely to do so before the detective. The revelation is simultaneously surprising and inevitable."

  CC-047:
    name: "Convention Delivery — Space Opera"
    measures: "Whether a space opera delivers the specific conventions of that genre"
    score_0: "Set in space but has no sense of scale. A single planet with a single city. No alien species, galactic politics, or interstellar conflict. Technology is window dressing rather than worldbuilding. Characters might as well be in a contemporary thriller."
    score_5: "The story achieves true galactic scope while maintaining personal stakes. FTL travel, alien species, and political structures are not just present but integral to the story. Technology shapes the world logically. Multiple civilizations feel distinct and real. The cosmic backdrop serves as more than scenery — it creates possibilities no other genre could offer. Scale creates wonder."

  CC-048:
    name: "Cost of Victory"
    measures: "Whether success and resolution come at a meaningful price that reflects the stakes and sacrifices established throughout the narrative."
    score_0: "The protagonist achieves their goal without meaningful sacrifice; victory is total and costless; established stakes evaporate at resolution; the ending is \"too tidy\" given what was threatened; characters who should bear scars emerge unscathed."
    score_5: "The resolution carries concrete consequences of the protagonist's choices; victory comes with genuine loss or transformation that reflects the story's stakes; the ending answers \"at what price?\" with specificity; consequences of the crisis decision persist through the resolution rather than evaporating."

  CC-049:
    name: "Cozy Mystery Convention Compliance"
    measures: "Whether a cozy mystery delivers all the specific conventions that define the subgenre"
    score_0: "Marketed as cozy but contains graphic violence, explicit sex, or dark content. Professional detective instead of amateur sleuth. Urban crime setting instead of close-knit community. Serial killer antagonist. No charm, humor, or community warmth."
    score_5: "All cozy conventions honored: amateur sleuth with relevant hobby/occupation, close-knit community setting, violence offstage, no graphic content, 4-5 suspects with motive/means/opportunity, killer pushed past limits rather than evil personified, quirky supporting cast, pets, charm, and warmth. Puzzle-mystery format where reader participates in detection. Community restored at resolution."

  CC-050:
    name: "Creativity and Originality of Conceits"
    measures: "Whether the world's speculative departures from reality (fantasy conceits, SF innovations) are original and explored to their fullest rather than derivative or superficial."
    score_0: "The world's speculative elements are direct copies of existing popular fiction (generic Tolkien elves, Star Wars-clone technology, Harry Potter-style magic school) with no transformation, subversion, or original development. The reader has seen this world many times before."
    score_5: "The world's speculative elements are genuinely novel, or familiar elements are combined, subverted, or explored in ways that feel fresh. Conceits are explored to their fullest implications rather than used as surface decoration. The world makes the reader think \"I've never seen this before\" or \"I never thought about that possibility.\""

  CC-051:
    name: "Cultural Distinctiveness (Space Opera/Fantasy)"
    measures: "Whether alien species, fantasy races, or different civilizations feel genuinely distinct rather than humans in costume"
    score_0: "All cultures are monocultures with one defining trait. Alien species are humans with different foreheads. Fantasy races map directly to real-world ethnic stereotypes. Cultural differences are described through exposition rather than demonstrated through behavior. Every civilization has identical values with different window dressing."
    score_5: "Cultures are distinct through \"behavior, values, decision-making\" rather than cosmetic differences. Alien species prioritize differently, perceive reality differently, and communicate in fundamentally different ways. Fantasy cultures have distinct beliefs, customs, and conflicts that feel organic. Cultural differences create genuine misunderstanding and dramatic conflict. \"What gets lost in translation\" is explored."

  CC-052:
    name: "Daily Life Texture and Material Culture"
    measures: "Whether the world includes the texture of everyday life -- food, clothing, work, shelter, tools, customs, entertainment -- that makes it feel inhabited rather than a stage set."
    score_0: "Characters exist in a world without visible daily life. Nobody eats specific food, wears described clothing, does recognizable work, or engages in mundane activities. The world is a series of action set-pieces connected by blank space. There is no sense of what ordinary life looks like between dramatic events."
    score_5: "The world has specific food, clothing, customs, entertainments, work patterns, and daily routines that arise logically from its geography, climate, technology, and culture. Material culture reflects and reinforces other worldbuilding elements (a maritime culture eats fish; a cold climate produces heavy textiles). Mundane details ground the fantastic and make the world feel inhabited by real people living real lives."

  CC-053:
    name: "De-escalation Avoidance"
    measures: "Whether the story maintains or increases tension through the climax rather than allowing stakes, threats, or consequences to diminish as the story progresses."
    score_0: "Big threats are made but consequences lessen or don't materialize as promised; stakes gradually diminish toward the climax; the author appears reluctant to follow through on established threats; the middle is more intense than the ending."
    score_5: "Every threatened consequence either materializes or is replaced by an equally impactful alternative; tension consistently rises toward the climax; the story \"makes good on threats\"; the final consequences are the most severe; any deflection of a promised consequence introduces an equally weighty alternative."

  CC-054:
    name: "Deus Ex Machina Avoidance"
    measures: "Whether the story's resolution emerges from established causal chains and protagonist action rather than from unexpected, unforeshadowed external intervention."
    score_0: "The climactic conflict is resolved by a new character, force, or event that arrives without prior establishment; the protagonist plays no active role in their own salvation; the resolution breaks the story's internal logic; readers feel cheated because the outcome was \"unexpected, unlikely, and unforeseen.\""
    score_5: "The resolution emerges directly from the protagonist's choices and actions using tools, knowledge, and relationships established earlier in the narrative; the audience understood the mechanism of resolution before it occurs; the solution feels inevitable in retrospect."

  CC-056:
    name: "Dramatic Irony Deployment"
    measures: "Whether information asymmetry between reader and characters is used strategically to create tension, dread, or anticipation."
    score_0: "Reader and characters always share the same information; no deliberate information gaps exist; opportunities for dramatic irony are missed."
    score_5: "The author strategically controls what the reader knows vs. what characters know; the reader sometimes knows danger the character doesn't see (creating dread) and sometimes knows less than the character (creating mystery); these gaps are managed deliberately and resolved at optimal moments."

  CC-057:
    name: "Dual-Level Causal Logic (Plot + Character)"
    measures: "Whether causal chains operate simultaneously on both the plot level (events follow from events) and the character level (motivations and psychology drive believable actions)."
    score_0: "Events happen for plot reasons but characters have no believable motivation for their actions, or characters have clear motivations that the plot ignores; one level works but the other is broken."
    score_5: "Every plot event is both externally logical (it follows from prior events) and internally logical (the characters involved have believable reasons for acting as they do); breaking either chain would break the story."

  CC-058:
    name: "Dual/Parallel Timeline Balance"
    measures: "Whether stories with multiple timelines maintain equal engagement and structural integrity across all threads"
    score_0: "One timeline is significantly more engaging than the other(s), causing reader frustration during switches; timelines have no meaningful connection to each other; one timeline is padded with filler to match the other's length; transitions are confusing or unmarked; timelines never converge or their convergence is unsatisfying"
    score_5: "Both timelines are equally compelling with their own plot points at approximately 25%, 50%, and 75%; transitions are clearly marked with dates, characters, and sensory cues; the timelines inform and enhance each other meaningfully; the earlier timeline concludes just before the later timeline's climax; pacing alternation is consistent and logical"

  CC-059:
    name: "Earned Thematic Resolution"
    measures: "Whether the story's thematic conclusion feels earned through the dramatic events and character choices rather than imposed or arbitrary."
    score_0: "The thematic resolution feels arbitrary, imposed, or unearned. A deus ex machina resolves the thematic question. The character's final state doesn't follow from their choices and growth. The ending \"proves\" a theme the story never actually explored. Consequences are avoided through contrivance."
    score_5: "The thematic resolution emerges inevitably from the dramatic action. The protagonist's climactic decision crystallizes the thematic premise through the hardest choice in the story. \"The ending of your story will prove what your story was really about.\" As Weiland notes: avoiding consequences (particularly through deus ex machina) destroys organic theme. The resolution feels both \"inevitable yet surprising.\""

  CC-060:
    name: "Economics and Infrastructure Believability"
    measures: "Whether the world's economic systems, trade networks, infrastructure, and material logistics feel plausible and internally consistent."
    score_0: "Gold coins appear whenever convenient and obey no known rules of economics. Characters travel freely without consideration of cost, supply lines, or infrastructure. Cities exist without visible means of feeding their populations. Armies march without logistics. Trade routes, agriculture, and industry are completely absent."
    score_5: "The economy feels organic and consequential. Trade exists because regions specialize based on geography. Currency or exchange systems reflect what the culture values. Class structures have economic roots. Infrastructure (roads, ports, communication networks) exists and affects plot logistics. Characters' economic circumstances constrain and enable their choices."

  CC-062:
    name: "Emotional Payoff Appropriate to Genre"
    measures: "Whether the story's ending delivers the emotional experience genre readers specifically seek"
    score_0: "The emotional payoff contradicts genre expectations without earning it. A mystery where the crime is never solved and this is presented as profound. A romance without emotional resolution. A thriller that ends in anticlimax. The reader's emotional investment is not repaid."
    score_5: "The emotional payoff precisely matches and exceeds genre expectations. Mystery provides intellectual satisfaction of puzzle solved plus thematic resonance. Romance provides catharsis of vulnerability rewarded. Space opera provides cosmic awe plus personal emotional resolution. The ending achieves the CrimeReads standard: \"equal parts surprising and inevitable.\""

  CC-064:
    name: "Environmental Change and Dynamism"
    measures: "Whether the world changes over the course of the story -- through weather, seasons, consequences of plot events, ecological shifts, or political changes -- rather than remaining a static backdrop."
    score_0: "The world is unchanging regardless of what happens in the story. Battles leave no scars. Seasons don't change. Political upheavals don't alter daily life. The world is a painted backdrop that remains the same from beginning to end."
    score_5: "The world responds to narrative events and changes over time. Weather shifts, seasons turn, landscapes are scarred by conflict, political changes alter daily life, and characters return to find familiar places transformed. \"Changing weather can help settings that must be revisited feel different and real.\""

  CC-067:
    name: "Escalation Within Scenes"
    measures: "Whether conflict and complications within a scene escalate progressively rather than remaining at a constant level or repeating the same degree of difficulty."
    score_0: "Conflict within the scene remains at the same level throughout. Obstacles repeat at the same difficulty. The character faces the same degree of opposition at the end as at the beginning. No escalation occurs."
    score_5: "Complications intensify progressively throughout the scene. Each obstacle is more difficult than the last. The opposition grows stronger as the character becomes more committed. The escalation builds toward the scene's climactic moment, creating a rising curve of tension."

  CC-070:
    name: "FTL and Technology Consistency (Space Opera)"
    measures: "Whether faster-than-light travel and other speculative technology operates consistently within established rules"
    score_0: "FTL is completely inconsistent. Travel times vary by plot convenience. Technology capabilities change scene to scene. The same technology works differently for different characters. No attention paid to the implications of FTL for communication, trade, or military strategy."
    score_5: "FTL operates by consistent rules throughout. The specific system chosen (warp, hyperspace, jump gates, etc.) has clear capabilities and limitations. Travel times are consistent. The implications of FTL for politics, economics, and warfare are explored. Technology's rules are \"established and stuck to\" — readers track these details and expect consistency."

  CC-071:
    name: "Failure as Genuine Possibility"
    measures: "Whether the story establishes that the protagonist can genuinely fail, lose, or suffer permanent setbacks."
    score_0: "The protagonist is never in genuine danger; it's obvious they will succeed; plot armor protects them from real consequences; failures are immediately reversed; the reader knows everything will be fine."
    score_5: "The story establishes early and convincingly that failure is possible; characters do fail, suffer permanent losses, or are set back in ways that cannot be undone; the reader genuinely does not know whether the protagonist will succeed; casualties and costs are real."

  CC-072:
    name: "Fair Play with the Reader (Mystery)"
    measures: "Whether the mystery presents all necessary clues to the reader before the solution is revealed"
    score_0: "The solution depends entirely on information withheld from the reader. The criminal was never mentioned. Critical clues were hidden. The detective possesses knowledge the reader was never given access to. The mystery is \"solved\" by confession, coincidence, or information that appears only at the revelation."
    score_5: "Every clue necessary to solve the mystery appears on the page before the revelation. Clues are honestly presented but artfully disguised among irrelevant details and red herrings. The reader can re-read and verify that every piece of the puzzle was available. The revelation recontextualizes earlier scenes in ways that reward rereading."

  CC-073:
    name: "Five Commandments Completeness"
    measures: "Whether every story unit (scene, sequence, act, global narrative) contains all five commandments: inciting incident, turning point progressive complication, crisis, climax, and resolution."
    score_0: "Story units are missing one or more commandments; scenes lack clear inciting incidents, crises are absent, climaxes don't answer the crisis question, or resolutions are skipped; the story has structural gaps that leave readers confused about what happened and why."
    score_5: "Every scene contains all five commandments with clear causal connections between them; the crisis presents a genuine binary choice with meaningful stakes; the climax reveals character truth through active choice under pressure; the resolution shows concrete consequences; the same protagonist drives turning point through climax."

  CC-078:
    name: "Setup Payoff Completeness"
    measures: "Whether significant foreshadowing elements introduced in the story are eventually paid off, and whether major payoffs have adequate foreshadowing."
    score_0: "The story is riddled with unfired Chekhov's guns (foreshadowed elements that never pay off) and/or delivers major plot resolutions that were never foreshadowed (deus ex machina)."
    score_5: "Every significant foreshadowed element pays off meaningfully, and every major resolution has been properly seeded earlier in the narrative. The ratio of setup to payoff is balanced and satisfying."

  CC-078b:
    name: "Payoff Earned-ness"
    measures: "Whether narrative hints and clues are embedded with sufficient subtlety that they prepare readers for future events without telegraphing them, and whether they reward attentive readers on re-reading."
    score_0: "No foreshadowing exists (events arrive from nowhere) or foreshadowing is so heavy-handed that every development is predictable; hints either don't exist or might as well be neon signs."
    score_5: "Foreshadowing is present but disguised, appearing to serve immediate purposes while planting seeds for later events; multiple foreshadowing techniques are used for major payoffs; re-reading reveals a rich layer of preparation that was invisible on first pass; the balance creates \"both surprising and inevitable\" outcomes."

  CC-079:
    name: "Four Throughline Completeness"
    measures: "Whether the story addresses conflict through multiple perspectives (objective story, main character, obstacle character, relationship) rather than a single viewpoint."
    score_0: "Conflict is presented from only one perspective; the story lacks relationship conflict or obstacle character perspective; the audience only sees the protagonist's experience of the conflict."
    score_5: "The story addresses conflict through multiple complementary perspectives: the overall story conflict (They), the protagonist's personal conflict (I), the impact character's challenge (You), and the central relationship's conflict (We); each throughline operates in a distinct domain."

  CC-080:
    name: "Genre Blending Coherence"
    measures: "Whether stories combining multiple genres successfully integrate conventions from each without confusing readers"
    score_0: "Multiple genre elements are present but never integrated. Mystery clues and fantasy magic exist in separate chapters without influencing each other. Genre conventions actively conflict — a romance subplot undermines thriller tension; a mystery structure prevents fantasy world immersion. The reader cannot determine what kind of story this is."
    score_5: "Genre elements are seamlessly integrated. One genre provides structural backbone; others enrich it. Mystery clues involve fantasy magic. Space opera politics create the detective's case. Romance develops through genre-appropriate action. Contrasting genre tones layer to create emotional complexity. Each genre's obligatory scenes are fulfilled through the lens of the other genres."

  CC-081:
    name: "Genre Innovation vs. Convention Violation"
    measures: "Whether departures from genre conventions are intentional innovations or accidental violations"
    score_0: "Genre conventions are violated without awareness. The author does not appear to know what the conventions are. Departures create confusion rather than surprise. Innovation cannot be distinguished from incompetence. The reader cannot tell whether rule-breaking is intentional."
    score_5: "Every departure from convention is clearly intentional, serves the story, and demonstrates mastery of what is being departed from. As with McCullough: the violation is done \"extremely well.\" The reader can distinguish between innovation (author chose to break this rule because...) and error (author didn't know this rule existed). Genre-aware readers appreciate the departures."

  CC-082:
    name: "Genre-Appropriate Ending Resolution"
    measures: "Whether the ending delivers the type of resolution the genre demands"
    score_0: "The ending does not resolve what the genre requires. A mystery where the criminal is never identified. A thriller where the threat remains. A romance with no emotional resolution. A fantasy where the quest is simply abandoned. Genre-specific loose ends are left dangling."
    score_5: "The ending delivers precisely what the genre demands while adding depth. Mystery: criminal exposed AND thematic resonance about justice. Thriller: threat neutralized AND character transformed by the experience. Fantasy: quest completed AND world meaningfully changed. Space opera: conflict resolved at both personal AND cosmic scale. The ending satisfies genre expectations while elevating beyond formula."

  CC-083:
    name: "Genre-Appropriate Pacing Structure"
    measures: "Whether the story's pacing and structure match the conventions of its genre"
    score_0: "The pacing violates genre expectations without purpose. A thriller that meanders through lengthy world-building. A mystery where the crime doesn't happen until page 200. A space opera that rushes through its world without establishing scale. The structure belongs to a different genre than the one being written."
    score_5: "Pacing precisely matches genre expectations. Mysteries introduce the crime early and build through investigation. Thrillers escalate tension continuously. Fantasy balances world immersion with forward momentum. Space opera establishes scale before narrowing focus. Genre-specific beats hit at approximately the right structural positions (inciting incident at ~12%, midpoint revelation at ~50%, climax at ~85%)."

  CC-084:
    name: "Genre-Specific Quality Markers (High Fantasy)"
    measures: "Whether high fantasy achieves the specific quality markers that distinguish excellent from adequate examples"
    score_0: "Medieval Europe with elves. No original magic system, no original cultures, no original cosmology. The quest is linear and unquestioned. Good vs. evil binary with no nuance. The Chosen One fulfills the Prophecy by defeating the Dark Lord. Every element is assembled from existing fantasy without transformation."
    score_5: "A Secondary World that feels genuinely original in its fantasy conceits while following internal logic rigorously. Magic creates real constraints and costs. Cultures have depth beyond a single trait. The moral landscape is complex. The quest (if present) involves genuine choice and cost. History is implied rather than dumped. The world invites rereading and exploration."

  CC-085:
    name: "Genre-Specific Quality Markers (Space Opera)"
    measures: "Whether space opera achieves the specific quality markers that distinguish excellent from adequate examples"
    score_0: "Pure spectacle without substance. Action without meaning. Galactic scope without personal stakes. Aliens that are humans with prosthetics. Technology without implications. A story that was clearly written to be a space opera without understanding what makes the genre meaningful."
    score_5: "\"Combines the epic with the intimate, the galactic with the personal, spectacle with ideas that matter.\" Fresh approaches to familiar elements (FTL, aliens, empires). Cultural specificity drawn from diverse traditions. Thematic exploration through character experience rather than abstract discussion. Distinctive voice. \"Galactic conflict becomes meaningful because we care about the characters experiencing it.\""

  CC-086:
    name: "Geography and Physical World Plausibility"
    measures: "Whether the physical world -- terrain, climate, ecology, distances, travel times -- is internally plausible and consistent."
    score_0: "Rivers flow the wrong way without explanation. Climate zones make no geographical sense. Travel times are wildly inconsistent -- journeys that take weeks in one chapter take hours in another. Ecology is impossible (a desert next to a rainforest with no transition). Maps contradict the narrative."
    score_5: "Geography follows real-world principles or clearly explained speculative ones. Climate zones, biomes, and ecology are internally consistent. Travel times are plausible and consistent throughout. The physical world shapes culture, trade, and conflict in recognizable ways. When geography violates real-world rules, there is an in-world explanation that creates rather than destroys interest."

  CC-088:
    name: "Hero's Journey Execution (Fantasy)"
    measures: "Whether the hero's journey structure (if used) is executed with depth rather than as a mechanical template"
    score_0: "The hero's journey beats are hit mechanically: call to adventure, refusal, mentor, trials, ordeal, return. Each beat is present but perfunctory. The structure dictates the story rather than the story expressing itself through the structure. No psychological depth or thematic resonance."
    score_5: "The hero's journey structure is internalized and expressed through character-specific detail. The call to adventure is unique to this character. The refusal reflects real psychological resistance. The mentor relationship has specific dynamic. Trials test character-specific weaknesses. The ordeal forces genuine transformation. The return reflects earned change. The structure serves the story; it doesn't constrain it."

  CC-089:
    name: "History Informing Present"
    measures: "Whether the world's past visibly shapes its present -- through ruins, traditions, grudges, institutions, legends, and scars on the landscape -- rather than history being absent or decorative."
    score_0: "The world has no visible past. There are no ruins, no old grudges, no institutions shaped by historical events, no cultural memories or traditions with roots in earlier eras. Characters behave as though history began with them. Or history is mentioned but never affects anything."
    score_5: "Historical events created the present political map, cultural tensions, institutional structures, and character worldviews. History is visible in the landscape (ruins, monuments, scarred terrain), in language (idioms referring to past events), in customs (traditions whose original meaning has been half-forgotten), and in ongoing conflicts (ancient grudges, territorial disputes, religious schisms). Characters are products of their history even when they don't know it."

  CC-090:
    name: "Hook Effectiveness"
    measures: "Whether the opening lines and pages create immediate engagement through curiosity, tension, voice, or intrigue that compels continued reading."
    score_0: "The opening generates no curiosity, poses no questions, establishes no tension, and provides no reason to continue reading. The reader can put the book down without wondering what happens next."
    score_5: "The opening immediately drops the reader into a moment of interest or tension, establishes a distinct voice, raises compelling questions, and creates an irresistible pull to continue reading."

  CC-091:
    name: "Hook Honesty"
    measures: "Whether the opening hook accurately represents the story that follows, rather than using a disconnected attention-grabber."
    score_0: "The hook is a false promise—an exciting or intriguing opening that has no connection to the actual story (e.g., an action scene revealed to be a dream, a provocative statement never explored)."
    score_5: "The hook is an organic entry point into the story's actual narrative—the intrigue it generates is directly connected to the story's core conflict, themes, and character journey."

  CC-092:
    name: "Idiot Plot Avoidance"
    measures: "Whether the plot requires characters to act with believable intelligence and make decisions consistent with their established competence, or whether the plot only works because characters are unreasonably stupid."
    score_0: "The plot depends entirely on intelligent characters making persistently poor decisions without justification; a single smart question or obvious action by any character would resolve the central conflict; characters avoid sharing critical information, asking obvious questions, or collaborating for no believable reason."
    score_5: "Characters act with intelligence consistent with their established traits; when characters make mistakes, they stem from believable limitations (stress, missing information, emotional conflict, youth); conflicts arise from genuine dilemmas rather than manufactured stupidity; readers never ask \"why didn't they just...?\" without the story providing a satisfying answer."

  CC-093:
    name: "In Medias Res Execution"
    measures: "When a story opens in medias res, whether it balances immediate engagement with necessary context"
    score_0: "Opening plunges into action with no character grounding, making readers unable to care about what's happening; or the in medias res opening is the most exciting thing in the story and everything after is anticlimactic; or the story delays essential context so long that confusion overwhelms intrigue"
    score_5: "The mid-action opening creates immediate engagement while still orienting the reader to character and stakes; context is woven in naturally rather than through exposition dumps; the opening's promise is fulfilled and exceeded by later events; the thin line between \"dangling enough unknowns to entice\" and \"failing to explain critical background\" is navigated successfully"

  CC-094:
    name: "Inciting Incident Placement"
    measures: "Whether the inciting incident—the event that disrupts ordinary life and launches the story—occurs at the right point in the narrative, neither too early nor too late."
    score_0: "The inciting incident is either missing entirely, buried so deep in the manuscript (50+ pages) that readers have abandoned the story, or occurs so early that readers have no context or investment."
    score_5: "The inciting incident occurs at the optimal point—early enough to maintain engagement but late enough that readers understand the protagonist's ordinary world and have reason to care about the disruption."

  CC-095:
    name: "Incluing and Worldbuilding Integration"
    measures: "Whether unfamiliar world elements (technology, magic systems, social structures, terminology) are integrated seamlessly through contextual clues, or explained through direct exposition blocks."
    score_0: "World mechanics are explained in lecture-format passages. Invented terminology is defined in parenthetical asides or footnotes that break narrative flow. Characters explain their own world as if they are strangers to it. The narrative stops to teach the reader about the setting."
    score_5: "World elements emerge through character interaction with them. Invented terms are contextualized by usage, allowing readers to infer meaning. Characters demonstrate familiarity with their world rather than explaining it. Information about world mechanics appears at the moment of narrative relevance. Readers build their understanding incrementally from scattered clues, and the gap between knowing and not-knowing creates engagement rather than confusion."

  CC-096:
    name: "Internal Consistency / World Logic"
    measures: "Whether the story's established rules (physical, magical, social, technological) remain consistent throughout and whether violations are identified and justified."
    score_0: "Established rules are violated without acknowledgment; magic systems work differently in different scenes for plot convenience; characters possess abilities in one scene that are forgotten in another; the world's own logic contradicts itself."
    score_5: "Rules established early hold throughout; any apparent violation is acknowledged and explained within the world's logic; characters' capabilities remain consistent or change through clearly established mechanisms; readers can trust that the story's logic won't change to suit the author's convenience."

  CC-097:
    name: "Internal-External Conflict Integration"
    measures: "Whether internal psychological conflict and external plot conflict are linked, with each influencing and complicating the other."
    score_0: "Internal and external conflicts exist in isolation; the character's psychological struggle has no bearing on plot events; or the story has only external conflict with no internal dimension (or vice versa)."
    score_5: "Internal conflict directly fuels and complicates external conflicts; character flaws create or worsen external obstacles; external challenges force confrontation with internal demons; resolution of one requires transformation in the other."

  CC-099:
    name: "Irreversibility of Key Decisions"
    measures: "Whether the protagonist faces genuine points of no return where significant decisions cannot be undone, creating permanent consequences that constrain future options."
    score_0: "The protagonist can undo or walk back from any decision without cost; there are no permanent consequences; the story provides easy escape routes from every commitment; nothing the character does has lasting impact on their options."
    score_5: "The story contains clear \"doors of no return\" where stepping through prevents reverting to the previous state; decisions entangle the protagonist more deeply; reversals come only at significant additional cost; crises force genuine, irreversible choices that shape all subsequent possibilities."

  CC-100:
    name: "Knox's Decalogue Compliance"
    measures: "Whether a fair-play mystery adheres to Knox's ten commandments for detective fiction"
    score_0: "Multiple commandments violated egregiously. The criminal's thoughts are shown to the reader (giving false information). Supernatural solutions. The detective solves the crime by accident or intuition. The Watson conceals his thoughts. Twins or doubles appear without preparation."
    score_5: "All applicable commandments honored. The criminal appears early but their thoughts are not revealed. Solutions are naturalistic. The detective works through logic and evidence. Clues are shared with the reader. No unearned shortcuts. Any deviation from the rules is deliberate, acknowledged, and serves the story."

  CC-101:
    name: "Language and Naming Consistency"
    measures: "Whether names, linguistic patterns, and language use within the world feel consistent and reflective of the cultures that produced them."
    score_0: "Names from wildly different linguistic traditions coexist within a single culture with no explanation. Naming conventions shift randomly. Characters from the same region have names that sound like they come from completely different languages. Place names bear no phonological relationship to each other despite geographic proximity."
    score_5: "Naming conventions within each culture share recognizable phonological patterns. Different cultures have distinct naming traditions that reflect their linguistic backgrounds. Names carry cultural information (class, region, era, profession) that readers can learn to decode. Language barriers and linguistic differences are acknowledged when they would realistically exist."

  CC-102:
    name: "Magic System Coherence (Fantasy)"
    measures: "Whether the fantasy's magic system follows consistent rules proportional to its role in problem-solving"
    score_0: "Magic is arbitrary and solves problems with no established rules. New magical abilities appear whenever the plot requires them. There are no costs, limitations, or constraints. Magic renders all non-magical conflict moot. The reader cannot predict what magic can or cannot do, yet magic routinely resolves climactic problems."
    score_5: "Magic operates within clear, consistent principles. If hard magic: rules are established, limitations create tension, and clever application of known rules drives solutions. If soft magic: it creates wonder and atmosphere, rarely solves problems, and when characters attempt magic it doesn't do what they expect. Costs and limitations make magic interesting. The system feels both wondrous and constrained."

  CC-103:
    name: "Magic/Technology System Design"
    measures: "Whether the world's magic, technology, or other speculative systems are designed with coherent rules, meaningful limitations, narrative costs, and logical consequences."
    score_0: "Magic or technology has no rules, no limitations, and no costs. It works however the plot needs it to. Conflicts are resolved by powers that appear without foreshadowing. The speculative system is a black box that generates whatever the author needs when they need it."
    score_5: "The system has clear rules, meaningful limitations, and narrative costs. Limitations generate conflict rather than resolving it. The system is explored in depth rather than breadth -- a few powers considered thoroughly rather than many powers used superficially. Consequences ripple logically through society, culture, and daily life."

  CC-105:
    name: "Midpoint Effectiveness"
    measures: "Whether the story's midpoint functions as a genuine pivot that reorients the narrative"
    score_0: "No identifiable midpoint event; the 50% mark passes without any shift in character understanding, stakes, or approach; protagonist remains in the same reactive mode throughout; the middle section sags with repetitive complications"
    score_5: "At approximately the 50% mark, a major event occurs that constitutes a Moment of Truth, shifting the protagonist from reaction to action; the midpoint functions as a set-piece scene that is one of the story's most visual/dramatic moments; it reveals new information that recontextualizes the conflict; it may include mirror symbolism where the protagonist confronts themselves"

  CC-107:
    name: "Multi-Layered Conflict Structure"
    measures: "Whether the story operates on multiple simultaneous conflict layers (internal, interpersonal, societal) that influence each other."
    score_0: "Only one type of conflict exists (typically external/interpersonal with no internal or societal dimension); conflict operates on a single plane."
    score_5: "Multiple conflict layers operate simultaneously and intersect: internal psychological struggles affect interpersonal relationships which connect to broader societal forces; resolving one layer impacts others; the narrative weaves these layers into a unified whole."

  CC-108:
    name: "Multi-POV Management"
    measures: "Whether a multi-POV narrative distributes perspectives effectively, with each POV character earning their perspective through narrative necessity, distinctive voice, and consistent presence."
    score_0: "Too many POV characters dilute reader investment. POV characters appear sporadically or are introduced late without establishment. Some POVs could be removed without affecting the plot. POV characters' voices are interchangeable. Distribution is random rather than purposeful."
    score_5: "Every POV character is essential to the story — each has unique access to information, stakes, and thematic resonance that cannot be obtained through another character. POVs are established early and distributed consistently. Each POV forms a satisfying thread when read sequentially. The number of POVs is the minimum needed for the story."

  CC-109:
    name: "Mystery Difficulty Calibration"
    measures: "Whether the mystery is neither too easy nor too hard for the reader to solve"
    score_0: "The mystery is either trivially obvious (the first suspect is the culprit, no misdirection) or impossibly opaque (the solution depends on obscure knowledge or withheld information). The reader either solves it in chapter two or cannot solve it at all. No middle ground of productive difficulty."
    score_5: "The mystery hits the sweet spot: most attentive readers will suspect the truth at some point but be led astray by red herrings. The actual solution, when revealed, makes the reader think \"I almost had it\" or \"I should have seen that.\" The CrimeReads standard: too-difficult mysteries make readers feel \"spurned by an unearned ending\"; too-easy mysteries are dismissed as predictable."

  CC-110:
    name: "Narrative Momentum"
    measures: "Whether the story maintains a sense of continuous forward movement that pulls readers through the narrative with increasing force."
    score_0: "The story stalls repeatedly; scenes don't generate forward momentum; subplots dissipate energy rather than building it; the middle sags with no sense of advancement; readers feel no compulsion to continue."
    score_5: "Each scene ends with a hook or unresolved question that propels into the next; the domino-chain of cause and effect creates accelerating momentum; pacing alternates between tension and release while maintaining overall forward drive; unresolved problems pile up rather than resolving completely, creating cumulative pressure toward the climax."

  CC-111:
    name: "Narrative Promise Establishment"
    measures: "Whether the opening pages clearly establish what kind of story the reader is entering—genre, tone, style, pacing, and the nature of the central conflict."
    score_0: "After reading the opening, a reader cannot identify the genre, has no sense of tone, does not know what kind of experience to expect, and would be unable to describe what the story is \"about.\""
    score_5: "The opening pages clearly signal genre, establish tone, introduce the narrative style, and give readers a confident sense of the kind of experience they are signing up for, all without heavy-handed exposition."

  CC-112:
    name: "Nonlinear Structure Integrity"
    measures: "Whether stories told out of chronological order maintain causal logic across both the actual timeline and the presentation order, with each structural choice serving a clear purpose."
    score_0: "Nonlinear structure confuses rather than illuminates; readers cannot track when events actually occur; the presentation order has no thematic justification; flashbacks or time-jumps create rather than resolve confusion; hidden information retroactively contradicts what was previously established."
    score_5: "The story maintains integrity on two tracks: the linear story (traditional arc) and the story-as-told (thematic connections justify presentation order); each revelation is causally consistent with what came before; nonlinear choices deepen understanding; readers can reconstruct the chronological timeline without encountering contradictions."

  CC-113:
    name: "Obstacle Difficulty Calibration"
    measures: "Whether obstacles are appropriately challenging — not so easy as to be trivial, not so hard as to require authorial intervention."
    score_0: "Obstacles are either trivially easy (protagonist breezes through) or impossibly hard (requiring deus ex machina or coincidence to overcome); difficulty is not calibrated to the protagonist's abilities."
    score_5: "Obstacles are at the edge of the protagonist's capabilities, requiring full use of their skills, growth, or sacrifice; each obstacle is genuinely difficult but not impossibly so within the story's logic; the protagonist must extend themselves to succeed."

  CC-114:
    name: "Opening Hook"
    measures: "Whether the first pages create sufficient engagement — through conflict, curiosity, voice, character connection, or in medias res action — to compel continued reading"
    score_0: "The opening generates no questions, no tension, no character connection, and no reason to continue. It begins with lengthy exposition, generic description, or world-building that provides no emotional or narrative hook."
    score_5: "The opening immediately engages through conflict, curiosity, emotional connection, distinctive voice, or plunging into action (in medias res). Questions are raised. A character's emotional state or predicament draws the reader in through empathy. The reader feels compelled to continue within the first page."

  CC-115:
    name: "Opening Orientation"
    measures: "Whether the opening provides enough information for readers to understand where they are, when they are, and who they are following."
    score_0: "The opening leaves readers completely disoriented—unable to determine the setting, time period, protagonist identity, or basic situation. Information is either absent or deliberately withheld to the point of confusion."
    score_5: "The opening efficiently orients readers in space, time, and character while maintaining intrigue. Readers know who the protagonist is, where the story takes place, and what situation they are entering without being subjected to exposition dumps."

  CC-116:
    name: "Opening Pace and Inciting Incident Timing"
    measures: "Whether the story's opening establishes engagement quickly enough for its genre, with the inciting incident arriving at an appropriate point rather than being delayed excessively or rushed."
    score_0: "The inciting incident is buried deep in the manuscript (past 20% of the story) with no hooks to sustain interest during the preamble. Or: the inciting incident occurs on page one before the reader has any reason to care."
    score_5: "The hook arrives almost immediately (within 1% of the narrative). The inciting incident is placed appropriately for genre -- thrillers within the first few pages, literary fiction within the first 10%, epic fantasy perhaps somewhat later but with strong hooks maintaining engagement. The reader's baseline reality is established efficiently before being disrupted."

  CC-117:
    name: "Opening Pacing Balance"
    measures: "Whether the opening achieves the right balance between action/engagement and context/orientation—neither drowning the reader in backstory nor throwing them into incomprehensible action."
    score_0: "The opening is either a wall of backstory/exposition that delays the story for dozens of pages, or it is so fast and contextless that readers are confused and disoriented."
    score_5: "The opening enters the story at the right moment—\"fast, but not too fast\"—providing enough context for reader orientation while maintaining momentum and engagement. Backstory is \"seasoning, not the meal.\""

  CC-118:
    name: "POV Selection Appropriateness"
    measures: "Whether the chosen point of view serves the story's needs in terms of intimacy, scope, information control, and reader experience."
    score_0: "POV chosen arbitrarily or by default, actively working against the story's needs (e.g., first person used for a sprawling multi-character epic requiring simultaneous access to distant events; omniscient used for a claustrophobic psychological thriller needing deep interiority)."
    score_5: "POV chosen with clear intent that serves story goals — the limitations of the chosen perspective create productive narrative tension (suspense, dramatic irony, unreliable narration) rather than fighting the material. Every advantage of the chosen POV is exploited."

  CC-119:
    name: "Perspective-Filtered Worldbuilding"
    measures: "Whether world information is filtered through specific character perspectives -- revealing character psychology through what they notice, ignore, value, or misunderstand about their world -- rather than delivered from an omniscient camera."
    score_0: "World description comes from a neutral, omniscient camera that notices everything with equal weight. Characters' unique perspectives do not filter what is described. A peasant farmer and a merchant prince notice the same things about the same city in the same way."
    score_5: "Each character notices, values, and interprets the world differently based on their background, training, class, and personality. A soldier notices defensible positions; a merchant notices trade goods; a child notices hiding places. Worldbuilding reveals character as much as it reveals setting. What characters miss or misunderstand about their own world is as revealing as what they understand."

  CC-120:
    name: "Philosophical Depth Without Didacticism"
    measures: "Whether the work explores philosophical or moral ideas through dramatic experience rather than through lectures, essays, or expository passages that halt the narrative."
    score_0: "Philosophical ideas are presented through exposition, lectures, or characters functioning as \"mere vessels for philosophical discussions rather than as fully developed individuals.\" Philosophy is \"disconnected from the story's emotional core.\" Dialogue sounds artificial or unnatural when conveying ideas."
    score_5: "Philosophical themes are \"integral to character development and plot progression.\" Ideas emerge through \"conflicts, character choices, and consequences.\" Characters \"struggle with ideas in a way that aligns with their personal conflicts, motivations, and the story's stakes.\" Philosophy is dramatized through action, as in Crime and Punishment, where Raskolnikov's ideas are tested through lived consequences."

  CC-121:
    name: "Pixar Causal Spine"
    measures: "Whether the story follows a causal spine structure where each event generates the next through explicit causation: \"Once upon a time... Every day... One day... Because of that... Because of that... Until finally...\""
    score_0: "The story events cannot be mapped onto a causal spine; events happen independently of each other; no \"because of that\" connector can logically link consecutive events; the story reads as a list of things that happen rather than a chain of consequences."
    score_5: "The entire story can be mapped onto the causal spine with each \"because of that\" connector feeling natural and inevitable; the disruption of status quo triggers a chain of causally linked events that build to a climax; every event is both a consequence of the prior event and a cause of the next."

  CC-122:
    name: "Plot Twist Satisfaction (Mystery/Thriller)"
    measures: "Whether plot twists are simultaneously surprising and inevitable — unexpected but earned through prior setup"
    score_0: "Twists are either absent (predictable throughout) or unearned (depend on withheld information, break established rules, or contradict prior characterization). The reader feels cheated rather than surprised. Twists exist for shock value rather than narrative purpose."
    score_5: "Twists are \"the only logical answer to a puzzle that seemed seemingly impossible to solve.\" Unexpected yet inevitable in retrospect. All clues exist on the page though misinterpreted. The twist recontextualizes earlier scenes to reward rereading. Multi-dimensional villains with understandable (if wrong) motivations. The revelation explains overlooked clues."

  CC-123:
    name: "Premise Exploitation (Fun and Games)"
    measures: "Whether the story actively explores and exploits its own premise, delivering scenes that showcase the core concept in action."
    score_0: "The story's premise is established but never explored. The unique concept that attracted the reader is abandoned in favor of generic plot mechanics. The \"trailer moments\" are absent."
    score_5: "The story thoroughly exploits its premise, delivering multiple scenes that showcase the core concept in action. Readers get the specific experiences that the premise promised. The concept is explored from multiple angles."

  CC-124:
    name: "Problem Statement Establishment"
    measures: "Whether the story establishes its core problem early enough for readers to orient themselves and invest in the narrative."
    score_0: "The core problem driving the narrative is either never clearly established or appears so late that readers have disengaged before understanding what the story is about."
    score_5: "The core problem is established early—ideally in the first couple of pages—giving readers immediate orientation and reason to invest. The resolution follows logically from this established problem."

  CC-125:
    name: "Progressive Complications"
    measures: "Whether obstacles facing the protagonist escalate in difficulty, requiring increasing effort and resources, while remaining relevant to the protagonist's goal and varied in type."
    score_0: "Obstacles are static in difficulty, repetitive in type, or unrelated to the protagonist's goal; the protagonist faces the same kind of challenge over and over; complications decrease in intensity mid-story; obstacles don't require increasing effort to overcome."
    score_5: "Each complication is harder than the last, directly threatens the protagonist's goal, requires greater effort and new approaches, combines internal and external conflict, and culminates in a turning point that forces abandonment of the original plan."

  CC-126:
    name: "Prologue/Epilogue Structural Justification"
    measures: "Whether prologues and epilogues serve essential structural functions rather than existing as default conventions"
    score_0: "Prologue contains information that would be better woven into the narrative; prologue is used as an excuse for a slow opening chapter; epilogue is used because the ending didn't resolve things adequately; prologue and epilogue feel disconnected from the main story; or prologues/epilogues are used by default without considering whether they're needed"
    score_5: "If present, the prologue makes specific promises that couldn't be made any other way (worldbuilding in unfamiliar settings, establishing future stakes, introducing a different time period); the epilogue provides closure that the climax couldn't deliver (time jump to show long-term consequences, character growth validation); if absent, the story is better without them and doesn't need external framing"

  CC-127:
    name: "Protagonist Agency"
    measures: "The degree to which the protagonist actively drives the plot through their own choices and actions rather than being passively carried along by events or other characters."
    score_0: "The protagonist is a passive observer, recipient, or victim; events would unfold identically without them; other characters or coincidences drive all major plot movements; the protagonist functions as a witness to the story rather than its engine."
    score_5: "The protagonist initiates approximately 70% of major plot movements through deliberate choices; their decisions create consequences that generate further plot; they actively solve problems rather than having solutions delivered to them; the climax depends on their specific actions."

  CC-128:
    name: "Protagonist Goal Specificity"
    measures: "Whether the protagonist has a clear, concrete, measurable goal that drives the narrative and against which progress and setbacks can be evaluated."
    score_0: "The protagonist has no discernible goal, or their wants are vague and unrelated to the plot, or they aren't actively pursuing anything; readers cannot measure progress because there's nothing to measure against; the character drifts through events without striving."
    score_5: "The protagonist has a specific, concrete objective that is actively pursued; the goal is relevant to the main plot; antagonistic forces directly oppose it; readers can clearly evaluate whether the protagonist is getting closer to or further from their goal at any point; goals may evolve across acts but remain defined."

  CC-130:
    name: "Reader Expectation Awareness"
    measures: "Whether the author demonstrates knowledge of what readers of this specific genre expect"
    score_0: "The author appears unaware that the genre has conventions at all. Missing elements are not subverted — they are simply absent, as though the author has never read in the genre. The story reads like someone who has heard of the genre secondhand."
    score_5: "The author demonstrates intimate familiarity with genre expectations and deploys them strategically — fulfilling some, subverting others, and innovating within established frameworks. Even subversions demonstrate knowledge of what is being subverted. Experienced genre readers recognize the author as one of their own."

  CC-131:
    name: "Reader-Writer Contract Establishment"
    measures: "Whether the opening establishes a clear implicit contract about genre, plot direction, character focus, style, and point of view that the reader can rely upon."
    score_0: "The opening establishes no identifiable contract—the reader has no basis for expectations about genre, tone, character, or narrative direction after reading the first chapter."
    score_5: "The opening clearly and skillfully establishes expectations about genre, tone, character focus, narrative style, and story direction, giving the reader a confident framework for their investment."

  CC-132:
    name: "Reader-Writer Contract Fulfillment"
    measures: "Whether the story delivers on the implicit promises made in its opening, resolving in ways that honor the established expectations."
    score_0: "The story systematically violates its own contract—the opening promises one kind of experience but the story delivers something entirely different, with no earned justification for the shift."
    score_5: "The story fulfills every major promise established in its opening while incorporating surprising elements that feel organic and earned. The reader finishes feeling that the opening's promises were honored and exceeded."

  CC-134:
    name: "Red Herring and Misdirection Quality"
    measures: "Whether red herrings and misdirection are employed skillfully to mislead without cheating"
    score_0: "No misdirection exists (mystery is obvious from the start), OR misdirection relies on authorial cheating — withholding information, lying to the reader, or presenting false evidence that could not reasonably be distinguished from real clues."
    score_5: "Red herrings exploit confirmation bias and primacy effect to lead the reader astray using real information. Each red herring has an innocent explanation that is revealed alongside the true solution. Misdirection is achieved by making the reader look at the right things for wrong reasons. On rereading, the difference between true clues and red herrings is clear."

  CC-135:
    name: "Red Herring vs. Broken Promise Distinction"
    measures: "Whether misdirection in the story functions as fair play (red herrings that are later explained) rather than broken promises (setups that are simply abandoned or information that is withheld dishonestly)."
    score_0: "The story introduces elements that appear significant but are simply dropped; misdirection works by withholding information rather than directing attention; readers feel \"the author lied to me\" rather than \"the author outsmarted me\"; red herrings are never explained or resolved."
    score_5: "Every red herring pays off by being revealed as false; misdirection gives extra information and redirects attention rather than withholding truth; false leads are cleared and explained; the revelation makes readers feel cleverly misled rather than cheated; even deliberately misleading elements serve the story's architecture."

  CC-136:
    name: "Religion and Belief Systems"
    measures: "Whether the world's religious and belief systems feel organic, influential, and integrated into culture rather than existing as decoration or absent entirely when they should be present."
    score_0: "Religion is absent from a world where it logically should exist, or it exists as pure decoration with no influence on character values, social norms, or plot. Belief systems are reduced to the existence of temples and priests without affecting how people actually think or behave."
    score_5: "Belief systems shape character worldviews, social taboos, calendar systems, art, architecture, interpersonal relationships, and political power. Religious diversity creates tension and alliances. Characters have individual relationships with their belief systems (devout, skeptical, lapsed, converted). Religion interacts with the world's speculative elements (magic, technology) in consequential ways."

  CC-137:
    name: "Resolution Earned-ness"
    measures: "Whether the story's resolution is achieved through means established within the narrative—through character agency, foreshadowed resources, and logical consequences—rather than through external, unearned intervention."
    score_0: "The resolution is a deus ex machina—the conflict is resolved by an external force, previously unknown resource, or unearned coincidence that was never set up or foreshadowed. The characters' struggles are rendered meaningless."
    score_5: "The resolution is achieved through the protagonist's own agency using skills, relationships, or resources established earlier in the narrative. The victory costs something. All the pieces were visible in retrospect."

  CC-138:
    name: "Resolution Quality"
    measures: "Whether the story's ending fulfills the promises established at the beginning, resolves major plot threads, emerges from the protagonist's climactic choice, and carries appropriate consequences."
    score_0: "The ending introduces new elements not established earlier; major plot threads are left unresolved without thematic purpose; the resolution feels rushed or disconnected from the climax; consequences evaporate; the ending contradicts the genre contract."
    score_5: "The resolution directly flows from the protagonist's climactic choice; every major plot thread is resolved or its non-resolution serves clear thematic purpose; consequences of the crisis persist; the ending fulfills genre promises while still feeling fresh; falling action and denouement provide proper emotional landing."

  CC-139:
    name: "Revelation Scheduling"
    measures: "Whether information is revealed to the reader at the optimal time for maximum narrative effect"
    score_0: "All important information is front-loaded in exposition dumps; there is nothing left to discover after the first quarter; or critical information is withheld so long that readers lose interest or feel cheated; revelations have no dramatic impact because they weren't set up; no layered discovery"
    score_5: "Information is released strategically using the tease-hint-reveal pattern; each revelation raises new questions, creating nested mysteries; unreliable narrators or limited perspectives create natural information asymmetry; the four-step slow reveal structure (present consistent aspect, introduce contradictory behavior, recontextualize, disclose truth) is employed effectively; ambiguity techniques create productive uncertainty; the timing of revelations is \"just right\" — neither too soon nor too late"

  CC-140:
    name: "Reversal and Twist Quality"
    measures: "Whether plot reversals and twists are earned through prior narrative groundwork, feel both surprising and retrospectively inevitable, and deepen rather than contradict the story."
    score_0: "Twists contradict established facts without justification; reversals have no foreshadowing and feel arbitrary; twists exist for shock value alone and don't deepen understanding; the story \"cheats\" by withholding information the viewpoint character possesses."
    score_5: "Reversals cause readers to reinterpret everything that came before in a new light; twists are foreshadowed through emotional cues and subtle details; the reversal feels both surprising and, in retrospect, inevitable; characters react to reversals with appropriate emotional weight rather than nonchalant acceptance."

  CC-141:
    name: "Safety-to-Threat Spectrum Calibration"
    measures: "Whether the story correctly positions itself on the genre-appropriate spectrum between \"reader will feel safe\" and \"reader will feel threatened\" and maintains that position."
    score_0: "The story is incorrectly calibrated—it promises safety (romance) but delivers threat (horror), or vice versa, without purpose or warning. The reader's emotional experience is mismatched with their expectations."
    score_5: "The story accurately positions itself on the safety-to-threat spectrum for its genre and delivers an experience consistent with that positioning throughout."

  CC-142:
    name: "Sagging Middle Prevention"
    measures: "Whether the story's middle section (approximately Act 2) maintains momentum through meaningful change, escalation, and a strong midpoint, rather than collapsing into repetitive filler."
    score_0: "The middle section drags. The same types of conflicts repeat without escalation. Thematic conflict becomes murky. The protagonist stops making significant decisions. Chapters blur together. Readers report that \"the beginning hooked me and the ending delivered, but the middle dragged.\""
    score_5: "A strong midpoint event divides the middle into two distinct halves. The protagonist transitions from reactive to proactive. Each scene in the middle section adds new information, raises stakes, or forces character growth. The middle feels like purposeful escalation, not padding."

  CC-143:
    name: "Satisfying vs. Derivative Balance"
    measures: "Whether the story satisfies genre conventions while bringing enough originality to avoid being derivative"
    score_0: "The story is indistinguishable from dozens of others in the genre. Every plot point, character type, and scene has been seen before in exactly this configuration. The author has replicated genre patterns without adding anything — no unique voice, perspective, or innovation. A reader could confuse this with any other competent genre exercise."
    score_5: "The story is unmistakably itself while being clearly of its genre. Conventions are fulfilled but through the lens of a distinctive authorial vision. Like Christie, Butler, or Pratchett: working within genre boundaries while producing deeply original work. The reader gets the satisfaction of genre expectations met PLUS the thrill of encountering something genuinely new within that framework."

  CC-144:
    name: "Scale and Scope Management (Space Opera)"
    measures: "Whether epic scale is maintained while keeping stakes personal and comprehensible"
    score_0: "Scale is either absent (story could take place anywhere) or overwhelming (numbers and planets are listed but none feel real). \"A billion people died\" is stated but not felt. Characters observe galactic events from a distance without personal connection. Conversely, the story may be entirely personal with no sense of the cosmic backdrop."
    score_5: "Scale is simultaneously epic and intimate. The destruction of a planet is felt through one character who lost their home. Galactic politics are understood through their impact on specific communities. Characters are \"directly affected by the galactic conflict\" rather than observing it. Rising stakes escalate from personal to local to planetary to galactic naturally."

  CC-145:
    name: "Scene Causality (Inter-Scene)"
    measures: "Whether scenes connect causally to each other -- whether you can say \"because of that\" rather than \"and then\" between consecutive scenes, forming a causal chain rather than an episodic sequence."
    score_0: "Scenes are episodic -- connected only by featuring the same characters. No scene's outcome drives the next scene's situation. Removing or reordering scenes would not create logical problems."
    score_5: "Every scene's outcome creates the conditions for the next scene. Conflict in one scene becomes the motivating cause for the next. Emotional responses in one scene drive decisions in the following scene. Unexpected objects, locations, and actions are foreshadowed in earlier scenes. The sequence feels inevitable."

  CC-146:
    name: "Scene Disaster / Outcome Quality"
    measures: "Whether scenes end with outcomes that propel the story forward rather than resolving neatly, and whether the five outcome types (Yes, Yes-But, No, No-And, No-But) are deployed with strategic variety."
    score_0: "Scenes consistently resolve with clean success (\"yes\" endings) that eliminate forward tension, or outcomes are muddled and unclear. The story loses momentum because nothing goes meaningfully wrong."
    score_5: "Scene outcomes strategically vary among the five types. \"Yes, but\" and \"No, and furthermore\" dominate the middle of the story, creating escalating complications. Clean \"yes\" endings are reserved for climactic moments. Each outcome creates a new situation requiring the character to respond."

  CC-147:
    name: "Scene Goal Clarity"
    measures: "Whether the POV character has a clear, concrete, specific goal established early in the scene that the reader can identify and track progress against."
    score_0: "No identifiable character goal exists in the scene. The character drifts through events without wanting anything specific. Readers cannot articulate what success or failure would look like."
    score_5: "The POV character's scene goal is concrete, specific, and established within the first few paragraphs. The goal connects to the larger plot goal, has physical manifestation even when emotional/mental, and readers can measure progress toward it throughout the scene."

  CC-148:
    name: "Scene Necessity (The Deletion Test)"
    measures: "Whether each scene is structurally necessary -- whether removing it would cause the plot, character development, or relationship evolution to break down."
    score_0: "Multiple scenes fail the deletion test. Removing them would not affect plot progression, character development, or relationship evolution. The story contains filler, research dumps, Point-A-to-Point-B transitions, rehashed information, and scenes exploring minor characters without story purpose."
    score_5: "Every scene is load-bearing. Removing any single scene would create a gap that readers would notice -- either plot logic would break, a character relationship would lose a necessary development step, or essential information would be missing."

  CC-149:
    name: "Scene Purpose and Necessity"
    measures: "Whether every scene advances the story through clear goal, friction, and change"
    score_0: "Multiple scenes could be removed without affecting the story; scenes lack identifiable goals, conflicts, or changes; scenes repeat the same information or emotional beat; the story contains scenes that exist only for atmosphere or information dumps"
    score_5: "Every scene has a clear goal (what someone wants), friction (an obstacle), and change (a win, loss, or new knowledge that shifts the next move); removing any scene would create a gap in causality or understanding; scenes advance both plot and character simultaneously"

  CC-150:
    name: "Scene Structure Completeness (Five Commandments)"
    measures: "Whether each scene contains all five essential structural elements identified by the Story Grid methodology: inciting incident, turning point progressive complication, crisis, climax, and resolution."
    score_0: "Scenes lack identifiable structural elements. No inciting incident launches the scene. No progressive complications build tension. No crisis forces a decision. No climax enacts a choice. No resolution reveals consequences."
    score_5: "All five commandments are present and identifiable. The inciting incident launches the scene's action. Progressive complications escalate. A crisis forces a best-bad-choice or irreconcilable-goods decision. The climax shows the character's active choice. The resolution reveals the value shift and immediate consequences."

  CC-151:
    name: "Scene Turn / Polarity Shift"
    measures: "Whether the value-charged condition of the character's life changes from the beginning to the end of the scene -- a shift in polarity that gives the scene dramatic purpose."
    score_0: "The value-charged condition of the character's life is identical at the scene's end to its beginning. Nothing meaningful has changed. The scene is a \"nonevent\" with activity but no change."
    score_5: "A clear, significant polarity shift occurs. The value at stake (love/hate, safety/danger, hope/despair, knowledge/ignorance) is identifiably different at the scene's close. The shift occurs through a specific turning point (action, revelation, or change of heart) and affects subsequent story developments."

  CC-152:
    name: "Scene Variety (Avoiding Repetitive Scene Structure)"
    measures: "Whether scenes vary in their internal structure, openings, and resolutions, rather than following the same pattern every time."
    score_0: "Every scene follows an identical structural pattern. All scenes open the same way, develop the same way, and close the same way. In a cop story, every investigation scene is structurally interchangeable. Readers detect the formula and disengage."
    score_5: "Scenes vary in opening (action, dialogue, description, flashback), development (escalation patterns, revelation timing), and closing (hook types, resolution levels). Even structurally similar scenes (multiple investigation scenes) each bring something new in structure, not just content."

  CC-153:
    name: "Scene-Level Causal Structure"
    measures: "Whether each scene contains a complete goal-conflict-disaster/reaction-dilemma-decision structure that causally links to adjacent scenes."
    score_0: "Scenes lack clear goals, conflicts, or outcomes; scene transitions are arbitrary rather than causal; scenes resolve completely without generating consequences for the next scene; the motivation-reaction sequence is absent or disordered."
    score_5: "Every scene has a clear character goal, meaningful conflict opposing it, and a disaster or setback that propels into the sequel; sequels contain emotional reaction, dilemma with no good options, and a decision that generates the next scene's goal; motivation-reaction units follow the proper physiological sequence (feeling, reflex, rational action)."

  CC-154:
    name: "Scene-Level Conflict and Opposition"
    measures: "Whether the scene contains genuine opposition that tests the character's pursuit of their goal, creating struggle and requiring difficult choices rather than mere obstacles to navigate."
    score_0: "No opposition exists, or obstacles are trivially overcome without struggle, hard choices, or consequences. The character moves from goal to achievement without meaningful resistance."
    score_5: "The character faces opposition that escalates throughout the scene, forces genuine choices with real consequences, and tests their commitment to the goal. The conflict stems from an antagonistic force (person, environment, internal contradiction) that has its own logic and cannot be easily dismissed."

  CC-155:
    name: "Scene-Level Conflict/Tension Presence"
    measures: "Whether individual scenes contain their own source of conflict or tension, independent of the global story conflict."
    score_0: "Many scenes lack any source of conflict or tension; characters have conversations without opposing goals; scenes exist only to deliver information or move characters between locations."
    score_5: "Nearly every scene contains either active conflict (opposing goals colliding) or tension (threat of conflict, unresolved questions, anticipatory dread); even quiet scenes maintain engagement through emotional undercurrents."

  CC-156:
    name: "Scene-Level Setup and Payoff"
    measures: "Whether scenes properly set up elements that pay off later (either within the scene or in subsequent scenes) and whether the scene itself delivers on promises made by earlier setups."
    score_0: "The scene introduces elements (objects, information, character details) that never pay off, or delivers payoffs for setups that were never established. Chekhov's guns are hung on walls but never fired. The scene feels disconnected from the larger narrative web."
    score_5: "Elements introduced in the scene serve clear narrative purposes -- either paying off within the scene or setting up future payoffs. Earlier setups from previous scenes are paid off at appropriate moments. The reader experiences \"aha-moments\" of recognition when connections become clear. No false promises are made."

  CC-157:
    name: "Scene-Level Stakes"
    measures: "Whether the reader can identify what the character stands to lose or gain in this specific scene, and whether those stakes are clearly communicated regardless of their magnitude."
    score_0: "No identifiable stakes exist. The character pursues a goal but there is no articulated consequence for failure. Alternatively, stakes are so vague (\"bad things will happen\") that they fail to register emotionally."
    score_5: "The reader can articulate precisely what the character stands to lose and why it matters to them specifically. Small but transparent consequences outweigh massive but ambiguous ones. Scene-level stakes connect to but are distinct from overall story stakes."

  CC-158:
    name: "Scene-Level Thematic Integration"
    measures: "Whether each individual scene advances or challenges the theme, rather than theme existing only at the macro level."
    score_0: "Individual scenes have no connection to theme. Scenes serve only plot mechanics without thematic weight. A scene's emotional arc and lesson do not relate to the broader thematic premise."
    score_5: "Every scene tests, challenges, or advances the thematic argument. Scene goals connect to the overarching theme. Character emotional arcs within scenes reflect the broader thematic journey. Even action-oriented scenes carry thematic weight through character choices and consequences. \"Every single sentence, paragraph, and scene in your story can and should be put to the same test: Does this support my theme in some way?\""

  CC-159:
    name: "Scene-Level Value Shift"
    measures: "Whether each scene produces a measurable change in the character's situation, moving from one emotional or circumstantial state to another."
    score_0: "Scenes begin and end in the same state; nothing has changed for any character; the scene could be removed without affecting the story."
    score_5: "Every scene shifts at least one value (safety to danger, trust to betrayal, hope to despair, ignorance to knowledge); the character's situation is measurably different at the end than at the beginning; turning points are identifiable."

  CC-160:
    name: "Scene-Sequel Structure"
    measures: "Whether the narrative alternates between active conflict scenes and reflective sequel sequences to create pacing rhythm"
    score_0: "All action with no reflection (exhausting), or all reflection with no action (boring); scenes lack clear goal-conflict-disaster structure; no identifiable moments where characters process events and make decisions; pacing is monotone"
    score_5: "Scenes follow goal-conflict-disaster structure and are followed by reaction-dilemma-decision sequels; the ratio of scene to sequel varies to control tempo; peaks (scenes) and valleys (sequels) create visual rhythm in the story's pacing; the pattern is flexible rather than mechanical"

  CC-161:
    name: "Scene-to-Summary Ratio"
    measures: "Whether the balance between dramatized scenes and narrative summary is appropriate"
    score_0: "Everything is dramatized including mundane transitions, marches, and routine activities, creating tedious pacing; or everything is summarized including emotionally crucial moments, creating distance and disengagement; no discernible principle governs what gets shown vs. told"
    score_5: "Approximately 90% of the novel is written in scene (dramatized); summary is used selectively for time passage, routine activities, and transitions; the rule \"write the slow parts fast and the fast parts slow\" is followed — mundane events are compressed while significant changes are expanded into full scenes; the choice of what to dramatize versus summarize is principled and consistent"

  CC-162:
    name: "Second Act Structural Integrity"
    measures: "Whether the middle section of the novel avoids the \"sagging middle\" through sufficient turning points and forward momentum"
    score_0: "The middle section feels aimless; the protagonist stops making significant decisions; obstacles repeat without progression; the novelty of the setup has worn off and nothing replaces it; the middle falls into one of two failure modes: repetition (same obstacles with no progression) or stalling (characters processing rather than acting)"
    score_5: "The middle section contains a clear midpoint turn and multiple subsidiary turning points; each cluster of chapters builds toward a moment that reorients the story; smaller reversals maintain anticipation; the middle simultaneously builds tension (things get worse) and develops character (people change); compression is applied to redundant beats; decisions carry escalating weight"

  CC-163:
    name: "Second-Order Consequences and Ripple Effects"
    measures: "Whether the world's speculative elements (magic, technology, altered physics, etc.) have been traced through their logical consequences on society, culture, economics, daily life, and power structures."
    score_0: "Speculative elements exist in isolation. A world has teleportation but cities still look medieval. A society has telepathy but privacy norms are unchanged. Magic exists but has no economic implications. Technology is advanced but society is functionally identical to the present day (\"Earth with hats\")."
    score_5: "Every major speculative element has been traced through its second-, third-, and fourth-order effects. If personal teleportation exists, cities have changed form. If magic is real, institutions have formed around it. The world's premise reshapes everything it logically would: economics, politics, social norms, architecture, daily routines, language, art. The world feels like a system rather than a collection of cool ideas."

  CC-164:
    name: "Secondary Belief vs. Suspension of Disbelief"
    measures: "Whether the world achieves what Tolkien called \"secondary belief\" -- genuine immersion where the reader believes in the world on its own terms -- rather than merely asking the reader to overlook impossibilities."
    score_0: "The world requires constant forgiveness from the reader. Implausible elements are not justified by the world's own logic but must be accepted because \"it's just fantasy.\" The reader is repeatedly pulled out of the story by elements that don't feel true even within the fiction's own rules."
    score_5: "The world commands genuine belief on its own terms. \"He makes a Secondary World which your mind can enter. Inside it, what he relates is 'true': it accords with the laws of that world.\" When disbelief arises, \"the spell is broken; the magic, or rather art, has failed.\" The reader forgets they are reading fiction and inhabits the world directly."

  CC-165:
    name: "Section Break and Transition Craft"
    measures: "Whether scene breaks, section breaks, and transitions serve clear purposes and maintain reader orientation"
    score_0: "Scene breaks are used randomly without clear purpose; transitions between time/place/POV shifts are unmarked and confusing; the reader frequently loses track of when, where, and whose perspective they're in; section breaks are either overused (creating choppiness) or underused (creating walls of undifferentiated text)"
    score_5: "Section breaks are used purposefully to signal changes in time, place, or perspective; transitions open with time anchors and character identification; scene endings create choices that imply the next scene's direction; white space is used strategically around key moments; the overall pattern of breaks creates a rhythm that serves the story's pacing without creating choppiness or monotony"

  CC-167:
    name: "Sense of Wonder"
    measures: "Whether the story evokes the distinctive emotional and intellectual response of awe characteristic of speculative fiction"
    score_0: "The speculative elements are treated as mundane. Alien worlds feel like reskinned Earth. Magic is just technology by another name. Nothing in the story provokes awe, curiosity, or expanded imagination. The reader never thinks \"what if?\" or feels their perception of the possible shift."
    score_5: "The story produces genuine sense of wonder through imaginative speculation. Ideas expand the reader's perception of what is possible. Scale, novelty, or conceptual depth provoke awe. The reader confronts genuinely new ideas rather than familiar ones in costume. Both intellectual stimulation and emotional response are present."

  CC-168:
    name: "Setting as Active Force (World-as-Character)"
    measures: "Whether the setting functions as an active narrative force with its own personality, history, and capacity to shape events -- rather than serving merely as passive scenery."
    score_0: "The setting is inert background. It does not create obstacles, reveal character, generate mood, or change over the course of the story. Locations are functional containers (a room, a forest, a city) with no personality or narrative weight. The story could happen anywhere."
    score_5: "The setting creates conflict, reflects character interiority, establishes and shifts mood, and transforms across the story's arc. It has a backstory, a personality, and a relationship with the characters that evolves. The setting \"speaks to readers, revealing secrets and emotions and feelings in ways the living characters may not be able to share.\" Readers remember the setting as vividly as they remember the characters."

  CC-170:
    name: "Setup-Payoff Consistency (Chekhov's Gun)"
    measures: "Whether narrative elements introduced with emphasis or prominence are eventually used in the story, and whether resolutions are grounded in previously established elements."
    score_0: "Significant narrative elements are introduced with emphasis but never referenced again. Major conflicts are resolved by elements that were never established or foreshadowed. The narrative contains numerous loose ends that appear accidental rather than intentional. Props, abilities, or characters introduced as important simply vanish from the story."
    score_5: "Every element given narrative prominence eventually contributes to the story. Resolutions grow organically from previously established elements. Where setups are deliberately left unresolved (thematic ambiguity, sequel hooks), this is clearly intentional and serves a narrative purpose. Red herrings, if present, function as genre-appropriate misdirection rather than forgotten threads."

  CC-171:
    name: "Showing vs. Telling Conflict"
    measures: "Whether pivotal conflict moments are dramatized in real-time scenes rather than summarized in exposition."
    score_0: "Major conflicts are summarized after the fact (\"They argued about X\"); confrontations happen offscreen; pivotal moments are recounted in summary; the reader is told about tension rather than experiencing it."
    score_5: "All major conflict moments are dramatized in real-time scenes; the reader is present for confrontations, decisions, and turning points; pivotal moments are experienced, not reported; only minor conflicts are summarized."

  CC-172:
    name: "Signposting Quality"
    measures: "Whether the narrative provides regular signals to the reader that progress is being made toward the story's promised outcomes."
    score_0: "The narrative provides no sense of forward momentum. Readers cannot tell whether the story is advancing toward resolution, and the middle feels aimless or stagnant."
    score_5: "Regular, well-placed signposts demonstrate that the story is advancing—clues are discovered, relationships deepen, skills develop, stakes escalate. Each section advances something. Readers feel continuous forward momentum."

  CC-173:
    name: "Social Structures and Power Dynamics"
    measures: "Whether the world's social hierarchies, governance systems, and power structures are coherent, consequential, and reflective of the world's other elements."
    score_0: "Governance and social structures are absent, contradictory, or purely decorative. A kingdom has no visible means of enforcing its authority. Social hierarchies are stated but never affect character behavior or plot. Power structures are generic (\"the king rules\") with no specificity about how power actually operates."
    score_5: "Governance, class, and social hierarchies shape every aspect of daily life, character motivation, and plot conflict. Power structures have visible mechanisms of enforcement and resistance. Social structures interact logically with economics, religion, geography, and technology. Characters at different social levels experience the same world differently."

  CC-174:
    name: "Stakes Clarity"
    measures: "Whether the reader understands what characters stand to lose or gain, and why it matters."
    score_0: "No discernible stakes; the reader cannot articulate what happens if the protagonist fails; consequences of failure are vague or absent."
    score_5: "Stakes are specific, concrete, and clearly communicated; the reader understands exactly what is at risk before it is endangered; consequences of failure are viscerally felt."

  CC-175:
    name: "Stakes Clarity and Escalation"
    measures: "Whether the story establishes clear, personal stakes early and escalates them throughout the narrative."
    score_0: "Nothing meaningful is at risk for the protagonist. There are no consequences for failure, or the consequences are abstract and impersonal. The reader has no reason to care about the outcome."
    score_5: "The stakes are specific, personal, and clearly communicated from the opening. They escalate throughout the story, becoming progressively more dire. The consequences of failure are tangible and deeply personal to the protagonist."

  CC-176:
    name: "Narrative Escalation"
    measures: "Whether the potential consequences of failure increase progressively throughout the narrative, with each new complication raising the personal and/or public cost of failure."
    score_0: "Stakes remain flat or decrease over the course of the story; the protagonist faces equivalent-magnitude threats throughout; the climax has lower stakes than earlier scenes; there is no sense of \"it's getting worse.\""
    score_5: "Stakes escalate continuously from inciting incident to climax; consequences broaden (affecting more people/things) and deepen (affecting the protagonist more personally); the final consequences are the biggest; each new complication costs more than the prior one."

  CC-177:
    name: "Story Grid Five Commandments Per Unit"
    measures: "Whether each structural unit (scene, act, global story) contains the five essential story event components"
    score_0: "Scenes lack identifiable inciting incidents, turning points, crises, climaxes, or resolutions; acts begin and end without clear dramatic movement; the global story is missing essential commandments; scenes feel like atmospheric passages rather than dramatic events"
    score_5: "Each scene contains: (1) an Inciting Incident that disrupts balance, (2) a Turning Point / Progressive Complication that changes direction, (3) a Crisis Question that forces a choice, (4) a Climax where the decision is made, and (5) a Resolution showing repercussions; these five commandments operate at scene level, act level, and global story level simultaneously"

  CC-178:
    name: "Subplot Integration"
    measures: "Whether subplots and secondary narrative threads feel like organic extensions of the main story rather than distractions or diversions."
    score_0: "Subplots feel disconnected from the main narrative, pulling readers away from the core story without enriching it. They \"feel like derailments\" and waste the reader's time."
    score_5: "Subplots feel like natural extensions of the main narrative, enriching the central conflict and themes. They \"feel like side quests, not derailments.\""

  CC-180:
    name: "Subplot as Thematic Mirror"
    measures: "Whether subplots function as thematic echoes, mirrors, or foils to the main plot"
    score_0: "Subplots explore entirely different themes from the main plot; no thematic resonance between storylines; subplots contradict the story's thematic argument without apparent intention; secondary characters face challenges unrelated to the protagonist's central struggle"
    score_5: "Mirror subplots reflect the main plot's thematic question with different outcomes; foil subplots present alternative responses to the same dilemma; parallel character arcs illuminate different aspects of the same universal struggle; subplots run counterpoint in pace, tone, and color while reinforcing the same thematic core"

  CC-181:
    name: "Technology Level Consistency"
    measures: "Whether the world's technological capabilities are consistent across domains and logical given the world's history, resources, and speculative elements."
    score_0: "Technology is wildly inconsistent across domains with no explanation. Characters have advanced medicine but primitive transportation, or vice versa, without any speculative justification. The technology level shifts to serve plot convenience. Magic and technology coexist without any consideration of how each would affect the other."
    score_5: "Technology is consistent across related domains, or inconsistencies are explained by world-specific factors (a resource that enables one technology but not another, cultural taboos, etc.). The interaction between magic/speculative elements and technology has been thought through. Technological capabilities and limitations constrain the plot consistently."

  CC-182:
    name: "Technology as Worldbuilding Driver (SF)"
    measures: "Whether technology in science fiction is integrated into the world logically — shaping society, politics, and conflict rather than serving as set dressing"
    score_0: "Technology is cosmetic. Ships fly through space but the universe functions like a modern-day nation. FTL exists but its implications for politics, trade, and military strategy are not explored. Technology solves plot problems conveniently but never creates them. Any technology could be swapped out without affecting the story."
    score_5: "Technology shapes every aspect of the world. FTL speed and availability determine political structure. Communication technology shapes intelligence and diplomacy. Weapons technology creates specific military doctrines. Technology creates as many problems as it solves. The story could not exist without its specific technological assumptions."

  CC-183:
    name: "Temporal Ordering Justification"
    measures: "Whether any non-linear temporal ordering serves a clear narrative purpose"
    score_0: "Non-linear elements are used without clear purpose; flashbacks interrupt momentum without providing necessary information; timeline jumps confuse rather than intrigue; the chronological scrambling seems arbitrary rather than meaningful; or conversely, linear structure is used when the story would clearly benefit from temporal manipulation"
    score_5: "If non-linear: every departure from chronology serves a specific narrative purpose (juxtaposition of thematically similar moments, delayed revelation for suspense, structural mirroring); the reader can follow the timeline without confusion; temporal shifts highlight \"particularly poignant images or important plot turns.\" If linear: the chronological approach is the best way to tell this particular story"

  CC-184:
    name: "Tension vs. Conflict Distinction"
    measures: "Whether the author demonstrates mastery of both tension (anticipation of conflict) and conflict (active collision), deploying them as distinct tools."
    score_0: "The author treats tension and conflict as identical; scenes are either all-action or all-inert; there is no anticipatory dread, only direct confrontation or nothing."
    score_5: "Tension and conflict operate as complementary tools—\"pistons working in concert\"; quiet scenes drip with dread and unspoken danger; action scenes are earned by prior tension; the reader experiences both the threat of conflict and conflict itself."

  CC-185:
    name: "The But/Therefore Test"
    measures: "Whether consecutive story beats are connected by causal (\"therefore\") or adversative (\"but\") connectors rather than merely additive (\"and then\") connectors."
    score_0: "Most beat transitions can only be connected with \"and then\"; events feel like a random series of incidents; no sense that prior events generate subsequent ones."
    score_5: "Every beat transition can be naturally connected with \"therefore\" or \"but\"; the story builds momentum through reactive, causally linked events; removing the connective words still leaves the causal relationship obvious."

  CC-186:
    name: "The Compelling C (Reader Engagement with World)"
    measures: "Whether the world captures and holds reader interest through wonder, mystery, specificity, or sheer imaginative force -- independent of whether it is technically well-constructed."
    score_0: "The world is technically consistent but boring. It generates no curiosity, no desire to explore, no emotional response. The reader does not care about the world and does not wish to spend more time in it. World elements are functional but uninspiring."
    score_5: "The world commands attention and generates genuine desire to explore. The reader wants to know more about the world's history, visit its locations, understand its systems. The world creates emotional responses -- wonder, dread, longing, fascination. As the Four Cs framework notes, this is measured by \"how long the audience will maintain their willing suspension of disbelief.\""

  CC-187:
    name: "The Four Cs of Worldbuilding"
    measures: "Whether the constructed world achieves the four qualities that distinguish memorable worldbuilding from forgettable"
    score_0: "The world fails all four Cs. Not Creative (no deviation from reality or genre defaults). Not Complete (world feels like a stage set). Not Consistent (contradicts its own rules). Not Compelling (boring). The reader has no desire to spend time in this world."
    score_5: "The world excels at all four Cs. Creative (fantasy conceits are genuinely novel). Complete (the world feels established before the story and continues after — hints of wider unexplored regions). Consistent (no self-contradictions; established rules hold). Compelling (the reader wants to explore and understand this world). The Four Cs reinforce each other."

  CC-188:
    name: "Thematic Complexity (Multiple/Competing Themes)"
    measures: "Whether the work handles thematic complexity through layered, interacting themes rather than a single simplistic thesis."
    score_0: "The work has either a single simplistic theme with no nuance, or multiple themes that are disconnected and compete for attention without interacting meaningfully. \"Too many themes risk diluting focus\" without enriching complexity."
    score_5: "The work handles multiple interacting themes where primary and secondary themes reinforce and complicate each other. Like To Kill a Mockingbird, where \"the primary theme of racial injustice is supported by secondary themes of childhood innocence and moral education.\" McKee's thematic square is fully populated, providing \"several incomplete or conflicting angles\" on the central truth."

  CC-189:
    name: "Thematic Presence and Identifiability"
    measures: "Whether the work has a discernible central theme that can be experienced by readers, even if it cannot be reduced to a simple statement."
    score_0: "The work has no discernible theme. After reading, the reader cannot identify what the story is about beyond its surface events. Plot events occur without accumulating into any larger meaning. The story is purely incident without significance."
    score_5: "The work possesses a rich, clearly experienceable theme that pervades every element of the narrative. The reader senses what the story means without the author ever needing to state it. As O'Connor wrote: \"A story is a way to say something that can't be said any other way, and it takes every word in the story to say what the meaning is.\""

  CC-190:
    name: "Thematic Resonance (Emotional Impact of Theme)"
    measures: "Whether the theme creates emotional impact that lingers with the reader beyond the final page, rather than being merely intellectual."
    score_0: "The theme, if identifiable, leaves no emotional impression. The reader finishes and feels nothing about the ideas explored. The theme was an intellectual exercise that never engaged the reader's feelings, values, or sense of what matters."
    score_5: "The theme creates lasting emotional and intellectual impact. The reader carries the thematic vision \"into their lives\" (McKee). The story creates experiences that \"resonate with readers both on a conscious and subconscious level and stay with them long after the book closes.\" The theme has been proven through character suffering, growth, and consequence, making it feel earned rather than asserted."

  CC-191:
    name: "Thematic Subtlety"
    measures: "Whether theme emerges from what characters DO (choices, consequences, dramatic action) rather than what they SAY (dialogue, internal monologue, narration)."
    score_0: "Theme is delivered through exposition: characters make speeches about the theme, the narrator explains the meaning, or an authority figure voices the lesson directly. Characters function as \"mouthpieces for the author's views.\" The theme is told, not shown."
    score_5: "Theme emerges entirely from the consequences of character decisions. \"What matters is not what the character says...but what the character does.\" Characters can even contradict the theme in dialogue while their actions prove it. As Barringer states: \"Theme isn't imposed on the story. Theme emerges from the way the hero lives.\""

  CC-192:
    name: "Theme as Question vs. Theme as Answer"
    measures: "Whether the work maintains the distinction between universal theme (inclusive, applicable to all readers) and specific message (exclusive, applicable only to the story's characters and situation)."
    score_0: "The work confuses message for theme, attempting to make a specific situational moral universally applicable. The result is heavy-handed moralizing. As one source notes: the problem is \"however spot-on in its intent--was more about the story's message than its theme.\" Or: message-fiction where \"everything in the story is there for the sake of discussing the message, promoting it (usually as the only way).\""
    score_5: "Theme operates at the universal level (justice, mercy, courage, love) while messages emerge through the specific situations of particular characters. \"Theme is inclusive and message is exclusive.\" The reader can extract broad human truths while understanding that the specific circumstances belong only to these characters."

  CC-194:
    name: "Theme-Character Arc Integration"
    measures: "Whether the protagonist's character arc embodies and dramatizes the theme through internal transformation."
    score_0: "Characters undergo changes unrelated to the theme, or characters don't change at all despite the story having thematic aspirations. The protagonist's internal struggle has no connection to the story's broader meaning."
    score_5: "The character's Lie and Truth directly encode the thematic argument. The character's internal battle between Lie and Truth becomes \"an externalized moral or philosophical argument\" within external conflict. Every lesson the character learns relates to the theme. The climactic decision crystallizes the thematic premise in concrete action."

  CC-195:
    name: "Threat Proximity and Imminence"
    measures: "Whether threats feel close and immediate rather than distant and theoretical."
    score_0: "All threats are distant, theoretical, or abstract; danger never feels imminent; the protagonist is never in immediate peril; threats are discussed but never materialized nearby."
    score_5: "Threats are proximate and immediate; danger is present in the scene, not just discussed; the reader feels that something bad could happen at any moment; the temporal and physical distance between the character and danger is small."

  CC-198:
    name: "Tolkien's Sub-Creation Standard"
    measures: "Whether the fantasy achieves Tolkien's four qualities of fairy-story: Fantasy, Recovery, Escape, and Consolation"
    score_0: "No sub-creation is achieved. The fantasy world does not feel like a Secondary World but like the Primary World with labels changed. No recovery (the reader does not see their own world differently). No escape (the prison of mundanity is not breached). No consolation (the story ends without eucatastrophe or any fairy-story \"piercing glimpse of joy\")."
    score_5: "Full sub-creation achieved. The Secondary World forms a \"coherent and organic whole.\" Recovery occurs — the reader sees stone, wood, fire, and bread with fresh eyes. Legitimate escape is provided from the limitations of reality. Consolation arrives through eucatastrophe — the sudden joyous turn that grants \"a piercing glimpse of joy, and heart's desire.\" The fantasy fulfills its highest function."

  CC-199:
    name: "Tonal Promise Fulfillment"
    measures: "Whether the tone established in the opening pages is maintained or evolved coherently throughout the story, honoring the reader's initial tonal expectations."
    score_0: "The opening establishes one tone (e.g., light-hearted adventure) but the story abandons it entirely (e.g., becomes grimdark torture) without any foreshadowing or gradual transition, leaving readers feeling the \"preceding pages have been invalidated.\""
    score_5: "The tonal promise of the opening is honored throughout. Any tonal evolution is gradual, foreshadowed, and feels like a deepening of the original tone rather than a betrayal of it."

  CC-200:
    name: "Travel Time and Distance Consistency"
    measures: "Whether distances, travel times, and spatial relationships remain consistent throughout the narrative."
    score_0: "A journey that takes two weeks in one part of the story is completed in a day elsewhere with no explanation. Armies or messages arrive impossibly fast or slow depending on plot needs. The spatial relationships between locations change implicitly. No sense of consistent scale exists."
    score_5: "Travel times and distances are consistent with the world's established transportation methods and geography. When characters travel, the time taken correlates with distance and mode of transport. If rapid travel exists (teleportation, fast ships), its availability and limitations are consistent. The reader can build a reliable mental map of spatial relationships."

  CC-201:
    name: "Trope Execution Quality"
    measures: "Whether genre tropes are deployed with craft and freshness rather than as empty repetition"
    score_0: "Every trope is used in its most predictable, unmodified form. The Chosen One is an orphan who discovers hidden powers and defeats the Dark Lord with the help of a mentor. The detective finds a clue, interviews suspects, and reveals the killer in the drawing room. Every beat is telegraphed. The reader has seen this exact story dozens of times."
    score_5: "Tropes are deployed with awareness and craft. Some are fulfilled satisfyingly, some subverted meaningfully, some combined in novel ways. The reader recognizes familiar structures but cannot predict exactly how they will play out. Tropes serve the specific story rather than the story serving the tropes. Execution makes the familiar feel fresh."

  CC-202:
    name: "Trope Subversion Skill"
    measures: "Whether trope subversions are earned, logical, and effective rather than arbitrary or self-congratulatory"
    score_0: "Subversion is arbitrary — tropes are violated but nothing replaces them. The Chosen One fails but the story has no alternative resolution. The detective doesn't solve the case and nothing meaningful results. Subversion is performed without understanding what the original trope provided emotionally. The reader feels cheated rather than surprised."
    score_5: "Subversion demonstrates deep understanding of the trope being subverted. The original emotional promise is redirected rather than denied — the reader gets something different but equally or more satisfying. Subversion serves theme and character. The reader says \"I didn't expect that, but it's even better\" rather than \"that was unfair.\" George R.R. Martin's approach: all actions have realistic consequences, removing plot armor, making outcomes genuinely uncertain."

  CC-203:
    name: "Try-Fail Cycle Effectiveness"
    measures: "Whether the protagonist makes multiple genuine attempts to solve their problem, failing productively (learning, changing, escalating) before succeeding."
    score_0: "The protagonist succeeds on the first attempt; or fails repeatedly without learning anything; or success arrives from external intervention rather than character effort; each attempt is the same approach repeated."
    score_5: "The protagonist attempts progressively more difficult and costly approaches; each failure teaches something or forces adaptation; the character tries simpler solutions first and resorts to costlier ones; final success requires combining lessons from prior failures and is qualitatively different from initial attempts."

  CC-204:
    name: "Try-Fail Cycles"
    measures: "Whether the protagonist makes multiple genuine attempts to achieve their goal, with each attempt producing meaningful consequences that change the situation before the next attempt."
    score_0: "The protagonist succeeds on the first attempt, or fails without trying, or makes attempts that don't change the situation; there is no sense of struggle or earned progress; success feels handed to the character."
    score_5: "The protagonist makes multiple distinct attempts, each of which meaningfully changes the status quo; failures produce consequences and complications that inform the next attempt; success (when it comes) emerges from accumulated effort and learning; each cycle uses \"yes, but\" or \"no, and\" outcomes rather than clean success or clean failure."

  CC-205:
    name: "Unresolved Questions as Engagement"
    measures: "Whether the narrative maintains a steady supply of unanswered questions that pull the reader forward."
    score_0: "All questions are answered as soon as they arise; there is no mystery, no withholding, no curiosity driving the reader forward; the reader is never left wondering about anything."
    score_5: "The narrative always has multiple unresolved questions operating simultaneously; as some are answered, new ones emerge; the reader is never in a state where all threads are resolved (until the ending); information is revealed at exactly the rate that maximizes curiosity."

  CC-206:
    name: "Unresolved Storyline Tracking"
    measures: "Whether all significant subplot threads introduced in the narrative are either resolved or clearly left open for intentional reasons."
    score_0: "Multiple subplots are introduced and then forgotten entirely. Secondary characters are given their own storylines that simply stop. Mysteries are raised but never answered. Plot threads that were given significant narrative attention simply vanish. The reader finishes the book with a list of unanswered questions that appear to be authorial oversights rather than intentional ambiguity."
    score_5: "Every significant subplot reaches a satisfying resolution, is deliberately left ambiguous for a clear thematic reason, or is explicitly acknowledged as unfinished (in a series). Minor threads may fade naturally, but no thread given substantial narrative investment is abandoned. The reader feels that the author was in control of all their narrative threads throughout."

  CC-207:
    name: "Urgency and Time Pressure"
    measures: "Whether the narrative creates a sense that time matters — that delay has consequences and the protagonist cannot afford to wait."
    score_0: "There is no time pressure; the protagonist could take forever to act with no consequences; delays and detours carry no cost; the pace feels leisurely when it should feel urgent."
    score_5: "Time pressure is palpable, whether through literal deadlines (ticking clocks, countdowns) or figurative urgency (deteriorating situations, narrowing windows of opportunity, irreversible changes); delays have clear costs; the reader feels the acceleration."

  CC-208:
    name: "Van Dine Rules Compliance"
    measures: "Whether a detective story adheres to Van Dine's twenty rules for detective fiction"
    score_0: "Multiple rules violated. The detective is the criminal. The solution depends on coincidence. No corpse. The method of murder is irrational. Servants are the culprit for convenience. The truth is not apparent in retrospect."
    score_5: "All applicable rules honored. Equal opportunity for reader. No authorial deception beyond the criminal's deception. Logical deduction drives solution. A corpse is present. Method is rational and scientific. The culprit is prominent and worthy. The truth was always apparent to the shrewd reader."

  CC-209:
    name: "Villain/Antagonist Genre Appropriateness"
    measures: "Whether the antagonist fits the conventions and needs of the story's genre"
    score_0: "The antagonist is wrong for the genre. A mystery villain with no logical motive. A Dark Lord with no menace. A space opera with no opposing faction. The antagonist could be transplanted to any genre without modification. No genre-specific qualities."
    score_5: "The antagonist embodies genre-specific excellence. Mystery: a culprit who was \"a decidedly worth-while person\" (Van Dine Rule 11), prominent in the story, with personal motives. Fantasy: an antagonist whose evil either has thematic purpose (Sauron) or understandable motivation (modern approach). Space opera: opposition at both personal and faction levels, with distinct goals, methods, and aesthetics."

  CC-211:
    name: "World Anchoring Through Familiar Elements"
    measures: "Whether the fantastical world is grounded in enough recognizable human experience (food, family, fear, weather, bodily sensation) to remain emotionally accessible."
    score_0: "The world is pure invention with no recognizable human touchstones. Readers cannot connect emotionally because nothing in the world relates to their experience. Or conversely, the world is so generic that it provides no specific anchor at all -- it is a featureless \"fantasy world\" or \"sci-fi setting\" without identity."
    score_5: "Fantastical elements are grounded in universal human experiences -- the texture of food, the feeling of weather, the dynamics of family and community, the fear of the unknown. The world is strange enough to be interesting and familiar enough to be emotionally legible. As Writer's Digest advises: \"Engage your reader at the human level with objects that are familiar and character-centered.\""

  CC-212:
    name: "Worldbuilding Delivery (Content vs. Exposition)"
    measures: "How world information is conveyed to the reader -- whether it is integrated naturally through character experience or delivered through exposition dumps."
    score_0: "World information arrives in large blocks of exposition, \"As You Know Bob\" dialogue, prologues that are history lectures, or narrator asides that halt the story. Characters explain things they already know for the reader's benefit. The world is told to the reader rather than experienced."
    score_5: "World rules, history, and culture emerge organically through character action, sensory detail, dialogue that serves character purposes, and environmental storytelling. The reader learns about the world by watching characters live in it. Information arrives precisely when the reader needs it and in a form that serves the scene."

  CC-213:
    name: "Worldbuilding Integration (Fantasy/SF)"
    measures: "Whether worldbuilding serves the story rather than existing as exposition for its own sake"
    score_0: "Worldbuilding is delivered through extended exposition dumps, \"As you know, Bob\" dialogue, or chapter-long history lessons. The story stops for worldbuilding and worldbuilding stops for story. Information is front-loaded rather than distributed. Characters explain things they would already know for the reader's benefit."
    score_5: "Worldbuilding is invisible — the reader absorbs it through character action, dialogue, and sensory experience without ever feeling lectured. Sanderson's Mistborn approach: instead of explaining allomancy in a textbook, readers watch Vin test metals, fail, and slowly figure out the rules during rooftop chases. Only the tip of the iceberg appears on page; the rest is implied. The world feels discovered."

  CC-214:
    name: "Worldbuilding Through Absence and Negative Space"
    measures: "Whether the world uses what is absent, unspoken, or implied as effectively as what is explicitly present -- whether strategic omission creates depth."
    score_0: "Everything in the world is exhaustively explained. There are no mysteries, no gaps, no elements left to the reader's imagination. The world feels like an encyclopedia entry rather than a living place. Or alternatively, omissions are accidental rather than strategic, creating confusion rather than mystery."
    score_5: "Strategic absences create depth and mystery. Not everything is explained, and the unexplained elements invite reader engagement rather than frustrating it. As Le Guin demonstrated: \"by leaving every detail of her creation unarticulated, she successfully made the world feel bigger and more real -- more lived-in -- because real worlds can never be fully knowable.\" The world acknowledges its own unknowns."

  CC-215:
    name: "Worldbuilding-Story Balance"
    measures: "Whether worldbuilding serves the story or overwhelms it -- whether there is an appropriate balance between setting detail and narrative momentum."
    score_0: "Either the world is so underdeveloped that the story floats in a void, or worldbuilding has swallowed the story entirely. In the latter case, pages of world detail pass without advancing plot, developing character, or creating emotional engagement. The author has \"Worldbuilder's Disease\" -- the world is more developed than the narrative."
    score_5: "Worldbuilding and story are inseparable. Every piece of world information serves character development, plot advancement, or thematic deepening. The world is richly detailed but the story never stalls for a world tour. As Writer's Digest advises: \"You put your novel into the world, not the world into your novel.\""

  IC-003:
    name: "Concept Strength (Pre-Premise Appeal)"
    measures: "Whether the foundational idea underlying the premise is inherently interesting, provocative, or fascinating before any character or plot is attached."
    score_0: "The concept is entirely familiar and unremarkable—a situation readers have encountered many times with no distinguishing element that makes this version worth their attention."
    score_5: "The concept is inherently fascinating, provocative, or challenging independent of execution—it promises a vicarious experience readers cannot get elsewhere and immediately differentiates itself within its genre."

  IC-005:
    name: "High-Concept Pitchability"
    measures: "Whether the story concept can be communicated in a way that immediately paints a picture in the listener's mind and generates desire to experience the story."
    score_0: "The concept requires extensive explanation to make sense, fails to generate an immediate mental image, and does not produce a \"I want to read that\" reaction in listeners."
    score_5: "The concept can be expressed in one to three sentences that immediately paint a vivid picture, feel both simple and unique, and produce an immediate \"I want to read that\" reaction. It has humor, suspense, conflict, or irony baked in."

  IC-007:
    name: "Premise Originality"
    measures: "Whether the premise offers something genuinely new—a fresh take, unexpected combination, or novel exploration—rather than retreading familiar territory."
    score_0: "The premise is a transparent retread of well-known stories with no distinguishing element in concept, character, setting, or approach. A reader can name the source material immediately."
    score_5: "The premise feels genuinely novel—either through an unprecedented concept, an unexpected combination of familiar elements, or a fresh angle on known material that reveals something previously unexplored."

  ML-001:
    name: "Abstraction Trap Sentinel"
    measures: "The text uses a high ratio of abstract conceptual vocabulary to concrete, tangible terms. At chapter_plan: scene descriptions use abstract conceptual vocabulary rather than concrete descriptions of what happens. At novel_plan: chapter summaries use abstract conceptual language rather than concrete descriptions of dramatic events."
    score_0: ""
    score_5: ""

  ML-002:
    name: "Circling Conflicts"
    measures: "The same argument, confrontation, or obstacle type recurs multiple times without meaningful change."
    score_0: ""
    score_5: ""

  ML-003:
    name: "Cliche Avoidance at Story Level"
    measures: "Whether the story avoids exhausted premises, character types, and plot patterns that have been done to the point of creative depletion — whether the story-level choices show awareness of what has already been written many times before."
    score_0: "The story deploys one or more exhausted story types without any fresh element: the \"chosen one\" prophecy, the love triangle resolved by one party conveniently dying, the twist where \"it was all a dream,\" the redemption through sacrifice of the mentor figure, the detective who is also a drunk with a dark past. The LitReactor \"10 stories we never need to see in workshops again\" list: white kid goes to Europe, everyone has cancer, existential crisis without stakes, the dead baby, abusive relationship redemption, romanticized history without nuance."
    score_5: "The story either avoids exhausted territory entirely or engages with familiar elements in ways that justify their presence — fresh combination, genuine subversion, or execution so specific that the familiar story type is transformed by its particular details. The editor's \"what else is there?\" question is answered: even if the basic shape is recognizable, the specific content makes the story feel necessary rather than repetitive."

  ML-004:
    name: "Coincidence Management"
    measures: "Whether the story's use of coincidence follows the principle that coincidences may create problems for characters but must not solve them, and whether coincidences are limited in frequency and positioned appropriately."
    score_0: "The story relies on coincidences to resolve conflicts, rescue characters from danger, or deliver critical information at convenient moments; multiple coincidences stack up throughout; the climax depends on lucky timing or chance encounters."
    score_5: "Coincidences appear only at the inciting incident or to create trouble; all resolution comes through character action and established causality; any remaining coincidences are acknowledged by characters, embedded in plausible context, or serve only as texture rather than plot hinges."

  ML-005:
    name: "Conceptual Originality (Premise Freshness)"
    measures: "Whether the story's central premise, situation, or \"what if\" offers something the reader hasn't encountered in that exact form before, or combines familiar elements in a genuinely surprising way."
    score_0: "The premise is indistinguishable from dozens of existing works — \"chosen one discovers powers,\" \"detective solves murder of wealthy patriarch,\" \"couple meets-cute through misunderstanding\" — with no twist, recontextualization, or combinatorial surprise that differentiates it. A reader could predict the entire arc from the first paragraph."
    score_5: "The premise makes the reader think \"I've never seen this before\" or \"I've never seen these elements combined this way.\" Even if individual components are familiar, their combination, recontextualization, or the specific \"what if\" produces genuine novelty. The concept alone generates curiosity about execution."

  ML-006:
    name: "Concrete vs. Abstract Description"
    measures: "Whether description operates in concrete, sensory terms rather than abstract, conceptual language."
    score_0: "Description is entirely abstract—\"the room was threatening,\" \"she was beautiful,\" \"the landscape was desolate\"—with no concrete sensory evidence. The reader must supply all the imagery themselves from abstract labels."
    score_5: "Description operates in concrete, sensory terms that allow the reader to construct the abstract meaning themselves. \"Beautiful\" is replaced by the specific features that create beauty. \"Threatening\" is replaced by the specific details that create threat. The movement is always from specific to universal, never the reverse."

  ML-007:
    name: "Convergence and Payoff (Multi-POV)"
    measures: "Whether multiple storylines in multi-POV narratives eventually converge and create payoff through their intersection"
    score_0: "Multiple POVs tell essentially separate stories that never meaningfully connect. Characters in different storylines could be in different books. The convergence is either absent or trivially coincidental. The reader questions why these storylines are in the same book."
    score_5: "Multiple storylines converge in ways that create meaning beyond what any individual storyline could achieve. Characters from separate threads interact in ways that transform both their stories. \"If storylines never intersect, why are they in the same book?\" The convergence creates satisfying structure and payoff that rewards the reader's investment in multiple threads."

  ML-008:
    name: "Cross-Reference and Internal Consistency"
    measures: "Whether all internal references are accurate — character names are spelled consistently, physical descriptions don't change without explanation, timeline events don't contradict, and all promises made by the text are fulfilled."
    score_0: "Characters' physical descriptions change without explanation (blue eyes become green). Timeline contradictions are present (events on Friday are referenced as happening on Thursday). Named places are spelled differently in different chapters. Injuries or conditions appear and disappear without explanation."
    score_5: "Every internal fact is consistent. Character details match across every mention. The timeline holds up under scrutiny. Named places, objects, and terms are spelled identically throughout. Injuries heal at realistic rates. No promise made by the text goes unfulfilled."

  ML-009:
    name: "Description-Action Integration"
    measures: "Whether descriptive passages are woven into ongoing action and character movement rather than delivered as static blocks that halt narrative momentum."
    score_0: "Description exists in isolated blocks that stop the story dead—paragraphs of pure setting description with no character action, no narrative movement, and no connection to the scene's dramatic purpose. Characters disappear while the author describes."
    score_5: "Description is embedded in character action and perception. Setting details emerge as characters move through and interact with environments. Description advances characterization or plot while establishing atmosphere. The reader never feels the story has paused for a descriptive set-piece."

  ML-010:
    name: "Exposition Front-Loading"
    measures: "The first 10-20% consists primarily of exposition rather than dramatic action."
    score_0: ""
    score_5: ""

  ML-011:
    name: "Fichtean Curve Crisis Escalation"
    measures: "Whether the story features multiple escalating crises building toward the climax, rather than a single peak"
    score_0: "The story has only one crisis point (the climax) with flat tension between the opening and the final confrontation; crises don't build on each other; each crisis is isolated rather than compounding; tension between crises drops to zero rather than maintaining a rising baseline"
    score_5: "Multiple crisis points punctuate the narrative, each genuinely threatening the protagonist's goals; each crisis is more intense than the last, creating a staircase effect; brief resolutions between crises maintain rising baseline tension; clear cause-and-effect relationships connect crises; reader investment is maintained through continuous escalation rather than a single delayed payoff"

  ML-012:
    name: "Five Turning Points Presence"
    measures: "Whether the novel contains the five major turning points that sustain narrative momentum"
    score_0: "Fewer than three identifiable turning points; story proceeds as a sequence of events without trajectory-changing moments; no clear inciting incident, midpoint shift, dark moment, or climax"
    score_5: "All five turning points are present and functional: (1) Opportunity/Inciting Incident at ~10% that creates desire, (2) Goal Lock-In that makes the objective concrete, (3) Midpoint/Mirror Moment at ~50% with full commitment, (4) Dark Night of the Soul at ~75% with apparent hopelessness, (5) Climax where all conflict converges"

  ML-013:
    name: "Genre Contract Fulfillment"
    measures: "Whether the story honors the implicit promises made by its genre classification"
    score_0: "The story's genre label bears no relationship to its content. A book marketed as mystery contains no crime, investigation, or revelation. A book marketed as space opera takes place entirely in one room on Earth. The reader cannot identify what genre they are reading after finishing the book. Genre promises are not just unmet but absent."
    score_5: "Every genre promise is fulfilled with precision and artistry. The reader gets exactly the experience the genre label advertised, plus unexpected depth. Mystery delivers fair-play puzzle AND thematic resonance. Space opera delivers epic scale AND intimate character work. Fantasy delivers wonder AND rigorous internal logic. The genre contract is not merely honored but exceeded in ways that surprise even experienced genre readers."

  ML-014:
    name: "Genre-Flavored Non-Genre Story"
    measures: "The story uses genre vocabulary, setting elements, and character types but does not deliver the genre's core emotional experience. At chapter_plan: whether individual chapters deliver genre-specific dramatic experiences. At premise_ideation: whether the story concept genuinely engages with genre conventions at a structural level, or merely borrows surface elements."
    score_0: ""
    score_5: ""

  ML-015:
    name: "Grandiose Stakes Inflation"
    measures: "Inflating mundane events to world-historical significance."
    score_0: ""
    score_5: ""

  ML-016:
    name: "Impossible Choice Presence"
    measures: "Whether the story includes at least one choice where the protagonist must sacrifice something deeply valued to achieve their goal."
    score_0: "The protagonist never has to sacrifice anything important; every victory is free; goals are achieved without meaningful cost; or apparent costs are immediately negated."
    score_5: "The protagonist faces at least one \"Sophie's Choice\" moment where they must decide between two equally devastating options; the choice tests their deepest values; the consequences of the decision are permanent and painful; the reader feels the weight of what was given up."

  ML-017:
    name: "Inciting Incident Timing"
    measures: "Whether the inciting incident occurs early enough to engage readers but late enough for character grounding"
    score_0: "The inciting incident occurs so early (first page) that readers have no connection to the character it affects; or it occurs so late (past 25%) that readers have already disengaged from waiting; the inciting incident is unclear or too subtle to register as a turning point"
    score_5: "The inciting incident occurs within the first 10-15% of the story, ideally around the 12% mark; the reader has had enough time to understand the protagonist and their world; the incident clearly disrupts the status quo and creates desire or need in the protagonist; if delayed past 15%, compelling subplots with their own earlier inciting incidents maintain engagement"

  ML-018:
    name: "Internal Consistency of World Rules"
    measures: "Whether the fictional world follows its own established rules without contradiction throughout the narrative."
    score_0: "The world contradicts its own established rules repeatedly. Magic works one way in Chapter 3 and another in Chapter 10 with no explanation. Characters teleport across distances that previously took weeks. Physical laws, social rules, or system mechanics shift to serve plot convenience."
    score_5: "Every established rule is followed or, when broken, the violation is itself significant and explained within the world's logic. Readers can predict how world systems will behave in new situations because the rules are coherent. The world functions as a reliable system that generates organic plot consequences."

  ML-019:
    name: "Invented Concept Labels (\"The X Paradox,\" \"The Y Trap\")"
    measures: "Constructions like \"the [noun] paradox\" used without grounding."
    score_0: ""
    score_5: ""

  ML-020:
    name: "Macro Pacing Variation"
    measures: "Whether the story's pacing varies across its length to create rhythm, rather than proceeding at a uniform pace"
    score_0: "The entire story proceeds at the same pace; every chapter has the same intensity level; no contrast between tense and quiet sections; the story is either all sprint (exhausting) or all walk (boring); no sense of acceleration toward the climax"
    score_5: "Pacing follows a \"peaks and valleys\" pattern with alternating high-intensity and quieter moments; quiet sections provide emotional processing without losing tension entirely; intensity generally escalates toward the climax; the opening features a dramatic peak to hook readers; post-climax deceleration is deliberate and necessary; the pattern of \"three quick beats, then one longer scene to absorb impact\" creates sustainable rhythm"

  ML-021:
    name: "Metaphor Pile-Up Without Coherent Vehicle"
    measures: "Multiple extended metaphors for the same concept from incompatible source domains."
    score_0: ""
    score_5: ""

  ML-022:
    name: "Narrative Voice and Tonal Consistency"
    measures: "Whether the narrative voice, register, and tone remain consistent with the established mode throughout the work, rather than shifting arbitrarily between styles."
    score_0: "The narrative voice shifts randomly between formal and informal, literary and colloquial, serious and comedic with no structural justification. A dark literary novel suddenly reads like a young adult adventure. Humor appears in serious scenes without tonal justification. The writing style changes noticeably between chapters or sections in ways that feel uncontrolled."
    score_5: "The narrative voice is consistent and intentional throughout. Tonal shifts, when they occur, are clearly deliberate and serve narrative purposes (comic relief in a tragedy, gravity in a comedy). Each narrator in a multi-voice work has a distinct but internally consistent voice. The prose style feels like the product of a single controlling intelligence."

  ML-023:
    name: "No Thematic Counter-Argument Present"
    measures: "The story presents a single thematic position without challenge."
    score_0: ""
    score_5: ""

  ML-024:
    name: "Obligatory Scene Delivery"
    measures: "Whether the story contains the key scenes that genre readers demand and expect"
    score_0: "Critical obligatory scenes are missing entirely. A mystery without a revelation scene. A romance without a confession of love. A thriller without escalating danger. The story lacks the structural spine that makes genre fiction function."
    score_5: "Every obligatory scene appears, each is executed with craft and innovation, and the scenes build on each other to create cumulative emotional impact. The obligatory scenes feel inevitable rather than checklist-driven. Master storytellers innovate within these constraints rather than abandoning them."

  ML-025:
    name: "Originality of Execution"
    measures: "Whether the story finds fresh, non-default ways to handle scenes, transitions, character introductions, dialogue, revelations, and other narrative mechanics — distinct from whether the premise itself is original."
    score_0: "Every scene plays out in the most default, expected way. Character introductions use stock patterns (mirror description, \"Let me tell you about myself\" internal monologue). Revelations are delivered through exposition dumps. Transitions follow the most obvious sequence. A writing workshop instructor would call it \"competent but unsurprising.\""
    score_5: "Scenes consistently surprise in how they unfold while remaining coherent. Character introductions reveal personality through unexpected means (action, dialogue, what they notice). Revelations emerge through dramatic situations rather than being stated. Transitions create unexpected juxtapositions. The reader repeatedly encounters moments where the execution itself is the pleasure."

  ML-026:
    name: "Passive Protagonist"
    measures: "The protagonist initiates fewer than ~30% of major plot transitions."
    score_0: ""
    score_5: ""

  ML-027:
    name: "Perfect Internal Consistency With No Acknowledged Contradictions"
    measures: "The world presented as perfectly self-consistent with no mysteries or paradoxes."
    score_0: ""
    score_5: ""

  ML-028:
    name: "Premise Clarity"
    measures: "Whether the core story concept can be articulated in a single, clear sentence that communicates protagonist, goal, and central conflict."
    score_0: "The premise cannot be summarized concisely; attempting to describe the story requires multiple paragraphs and still leaves the listener confused about what the story is actually about."
    score_5: "The premise is expressible as a single sentence that immediately communicates who the protagonist is, what they want, and what stands in their way, generating instant curiosity."

  ML-029:
    name: "Premise Completeness"
    measures: "Whether the premise contains all essential structural elements: protagonist, inciting incident, goal, opposition, and stakes."
    score_0: "The premise is missing multiple essential elements—no clear protagonist, no identifiable goal, no opposition, or no stakes. The story concept is a situation or mood rather than a narrative engine."
    score_5: "The premise contains a specific protagonist with a passionate drive, a clear inciting incident, central conflict with identifiable opposition, and high personal stakes, all working together as a narrative engine."

  ML-030:
    name: "Premise Inexpressible in One Sentence"
    measures: "After reading the complete work, it is impossible to express the premise in a single sentence."
    score_0: ""
    score_5: ""

  ML-031:
    name: "Premise Stated But Never Explored"
    measures: "The story's core premise is established but the narrative never meaningfully explores it."
    score_0: ""
    score_5: ""

  ML-032:
    name: "Prose Density (Layered Meaning)"
    measures: "Whether each sentence and paragraph is doing multiple things simultaneously — characterization, world-building, narrative momentum, thematic resonance, foreshadowing — or whether prose is \"thin\" (single-purpose sentences conveying only information)."
    score_0: "Each sentence does exactly one thing: conveys a fact, describes a setting, states an emotion, or advances the plot. Prose is purely functional. No sentence simultaneously characterizes while advancing plot while establishing mood while foreshadowing. Reading produces no resonance, no sense of layers, no backward or forward connections."
    score_5: "Every sentence does at least two things, and the best do three or more. A character's observation simultaneously reveals their psychology, establishes the world, creates mood, and foreshadows a later development. The prose connects backward (to the reader's accumulated memory of the text) and forward (as \"invisible prophecy of what is coming\"). Reading produces the sensation of depth and richness — \"the illusion of reality\" created by density matching the actual world, which is \"absolutely filled with stuff.\""

  ML-033:
    name: "Repetitive Scene Beat Pattern"
    measures: "Same sequence of beats across 5+ scenes."
    score_0: ""
    score_5: ""

  ML-034:
    name: "S58: \"Eyeball Kicks\" — Stacked Nonsensical Metaphors"
    measures: "Multiple stacked metaphors creating contradictory imagery."
    score_0: ""
    score_5: ""

  ML-035:
    name: "Scene Opening Quality"
    measures: "Whether scenes open with hooks that engage the reader immediately, establish the scene's situation efficiently, and avoid common opening mistakes (delayed inciting incident, backward-looking exposition, situational rather than specific events)."
    score_0: "Scenes consistently open with exposition dumps, backstory, character routines, or situational description without a specific inciting moment. The inciting incident is delayed or absent. Openings look backward at past events rather than forward at coming conflict."
    score_5: "Scenes open with hooks that create forward-looking curiosity. The inciting incident occurs within the first few lines. The opening establishes a specific, pinpointable event (not a general situation) that forces new conflict. The character's scene goal or the stakes are made clear early."

  ML-037:
    name: "Scenes Opening with Exposition Dumps"
    measures: "Scenes consistently beginning with exposition before drama."
    score_0: ""
    score_5: ""

  ML-038:
    name: "Sensory Detail Absence or Overload"
    measures: "Either no sensory detail or excessive implausible sensory metaphors."
    score_0: ""
    score_5: ""

  ML-039:
    name: "Sensory Detail as Plot Device"
    measures: "Whether sensory details serve plot functions (foreshadowing, revelation, misdirection) beyond atmospheric decoration."
    score_0: "Sensory details are purely decorative—they create atmosphere but never foreshadow, reveal, misdirect, or otherwise participate in the plot mechanics. No sensory detail mentioned early proves significant later."
    score_5: "Sensory details function simultaneously as atmosphere and as plot architecture. A described smell foreshadows danger. A noted texture becomes evidence. A sound mentioned in passing proves significant. The reader discovers on rereading that descriptive details they absorbed as atmosphere were doing narrative work all along."

  ML-040:
    name: "Setting-Character Integration"
    measures: "Whether the physical environment is actively integrated with character action and emotion rather than existing as inert backdrop, and whether characters interact with their surroundings meaningfully."
    score_0: "Setting is described separately from character action, feeling like stage directions. Characters do not interact with their environment. Description is detached from POV character's emotional state. Environment exists as decoration rather than an active story element."
    score_5: "Characters move through, interact with, and react to their environment continuously. Setting mirrors or contrasts character emotion. Environmental details are filtered through the POV character's perception and colored by their mood. The environment functions as an active force that shapes character behavior and reveals personality."

  ML-041:
    name: "Specificity and Concrete Detail"
    measures: "Whether the prose traffics in specific, concrete, sensory details that create vivid mental images — or in abstract, vague, conceptual language that fails to engage the reader's senses and imagination."
    score_0: "The prose deals entirely in abstractions and generalities. \"The room was nice.\" \"She felt bad.\" \"It was a beautiful day.\" No sensory details engage sight, sound, smell, taste, or touch. Settings are generic. Objects are unnamed. The reader cannot form mental images from the language provided."
    score_5: "The prose is rich with specific, concrete, sensory details. Not \"a car\" but \"a rust-spotted Corolla.\" Not \"she felt bad\" but the specific physical and behavioral manifestations. Settings engage multiple senses. Objects are named. The reader can see, hear, smell, taste, and touch the world being described. As the principle goes: \"Fiction occurs when the particular penetrates the general.\""

  ML-042:
    name: "Structural Beat Placement"
    measures: "Whether major structural turning points occur at approximately the expected positions in the narrative"
    score_0: "Major beats are absent, redundant, or wildly misplaced; inciting incident occurs at 40%; midpoint is indistinguishable; climax arrives with no preceding escalation; beats bunch up in one section while other sections contain no significant turns"
    score_5: "Turning points land at approximately their expected positions (inciting incident ~10-12%, first plot point ~25%, midpoint ~50%, third plot point ~75%, climax ~88-95%); each beat genuinely changes the story's trajectory; turns are spaced to create rhythm without mechanical rigidity"

  ML-043:
    name: "Subplot Pacing as Counterpoint"
    measures: "Whether subplots function as pacing relief valves and tonal counterpoints to the main plot, providing variety and preventing monotony."
    score_0: "Subplots either don't exist (the main plot runs at a single unvarying intensity) or exist but compete with the main plot for attention without providing contrast or relief."
    score_5: "When the main plot is high-intensity, cutting to a slower-paced subplot provides tension release. Subplots offer tonal counterpoint (humor in a thriller, gravity in a comedy). The interplay between main plot and subplots creates \"musical counterpoint\" -- richer rhythm than either alone."

  ML-044:
    name: "Subversion Without Foundation (Bait-and-Switch)"
    measures: "Story dramatically shifting genre/tone/conflict contrary to opening promises."
    score_0: ""
    score_5: ""

  ML-045:
    name: "Surface-Level Thematic Details Without Structural Integration"
    measures: "Thematic objects/images/dialogue that don't connect to character arc or plot."
    score_0: ""
    score_5: ""

  ML-046:
    name: "Suspension of Disbelief"
    measures: "Whether the text maintains the reader's voluntary acceptance of fictional premises by providing sufficient \"human interest and semblance of truth\" (Coleridge) to sustain immersion"
    score_0: "The text contains so many implausibilities, contradictions, or violations of established rules that the reader cannot maintain belief in the fictional world. Internal logic is violated. Characters act in ways that defy both the story's rules and any recognizable psychology."
    score_5: "The reader fully suspends disbelief, accepting even fantastical premises as real within the story. The text provides sufficient internal consistency, emotional authenticity, and \"semblance of truth\" that the fictional contract holds. \"Poetic faith\" is maintained through the narrative's value and coherence."

  ML-047:
    name: "Suspension of Disbelief Maintenance"
    measures: "Whether the story establishes its premises convincingly enough that readers accept and operate within the story's logic, even when it departs from reality."
    score_0: "The story makes claims about its world that it fails to support. Rules are inconsistent, character reactions are implausible, and the reader constantly questions the logic of events rather than engaging with the story."
    score_5: "The story's internal logic is consistent and convincing. Whatever premises the story establishes are supported throughout. Readers accept even fantastical elements because they are presented with internal consistency and appropriate character reactions."

  ML-048:
    name: "Thematic Premise as Dramatic Argument (Egri/Truby)"
    measures: "Whether the story's thematic content functions as a dramatic argument with a clear premise that drives character and conflict."
    score_0: "The story has no identifiable premise driving its dramatic action. Events occur without testing any proposition about human nature. The moral argument is absent or incoherent. Characters don't embody different approaches to a central moral problem."
    score_5: "The story has a clear premise (e.g., \"Honesty defeats duplicity\") that every line and action serves. The moral argument is dramatized through a character web where each character represents a different approach to the central moral problem. The premise functions as \"the very DNA of the script, informing every line and every action.\" Truby: \"every great story is a moral argument that traces the change in the hero's moral character from the beginning of the tale to the end.\""

  ML-049:
    name: "Thematic Subplots and Mirroring"
    measures: "Whether subplots explore different facets of the central theme, providing thematic counterpoint, reinforcement, or complication."
    score_0: "Subplots exist but have no thematic relationship to the main plot. They are purely additional storylines that neither mirror, contrast, nor complicate the central theme. Secondary characters don't embody different perspectives on the thematic statement."
    score_5: "Subplots function as thematic microcosms. Secondary characters embody different perspectives on the thematic statement, with subplots either supporting or arguing against it. Supporting characters hold \"conflicting viewpoints stemming from different interpretations of the same theme.\" Truby's \"four corners of opposition\" are populated by supporting characters who externalize different aspects of the protagonist's internal thematic conflict."

  ML-050:
    name: "Thematic Unity Across Story Elements"
    measures: "Whether all major story elements (setting, dialogue, imagery, structure, character, plot) work in concert to express the theme, achieving organic unity."
    score_0: "Story elements work at cross-purposes. Setting has no thematic resonance. Dialogue delivers information without thematic layering. Structure doesn't reinforce meaning. The story feels like disparate elements assembled without a unifying principle."
    score_5: "Every element contributes to thematic expression. Setting reinforces theme. Dialogue operates on multiple levels including thematic subtext. Structure mirrors thematic content. The work achieves what New Criticism calls organic unity: \"every part of the text contributes to its overall meaning and effect, forming a singular experience for the reader.\" The story \"becomes greater than the sum of its parts\" (Truby's \"designing principle\")."

  ML-051:
    name: "Three-Chapter Degradation"
    measures: "Quality degrades noticeably after the first two to three chapters."
    score_0: ""
    score_5: ""

  ML-052:
    name: "Tidy Single-Track Plots"
    measures: "Narrative following one protagonist through one conflict to one resolution."
    score_0: ""
    score_5: ""

  ML-053:
    name: "Tonal Consistency"
    measures: "Whether the story maintains a coherent emotional register throughout, or intentionally and effectively modulates tone within an established framework."
    score_0: "The story's tone shifts erratically and without purpose—comedy one chapter, horror the next—creating disorientation. Readers cannot determine what kind of emotional experience the story is offering."
    score_5: "The tone is consistent and unified throughout, serving as a \"throughline providing cohesion.\" Where tonal shifts occur, they are gradual, purposeful, and established within the opening's tonal range."

  ML-054:
    name: "Tonal Consistency in Description"
    measures: "Whether the descriptive register, diction, and imagery maintain a consistent emotional tone within scenes and across the work, or jar the reader with unexplained shifts."
    score_0: "Descriptive tone lurches between registers without cause—ornate literary description in one paragraph, casual colloquial in the next; serious atmospheric detail followed by incongruously comic imagery. The reader is jolted out of the fictional dream by tonal whiplash."
    score_5: "The descriptive register is consistent and purposeful. When tonal shifts occur, they are motivated by narrative events (a character's mood change, a revelation, a shift in time or place) and are executed deliberately rather than accidentally. Diction, imagery, and rhythm cohere within each scene and across the work."

  ML-055:
    name: "Tonal Whiplash Without Foreshadowing"
    measures: "Abrupt emotional register shifts without preparation."
    score_0: ""
    score_5: ""

  ML-056:
    name: "Turning Points at Default Intervals"
    measures: "Major structural beats at exactly 25%, 50%, 75%, 100%."
    score_0: ""
    score_5: ""

  ML-057:
    name: "Unfired Chekhov's Guns"
    measures: "Elements introduced with heightened emphasis that never become relevant."
    score_0: ""
    score_5: ""

  ML-058:
    name: "Uniform Chapter/Scene Lengths"
    measures: "All chapters or scenes approximately same word count."
    score_0: ""
    score_5: ""

  ML-059:
    name: "Uniform Narrator Voice Across All POV Characters"
    measures: "POV character sections indistinguishable from each other."
    score_0: ""
    score_5: ""

  ML-060:
    name: "Promise-Progress-Payoff Integrity"
    measures: "Whether the story follows a complete arc of establishing promises, demonstrating progress toward those promises, and delivering satisfying payoffs."
    score_0: "The story makes promises it never progresses toward, shows progress on threads that were never promised, or ends without paying off the promises it established. The three-phase structure is absent or broken."
    score_5: "Every promise established in the opening is progressed through the middle and paid off at the end. The payoff is \"surprising but fulfilling\"—it answers the opening promise \"in a way that feels earned\" and \"better than expected.\""

  ML-061:
    name: "Moral and Thematic Complexity"
    measures: "Whether the thematic argument presents genuine complexity with competing valid perspectives, rather than a one-sided moral premise."
    score_0: "The thematic premise is one-sided. All counterpoint has been stripped from the narrative. Opposing characters are strawmen. \"You'll never gain a complex moral argument if the 'bad' side is so bad, no one in his right mind would ever argue for it.\" The reader feels the jury has been rigged."
    score_5: "The work presents a genuine dialectic where opposing positions have legitimate weight. The antagonist's perspective is comprehensible and even sympathetic. McKee's thematic square is fully populated: positive (Truth), contradictory (Lie), contrary (compromise), and negation of the negation (extreme darkness). Readers engage in genuine consideration rather than automatic agreement. As one source states: \"It's not the author's job to make up the readers' mind. Rather, it's your job to present all the facts, so they can make up their own minds.\""

  ML-062:
    name: "Aggregate Consistency Across Length"
    measures: "Whether consistency is maintained not just locally but across the full span of a novel-length or series-length work, where details introduced early must remain coherent with events hundreds of pages later."
    score_0: "Details introduced in early chapters are contradicted in later chapters. The character who was established as left-handed is suddenly right-handed. Relationships described early are forgotten or contradicted. The world's rules shift as the narrative progresses. The narrative reads as if the author did not review earlier sections while writing later ones."
    score_5: "The narrative maintains perfect consistency between its earliest and latest pages. Details planted in chapter one remain accurate in chapter thirty. Character arcs begun early are carried through to completion. The world's rules established in the opening are still in force at the climax. The work reads as if the author maintained a comprehensive reference document and verified consistency throughout."

  ML-063:
    name: "Atmosphere and Mood Creation"
    measures: "Whether descriptive choices create a coherent emotional atmosphere that pervades the scene or work."
    score_0: "No discernible mood or atmosphere emerges from the description. Descriptive details are chosen randomly without emotional coherence, or the description is too sparse to create any atmospheric effect. The scene has no emotional texture."
    score_5: "Description creates a unified, palpable atmosphere through coordinated choices of detail, diction, rhythm, and sensory emphasis. The reader feels immersed in a specific emotional environment. Mood is created through accumulation of carefully chosen concrete details rather than through direct statement (\"it was eerie\")."

  ML-064:
    name: "Audience Expectation Alignment"
    measures: "Whether the story's pacing delivers what its genre and opening promise, rather than surprising readers with content they didn't sign up for."
    score_0: "The story promises one type of experience (thriller, romance, horror) and delivers pacing appropriate to a different type. A thriller spends most of its time in philosophical reflection. A literary novel delivers relentless action with no depth. Readers who picked up the book for its genre feel cheated."
    score_5: "Pacing matches genre promises. A thriller delivers fast pacing with brief reflective interludes. A literary novel delivers contemplative pacing with strategic dramatic moments. The content readers came for appears with appropriate frequency and weight."

  ML-065:
    name: "Character Behavioral Consistency"
    measures: "Whether characters act in ways consistent with their established personality, motivations, skills, and limitations — separate from but related to emotional continuity."
    score_0: "Characters act \"out of character\" without any narrative justification. A character established as fearful of heights heroically scales a building with no preceding development arc. Skills and competencies fluctuate — a character is expert in one scene and incompetent in the next. Personality traits appear and disappear based on plot needs. Characters make decisions that serve the plot but contradict their established nature."
    score_5: "Every character action flows from established personality, motivations, and capabilities. When characters act against their established patterns, this is treated as significant and dramatically meaningful, with clear precipitating causes. Character growth is gradual and grounded in experience. Readers can predict (at least in hindsight) why characters made the choices they did based on who they have been established to be."

  ML-066:
    name: "Character Complexity Through Contradiction"
    measures: "Whether characters contain structured internal oppositions that generate narrative energy, rather than being defined by a single trait or role."
    score_0: "Characters are defined by a single trait; all behavior is predictable from one quality; characters never surprise the reader; no tension exists between what characters want and what they do."
    score_5: "Characters embody credible, structured contradictions (between desires and behavior, between stated principles and enacted choices, between public persona and private self); contradictions are consistent and fundamental, not random; the reader can trace every surprise back to an established tension; characters function as \"thematic operators\" testing propositions about belief and action."

  ML-067:
    name: "Character Consistency Under Change"
    measures: "Whether characters remain recognizably themselves even as they grow, change, and evolve throughout the narrative."
    score_0: "Characters change personality without explanation; established traits disappear randomly; the character in chapter 20 is unrecognizable from chapter 1 without any traceable development; goals and motivations shift without cause."
    score_5: "Characters evolve along logical trajectories connected to theme and plot; even after significant transformation, core personality traits remain recognizable; changes in behavior can be traced back through the chain of events that caused them; the reader experiences the character as a continuous identity who has grown rather than been replaced."

  ML-068:
    name: "Character Self-Revelation"
    measures: "Whether the narrative includes moments where characters discover truths about themselves that the reader has been prepared to understand, creating sudden emotional and thematic clarity."
    score_0: "Characters never gain insight into their own behavior or beliefs; or revelation is told through narration rather than enacted; or the character \"realizes\" something without any preceding evidence of the internal struggle."
    score_5: "The moment of self-revelation is sudden for maximum dramatic force; it creates a burst of shared emotion between character and reader; it presents new information showing the character has been living a lie; it triggers immediate new moral action; the revelation has been carefully prepared through preceding events so it feels both surprising and inevitable."

  ML-069:
    name: "Character-Driven Stakes"
    measures: "Whether what's at risk in the story is rooted in what the character specifically and intensely cares about, creating personal investment that generates reader investment."
    score_0: "Stakes are abstract or disconnected from what the character values; the character shows no emotional investment in outcomes; stakes exist only at the plot level with no personal dimension; the character faces no meaningful dilemmas."
    score_5: "Stakes operate on multiple levels simultaneously (public/personal/philosophical); what's at risk is deeply tied to the character's specific values, relationships, and identity; the character faces genuine dilemmas where all choices carry cost; stakes escalate through both external pressure and deepening personal investment; even small-scale stakes feel enormous because the character cares enormously."

  ML-070:
    name: "Character-as-Theme"
    measures: "Whether the character's journey, psychology, and transformation embody and investigate the story's thematic questions rather than merely existing alongside them."
    score_0: "Character's journey has no connection to the story's thematic concerns; theme is stated through dialogue or narration rather than demonstrated through character experience; character arc and thematic arc are disconnected; supporting characters don't represent different perspectives on the theme."
    score_5: "The character's internal struggle (Lie vs Truth) directly embodies the story's thematic question; the character's arc IS the theme being tested through action; supporting characters represent different answers to the same thematic question; the character's transformation (or failure to transform) constitutes the story's thematic argument; plot events force the character to confront the theme through personal experience rather than abstraction."

  ML-071:
    name: "Creative Problem-Solving Within the Story"
    measures: "Whether characters solve problems, overcome obstacles, and navigate conflicts through creative, non-obvious means that arise from their specific abilities, knowledge, and circumstances — or whether solutions are generic, convenient, or imported from outside the story's established logic."
    score_0: "Problems are solved through the most convenient mechanism: a previously unmentioned skill appears, information arrives by coincidence, the antagonist makes an inexplicable mistake, or a deus ex machina intervenes. The solutions demonstrate no creativity and could be predicted by any reader familiar with the genre. Characters' specific knowledge, personality, and established capabilities play no role in the resolution."
    score_5: "Problems are solved in ways that feel simultaneously surprising and inevitable. Solutions arise from the intersection of specific character traits, knowledge, and circumstances that have been established earlier in the narrative. The reader thinks \"I didn't see that coming, but of course — that's exactly what this character would do given what they know and who they are.\" The creative problem-solving within the story mirrors the creative problem-solving of the author."

  ML-072:
    name: "Curiosity Engine (Question Architecture)"
    measures: "Whether the narrative actively generates reader curiosity by raising questions and strategically delaying answers, creating a forward-pulling engine of engagement."
    score_0: "No active questions pull the reader forward. Information is delivered proactively before the reader has reason to wonder about it. The narrative answers questions before they're asked, or fails to raise them at all. Reader has no sense of wanting to know what happens next."
    score_5: "The narrative consistently generates curiosity by presenting effects before causes, outcomes before explanations, and partial information that invites completion. Multiple questions operate at different time horizons (scene-level, chapter-level, book-level). Questions are answered at satisfying intervals while new ones emerge. The reader is always in a state of wanting to know something the narrative has not yet revealed."

  ML-073:
    name: "Dramatic Irony"
    measures: "Whether the text strategically places readers in a position of superior knowledge relative to characters, creating engagement through anticipation, cognitive dissonance, and emotional tension"
    score_0: "Readers and characters always have identical information. No information asymmetry exists. There is no gap between what the reader knows and what characters know, and therefore no anticipatory tension."
    score_5: "The text strategically reveals information to readers that characters lack, creating sustained dramatic irony. Readers actively anticipate consequences, feel the danger characters don't see, and experience cognitive dissonance that drives engagement. The gap between reader and character knowledge generates suspense, superior understanding, and emotional investment in every scene."

  ML-074:
    name: "Emotional Continuity"
    measures: "Whether characters carry appropriate emotional states between scenes, with emotions flowing logically from what has happened to them rather than resetting to a neutral baseline at each scene boundary."
    score_0: "Characters experience traumatic events in one scene and appear completely unaffected in the next. Emotional states reset to neutral at every scene break. Characters who were grieving, furious, or terrified show no residue of those emotions in subsequent scenes. Relationships between characters fluctuate wildly (hostile in one scene, casually friendly in the next) with no transition or explanation."
    score_5: "Each scene's opening emotional state flows logically from the preceding scene's events. Characters carry emotional residue — grief lingers, anger simmers, joy colors subsequent interactions. Emotional shifts between scenes are either explicitly dramatized or occur over plausible timeframes. A character's emotional state at the beginning of a scene is informed by what happened \"the moment before.\""

  ML-075:
    name: "Emotional Resonance and Memorability"
    measures: "Whether the story creates lasting emotional impact that lingers in the reader's mind after finishing — the haunting quality that makes certain stories unforgettable"
    score_0: "The reader closes the book and immediately forgets the experience. No emotions linger. No scenes or images recur in memory. The story made no lasting impression."
    score_5: "The story haunts the reader. Specific scenes, images, and emotional moments recur in memory days and weeks later. The reader's understanding of characters and themes continues to deepen after finishing. Emotional resonance was achieved through subtlety rather than explicitness — \"the power of what remains unsaid can be profound.\" The story changes how the reader thinks or feels about something."

  ML-076:
    name: "Enter Late, Exit Early"
    measures: "Whether scenes begin as close to the conflict/action as possible and end immediately after the core dramatic purpose is achieved, cutting unnecessary preamble and aftermath."
    score_0: "Scenes begin with extensive setup -- characters arriving, exchanging pleasantries, settling into locations -- before any conflict or inciting incident occurs. Scenes continue well past their dramatic purpose with characters winding down, departing, or reflecting without new information."
    score_5: "Scenes open in media res, as close to the action or conflict as possible. They conclude immediately after the core purpose is achieved. Preamble and aftermath are cut or compressed into summary. Only material that serves plot, character, or theme remains."

  ML-077:
    name: "Flashback Integration Without Momentum Loss"
    measures: "Whether flashbacks are integrated into the narrative without destroying present-timeline momentum, and whether they earn their space by illuminating the present."
    score_0: "Flashbacks interrupt tense present-action scenes, causing readers to skim forward. They run for pages without illuminating the present. Re-entry to the present timeline is disorienting."
    score_5: "Flashbacks are positioned during natural lulls rather than mid-action. They are brief (a few lines when possible), increase present-scene tension or provide essential context, and end with a clear return to the present. Longer flashbacks are placed at scene or chapter boundaries."

  ML-078:
    name: "Flat vs Round Character Deployment"
    measures: "Whether the author makes deliberate, effective choices about which characters receive full psychological development (round) versus serving as functional types (flat), deploying each appropriately."
    score_0: "Protagonist is flat (definable by a single trait, incapable of surprise) when roundness is needed; or every character is equally developed, causing narrative bloat; or flat characters are so thin they break believability; no intentional deployment strategy is visible."
    score_5: "Protagonist and key characters are round (capable of surprising the reader without losing credibility); supporting characters are deliberately flat where appropriate (immediately recognizable, never need reintroducing, serve clear narrative functions); the collision between flat and round characters \"parallels life more accurately\" (Forster); the author shows awareness that flatness and roundness are tools, not qualities."

  ML-079:
    name: "Meaningful vs Cosmetic Flaws"
    measures: "Whether character flaws actively create consequences and drive conflict rather than existing as decorative traits that never cost the character anything."
    score_0: "Character has no flaws (Mary Sue/Gary Stu); or flaws are purely cosmetic (\"clumsy but it's cute\"); flaws never create real consequences; flaws are stated but never demonstrated in action; flaws don't connect to the character's arc or the story's conflicts."
    score_5: "Flaws are deeply connected to the character's wound and Lie; they actively create problems at the worst possible moments; flaws cost the character things they can't easily recover (relationships, trust, opportunities, safety); flaws fuel both internal and external conflict; flaws are the engine of the character's arc (what must be overcome or what destroys them)."

  ML-080:
    name: "Non-Default Narrative Choices"
    measures: "Whether the writer makes deliberate, surprising choices at each decision point in the narrative (structure, POV, scene selection, character actions, resolutions) rather than defaulting to the most statistically common or expected option."
    score_0: "Every structural choice, character action, and plot resolution follows the most predictable path. If a writing workshop instructor could guess the next scene from the current one, the story is on autopilot. POV is third-person limited past tense without justification. Conflict resolves through the most obvious mechanism. Characters make the decision the reader expects. The story never deviates from the center of its genre's probability distribution."
    score_5: "The story consistently surprises at the level of craft choices. K.M. Weiland's test: the writer has examined and rejected the first automatic instinct at every juncture. POV, tense, structure, scene selection, and character decisions all show evidence of deliberate choice rather than default. The narrative is \"a perfectly valid, rational story told in parallel to a consistently surprising one.\" Choices feel purposeful rather than arbitrary — surprise with coherence."

  ML-081:
    name: "Novelistic Discovery"
    measures: "Whether the fiction reveals something about human experience that the reader did not already know — whether it functions as an act of exploration and discovery rather than merely confirming existing understanding."
    score_0: "The fiction tells the reader nothing they didn't already know about human experience. Emotions are described in expected terms. Character insights are platitudes. The story confirms received wisdom without examining it. A reader finishes the work with exactly the same understanding of human nature they had before starting."
    score_5: "The fiction functions as an instrument of discovery. It reveals something about human experience — a psychological dynamic, a moral complexity, an emotional truth — that the reader recognizes as true but had not previously articulated. Milan Kundera's standard: \"the novelist is an explorer feeling his way in an effort to reveal some unknown aspect of existence.\" The reader finishes the work with an expanded understanding of what it means to be human."

  ML-082:
    name: "Personal Stakes Grounding"
    measures: "Whether large-scale or abstract stakes are grounded in specific, personal consequences for characters the reader cares about."
    score_0: "Stakes are entirely abstract or global with no personal dimension; saving the world but no individual person the reader cares about is at risk; the protagonist has no personal skin in the game."
    score_5: "Every major stakes escalation is anchored in specific personal consequences; global stakes are filtered through their impact on individual relationships and losses the reader has been made to care about."

  ML-083:
    name: "Reaction Beat Pacing / Recovery Beats"
    measures: "Whether the story provides adequate breathing room after intense sequences, allowing both characters and readers to process emotional experiences before the next escalation."
    score_0: "Action sequences follow one another without any processing time. Characters never react emotionally to events. The reader has no space to internalize what happened before the next crisis arrives."
    score_5: "After major action or emotional intensity, the narrative provides proportionate recovery: characters process, reflect, and make decisions. These sequel/reaction scenes control pacing by their length -- short sequels maintain urgency, long sequels create contemplation. Recovery beats make subsequent intense scenes hit harder through contrast."

  ML-084:
    name: "Relationship Dynamics"
    measures: "Whether character relationships are varied, evolving, and revelatory -- each relationship drawing out different facets of the characters involved."
    score_0: "All relationships feel the same; characters interact identically with everyone; no power dynamics, history, or tension between characters; relationships are static and do not evolve; the protagonist shows the same face to all characters."
    score_5: "Every relationship dynamic is distinct; characters show different facets depending on who they're with; relationships have their own arcs with evolution over time; power dynamics are present and shift; characters bring out contradictions in each other; conflict exists (large or small) in every pairing; the protagonist's behavior changes depending on the relationship context."

  ML-085:
    name: "Surprise and Misdirection"
    measures: "Whether the text delivers plot developments that are simultaneously unexpected and retrospectively inevitable — surprising the reader while making them admire the craft of the setup"
    score_0: "All developments are predictable. The reader is never surprised. Or surprises are cheap shocks with no foreshadowing — they feel arbitrary rather than earned. The reader feels either bored or cheated."
    score_5: "The text employs masterful misdirection — establishing expectations through red herrings, character assumptions, and structural cues, then delivering revelations that recontextualize everything. Surprises deepen emotional resonance and invite re-reading. Good misdirection makes readers \"look back at various telltale clues peppered throughout the story, hopefully leading them to admire the author's skill.\""

  ML-086:
    name: "Suspense and Anticipation"
    measures: "Whether the text creates and sustains psychological tension through information control, uncertainty about outcomes, and exploitation of the reader's need for narrative completion"
    score_0: "All outcomes are predictable. No information is withheld. No questions remain open. The reader experiences no uncertainty about what will happen next and no compulsion to continue reading."
    score_5: "Suspense operates on multiple levels simultaneously — immediate (next scene), mid-range (chapter arc), and global (overall story question). The text exploits the Zeigarnik effect (unfinished tasks create psychological tension), uses dramatic irony, foreshadowing, ticking clocks, and information asymmetry. The reader's amygdala and dopamine-reward system are activated through contained, manageable anxiety."

  ML-087:
    name: "Symbolism and Image System Effectiveness"
    measures: "Whether the work employs symbols and image systems that reinforce theme through concrete imagery operating below conscious awareness."
    score_0: "The work either lacks symbolic imagery entirely, or symbols are arbitrary (present without thematic connection), or symbols are heavy-handed (blatantly obvious, \"wearing their symbolism on their sleeve\"). Cliched imagery (butterflies for transformation, water for cleansing) used without innovation."
    score_5: "The work employs a coherent image system -- a category of imagery that repeats with variation from beginning to end, reinforcing theme subconsciously. \"The images must rhyme in ways that will amalgamate power and bring emotional unity to the story. In order to resonate, the images must emerge from the subconscious, and they must appeal to the reader's subconscious as well. They can't be out in the open, or the effect will be ruined.\" Symbols evolve in meaning as the story progresses, with \"subtlety and constant variation.\""

  ML-088:
    name: "Three-Level Stakes Architecture"
    measures: "Whether the story operates on public (external/plot), personal (emotional/relational), and philosophical (thematic/value) stakes simultaneously, with all three connected to the protagonist's central goal."
    score_0: "Only one level of stakes operates; threats are purely external with no personal or thematic dimension, or personal with no external manifestation; the story provides no answer to \"why should anyone care about this beyond the immediate plot?\""
    score_5: "All three levels are active, coherent, and connected to the same primary goal; public stakes drive plot significance, personal stakes drive character investment, philosophical stakes drive thematic meaning; each level has a clear outcome at resolution."

  ML-089:
    name: "Trope Awareness and Subversion"
    measures: "Whether the writer demonstrates awareness of the conventions, tropes, and reader expectations of their genre or mode, and either deploys them with fresh execution or deliberately subverts them — as opposed to deploying tropes unconsciously or without variation."
    score_0: "Tropes are deployed unconsciously — the writer appears unaware they are using a stock character (the gruff mentor with a heart of gold), a stock plot (the prophecy that comes true), or a stock scene (the training montage). There is no variation, subversion, or fresh perspective on the convention. The tropes feel inherited rather than chosen."
    score_5: "The writer demonstrates clear awareness of genre conventions and either executes them with fresh specificity (the trope is recognizable but feels new because of concrete, non-interchangeable detail) or subverts them deliberately (the setup of the trope creates an expectation that is paid off with something unexpected). Subversion has Weiland's \"two mandatory segments: first, the expectation is set up that something familiar is coming, then that set-up is paid off with something else entirely.\""

  ML-103:
    name: "Character Agency"
    measures: "Whether the protagonist's choices and actions drive the plot, as opposed to events happening to or around a passive character."
    score_0: "The protagonist is a witness or bystander; events would unfold identically without them; other characters solve problems on their behalf; the character makes no meaningful choices."
    score_5: "The protagonist initiates action, makes choices with real consequences, and directly causes the story's turning points; even moments of apparent passivity are revealed as deliberate choices; the reader can trace causal lines from character decisions to plot outcomes."

  ML-104:
    name: "Character Arc Execution"
    measures: "Whether the character's internal transformation (or deliberate stasis, in flat arcs) is structured, paced, and earned across the full narrative."
    score_0: "Character undergoes no change, or changes abruptly without groundwork; arc is crammed into the climax; growth contradicts established characterization; transformation feels unearned because obstacles were trivial."
    score_5: "Arc follows a traceable progression with setbacks, regressions, and partial victories; change emerges from repeated challenge to the character's core belief; the climax forces definitive choice; transformation is costly and hard-won; even a flat arc demonstrates consistent testing of the character's truth."

  ML-105:
    name: "Conflict Evolution"
    measures: "Whether conflicts transform over the course of the narrative rather than remaining static, reflecting character growth and changing circumstances."
    score_0: "The conflict at the end is the same as the conflict at the beginning; the nature of opposition never changes; the protagonist is fighting the same battle in the same way throughout."
    score_5: "Conflicts evolve, transform, and reveal new dimensions as the story progresses; what seemed like the central conflict gives way to deeper conflicts; character growth reframes the nature of the opposition; the protagonist's understanding of what they're fighting shifts."

  ML-106:
    name: "Conflict Hierarchy"
    measures: "Whether the story maintains a clear hierarchy of conflicts with one dominant conflict providing structure while smaller conflicts create scene-level texture."
    score_0: "Conflicts are all the same magnitude, creating a flat landscape; or too many equally important conflicts compete for attention, creating confusion; or scene-level conflicts are disconnected from the central conflict."
    score_5: "One dominant overarching conflict provides structural spine; smaller conflicts branch from character relationships and actions; scene-level conflicts serve the central conflict while maintaining their own integrity; the hierarchy is clear without being rigid."

  ML-107:
    name: "Dilemma Quality"
    measures: "Whether characters face genuine dilemmas (choices between two bad options or two goods that cannot coexist) rather than merely obstacles to overcome."
    score_0: "Characters face only obstacles (things in the way) without genuine dilemmas (choices with costs); every problem has an obvious correct solution; the protagonist never has to sacrifice anything important."
    score_5: "Characters regularly face genuine dilemmas where both options carry real costs; there is no clearly correct choice; decisions test character values and beliefs; the reader agonizes alongside the character over which path to take."

  ML-108:
    name: "Emotional Arc Shape"
    measures: "Whether the narrative follows a discernible and effective emotional trajectory — a shape of fortune and misfortune that creates reader satisfaction through its pattern of change"
    score_0: "The emotional valence is flat throughout — no meaningful rises or falls in fortune, no pattern of change, no emotional trajectory. Or the arc is incoherent, lurching randomly without building toward anything."
    score_5: "The story follows a clear, compelling emotional arc with meaningful rises and falls that build toward satisfying culmination. The arc shape (rags-to-riches, man-in-a-hole, Cinderella, Icarus, Oedipus, or complex combinations) creates emotional resonance through its pattern of change, with the most powerful arcs combining hope, loss, and redemption."

  ML-109:
    name: "Ensemble Differentiation"
    measures: "Whether each member of a multi-character cast is psychologically distinct, functionally non-redundant, and individually indispensable to the narrative."
    score_0: "Characters are interchangeable; multiple characters serve the same function; all characters sound alike in dialogue; removing a character would not change the story; cast is too large for the story's length."
    score_5: "Each character has a unique psychology, voice, goal, and thematic perspective; no two characters could swap roles; each character's presence is justified by a contribution only they can make; the cast creates a web of distinct, conflicting perspectives that illuminates the central conflict from multiple angles."

  ML-110:
    name: "Foil and Mirror Cast Architecture"
    measures: "Whether supporting characters are designed to illuminate the protagonist through contrast (foils) and parallel (mirrors), serving architectural rather than merely decorative functions."
    score_0: "Supporting characters exist solely for plot convenience; no character reflects or contrasts the protagonist's journey; supporting cast could be removed without thematic loss; all characters represent the same perspective."
    score_5: "Mirror characters share the protagonist's wound or flaw but diverge in resolution, forcing the protagonist to confront possible futures; foil characters operate within the same institutional/goal framework but challenge the protagonist's ethics, strategy, or reasoning; together, the cast creates a thematic argument where every character represents a different answer to the story's central question."

  ML-111:
    name: "Ghost/Wound/Lie/Weakness Architecture"
    measures: "Whether the character's backstory trauma (Ghost), resulting psychological damage (Wound), protective false belief (Lie), and behavioral expression (Weakness) form a coherent, integrated system that drives both character and plot."
    score_0: "Character has no discernible backstory motivation; or backstory exists but doesn't connect to present behavior; or the Lie is stated but never tested; or weakness is cosmetic rather than consequential."
    score_5: "A specific Ghost event produces a identifiable Wound that generates a coherent Lie the character uses as coping mechanism; this Lie manifests as observable Weakness that creates real consequences in the story; the plot systematically challenges the Lie until the character must either abandon it (positive arc) or double down (negative arc)."

  ML-112:
    name: "Interpretive Richness and Ambiguity"
    measures: "Whether the work supports multiple valid interpretations and rewards re-reading with new discoveries of meaning."
    score_0: "The work has exactly one possible interpretation. Every element is explained, every symbol decoded, every question answered. There is nothing beneath the surface. Re-reading yields no new insights. The text is \"predictable and artistically dull.\""
    score_5: "The work supports multiple valid readings along multiple dimensions. Ambiguity is deliberate and enriching, \"mirror[ing] the complexity of human experience, reflecting the often indeterminate nature of reality.\" Readers return to discover new meanings. The text invites \"participatory reading\" where \"readers contribute their interpretations, thus co-creating the text's meaning.\""

  ML-113:
    name: "Meaning Inseparable from Form"
    measures: "Whether the story's meaning can only be experienced through the story itself, rather than being reducible to a paraphrase or moral."
    score_0: "The story's meaning can be fully captured in a sentence or two. \"You tell a story because a statement would be inadequate\" -- but this story could have been a statement. Removing the story and keeping only the moral loses nothing essential. The form is merely a delivery vehicle for a pre-existing idea."
    score_5: "The story's meaning can only be accessed through the experience of reading it. \"The meaning of a story has to be embodied in it, has to be made concrete in it.\" Paraphrasing the theme inevitably reduces and distorts it. \"It takes every word in the story to say what the meaning is.\" When asked what the story means, \"the only proper thing is to tell him to read the story.\""

  ML-114:
    name: "Motif Development and Evolution"
    measures: "Whether recurring elements (images, phrases, objects, actions) accumulate meaning through repetition and variation, reinforcing theme."
    score_0: "The work has no recurring elements, or recurring elements repeat identically without variation or accumulation of meaning. Motifs are present but disconnected from theme. Or motifs are so heavy-handed they become annoying: \"Repeating the exact same thing over and over to the audience can get annoying.\""
    score_5: "Motifs recur with meaningful variation, each appearance deepening or complicating the thematic resonance. The motif has \"emotional significance for the character,\" ties \"intrinsically into your theme,\" and is \"simple and clear in its symbolism.\" Motifs evolve by changing context rather than repeating identically. Example: doors in Frozen shift meaning as characters transform, communicating thematic resolution through variation of a single motif."

  ML-115:
    name: "Reader Agency in Meaning-Making"
    measures: "Whether the work invites active reader participation in constructing meaning, rather than delivering meaning passively."
    score_0: "The work leaves no room for reader interpretation. Every meaning is spelled out. Every symbol is explained. Every moral is stated. The reader is a passive consumer of pre-digested meaning. The author functions as \"judge of his characters and their conversations\" rather than allowing readers to judge."
    score_5: "The work deliberately creates space for reader interpretation. \"Drawing conclusions is up to the jury (the readers), and the writer's only job is to be talented -- to know how to distinguish important testimony from unimportant, to place characters in proper light and speak their language.\" The reader participates in meaning-making, supplying \"the subjective elements that are lacking in the story.\""

  ML-116:
    name: "Want/Need Tension"
    measures: "Whether the protagonist has a conscious external desire (Want) in productive tension with an unconscious internal need (Need), and whether the story forces confrontation between them."
    score_0: "Characters have no distinguishable want or need; or want and need are identical, producing no internal tension; or the need is never confronted, leaving the character arc inert."
    score_5: "The Want emerges organically from a specific Lie the character believes; the Need directly opposes it; the plot repeatedly forces choices between them; the climax demands sacrifice of one for the other; resolution feels both surprising and inevitable."

  ML-126:
    name: "Central Dramatic Question Clarity"
    measures: "Whether the story poses a clear central dramatic question early and answers it by the end."
    score_0: "No identifiable central dramatic question exists—the story meanders without a core question driving the reader forward, or the question is so vague that readers cannot articulate what they are waiting to learn."
    score_5: "A clear, compelling dramatic question is posed early (by implication if not explicitly), drives the entire narrative, and is definitively answered at the climax. The story begins when the question is asked and ends shortly after it is answered."

  ML-127:
    name: "Empathic Engagement"
    measures: "Whether the story arouses the reader's emotional experience, passion, and empathy."
    score_0: "The story fails to evoke any emotional response. Characters feel flat, events feel inconsequential, and the reader remains emotionally detached throughout."
    score_5: "The story creates deep emotional engagement—readers feel the characters' emotions, experience genuine empathy, and are emotionally affected by the story's events and outcomes."

  ML-128:
    name: "Narrative Coherence"
    measures: "Whether all elements of the story—characters, plot events, themes, settings—align logically and consistently to create an understandable, connected whole."
    score_0: "The narrative is incoherent—events contradict each other, character motivations are inconsistent, themes are scattered, and the reader cannot construct a unified understanding of what the story is about."
    score_5: "All narrative elements align seamlessly. Events follow logically from prior events, character actions are motivated and consistent, themes are unified, and the story reads as a coherent whole."

  ML-129:
    name: "Surprise-Within-Expectations Balance"
    measures: "Whether the story contains genuine surprises and avoids pure predictability while still operating within the framework of its established promises."
    score_0: "The story is entirely predictable—every scene plays out exactly as genre templates suggest, with no surprises, subversions, or unexpected developments. OR the story is so unpredictable as to feel random."
    score_5: "The story consistently surprises within its established framework. Developments feel both unexpected and inevitable in retrospect. Genre expectations are fulfilled but through fresh, non-obvious means."

  ML-132:
    name: "\"What If\" Question Compellingness"
    measures: "Whether the speculative or conceptual question at the story's heart is interesting enough to sustain reader engagement through a full narrative."
    score_0: "The \"what if\" question is either absent, trivially obvious, or has been so thoroughly explored by prior works that it generates no curiosity."
    score_5: "The \"what if\" question is immediately intriguing, easy to articulate, and generates a cascade of follow-up questions about consequences and implications that sustain interest."

  ML-133:
    name: "Cognitive Load Management"
    measures: "Whether the narrative respects the limits of reader working memory when introducing new information, particularly unfamiliar names, concepts, and world elements."
    score_0: "Multiple unfamiliar names, concepts, and world elements are introduced simultaneously. The reader must track more than 4-5 new items at once. Invented terminology is introduced without contextual support. Dense exposition passages require backtracking to comprehend. The reading experience feels like work rather than entertainment."
    score_5: "New information is introduced one element at a time with contextual scaffolding. Invented terms are spaced apart and surrounded by familiar elements. Complex concepts are chunked into digestible pieces. The narrative provides cognitive breathing room between dense information passages. Readers rarely need to reread for comprehension."

  ML-134:
    name: "Concept-to-Premise Development"
    measures: "Whether the story has progressed beyond a bare concept (a \"what if\") into a fully developed premise with specific characters, goals, and obstacles."
    score_0: "The story is built on a concept alone—an interesting \"what if\" scenario with no specific protagonist, goal, or conflict attached. It reads as a setting or situation, not a story."
    score_5: "The concept has been fully developed into a premise with specific characters who have clear motivations, defined obstacles, and personal stakes that make the concept into a complete narrative engine."

  NC-001:
    name: "C8: Plot Diversity and Narrative Uniqueness"
    measures: "Whether the narrative takes unexpected paths rather than following the most statistically probable plot structure"
    score_0: "Plot follows the most common template for its genre without deviation. Story elements are highly predictable. The same plot beats, landmarks, and character decisions appear as would be found in dozens of other stories given the same premise. Story could be generated by averaging existing stories."
    score_5: "Plot takes genuine unexpected turns while maintaining internal logic. Story elements are particular to this narrative rather than generic. The combination of plot elements is unique rather than a recombination of common patterns."

  NC-002:
    name: "Cause-and-Effect Chain Integrity"
    measures: "Whether every cause in the story leads to an appropriate effect, and every significant effect has a proportionate cause."
    score_0: "Events happen without logical cause, consequences do not follow actions, and the story's chain of causality is broken or arbitrary."
    score_5: "Every action leads to logical, proportionate consequences. Every major event has identifiable causes established earlier in the narrative. The causal chain is unbroken and satisfying."

  NC-004:
    name: "Circular/Chiastic Structural Resonance"
    measures: "Whether the story's ending echoes or mirrors its beginning in a way that creates structural satisfaction"
    score_0: "No structural relationship between beginning and ending; the story arrives at its conclusion without any echo of where it started; opportunities for meaningful mirroring are missed; or the story ends exactly where it began with no sense of change"
    score_5: "The ending mirrors the beginning through deliberate structural choices (returning to opening imagery, revisiting opening situations with transformed understanding, completing a thematic circuit); if chiastic structure is employed, mirrored elements create insight through both comparison and contrast; the final image meaningfully reflects or inverts the opening image; the reader experiences \"instinctual satisfaction\" from the structural symmetry"

  NC-005:
    name: "Commonsense Plausibility"
    measures: "Whether the story adheres to commonsense knowledge about physical entities, social interactions, and human behavior within its established framework."
    score_0: "Characters behave in ways that violate basic human psychology, physical events defy established in-world physics, and social interactions follow no recognizable human pattern."
    score_5: "All character behavior, physical events, and social interactions are plausible within the story's established framework. Even fantastic elements are grounded in recognizable human experience and logic."

  NC-006:
    name: "Controlling Idea Coherence (McKee)"
    measures: "Whether the story conveys a single, unified controlling idea expressed through the relationship between value change and cause across the entire narrative."
    score_0: "The story has no unified controlling idea. Scenes convey contradictory meanings without purpose. The value changes at the climax are arbitrary and disconnected from the rest of the story. The reader carries away no coherent vision of life."
    score_5: "Every scene's climactic value change either proves the truth of the theme or its opposite, creating a dialectical tension that resolves at the climax. The controlling idea can be expressed as a single sentence with both a value statement and a cause: e.g., \"Children live fulfilling lives when parents allow them to take risks.\" The entire story feels like it conveys the same meaning."

  NC-007:
    name: "Dan Harmon Story Circle Completeness"
    measures: "Whether the story completes the full circular journey of departure, transformation, and return"
    score_0: "The protagonist never leaves their comfort zone; or they leave but the return doesn't reflect transformation; the circular structure is incomplete — departure without return or return without change; the character's journey has no clear \"low point\" at the bottom of the circle"
    score_5: "All eight steps are present: (1) You — character in comfort zone, (2) Need — something is missing, (3) Go — entering unfamiliar situation, (4) Search — adapting to new world, (5) Find — getting what they wanted, (6) Take — paying a heavy price, (7) Return — going back to familiar situation, (8) Change — having been fundamentally altered; the low point occurs at the circle's bottom; the character's final state meaningfully contrasts their initial state"

  NC-008:
    name: "Denouement Proportionality"
    measures: "Whether the post-climax resolution is appropriately proportioned — long enough to provide satisfaction but short enough to maintain energy"
    score_0: "The story ends immediately after the climax with no falling action, leaving readers disoriented; or the denouement drags on for many chapters after the central tension has resolved, losing reader interest; loose ends are either ignored or addressed at tedious length; the denouement re-introduces new conflicts"
    score_5: "The denouement occupies approximately 2-3% of the story (1-3 chapters for a novel); remaining conflict and tension are addressed and dissipated; important loose ends are tied up; character change is validated; the tone shifts from tension to resolution without abruptness; the ending earns its emotional weight without overstaying"

  NC-009:
    name: "Difficulty/Challenge Calibration"
    measures: "Whether the narrative challenges facing the reader (puzzles, mysteries, ambiguity) are calibrated to be engaging without being either trivially easy or impossibly opaque."
    score_0: "The story's challenges are either so obvious that readers feel patronized or so opaque that readers feel excluded. Mysteries are either unsolvable or transparent; ambiguity is either absent or impenetrable."
    score_5: "Challenges are perfectly calibrated—the reader feels engaged and tested without being excluded. Mysteries are solvable in retrospect. Ambiguity enriches rather than confuses."

  NC-010:
    name: "Dramatica Completeness of Argument"
    measures: "Whether the story investigates all significant approaches to its central problem"
    score_0: "The story presents only one approach to its central problem; alternative perspectives are strawmanned or absent; the story's \"argument\" is one-sided; the resolution feels predetermined rather than earned through exploration; the story mind is incomplete"
    score_5: "The story functions as a \"Grand Argument Story\" that investigates all significant approaches to its central problem; the protagonist's linear or holistic problem-solving style is challenged; multiple throughlines (main character, obstacle character, relationship, overall story) are present; the resolution provides \"the most appropriate solution\" because all alternatives have been explored and found wanting"

  NC-012:
    name: "Frame Narrative and Nested Structure Coherence"
    measures: "Whether frame narratives and nested story structures maintain clarity and serve the overall narrative"
    score_0: "The frame narrative is forgotten or abandoned partway through; nested stories have no thematic or narrative connection to the frame; transitions between narrative levels are confusing; the frame feels like a device rather than an integral part of the story; nesting levels become so deep that the reader loses track"
    score_5: "The frame narrative and inner stories are thematically linked; each layer of nesting adds meaning to the others; transitions between narrative levels are clear and purposeful; the frame provides context or perspective that transforms understanding of the inner narrative; the structure creates \"Russian doll\" depth where each story enriches the others"

  NC-013:
    name: "Genre Contract Adherence"
    measures: "Whether the story identifies and fulfills the expectations inherent in its chosen genre, including required structural elements, character types, and narrative outcomes."
    score_0: "The story either fails to identify its genre, sets up genre expectations it systematically violates without purpose, or delivers none of the structural elements genre readers expect."
    score_5: "The story clearly identifies its genre, delivers all required conventions and obligatory scenes, and either fulfills or consciously innovates upon genre expectations in ways that enhance rather than betray the reader experience."

  NC-014:
    name: "Genre-Specific Obligation Fulfillment"
    measures: "Whether the story contains the specific obligatory scenes and conventions that its genre demands."
    score_0: "The story is missing critical obligatory scenes for its genre—a mystery without a final reveal, a romance without lovers meeting, a thriller without escalating stakes, an action story without a climactic confrontation."
    score_5: "Every genre-specific obligatory scene is present, well-executed, and the conventions are either fulfilled faithfully or innovated upon in ways that feel fresh rather than deficient."

  NC-015:
    name: "Interestingness/Engagement"
    measures: "Whether the story is enjoyable, entertaining, and engaging to read, with rich details that engage the reader's imagination."
    score_0: "The story is boring, flat, and fails to engage the reader's imagination or emotions at any point. It reads as a summary of events rather than a lived experience."
    score_5: "The story is highly enjoyable and entertaining, with rich details and descriptions that engage the reader's senses and imagination. Reading it is a compelling, immersive experience."

  NC-016:
    name: "Kishotenketsu Structural Awareness"
    measures: "Whether stories that don't center on conflict still achieve structural satisfaction through the four-act twist-and-reconciliation pattern"
    score_0: "A story without central conflict proceeds as a flat sequence of events with no structural movement; there is no identifiable \"twist\" (ten) that recontextualizes what came before; the story lacks the reconciliation that gives the twist meaning; the absence of conflict is not compensated by any other structural engine"
    score_5: "The four acts function clearly: Introduction (ki) establishes characters and world; Development (sho) deepens the established elements; Twist (ten) introduces an unexpected element that recontextualizes everything; Reconciliation (ketsu) brings the first two acts and the twist into harmony; the story achieves structural satisfaction without requiring antagonistic conflict; character growth comes through self-actualization and introspection rather than opposition"

  NC-018:
    name: "Novel Length Appropriateness"
    measures: "Whether the story's length is appropriate for its genre and content"
    score_0: "The story is dramatically shorter or longer than genre expectations without justification; the narrative is padded to reach a target length; or the narrative is compressed to the point where necessary development is missing; the length doesn't serve the story's structural needs"
    score_5: "The story's length falls within genre expectations (romance 65-80K, thriller 70-100K, fantasy 90-120K+, literary 80-100K, YA 50-80K) or deviates with clear justification; every chapter earns its length; the story doesn't feel padded or rushed; structural beats have appropriate breathing room; the pacing matches reader expectations for the genre"

  NC-019:
    name: "Organic Unity of Structure"
    measures: "Whether all structural elements are interdependent and necessary, forming a cohesive whole"
    score_0: "Structural elements feel arbitrary or interchangeable; scenes, chapters, or sections could be rearranged without impact; the form doesn't serve the content; structural choices follow convention rather than the story's needs; removing or rearranging sections wouldn't affect the reader's experience"
    score_5: "Every structural element is necessary and interdependent; the \"transposal or withdrawal of any one of them would disjoin and dislocate the whole\" (Aristotle); the chosen structure is the only structure that could tell this particular story this particular way; form enhances content at every level; the story functions holistically rather than as a collection of independent parts"

  NC-025:
    name: "Protagonist Active Agency in Climax"
    measures: "Whether the protagonist plays an appropriately active role in resolving the central conflict, rather than being rescued or having the problem solved for them."
    score_0: "The protagonist is passive in the climax—the conflict is resolved by other characters, external events, or coincidence while the protagonist watches or benefits without acting."
    score_5: "The protagonist directly and actively resolves the central conflict through their own choices, using skills or relationships developed throughout the story. Their agency is the decisive factor."

  NC-026:
    name: "Quest Structure Execution (Fantasy)"
    measures: "Whether the quest narrative (if used) is executed with purpose and freshness rather than as a formulaic journey"
    score_0: "The quest is a linear series of locations with no thematic purpose. Characters travel from A to B to C, encountering obstacles that don't develop them. The quest could be rearranged without consequence. Side quests are tangential filler. The physical journey has no relationship to character growth."
    score_5: "The quest structure serves both plot and theme. Each location and encounter develops character or advances the story meaningfully. The physical journey mirrors internal transformation. Side quests connect to the main quest thematically or practically. The destination is not just a place but a state of being. Tolkien's standard: each location must justify its presence."

  NC-027:
    name: "Redundancy and Structural Efficiency"
    measures: "Whether the story avoids repeating the same structural beat or delivering the same information multiple times"
    score_0: "Multiple scenes pursue the same goal with the same type of obstacle; information is delivered multiple times through different characters or scenes; chapters chase the same outcome; emotional beats repeat without escalation; the story could be significantly compressed without losing anything"
    score_5: "Every scene has a unique five-word purpose statement; no two scenes repeat the same structural function; when similar situations recur, they escalate or transform; redundant beats have been merged or cut; the story achieves its narrative goals with maximum efficiency"

  NC-028:
    name: "Save the Cat Beat Completeness"
    measures: "Whether the story contains all fifteen structural beats of the Save the Cat framework"
    score_0: "Fewer than half the fifteen beats are identifiable; the A Story (plot) and B Story (theme/relationship) never connect; no identifiable Fun and Games section delivering on the premise; no Dark Night of the Soul creating the low point before the finale; the Finale lacks the five sub-components"
    score_5: "All fifteen beats are present and functional: Opening Image (0-1%), Theme Stated (5%), Setup (1-10%), Catalyst (10%), Debate (10-20%), Break Into Two (20%), B Story (22%), Fun and Games (20-50%), Midpoint (50%, false victory or defeat), Bad Guys Close In (50-75%), All Is Lost (75%), Dark Night of the Soul (75-80%), Break Into Three (80%), Finale (80-99%, with five sub-components: Gathering the Team, Executing the Plan, High Tower Surprise, Dig Deep Down, Execution of New Plan), Final Image (99-100%)"

  NC-029:
    name: "Scene Entrance and Exit Craft"
    measures: "Whether scenes begin and end at the dramatically optimal moments"
    score_0: "Scenes begin with arrivals, small talk, and setup exposition before anything happens; scenes end with characters wrapping up conversations, departing, and returning to neutral states; extensive preamble and wind-down surround the actual dramatic content"
    score_5: "Scenes begin mid-action, mid-thought, or mid-argument at the latest possible entry point; scenes end shortly after their dramatic peak, before full resolution; no time is spent on arrivals, departures, or \"settling in\" unless those moments are themselves dramatic; the principle of \"arrive late, leave early\" is consistently applied"

  NC-030:
    name: "Seven-Point Symmetry"
    measures: "Whether the story's structure exhibits the symmetrical hook-resolution, turn-turn, pinch-pinch architecture"
    score_0: "No identifiable hook or resolution; no symmetrical relationship between the story's halves; pinch points are absent or don't escalate; the midpoint doesn't mark a shift from reaction to action; the structure is asymmetric without intentional purpose"
    score_5: "Seven points are present and symmetrical: Hook and Resolution are polar opposites; Plot Turn 1 and Plot Turn 2 mirror each other (entering the conflict / getting the final piece needed); Pinch 1 and Pinch 2 escalate (pressure / dire pressure); the Midpoint sits at the center where the protagonist shifts from reaction to action; the overall structure creates balance between the story's halves"

  NC-031:
    name: "Structural Approach Appropriateness"
    measures: "Whether the chosen structural model (three-act, five-act, circular, kishotenketsu, etc.) is appropriate for the story being told"
    score_0: "A rigid structural template has been applied regardless of whether it fits; the story contorts to hit arbitrary beats; the structure fights against the story's natural shape; alternatively, no recognizable structure exists at all and the story wanders without architecture"
    score_5: "The structural model is chosen (or emergent) based on the story's needs; the structure enhances rather than constrains the content; if the story follows a recognizable template, it does so because the template fits, not because the template was imposed; structural innovation is present where convention would be limiting; the reader can feel the architecture without being distracted by it"

  NC-033:
    name: "Surprise/Suspense Generation"
    measures: "Whether the story creates genuine suspense and surprise, particularly through unpredictable-yet-logical developments."
    score_0: "The story is entirely predictable from beginning to end. No scene produces genuine surprise or suspense. The reader always knows what will happen next."
    score_5: "The story generates genuine suspense throughout and delivers surprising developments that, in retrospect, feel inevitable. Tension is maintained and surprises are both unexpected and logical."

  NC-034:
    name: "Technology/Magic Consistency"
    measures: "Whether the story's speculative elements (technology, magic, supernatural) maintain a generally consistent level and are properly introduced."
    score_0: "The story's speculative elements fluctuate wildly in capability and rules, with new powers or technologies appearing whenever the plot requires them. Previously established rules are contradicted without explanation."
    score_5: "Speculative elements maintain consistent rules throughout. Any expansion of capabilities is properly foreshadowed and logically grounded. Readers can predict what is and isn't possible within the story's framework."

  NC-035:
    name: "Three-Act Proportional Balance"
    measures: "Whether the novel's act structure follows sound proportional distribution (approximately 25% setup, 50% confrontation, 25% resolution)"
    score_0: "No discernible act structure; story weight distributed randomly; setup may consume 50% or resolution may be crammed into 5%; no identifiable structural movement from setup through confrontation to resolution"
    score_5: "Each act receives appropriate proportional weight; setup efficiently establishes characters and conflict without overstaying; the middle section has sufficient space for complication and development; resolution is neither rushed nor padded; structural transitions between acts are clear and motivated"

  SC-001:
    name: "Action-to-Reflection Ratio"
    measures: "Whether the narrative balances external action (events happening, characters doing things) with internal reflection (characters processing, thinking, feeling) in proportions appropriate to the genre and story."
    score_0: "The story is all action with no reflection (events happen but nobody processes them, creating emotional emptiness) or all reflection with no action (characters think endlessly but nothing happens)."
    score_5: "Action sequences drive plot forward creating excitement and conflict; reflective scenes provide depth, emotional resonance, and character development. The ratio matches genre expectations while ensuring that reflection follows action naturally and action emerges from decisions made during reflection."

  SC-002:
    name: "Adverb Control"
    measures: "Whether adverbs (particularly -ly adverbs) are used sparingly and purposefully, with stronger verbs and more specific description preferred over verb + adverb constructions."
    score_0: "Adverbs appear frequently, especially in dialogue tags (\"she said angrily,\" \"he replied sarcastically\"). Weak verb + adverb combinations dominate where a single strong verb would suffice (\"walked slowly\" instead of \"ambled,\" \"said loudly\" instead of \"shouted\"). -Ly adverbs pad nearly every action."
    score_5: "Adverbs appear rarely, and when they do, they earn their place by adding meaning no other construction could provide. Dialogue tags rely on \"said\" and \"asked\" with emotion conveyed through dialogue content, action beats, and context. Strong verbs replace verb + adverb combinations."

  SC-004:
    name: "Anachronism Avoidance"
    measures: "Whether elements of the narrative (technology, language, customs, attitudes, objects) are appropriate to the time period in which the story is set."
    score_0: "Characters use technology, language, or reference cultural phenomena that did not exist in the story's time period. Modern attitudes and values are projected onto historical characters without authorial awareness. Objects or concepts appear before their historical invention or existence. The story's treatment of period details reveals the author's lack of research."
    score_5: "Every element is appropriate to its stated time period, or anachronisms are clearly intentional and serve a narrative or thematic purpose. Language, technology, customs, and attitudes reflect the story's era. When the author takes deliberate liberties with historical accuracy, the departures serve the story rather than resulting from ignorance."

  SC-005:
    name: "Apostrophe Correctness"
    measures: "Whether apostrophes are used correctly for possessives, contractions, and plurals throughout — including tricky cases like \"its\" vs. \"it's,\" singular possessives ending in 's' (James's vs. James'), and no apostrophes in plurals."
    score_0: "Frequent apostrophe errors: \"it's\" used as possessive, \"its\" used as contraction, apostrophes in plurals (\"the 1990's\"), inconsistent possessive formation for names ending in 's'."
    score_5: "Every apostrophe is correct. Possessives, contractions, and omissions are properly formed. Backward-facing apostrophes for dialect elisions ('cause, 'im) are correctly oriented. No greengrocers' apostrophes (plural nouns with apostrophes)."

  SC-007:
    name: "Atmosphere, Mood, and Tone Integration"
    measures: "Whether the setting's physical details, weather, architecture, and environment work together to create a coherent emotional atmosphere that serves the narrative."
    score_0: "Setting descriptions create no mood or create mood that clashes with the scene's emotional content. Physical details are chosen randomly rather than for atmospheric effect. The world feels emotionally neutral -- it neither supports nor contrasts the story's emotional register."
    score_5: "Every setting detail contributes to a coherent emotional atmosphere. Weather, lighting, architecture, landscape, and environmental sounds work together to establish and shift mood throughout the narrative. Atmosphere deepens theme and reveals character interiority. The world's emotional texture is inseparable from the story's meaning."

  SC-009:
    name: "Author Intrusion Avoidance"
    measures: "Whether the author's knowledge, opinions, and expository needs are kept separate from the POV character's consciousness, or whether the author \"breaks through\" the character to address the reader directly."
    score_0: "The narrative frequently breaks character consciousness to explain things the character already knows, describe things the character cannot perceive, insert vocabulary inappropriate to the character, or deliver exposition the author wants the reader to have. The author's hand is constantly visible."
    score_5: "Every line of narration is filtered through the POV character's consciousness, knowledge, vocabulary, and perception. Information reaches the reader only through channels the character would naturally access. When exposition is needed, it emerges organically from character thought, dialogue, or action."

  SC-010:
    name: "Author Intrusion Discipline"
    measures: "Whether the narrative voice remains consistent and in service of the story, or whether the author's own voice, opinions, or knowledge break through to lecture, moralize, or explain beyond what the narrative naturally supports."
    score_0: "The narrator breaks from story voice to editorialize, moralize, or explain significance. The author's research is showcased beyond what the story requires. Characters become mouthpieces for the author's views. The narrative tells the reader what to think or feel about events rather than dramatizing them. POV boundaries are violated to deliver information the POV character couldn't possess."
    score_5: "The narrative voice remains consistent with the established POV and tone. Information is delivered through channels available to the characters and narrative situation. The author's knowledge and opinions are invisible -- the story's themes emerge from dramatized events rather than from narratorial commentary. Research enriches the narrative without being displayed for its own sake."

  SC-011:
    name: "Author/Narrator Voice Separation"
    measures: "Whether the three levels of voice — author voice, narrator voice, and character voice — are handled with appropriate distinction and consistency."
    score_0: "The author's voice bleeds through all characters and the narrator indiscriminately. Every character sounds like the author. The narrator's vocabulary and concerns are clearly the author's rather than emerging from the narrative world. No separation between these layers."
    score_5: "Author voice is detectable as a cumulative pattern across works but does not intrude on individual character voices. The narrator voice is appropriate to the story and distinct from the author's personal voice. Character voices are distinct from both narrator and author, reflecting their own personalities and worldviews."

  SC-012:
    name: "Authorial Voice Distinctiveness"
    measures: "Whether the prose has a recognizable, distinctive authorial personality that persists across scenes and would be identifiable even out of context, or whether it reads as generic, interchangeable writing."
    score_0: "The prose has no discernible personality. It could have been written by anyone. It reads as generic \"competent writing\" without attitude, worldview, or verbal quirks. There is no sense of a particular human intelligence behind the words. The diction, rhythm, and concerns are interchangeable."
    score_5: "The prose has a distinctive verbal personality — particular rhythms, obsessions, humor, attitudes, and relationship with language — that would be recognizable across different passages. Like Toni Morrison's \"florid, almost trance-like narration\" or Hemingway's \"terse, economical prose,\" the voice is unmistakably itself. This does not mean flashy — Carver's voice is distinctive precisely in its restraint."

  SC-013:
    name: "Backstory Integration"
    measures: "Whether character history is revealed through organic narrative techniques rather than expository dumps, and whether revealed backstory serves present dramatic needs."
    score_0: ""
    score_5: ""

  SC-014:
    name: "Boredom Prevention"
    measures: "Whether every scene progresses the narrative question, whether character interaction is maximized, whether information is delivered through discovery rather than dumps, and whether the reader always has a reason to keep reading"
    score_0: "Scenes don't progress the narrative question. Characters avoid interaction and react in their heads. Information arrives in exposition dumps disconnected from story events. The reader has no motivation to continue. Reading feels like a task."
    score_5: "Every scene significantly progresses the driving narrative question. Characters interact rather than ruminate in isolation. Details are revealed through discovery \"just in time for the reader to understand what's going on.\" Pacing kicks into high gear by the midpoint. The reader always has both a question to answer and an emotional investment in finding the answer."

  SC-016:
    name: "C11: Authorial Voice and Stylistic Identity"
    measures: "Whether the prose exhibits a recognizable, distinctive authorial voice that could not be mistaken for a generic default"
    score_0: "Prose has no distinctive qualities. It reads as a competent but generic default. There is no sense that a particular mind with particular convictions and aesthetic preferences produced these sentences. The writing could have been produced by averaging the styles of many authors."
    score_5: "The prose has an unmistakable voice. Sentence construction, word choice, rhythm, and perspective reflect a specific sensibility. The writing could not be mistaken for anyone else's. There is a sense of cost—that a specific human spent time choosing these words over other words."

  SC-017:
    name: "C1: Lexical Diversity and Vocabulary Breadth"
    measures: "Whether the text demonstrates varied and intentional word choice rather than clustering around a narrow band of statistically probable vocabulary"
    score_0: "Text uses a narrow vocabulary band, clustering around common \"safe\" words. High repetition of the same adjectives, adverbs, and transitional phrases. Type-token ratio is low. Same words appear in the same syntactic positions across paragraphs."
    score_5: "Text demonstrates a wide and intentional vocabulary. Word choice is specific rather than generic, varied across passages, and appropriate to the context. Author employs precise terminology when available rather than defaulting to vague category labels."

  SC-018:
    name: "C2: Burstiness and Sentence-Length Variation"
    measures: "Whether the text exhibits natural variation in sentence length, structure, and rhythm across passages"
    score_0: "Sentence lengths are uniform throughout. Paragraphs follow identical structural patterns. Standard deviation of sentence length divided by mean is below 0.30. Every paragraph has similar rhythm."
    score_5: "Sentence lengths vary deliberately and purposefully. Short punchy sentences alternate with complex constructions. Rhythm shifts between passages to match content and emotional register. Standard deviation/mean ratio above 0.60."

  SC-019:
    name: "C3: Entropy and Predictability"
    measures: "Whether the text contains genuine surprises in word choice, phrasing, and narrative development rather than always selecting the most statistically probable next token"
    score_0: "Text is maximally predictable. Every word choice is the most probable completion. No surprising juxtapositions, unusual phrasings, or unexpected word combinations. Cross-entropy is low."
    score_5: "Text contains genuine surprises that reward attention. Word choices are sometimes unexpected but justified by context. Phrasing departs from the most probable path in ways that create meaning, humor, or intensity. Cross-entropy approaches human baseline."

  SC-020:
    name: "C4: Semantic Specificity vs Semantic Ablation"
    measures: "Whether the text uses specific, concrete, precise language rather than generic category labels and vague descriptions"
    score_0: "Text systematically replaces specific details with generic categories. Proper nouns dissolve into category labels. Metaphors are conventional similes. Wine is described as \"notes of dark fruit with velvety finish\" instead of \"blackcurrant and pencil lead.\" Jazz is described with \"complex harmonies\" instead of \"McCoy Tyner comping in fourths.\""
    score_5: "Text is precise and particular. Details are chosen for their specificity and resonance. Descriptions name specific things rather than gesturing at categories. References are concrete and grounded in knowledge rather than statistical approximation."

  SC-021:
    name: "Emotional Rendering Quality"
    measures: "Whether emotions are rendered through action, physical detail, dialogue, and behavior rather than stated directly through narration"
    score_0: "Emotions are stated directly: \"She felt afraid,\" \"He was angry,\" \"A sense of unease grew.\" Characters announce how they feel. The narrator summarizes emotional states rather than depicting them. Every emotional moment is explained."
    score_5: "Emotions emerge through physical behavior, dialogue choices, action, and selective detail. The reader infers emotional states from evidence rather than being told. Subtext operates beneath the surface. Some emotions are never named but are unmistakably present."

  SC-024:
    name: "C9: Temporal Complexity"
    measures: "Whether the narrative employs varied and sophisticated temporal structures rather than strict linear chronology"
    score_0: "Narrative proceeds in strict chronological order with no variation. Events are presented in the order they occur without flashbacks, flash-forwards, parallel timelines, or temporal layering. Time is treated as a flat conveyor belt."
    score_5: "Temporal structure is employed as a deliberate narrative tool. Flashbacks, flash-forwards, parallel timelines, or non-linear chronology serve the story's themes and emotional arc. Time manipulation creates meaning and surprise."

  SC-025:
    name: "Capitalization Consistency"
    measures: "Whether capitalization conventions are applied consistently throughout — titles and honorifics, proper nouns, invented terms, generic vs. specific uses of titles, kinship terms, and fantasy/sci-fi species and races."
    score_0: "Capitalization is inconsistent: \"the President\" in one paragraph and \"the president\" in the next for the same character in the same context. Invented terms alternate between capitalized and lowercase. Kinship terms are randomly capitalized (\"Come here, mother\" vs. \"Come here, Mother\")."
    score_5: "Every capitalization choice follows a consistent rule. Titles are capitalized before names, lowercase when generic. Kinship terms are capitalized only when replacing a name. Invented terms maintain consistent capitalization throughout. Fantasy races/civilizations follow a consistent convention."

  SC-026:
    name: "Chapter/Scene Length Variation"
    measures: "Whether chapter and scene lengths vary deliberately to control pacing and reading rhythm, rather than defaulting to a uniform length."
    score_0: "Every chapter is approximately the same length regardless of content, creating predictable rhythmic uniformity and preventing the pacing effects that length variation enables."
    score_5: "Chapter lengths vary based on content needs: short chapters for rapid action and momentum, longer chapters for deep character work and immersion. The variation creates a reading rhythm where short chapters after long ones feel accelerating, and long chapters after short ones provide welcome depth. Strategic variation prevents both exhaustion and boredom."

  SC-030:
    name: "Character Credibility"
    measures: "Whether characters' actions, thoughts, and dialogue remain logically consistent with their established traits, the story's internal logic, and the specific moment in the narrative."
    score_0: "Characters act in ways that contradict their established traits without explanation; emotional responses are mismatched to situations; characters suddenly acquire skills or knowledge they shouldn't have; the reader frequently thinks \"this person would never do that.\""
    score_5: "Characters' actions remain consistent with their established psychology even as they change; emotional responses match the specific moment and the character's history; surprises come from the revelation of hidden depth, not arbitrary behavior; the reader experiences even shocking character actions as retrospectively inevitable; credibility is maintained within the story world's own rules."

  SC-031:
    name: "Character Identification"
    measures: "Whether readers psychologically adopt characters' perspectives, goals, and mental states as a form of narrative transportation into first-person experience"
    score_0: "Readers feel no connection to any character's perspective. They observe events as distant spectators with no investment in character goals or outcomes. No dimension of identification (spatiotemporal, perceptual, cognitive, moral, emotional, embodied) is activated."
    score_5: "Readers fully internalize the protagonist's viewpoint, goals, and mental states. They use the same \"neural machinery\" to think about the character that they use for self-reflection. Identification spans all six dimensions and readers feel genuine psychological relocation into the character's first-person perspective."

  SC-032:
    name: "Character Interiority Quality"
    measures: "Whether the scene provides appropriate access to the POV character's internal experience -- thoughts, feelings, unspoken reactions -- creating the connection between external events and internal character response."
    score_0: "No interiority exists -- the scene reads like a screenplay or stage directions. Alternatively, interiority is so excessive that it overwhelms action and dialogue, creating stasis. Or interiority violates POV boundaries (head-hopping without scene breaks)."
    score_5: "Interiority is balanced with action and dialogue. Internal responses illuminate why characters make their choices. Thoughts advance plot or build character without redundantly explaining what's already shown. The technique (direct monologue, indirect thought, free indirect discourse) is consistent and appropriate to the narrative voice."

  SC-033:
    name: "Character Knowledge Tracking"
    measures: "Whether characters act on and reference only information they have actually acquired within the story, and whether they retain and use information they should logically possess."
    score_0: "Characters know things they have no way of knowing (never witnessed, were never told, could not have deduced). Characters conveniently forget critical information they definitely possessed. A character in one scene demonstrates knowledge that contradicts their established ignorance in a previous scene. Information learned in one plotline bleeds into another character's awareness without any in-story mechanism."
    score_5: "Each character's knowledge state is rigorously consistent with their experiences. Characters only act on information they could plausibly possess. When characters lack information the reader has, this creates legitimate dramatic irony rather than appearing as authorial error. Characters remember and build on previous discoveries rather than forgetting them when inconvenient."

  SC-034:
    name: "Character Name Overuse in Dialogue"
    measures: "Whether characters address each other by name with realistic frequency rather than the artificially high frequency common in weak fiction."
    score_0: "Characters constantly address each other by name in every exchange, far exceeding how people actually speak. Direct address appears multiple times per page or even per exchange. The overuse feels like a sales technique or parental scolding rather than natural conversation."
    score_5: "Characters rarely address each other by name except when getting attention, introducing someone, or making an emphatic point. Name usage reflects real conversational patterns. Most exchanges rely on context and turn-taking rather than name-calling for speaker identification. When names are used for emphasis, the rarity makes the emphasis land."

  SC-036:
    name: "Character Voice Distinctiveness"
    measures: "Whether each character speaks, thinks, and expresses themselves in ways unique to their personality, background, and emotional state, such that characters are identifiable without dialogue tags."
    score_0: "All characters speak in the same register, vocabulary, and rhythm; dialogue is interchangeable between characters; the \"cover the name\" test fails completely; characters sound like the author rather than themselves."
    score_5: "Each character has distinct vocabulary, syntax, rhythm, and speech patterns reflecting their background, education, psychology, and emotional state; readers can identify speakers without tags; voice reveals character through what is said, what is avoided, and how things are phrased; internal monologue is as distinctive as spoken dialogue."

  SC-040:
    name: "Cliche Avoidance"
    measures: "Whether the prose avoids figurative clichés (stock phrases and dead metaphors), prose rhythm clichés (predictable sentence patterns), and descriptive clichés (stock descriptions like \"piercing blue eyes\") — or whether it relies on pre-fabricated language throughout."
    score_0: "The prose is built from stock phrases: \"at the end of the day,\" \"cold as ice,\" \"heart of gold,\" \"light at the end of the tunnel.\" Characters have \"piercing eyes\" and \"chiseled jaws.\" Emotions are described in clichéd terms (\"butterflies in her stomach,\" \"his heart sank\"). The writer has substituted cultural shorthand for fresh observation."
    score_5: "The prose avoids or subverts familiar phrases. Descriptions emerge from fresh observation rather than cultural shorthand. When familiar territory must be covered (describing a sunset, a kiss, a fight), the writer finds an angle that hasn't been used a thousand times. If clichés appear, they are deliberately subverted or placed in a character's mouth for characterization purposes."

  SC-041:
    name: "Cliche Avoidance at Sentence Level"
    measures: "Whether the prose at the phrase and sentence level avoids stock constructions, tired imagery, and formulaic transitions — whether the writer has taken Orwell's rule seriously that \"the concrete melts into the abstract\" when topics are raised in default language."
    score_0: "Nearly every sentence contains at least one stock phrase, dead metaphor, or formulaic construction: \"her heart raced,\" \"he let out a breath he didn't know he was holding,\" \"the silence was deafening,\" \"a wave of emotion washed over her.\" Transitions use \"Meanwhile,\" \"Furthermore,\" or \"In that moment.\" The prose reads as if assembled from a finite inventory of pre-existing phrases."
    score_5: "The prose is free of dead metaphors and stock constructions. Every phrase shows evidence of having been examined and found adequate by this specific writer for this specific moment. Even functional sentences avoid autopilot. Orwell's test is passed: no metaphor, simile, or figure of speech \"which you are used to seeing in print.\" Flaubert's test is passed: no \"received idea\" — no automatic thought or platitude — survives in the final prose."

  SC-042:
    name: "Comma Splice and Run-On Management"
    measures: "Whether comma splices and run-on (fused) sentences are avoided in narration, and whether any deliberate comma splices in dialogue or stream-of-consciousness are clearly intentional."
    score_0: "Comma splices and fused sentences appear frequently in narration with no apparent intent. Independent clauses are routinely joined with commas where periods, semicolons, or conjunctions are needed. No distinction between intentional and accidental splices."
    score_5: "Narration is free of accidental comma splices and run-ons. Any comma splices that appear are clearly deliberate: in dialogue for breathless speech, in stream-of-consciousness for racing thoughts, or in short parallel clauses per Strunk & White's exception (\"very short and alike in form\"). The reader can always distinguish choice from error."

  SC-043:
    name: "Commonsense Physical Plausibility"
    measures: "Whether events in the non-speculative aspects of the story conform to basic physical and commonsense expectations — characters need to eat, sleep, and rest; injuries have consequences; weather affects activity; time passes at a normal rate for non-magical activities."
    score_0: "Characters go days without eating, sleeping, or attending to basic physical needs with no explanation. Injuries sustained in one scene have no physical consequences in the next. Characters perform feats that would be physically impossible for non-enhanced humans. Real-world elements (how guns work, how long it takes to travel by horse, how weather affects visibility) are depicted inaccurately."
    score_5: "Non-speculative elements operate by real-world physics and common sense. Characters have physical needs that the narrative acknowledges. Injuries have realistic consequences. Real-world elements are depicted with accuracy appropriate to the genre. The reader's knowledge of how the world actually works is respected for all non-fantastical elements."

  SC-044:
    name: "Concision and Filler Word Control"
    measures: "Whether the prose is tight and efficient — free of unnecessary filler words, throat-clearing phrases, redundant modifiers, and padding that adds word count without meaning."
    score_0: "Prose is padded with filler words (just, really, very, actually, basically, literally, definitely, certainly, probably, somewhat, somehow, quite, rather), throat-clearing phrases (\"it is important to note,\" \"in my opinion\"), and redundant modifiers (\"dark, pitch-black sky\"). Sentences could lose 20-30% of their words without losing meaning."
    score_5: "Every word contributes to meaning, rhythm, or voice. Filler words appear only in dialogue where they characterize the speaker. Narration is lean without being starved. Redundancy is absent. \"Began to\" and \"started to\" appear only when an action is interrupted."

  SC-045:
    name: "Conflict and Tension Within Exchanges"
    measures: "Whether dialogue scenes contain meaningful conflict, opposing agendas, or tension that gives exchanges dramatic energy rather than functioning as neutral information transfer."
    score_0: "Characters exchange information cooperatively with no underlying tension. No character wants anything the other is reluctant to give. Conversations are pleasant and agreeable. There are no competing agendas, no things at stake, no power dynamics. Dialogue reads as cooperative Q&A."
    score_5: "Every dialogue scene contains some form of conflict, whether explicit confrontation, subtle tension, competing agendas, veiled threats, or the friction of characters who want different things. Conflict intensity varies appropriately—some scenes feature faint undercurrents while others escalate to full confrontation. Characters pursue individual agendas that shape their responses, and someone is always being thwarted, evaded, or resisted."

  SC-046:
    name: "Consistency of Style Choices"
    measures: "Whether the manuscript maintains consistent editorial decisions throughout — Oxford comma usage, em dash formatting (spaced or unspaced), ellipsis style (three dots or Unicode character, spaced or unspaced), number formatting (spelled out or numerals), capitalization conventions, hyphenation patterns, British vs. American spelling, and all other style-guide decisions."
    score_0: "Style choices vary randomly throughout the manuscript: Oxford comma present in some lists but absent in others, em dashes sometimes spaced and sometimes not, numbers sometimes spelled out and sometimes numerals within the same context, capitalization of terms inconsistent (e.g., \"the Governor\" vs. \"the governor\" in equivalent contexts)."
    score_5: "Every style choice is made once and applied uniformly throughout. A style sheet could be reconstructed from the manuscript with zero contradictions. The reader never notices formatting because it is invisible in its consistency."

  SC-047:
    name: "Contextual Distance Calibration"
    measures: "Whether the amount of explicit exposition is calibrated to the actual gap between the reader's likely knowledge and the story world's reality."
    score_0: "The narrative over-explains familiar concepts (contemporary real-world settings described as if alien) or under-explains unfamiliar ones (secondary worlds or deep-future settings with insufficient context). The author does not distinguish between what readers can infer from shared cultural knowledge and what genuinely requires explanation."
    score_5: "The exposition budget is proportional to the contextual distance between reader and story world. Contemporary settings rely on shared cultural assumptions with minimal exposition. Speculative settings provide enough unfamiliar-world context for comprehension without over-explaining elements readers can infer. Historical settings explain what's genuinely surprising to modern readers while trusting familiarity with human universals."

  SC-048:
    name: "Correct Speaker Tag Verbs"
    measures: "Whether dialogue tags use verbs that can actually be performed with speech — \"said,\" \"asked,\" \"whispered,\" \"shouted\" — rather than verbs that describe physical actions that cannot produce speech — \"smiled,\" \"laughed,\" \"shrugged,\" \"sighed.\""
    score_0: "Non-speech verbs are routinely used as dialogue tags: '\"I love you,\" he smiled.' '\"Let's go,\" she shrugged.' Physical actions are formatted as if they produce speech. The distinction between tags and beats is not understood."
    score_5: "Dialogue tags use only speech-producing verbs. Physical actions are formatted as action beats (separate sentences with periods). Borderline cases are handled consistently. The reader always knows whether an action produces or accompanies speech."

  SC-050:
    name: "Cultural Depth and Specificity"
    measures: "Whether the fictional cultures feel like authentic, multi-dimensional societies with internal diversity, history, values, customs, and contradictions -- rather than monolithic stereotypes or shallow window dressing."
    score_0: "Cultures are monolithic (the \"Planet of Hats\" problem) -- all members of a group think, look, and act the same. Cultural details are limited to surface markers (funny hats, unusual food) without deeper values, contradictions, or internal diversity. Or cultures are generic real-world analogs without transformation or specificity."
    score_5: "Cultures contain internal factions, dissenters, and diversity. They have coherent worldviews that inform everything from daily customs to power structures to language patterns. Cultural practices emerge from history, geography, and belief systems in ways that feel inevitable rather than arbitrary. Individuals within cultures have their own relationships to cultural norms (compliance, rebellion, ambivalence)."

  SC-052:
    name: "Curiosity Gap Management"
    measures: "Whether the text creates and manages gaps between what readers know and what they want to know, using the information gap to sustain forward momentum without frustrating readers"
    score_0: "Either no questions are raised (nothing to be curious about), or questions are raised and immediately answered (no gap), or gaps are sustained so long without any closure that readers disengage from frustration."
    score_5: "Multiple curiosity gaps operate at different timescales — small mysteries introduced chapter-by-chapter and solved one or two chapters later, larger mysteries covering whole acts, and persistent mysteries spanning the entire book. Curiosity stimulates the brain's dopamine reward system. Gaps are filled as tension builds rather than stringing readers along indefinitely."

  SC-053:
    name: "Dangling and Misplaced Modifiers"
    measures: "Whether modifying phrases are correctly attached to the words they are intended to modify, avoiding unintentional comic or confusing readings."
    score_0: "Multiple dangling or misplaced modifiers per chapter. Participial phrases attach to wrong subjects (\"Running as fast as she could, the cape flapped in the wind\"). Absolute phrases create impossible readings (\"Opening the back door of a café, her purse fell to the ground\")."
    score_5: "Every modifier clearly and correctly attaches to its intended target. No dangling participles, no misplaced adjectival phrases, no squinting modifiers. The reader never has to reconstruct intended meaning."

  SC-054:
    name: "Defamiliarization (Making the Familiar Strange)"
    measures: "Whether the writing causes the reader to perceive familiar things, situations, or experiences in a new way — the degree to which the prose fights \"automatized\" perception and re-vivifies ordinary experience."
    score_0: "The prose describes familiar things in familiar ways. A sunset is beautiful, a city is bustling, grief is heavy. The reader's perception is never challenged or renewed. Objects and experiences pass through the prose unchanged, as automatic as they are in daily life. The writing confirms existing perception rather than transforming it."
    score_5: "The prose consistently causes the reader to see familiar things as if for the first time. Descriptions of ordinary objects, emotions, or situations produce the sensation of strangeness and renewed perception. The reader's habitual way of understanding the world is disrupted and enriched by the writing. Techniques may include unusual perspective (Tolstoy's horse narrator in \"Kholstomer\"), unexpected sensory channels (describing a sunrise through touch and sound rather than sight), cross-sensory description, or language that makes forms \"difficult\" and perception \"lengthy.\""

  SC-055:
    name: "Defamiliarization / Making Strange"
    measures: "Whether description refreshes the reader's perception of familiar objects, settings, or experiences by presenting them in unfamiliar ways."
    score_0: "Description presents everything in the most familiar, expected way. Objects are described through their most conventional attributes. Nothing in the description challenges the reader's habitual perception or makes them see something they've seen before as if for the first time."
    score_5: "Description consistently makes the familiar strange—presenting ordinary objects, settings, or experiences through unexpected angles, unusual sensory emphasis, or language that forces the reader to perceive freshly rather than recognize automatically. The reader sees the world newly through the description."

  SC-056:
    name: "Description Filtered Through POV"
    measures: "Whether descriptive passages are colored by the observing character's psychology, knowledge, emotional state, and sensory priorities rather than delivered from a neutral omniscient camera."
    score_0: "Description reads as a neutral camera recording—an impartial inventory of details with no trace of a perceiving consciousness. Any character could be looking at this scene and the description would be identical. The POV character's personality, emotion, and knowledge do not color what is noticed or how it is described."
    score_5: "Every descriptive detail reveals the perceiving character—what they notice (and don't notice), the language they use to process it, the emotional valence they assign to it, and the associations it triggers for them. Different characters would describe the same scene differently. Description is simultaneously world-building and characterization."

  SC-057:
    name: "Description Pacing and Proportion"
    measures: "Whether the amount and timing of description is proportionate to its narrative importance, avoiding both over-description of trivial elements and under-description of crucial ones."
    score_0: "Trivial settings or objects receive exhaustive description while crucial environments are barely sketched. The amount of descriptive attention a scene receives bears no relationship to its narrative importance. High-tension moments are slowed by irrelevant description; pivotal locations are described in a single generic sentence."
    score_5: "Descriptive attention is proportionate to narrative significance. Important settings, objects, and moments receive fuller description; transitional or familiar spaces receive lighter touches. The pacing of description reinforces the pacing of the story—lingering where the story benefits from immersion, moving quickly where momentum matters."

  SC-058:
    name: "Description as Characterization"
    measures: "Whether descriptive choices about what a character notices, how they describe it, and what language they use reveal character psychology, values, background, or emotional state."
    score_0: "All characters notice and describe the same things in the same way. Description is functionally identical regardless of whose perspective it comes through. No information about character psychology, values, or emotional state can be inferred from what is described or how."
    score_5: "What a character notices reveals what they care about. How they describe it reveals how they think. What they ignore reveals their blind spots. Different characters observing the same space would produce recognizably different descriptions. The selection and framing of descriptive detail is itself a characterization tool."

  SC-059:
    name: "Dialogue Compression and Naturalism Balance"
    measures: "Whether dialogue achieves the impression of natural speech while being strategically compressed to remove the filler, repetition, and meandering of actual conversation."
    score_0: "Dialogue either reads as a literal transcription of real speech (full of filler words, greetings, repetition, small talk, and non-sequiturs that serve no narrative purpose) or reads as overly formal and stilted, nothing like how humans actually speak. Characters speak in complete, grammatically perfect sentences with no contractions."
    score_5: "Dialogue creates a convincing illusion of natural speech through strategic compression. Filler is eliminated except where it characterizes. Sentence fragments replace full sentences where natural. Contractions are used appropriately. Small talk and greetings are elided or summarized. Every line does narrative work while sounding effortlessly conversational. The compression is invisible to the reader."

  SC-060:
    name: "Dialogue Exposition Naturalness"
    measures: "Whether information delivered through dialogue emerges from legitimate character motivations and dynamics, or whether characters explain things they already know for the reader's benefit."
    score_0: "Characters routinely explain things both parties already know (\"As you know, Bob...\"). Dialogue sounds like a textbook or lecture. Characters deliver information in ways no human would naturally speak. Conversations exist solely to inform the reader, with no authentic interpersonal dynamics."
    score_5: "Every piece of information delivered through dialogue has a legitimate character motivation (persuading, arguing, revealing under pressure, teaching a genuine newcomer). Dialogue reveals character personality while conveying information. What characters don't say is as informative as what they do say. Conversations feel like authentic interpersonal exchanges that happen to illuminate the reader."

  SC-061:
    name: "Dialogue Pacing Variation"
    measures: "Whether dialogue exchanges vary in pace -- from rapid-fire stichomythia to longer speeches -- matching the emotional and dramatic needs of each scene, rather than defaulting to a single dialogue rhythm."
    score_0: "All dialogue operates at the same pace throughout the story. Every exchange is either all rapid-fire or all extended monologue, regardless of dramatic context."
    score_5: "Rapid exchanges accelerate confrontational and high-stakes scenes; longer speeches slow for emotional moments and exposition. Dialogue beats (action tags, internal reactions) control micro-rhythm within conversations. The pacing of dialogue matches the emotional register of the scene."

  SC-062:
    name: "Dialogue Punctuation and Formatting"
    measures: "Whether dialogue follows standard punctuation conventions — correct use of commas vs. periods with dialogue tags vs. action beats, proper capitalization after tags, correct placement of punctuation inside/outside quotation marks, proper handling of interrupted and trailing speech."
    score_0: "Dialogue punctuation is inconsistent or incorrect: periods used with dialogue tags (\"I love you.\" he said), action beats punctuated as tags (\"I love you,\" she smiled), no distinction between interruption and trailing, smart/curly quotes inconsistently applied."
    score_5: "Every instance of dialogue follows correct conventions. Tags and beats are properly distinguished. Interrupted dialogue uses em dashes correctly. Trailing dialogue uses ellipses correctly. Each speaker gets their own paragraph. Quotes within dialogue use single marks. Multi-paragraph dialogue has correct opening/closing quote placement."

  SC-063:
    name: "Dialogue Purpose and Economy"
    measures: "Whether every dialogue exchange serves at least one narrative function (advancing plot, revealing character, building tension, delivering information, establishing mood) and whether exchanges that serve no function are cut."
    score_0: "Extended dialogue exchanges serve no narrative purpose. Characters engage in small talk, pleasantries, greetings, and leave-takings that don't characterize or advance plot. Phone calls and family dinners are fully rendered when a sentence of summary would suffice. Dialogue is present because \"characters need to talk\" rather than because the story requires it."
    score_5: "Every dialogue exchange performs at least one narrative function, and the best exchanges perform multiple functions simultaneously (revealing character while advancing plot while building tension). Purposeless pleasantries are elided. Conversations enter late and leave early. Each line earns its place. Dialogue that could be replaced by summary is either cut or upgraded to carry additional weight."

  SC-064:
    name: "Dialogue Rhythm and Pacing"
    measures: "Whether dialogue exchanges have varied rhythm through sentence length variation, speech pattern modulation, strategic interruptions, and appropriate pacing that matches the emotional intensity of the scene."
    score_0: "All dialogue lines are roughly the same length and follow the same syntactic pattern. The exchange has no rhythmic variation—no short punchy lines after long ones, no interruptions, no trailing off. The pace never shifts to match emotional content. Rapid exchanges read as slow; tense moments lack urgency; contemplative moments lack space."
    score_5: "Dialogue rhythm is precisely controlled. Short sentences create urgency and impact. Longer lines slow pace for reflection or building tension. Interruptions (em dashes) convey characters cutting each other off. Ellipses indicate trailing thoughts. The rhythm of exchanges matches emotional content—fast stichomythia for conflict, longer turns for monologue and revelation. Sentence length variation within dialogue creates a natural rise and fall. Rhythm shifts signal emotional changes."

  SC-065:
    name: "Dialogue Tag Craft"
    measures: "Whether dialogue attribution is handled with invisible, purposeful tags that serve the scene rather than drawing attention to themselves through overuse of creative verbs, adverbs, or said-bookisms."
    score_0: "Dialogue tags are ornate (\"he exclaimed,\" \"she retorted,\" \"he opined gravely\"), drawing constant attention to the attribution rather than the dialogue. Adverbs prop up weak dialogue (\"she said angrily\"). Physical impossibilities are used as tags (\"she laughed,\" \"he smiled\" as speech verbs). Every line has a tag even when the speaker is obvious. The tags constitute \"telling\" rather than showing."
    score_5: "Attribution is invisible. \"Said\" and \"asked\" predominate, functioning like punctuation readers skip. Tags appear only when needed for speaker clarity. Action beats replace many tags, simultaneously identifying the speaker and adding characterization or subtext. No adverbs modify \"said.\" No physical impossibilities are used as speech verbs. Tag placement varies for rhythm. Some exchanges run without any attribution, relying on turn-taking and voice distinction."

  SC-066:
    name: "Dialogue Tag and Attribution Craft"
    measures: "Whether dialogue attribution is handled with skill — using \"said\" as the invisible default, employing action beats for both attribution and characterization, and avoiding \"said bookisms\" (opined, interjected, exclaimed) and adverbial tags (\"said angrily\") that tell rather than show."
    score_0: "Every dialogue line uses a different fancy tag (\"opined,\" \"exclaimed,\" \"murmured,\" \"interjected,\" \"queried\"). Adverbs pile onto tags (\"said softly,\" \"whispered quietly,\" \"shouted loudly\"). Action beats are absent. The attribution itself becomes the focus rather than the dialogue."
    score_5: "\"Said\" and \"asked\" are the primary tags, rendered invisible by familiarity. Action beats replace tags where possible, simultaneously attributing dialogue and revealing character (\"'We should leave.' His keys rattled in his hand\"). Tags with adverbs appear only in the rarest cases where no other technique conveys the meaning. The reader always knows who is speaking without the attribution calling attention to itself."

  SC-067:
    name: "Dialogue-Action Integration (Beats)"
    measures: "Whether dialogue is integrated with physical action, gesture, and environmental interaction to create a complete scene rather than disembodied \"talking heads.\""
    score_0: "Extended passages of dialogue float in a void with no physical action, setting detail, or body language. Characters are disembodied voices (\"talking heads\" or \"white room syndrome\"). Alternatively, action beats are purely mechanical busywork (nodding, smiling, sipping coffee) that adds bulk without meaning."
    score_5: "Physical actions and environmental details are woven into dialogue to create complete scenes. Action beats reveal character emotion, advance plot, create subtext, or contradict spoken words. Characters interact with their environment meaningfully. The balance between speech and action maintains rhythm without interrupting conversational flow. Every beat serves the scene rather than filling space."

  SC-068:
    name: "Dialogue-to-Narration Balance"
    measures: "Whether the proportion of dialogue to narration/description is appropriate for the genre, pacing needs, and emotional content of each scene and the work as a whole."
    score_0: "The work is either wall-to-wall dialogue with no narrative breaks (resulting in \"talking heads\" without grounding, pacing, or interiority) or wall-to-wall narration with minimal dialogue (resulting in distance, lecture-like telling, and absence of character voice). No variation in proportion across scenes."
    score_5: "Dialogue proportion shifts appropriately by scene: fast-paced conflict scenes lean dialogue-heavy; atmospheric or reflective moments lean toward narration; emotional confrontations balance both. The work's overall proportion fits its genre and tone. Within scenes, dialogue and narration alternate to create rhythm, provide visual page breaks, and maintain reader engagement. Neither element dominates inappropriately."

  SC-069:
    name: "Diction Precision and Intentionality"
    measures: "Whether word choices are specific, accurate, and deliberately selected for their denotative and connotative effects rather than reaching for the first available or most generic option."
    score_0: "Words are vague, generic, or randomly selected. Vocabulary is either inappropriately simple or inappropriately complex for the narrative context. Abstract nouns dominate where concrete ones would serve. Words are used imprecisely (near-misses in meaning). Connotation is ignored."
    score_5: "Every word earns its place. Denotation and connotation are both controlled. Vocabulary fits the narrative register. Concrete, specific nouns and precise verbs dominate. When uncommon words appear, they appear because no common word captures the exact meaning. The writer demonstrates Flaubert's \"le mot juste\" — the exact right word in every position."

  SC-070:
    name: "Distinctive Voice"
    measures: "Whether the prose has a recognizable, individual quality that could not have been written by a different author or by a statistical average of all authors — whether reading a random paragraph would allow identification of the author or at minimum would not be attributable to \"anyone.\""
    score_0: "The prose sounds like it was written by no one in particular. Sentence structures follow default patterns. Word choices are drawn from the most statistically common options. The rhythm is even and unremarkable. There is no sense of a particular human consciousness shaping the language. The writing could be attributed to any competent but undistinguished author — or to a language model producing \"the average voice of its training data.\""
    score_5: "The prose has a voice so distinctive it functions \"as distinctive as fingerprints.\" There is a cadence, rhythm, selection of words and phrases, set of obsessions, and way of seeing that belongs to one consciousness. The voice creates \"sympathetic vibrations in readers\" and gives \"a sense of connection to another live human presence.\" Reading a random paragraph produces the sensation of encountering a specific mind at work."

  SC-072:
    name: "Dramatic Irony Through POV"
    measures: "Whether the narrative uses POV limitations and multi-perspective structures to create productive gaps between what readers know and what characters know, generating tension, suspense, or thematic resonance."
    score_0: "No productive information asymmetry exists between reader and characters. In multi-POV stories, information from one perspective never meaningfully interacts with another. In single-POV stories, no gap exists between reader understanding and character understanding. Alternatively, the author withholds information the POV character has, creating false mystery rather than dramatic irony."
    score_5: "POV limitations create powerful information asymmetry. In multi-POV stories, readers see two or more threads converging before characters do. In single-POV stories, readers recognize narrator biases, blind spots, or deceptions that the narrator does not. The gap between reader knowledge and character knowledge generates genuine suspense, empathy, or thematic depth."

  SC-073:
    name: "Dramatic Irony and Information Asymmetry Use"
    measures: "Whether the narrative deliberately creates productive gaps between what the reader knows and what characters know, generating tension, suspense, dread, or humor through that asymmetry."
    score_0: "The reader and all characters possess identical information at all times, missing opportunities for tension. Alternatively, information asymmetry is created accidentally (reader confused about what characters know) rather than deliberately. No strategic use of knowledge gaps to generate emotion."
    score_5: "The narrative deliberately controls who knows what and when. Some scenes gain power from the reader knowing something a character doesn't (dramatic irony creating dread or suspense). Other scenes gain power from the reader knowing less than the characters (mystery creating curiosity). The knowledge gaps between reader and characters shift purposefully across the narrative, and each shift produces a specific emotional effect."

  SC-074:
    name: "Earned Moments and Restraint"
    measures: "Whether the prose earns its emotional, descriptive, and stylistic moments through contrast and restraint — using quiet passages to make loud moments louder, and exercising discipline about when to deploy its full power — or whether it runs at maximum intensity throughout, depleting its own impact."
    score_0: "Every paragraph operates at maximum emotional or descriptive intensity. Metaphors appear in every sentence. Emotions are always at peak levels. There is no quiet moment, no restraint, no contrast. The prose equivalent of a film that's all explosions — each one diminishing the impact of the next."
    score_5: "The prose exercises strategic restraint. Quiet passages predominate, creating space for the moments of intensity to land with full impact. The writer trusts that \"silence, hesitation, and half-finished gestures can be more powerful than dialogue.\" Elaborate prose appears at moments of genuine narrative importance. As in music, the rests are as important as the notes."

  SC-075:
    name: "Echo Word Avoidance"
    measures: "Whether the same non-trivial word appears in close proximity (within a few sentences or a paragraph) without intentional rhetorical purpose."
    score_0: "Non-trivial words (not articles/prepositions) repeat within the same paragraph or across consecutive sentences without rhetorical purpose. Character names, body parts (\"eyes,\" \"hands\"), and action words (\"looked,\" \"turned\") echo conspicuously. Unusual or distinctive words (e.g., \"ancient,\" \"chamber,\" \"sigh\") repeat within a page."
    score_5: "Word echoes are absent or rare. When the same concept must be referenced repeatedly, varied phrasing is used naturally (not to the point of \"elegant variation\" or \"said bookism\" for nouns). Any repetition within close proximity serves deliberate emphasis."

  SC-076:
    name: "Economy of Description"
    measures: "Whether description achieves its effects with minimal words, without unnecessary elaboration or padding."
    score_0: "Descriptions are padded with redundant adjectives, unnecessary adverbs, and details that carry no narrative, characterological, or thematic weight. Every noun is modified; every scene is exhaustively catalogued."
    score_5: "Every descriptive word earns its place. Adjectives and adverbs are rare and precise. The text trusts the reader to infer and imagine. Description is compressed to its essential elements, achieving maximum impact with minimum verbiage."

  SC-077:
    name: "Economy of Language (Concision vs. Density)"
    measures: "Whether the prose achieves its effects with appropriate economy — neither wasting words on padding nor starving the reader of necessary detail — balancing Strunk's \"omit needless words\" with Le Guin's \"crowding\" (loading every rift with ore)."
    score_0: "Prose is padded with filler words (just, really, very, sort of, kind of, actually), redundant pairs (past history, close proximity), throat-clearing openers (It's important to note...), and empty expletives (There is... It is...). Alternatively, prose is so stripped that it starves the reader of necessary sensory or emotional detail."
    score_5: "Every word earns its place. Filler is eliminated. Redundancies are pruned. The prose is dense with meaning without being verbose. It follows Le Guin's \"crowding\" principle — vivid, exact, accurate, concrete — while simultaneously \"leaping\" over what doesn't serve the narrative trajectory. As Le Guin put it: \"What you leave out is infinitely more important than what you leave in.\""

  SC-078:
    name: "Ellipsis Formatting Consistency"
    measures: "Whether ellipses are formatted consistently throughout — whether using three spaced periods (. . .), three unspaced periods (...), or the Unicode ellipsis character (…), and whether spacing before/after ellipses is consistent."
    score_0: "Ellipses alternate between different formats within the manuscript. Some are three periods, some are Unicode characters. Spacing before and after varies. Ellipses are split across line breaks. Some have four dots (indicating a period plus ellipsis) and some don't when they should."
    score_5: "One ellipsis format is used throughout. Spacing before and after is consistent. Ellipses at sentence ends correctly include a period where needed. Ellipses are never awkwardly split across lines."

  SC-079:
    name: "Em Dash, En Dash, and Hyphen Distinction"
    measures: "Whether the manuscript correctly distinguishes between hyphens (-), en dashes (–), and em dashes (—) and uses each in its proper context."
    score_0: "Hyphens, en dashes, and em dashes are used interchangeably. Double hyphens (--) appear in place of em dashes. En dashes appear where hyphens belong. No consistent pattern is discernible."
    score_5: "Each dash type is used correctly and consistently. Hyphens join compound words. En dashes mark ranges (1996–2006) and complex compounds. Em dashes mark interruptions and parenthetical asides. Spacing around dashes is consistent. No double hyphens remain."

  SC-080:
    name: "Emotion Shown Through Speech Patterns Rather Than Declared"
    measures: "Whether characters' emotional states are conveyed through changes in their speech patterns, word choice, rhythm, and behavior rather than through explicit emotional declarations or adverbial tags."
    score_0: "Emotions are conveyed through adverbs in dialogue tags (\"she said angrily\"), through characters explicitly stating their feelings (\"I'm so frustrated right now\"), or through narrative declaration (\"He was clearly upset\"). Speech patterns don't change when characters are emotional. A calm character and a furious character speak with identical syntax, vocabulary, and rhythm."
    score_5: "Emotional shifts manifest in speech itself: a calm character's sentences shorten and fragment when angry; a verbose character goes quiet under stress; word choice shifts toward profanity or formality under pressure; rhythm accelerates or decelerates; a character who normally uses complete sentences trails off mid-thought. Body language and action beats show emotion rather than telling. The reader infers the emotion from behavioral evidence without being told."

  SC-081:
    name: "Emotional Authenticity"
    measures: "Whether characters' emotional responses are specific to their individual psychology, history, and circumstances rather than generic or formulaic."
    score_0: "Characters express emotions through generic, interchangeable reactions (e.g., \"her heart pounded,\" \"tears streamed down her face\"); emotional responses don't reflect the specific character's personality or history; emotions are named/told rather than demonstrated; all characters react identically to similar stimuli."
    score_5: "Each character's emotional response is tailored to their specific psychology, wound, and history; emotions are layered (multiple simultaneous feelings including contradictory ones); emotional arcs are nonlinear with regressions and backtracking; physical/behavioral manifestations of emotion are character-specific and surprising yet credible; the writer has clearly explored what each emotion means to this particular character."

  SC-084:
    name: "Emotional Exposition Quality"
    measures: "Whether characters' emotional states are conveyed through behavior, physical response, action, and dialogue subtext rather than through direct emotional labeling or internal monologue that names feelings."
    score_0: "Characters' emotions are named directly (\"She felt angry.\" \"He was devastated.\"). Internal monologue explicitly labels emotional states. The narrator tells the reader what characters are feeling rather than showing through behavior. Emotional moments are summarized rather than dramatized."
    score_5: "Emotional states are conveyed through physical sensation, involuntary behavior, altered perception, dialogue tone, action choices, and environmental interaction. Readers infer emotions from evidence rather than being told. Complex emotional states are shown through contradictory signals rather than labeled. The gap between what a character says and what they visibly feel creates productive tension."

  SC-085:
    name: "Emotional Mode Craft (Maass)"
    measures: "Whether the text uses appropriate emotional craft modes — inner (reporting feelings), outer (showing through action), and other (creating reader emotions characters don't feel) — to produce genuine reader emotional response rather than merely labeling emotions"
    score_0: "Emotions are labeled with generic phrases (\"her guts twisted in fear\") that trigger no reader response. Only surface-level primary emotions are reported. No secondary or conflicting emotions explored. Characters feel exactly what readers expect in every situation."
    score_5: "The text deploys all three modes masterfully. Inner mode explores surprising secondary emotions (excitement during horror, tenderness during danger). Outer mode allows readers to infer emotions from action and subtext. Other mode creates a dialogue where readers feel things characters don't — the reader goes on their own emotional journey distinct from characters'."

  SC-086:
    name: "Emotional Mode Deployment"
    measures: "Whether the author uses appropriate techniques to generate reader emotion rather than merely describing character emotion (the distinction between character feeling and reader feeling)."
    score_0: "Emotions are exclusively told (\"She felt angry\"); no technique beyond naming emotions is employed; the author assumes that describing a character's emotion will make the reader feel it; emotional scenes rely on charged language rather than dramatic technique."
    score_5: "The author deploys multiple emotional modes: Inner Mode (stated emotions used creatively, not just named), Outer Mode (action and behavior that provoke reader emotions matching characters'), and Other Mode (a dialogue between reader and writer through description, dialogue, and detail); emotional scenes use the \"third-level emotions\" technique (layering primary emotion with secondary and tertiary feelings); character-specific sensory details ground emotions in scene."

  SC-087:
    name: "Emotional Pacing Congruence"
    measures: "Whether the prose's formal properties (sentence length, paragraph density, word choice, pace) match the emotional content being described -- anxiety feels fast and fragmented, calm feels flowing and spacious, grief feels weighted and suspended."
    score_0: "The formal properties of the prose contradict the emotional content. A panic scene is written in long, flowing sentences; a peaceful scene is written in staccato fragments. There is no congruence between what is felt and how it reads."
    score_5: "The prose's rhythm physically embodies the emotion being described. Readers feel the panic through the fractured sentences, the peace through the flowing prose. The Word Codex describes this as micro-pacing setting \"the temperature and pressure of the prose.\""

  SC-088:
    name: "Emotional Pacing for Heavy Content"
    measures: "Whether narratives dealing with grief, trauma, or other emotionally heavy content manage reader overwhelm through tonal variation, narrative distance shifts, and breathing room."
    score_0: "Heavy emotional content is delivered at unrelenting intensity with no variation in narrative distance, tone, or pace. The reader is either numbed by constant darkness or emotionally cornered by explicit emotional detail with no room for their own response."
    score_5: "Narrative distance shifts around emotional events (sometimes close, sometimes pulled back). Dark humor, observational detail, and scenes of ordinary life give readers breathing room. The author \"pulls back so the reader doesn't have to,\" allowing the reader's own emotional response to be \"more powerful, intimate, and immediate.\""

  SC-090:
    name: "Empathic Character Connection"
    measures: "Whether characters evoke empathic engagement through which readers simulate characters' mental states, emotions, and physical experiences"
    score_0: "Characters are opaque, flat, or repellent in ways that prevent any empathic connection. The reader cannot simulate their inner states, feels no emotional investment in outcomes, and would not care if any character ceased to exist."
    score_5: "Characters evoke deep empathic engagement across cognitive and affective dimensions. Readers simulate characters' thoughts and feelings, experience neural activation in mirror neuron and mentalizing networks, and feel genuine concern, joy, fear, or grief on behalf of characters."

  SC-092:
    name: "Epistolary/Document Narration Craft"
    measures: "When epistolary or found-document narration is used, whether each document type and narrator voice is authentic, distinct, and serves the story's information architecture."
    score_0: "Documents sound identical despite being attributed to different characters. The document format adds nothing that traditional narration could not provide. Document types are inconsistent (a character writes in their diary the way they would narrate an action scene). The conceit is not maintained — documents contain information their putative authors would not include."
    score_5: "Each document type sounds authentic to its form (letters sound like letters, reports sound like reports, texts sound like texts). Each narrator has a distinct voice reflecting education, personality, and relationship to the reader. The document format creates natural information gaps, unreliability, and dramatic irony that traditional narration could not achieve."

  SC-093:
    name: "Expectation-Silence-Surprise Pattern"
    measures: "Whether the prose deploys a rhythmic trinity of establishing patterns (expectation), inserting breath and pause (silence), and breaking patterns strategically (surprise) at both the sentence and scene level."
    score_0: "The prose is either all surprise (no patterns established, so nothing can be disrupted) or all expectation (patterns never broken, creating monotony). Silence (deliberate pause) is absent."
    score_5: "Patterns are established through consistent rhythms (sustained dialogue, similar sentence lengths, consecutive short paragraphs), then paused through lingering description or longer sentences, then broken through isolated short sentences, perspective shifts, or unexpected information. All three elements work in balance."

  SC-094:
    name: "Exposition Handling in Dialogue"
    measures: "Whether information necessary for the reader is delivered through dialogue naturally and without contrivance, avoiding the \"As You Know, Bob\" pattern where characters tell each other things they already know."
    score_0: "Characters routinely tell each other things both already know purely for the reader's benefit. Exposition is delivered in speeches rather than emerging from conflict. \"As You Know, Bob\" / \"maid and butler\" dialogue is frequent. Characters become transparent information-delivery vehicles. Information dumps are disguised as conversation but fool nobody."
    score_5: "Exposition emerges organically from character need, conflict, and situation. Information is delivered because a character genuinely needs to know it, is arguing about its implications, or is revealing it under emotional pressure. The naive-character, disguise-with-desire, disguise-with-conflict, and emotional-overlay techniques are deployed as appropriate. Readers absorb necessary information without noticing it was delivered."

  SC-095:
    name: "Exposition Handling"
    measures: "Whether background information (character history, world mechanics, setting context) is woven into the narrative through action, dialogue, and scene work rather than delivered in standalone blocks."
    score_0: "Exposition is delivered in multi-paragraph blocks that halt narrative momentum. Background information is presented as standalone passages disconnected from present-moment action. Characters stop what they're doing so the narrator can explain things. The reader must process abstract information with no emotional stakes or dramatic context."
    score_5: "Background information emerges naturally through character action, dialogue subtext, environmental detail, and plot necessity. Readers absorb world and character information while remaining engaged with present-moment drama. Exposition serves double duty -- revealing character, advancing plot, or building tension simultaneously. Information appears at the moment it becomes relevant to the unfolding story."

  SC-096:
    name: "Exposition Vehicle Character Design"
    measures: "Whether the narrative deploys characters with legitimate reasons for not knowing things (newcomers, outsiders, apprentices) as natural exposition vehicles, rather than having established characters explain their own world unnaturally."
    score_0: "No character has a legitimate reason to learn about the world, forcing established characters to explain things they already know. Alternatively, the newcomer character is a transparent exposition device with no other narrative function. Characters ask questions solely for reader benefit rather than out of genuine character motivation."
    score_5: "At least one character has authentic reasons for needing information that coincide with the reader's needs. This character has genuine narrative purpose beyond being an exposition recipient. Their learning process creates its own dramatic tension. Established characters' explanations emerge from teaching, warning, arguing, or other motivated interactions rather than from unprompted lectures."

  SC-097:
    name: "Extended/Controlling Metaphor Craft"
    measures: "Whether extended or controlling metaphors sustain and develop across passages or the entire work, creating unified meaning."
    score_0: "No sustained figurative patterns exist, or attempts at extended metaphor break down, become redundant, or lose coherence partway through. The metaphor is abandoned or contradicted."
    score_5: "A central metaphor or network of metaphors sustains across the work, developing in complexity and revealing new facets as the narrative progresses. The controlling metaphor illuminates theme, character, and plot simultaneously without becoming heavy-handed or monotonous."

  SC-098:
    name: "Fact-Checking for Fiction"
    measures: "Whether real-world facts referenced in the fiction are accurate — historical dates, geographical details, scientific principles, cultural practices, and any other verifiable claims embedded in the narrative."
    score_0: "Real-world facts are incorrect: historical events are misdated, real locations are misdescribed, scientific principles are wrong, cultural practices are misrepresented. Contemporary objects appear in historical settings. The reader who knows the subject loses trust."
    score_5: "Every verifiable real-world fact is accurate. Historical periods are correctly detailed. Geography is correct. Science follows actual principles (or the departure is acknowledged). Cultural practices are accurately represented. The knowledgeable reader finds no factual errors."

  SC-099:
    name: "Factual Detail Consistency"
    measures: "Whether concrete factual details about characters, objects, and settings (names, physical descriptions, biographical facts, object properties) remain stable throughout the narrative."
    score_0: "Physical descriptions contradict themselves (eye color, hair color, height change without explanation), character names are spelled inconsistently, biographical details (age, occupation, marital status, educational background) shift between passages, objects change properties or identities (a shotgun becomes a rifle, a 4x4 becomes a sedan)."
    score_5: "Every factual detail introduced about characters, objects, and settings remains consistent across the entire narrative, or changes only when the narrative explicitly accounts for and dramatizes that change. A reader performing a close audit would find zero unintentional contradictions in physical descriptions, names, or biographical facts."

  SC-100:
    name: "Fictive Dream Continuity (Gardner)"
    measures: "Whether the prose sustains an unbroken state of imaginative immersion where the reader \"forgets the words\" and sees characters moving through their world"
    score_0: "The dream is constantly broken by abstract language, mechanical errors, faulty diction, unnecessary explanation, awkwardly inserted details, or inappropriate authorial attitude (frigidity or sentimentality). The reader is perpetually aware of the text as text and cannot enter the story world."
    score_5: "The prose creates a sustained, vivid fictive dream through masterful language control, precisely described action, sensory specificity engaging all five senses, and a strong sense of place. Readers forget they are reading and experience events as if present."

  SC-101:
    name: "Figurative Language Coherence"
    measures: "Whether metaphors, similes, and figurative patterns are internally consistent and do not clash, mix, or undermine each other."
    score_0: "Metaphors are mixed (\"At first she was a weighted barge, then a sunflower tracking the light\"), vehicles clash within sentences, or multiple unrelated figurative frameworks collide within a single passage (\"five-car metaphor pile-up\"). Figurative language creates confusion rather than clarity."
    score_5: "Figurative vehicles are consistent within passages and across the work. Extended metaphors are sustained without breaking. When vehicles shift, the transition is deliberate and controlled. The figurative framework reinforces rather than undermines the literal content."

  SC-102:
    name: "Figurative Language Originality"
    measures: "Whether metaphors, similes, and other figurative language are fresh, surprising, and contextually appropriate rather than clichéd or generic."
    score_0: "Figurative language consists entirely of clichés (\"heart of gold,\" \"cold as ice,\" \"tears fell like rain\"), dead metaphors, or stock comparisons that add no new perception. Metaphors are interchangeable with any other scene."
    score_5: "Every metaphor or simile creates a surprising but apt connection that illuminates something specific about this moment, character, or situation. Figurative language is contextually grounded (thematically coherent with setting, character, genre) and reveals something that literal description could not. The reader sees the subject newly through the comparison."

  SC-103:
    name: "Figurative Language Quality"
    measures: "Whether metaphors, similes, and other figurative language are fresh, character-appropriate, and purposeful — or whether they are clichéd, dead, mixed, or generic."
    score_0: "Figurative language consists entirely of clichés (\"cold as ice,\" \"heart of gold,\" \"eyes like jewels\"). Dead metaphors pass without awareness. Mixed metaphors combine incompatible frames (\"a tsunami of silence choked the room\"). Similes and metaphors are generic rather than character-specific. Alternatively, figurative language is so overwrought it becomes purple prose."
    score_5: "Metaphors and similes are fresh, surprising, and precise. They emerge organically from character perspective — a mechanic's metaphors involve engines, not flowers. Dead metaphors are avoided or deliberately revived. Extended metaphors sustain a single frame without mixing. Figurative language illuminates rather than decorates — each comparison reveals something about both the tenor and the vehicle. The writer knows when NOT to use figurative language."

  SC-104:
    name: "Filter Word Control"
    measures: "Whether the prose avoids unnecessary perception-reporting words (saw, felt, heard, noticed, watched, realized, wondered, thought, knew) that create distance between the reader and the character's experience."
    score_0: "Nearly every sensory detail or emotional moment is prefaced with a filter word: \"She felt the cold wind,\" \"He saw the door open,\" \"She noticed the lights flickering,\" \"He wondered what would happen.\" The reader is constantly told the character is perceiving rather than being placed in the perception."
    score_5: "Sensory details and emotional states are rendered directly: \"The cold wind bit her face,\" \"The door swung open,\" \"The lights flickered.\" Filter words appear only where the act of perceiving is itself the point (e.g., \"She noticed him watching her\" where the noticing is the action). Narrative distance is consistent with the chosen POV mode."

  SC-105:
    name: "Filter Word Management"
    measures: "Whether the narrative minimizes unnecessary filter words (saw, heard, felt, noticed, wondered, realized, etc.) that create distance between reader and character experience."
    score_0: "Narration is saturated with filter words (\"she saw the door open,\" \"he felt angry,\" \"she noticed the blood on the floor\") creating constant reminder that the reader is observing through a character rather than experiencing directly. Every sensation is mediated through explicit perception verbs."
    score_5: "Sensory experiences and perceptions are rendered directly (\"the door swung open,\" \"heat flooded his chest,\" \"blood pooled on the tile\"). Filter words are used only when the act of perceiving is itself significant or when deliberate distance serves the scene. The reader experiences the story rather than being told about a character's experience of the story."

  SC-106:
    name: "Filter Word and Psychic Distance Control"
    measures: "Whether the prose controls psychic distance — the felt closeness between reader and character — through deliberate use or avoidance of filter words (saw, heard, felt, thought, realized, noticed), rather than defaulting to distancing language."
    score_0: "Filter words proliferate throughout close-POV narration: \"She saw the door open. She heard footsteps. She felt afraid. She thought about running.\" Every perception is mediated through explicit character acknowledgment, creating constant distance between reader and experience."
    score_5: "Psychic distance is deliberately controlled. In close POV, perceptions are presented directly (\"The door opened. Footsteps. Her stomach clenched\") without unnecessary filtering. Filter words appear only when the ACT of perceiving matters — when the character's noticing, realizing, or remembering is itself significant. The prose moves fluidly between close and distant perspectives with purposeful control."

  SC-107:
    name: "First-Person Self-Description Discipline"
    measures: "Whether first-person narrators describe themselves in ways that are physically and psychologically plausible — avoiding impossible self-observation and unmotivated vanity."
    score_0: "The first-person narrator describes their own appearance as if viewed from outside (\"my golden hair cascaded,\" \"my blue eyes sparkled\"). Mirror scenes are used as clumsy exposition devices. The narrator comments on their own facial expressions they cannot see. Physical descriptions read like a character sheet rather than a person's natural self-awareness."
    score_5: "Self-description is limited to what a person would naturally notice or think about — sensations (hair in their eyes), clothing choices (grabbing a jacket), others' reactions to them. Physical appearance is revealed through dialogue, others' responses, or contextually motivated observation. The narrator's self-image reflects their psychology rather than the author's need to describe them."

  SC-110:
    name: "Focalization Clarity"
    measures: "Whether the narrative clearly distinguishes who sees (the focalizer) from who speaks (the narrator), maintaining consistent focalization within scenes."
    score_0: "The narrative confuses who is perceiving with who is speaking. The narrator describes things no character could perceive while maintaining a \"limited\" label. Internal focalization is violated when the narrative shifts to external observation of the focal character (describing their own face) or to another character's perception without transition."
    score_5: "The focalizer (whose perception orients the narrative) is clearly established and maintained within scenes. Zero focalization (omniscient) is distinct from internal focalization (character-bound) — the narrator does not accidentally slip between them. External focalization (camera-eye) is used deliberately for effect."

  SC-111:
    name: "Four-Question Scene Evaluation"
    measures: "Whether each scene can answer all four evaluative questions: what it accomplishes for plot, what the audience should feel, what the audience should think, and what the audience should wonder afterward."
    score_0: "The scene cannot answer even one of the four questions clearly. Its purpose in the narrative is unclear, it generates no specific emotional response, conveys no thematic meaning, and creates no forward-looking curiosity."
    score_5: "The scene answers all four: 1) \"The purpose of this scene is to ___\" (plot), 2) \"The audience should feel ___\" (emotion), 3) \"The audience should think ___\" (theme), 4) \"The audience should wonder ___\" (suspense). The answers are specific rather than generic, and the scene functions as a self-contained mini-story."

  SC-112:
    name: "Free Indirect Discourse Skill"
    measures: "Whether the narrative effectively blends character consciousness into third-person narration without attribution tags, allowing the narrator to temporarily recede while character voice emerges."
    score_0: "The narrative never blends character voice into third-person narration, relying entirely on explicit thought tags (\"she thought,\" \"he wondered\") or maintaining a flat narrator voice that never takes on character coloring. Alternatively, attempts at FID are confusing — the reader cannot distinguish narrator commentary from character thought."
    score_5: "Character thoughts, vocabulary, speech patterns, and emotional coloring flow seamlessly into third-person narration without attribution. The reader experiences a \"two-brain\" effect — narrator and character perspectives merge and separate fluidly. The technique is applied consistently from the beginning and enhances both characterization and narrative authority."

  SC-113:
    name: "Free Indirect Style Execution"
    measures: "Whether the prose (when using close third person) successfully employs free indirect discourse — blending the character's voice into the narration without explicit tags like \"she thought\" — or whether it clumsily signals every shift between narration and character interiority."
    score_0: "The prose rigidly separates narration from character thought. Every internal moment is tagged: \"She thought that the room was ugly.\" \"He wondered if she would come.\" The narrator's voice never takes on the character's diction or perspective. Or the prose attempts free indirect style but confuses whose consciousness is being represented."
    score_5: "Character consciousness flows seamlessly into narration. \"The room was ugly\" conveys the character's judgment without \"she thought.\" The prose shifts fluidly between narrator perspective and character interiority, with the character's diction, syntax, and emotional state coloring the narration. The technique is executed so smoothly the reader may not notice it operating."

  SC-114:
    name: "Freshness of Figurative Language"
    measures: "Whether metaphors, similes, and other figures of speech are original and vivid rather than drawn from the common stock of \"dying metaphors\" — whether the figurative language produces genuine perceptual surprise or merely confirms automatic associations."
    score_0: "The prose relies entirely on dead metaphors and stock figures: hearts pound, stomachs churn, eyes are windows to the soul, silence is deafening, darkness is oppressive. Comparisons are so familiar they produce no perceptual effect. Metaphors are mixed without awareness (a sign the writer \"is not interested in what he is saying,\" per Orwell). The figurative language could be generated by autocomplete."
    score_5: "Figurative language is fresh, precise, and produces genuine surprise while remaining apt. Metaphors create new perceptual connections rather than confirming existing ones. Comparisons reveal something about both the tenor and vehicle that the reader hadn't seen before. There are zero dead metaphors, and figures of speech create the sensation of seeing something for the first time."

  SC-115:
    name: "Genette's Duration Spectrum (Narrative Speed Control)"
    measures: "Whether the author deploys the full spectrum of narrative speeds -- ellipsis (time skipped), summary (compressed), scene (real-time equivalent), and pause/description (time stops while prose continues) -- with purposeful variation."
    score_0: "The narrative operates at a single speed throughout, typically unvarying scene-level pacing with no ellipsis, no summary, and no descriptive pause."
    score_5: "All four speeds appear where appropriate. Ellipsis skips unimportant time; summary compresses necessary but non-dramatic periods; scenes dramatize key moments; descriptive pauses create atmosphere or emphasis. Speed changes feel motivated by story needs."

  SC-116:
    name: "Genre-Appropriate POV Convention"
    measures: "Whether the POV choices respect or deliberately subvert genre expectations in a way that serves the story."
    score_0: "POV choices ignore genre conventions without compensation. First-person omniscient in a thriller where suspense depends on limited information. Distant third person in a romance where intimacy is paramount. The genre's POV conventions are violated not for artistic effect but through ignorance."
    score_5: "POV choices either fulfill genre expectations effectively (close third in contemporary romance, first person in noir, omniscient in epic fantasy) or subvert them with clear purpose and skill (second person in a thriller for complicity effect, omniscient in a romance for panoramic irony)."

  SC-117:
    name: "Grammar Correctness"
    measures: "Whether the prose follows standard English grammar rules (subject-verb agreement, pronoun-antecedent agreement, correct verb forms, proper modifier placement) with deviations only where clearly intentional for voice or effect."
    score_0: "Frequent grammatical errors throughout (subject-verb disagreement, pronoun case errors, misused verb tenses) with no discernible artistic purpose. Reads as unedited."
    score_5: "Grammar is flawless or near-flawless in narration. Any grammatical deviations (in dialogue, stream-of-consciousness, etc.) are clearly intentional, consistent, and serve characterization or artistic purpose. Professional editor would find no errors."

  SC-118:
    name: "Grounding Dialogue in Physical Space"
    measures: "Whether dialogue scenes are situated in a specific, sensory environment rather than occurring in an undefined \"white room\" where characters exist as disembodied voices."
    score_0: "Dialogue occurs in an undefined space. There is no sense of where characters are, what they see, hear, or physically interact with. Extended exchanges have no environmental detail whatsoever. Characters float in a void. The reader cannot visualize the scene. This is \"white room syndrome\" applied to dialogue scenes."
    score_5: "Dialogue scenes are anchored in specific environments that affect the conversation. Characters interact with their surroundings (handling objects, noticing changes, responding to environmental pressures). Setting details emerge through the dialogue and action beats rather than in separate descriptive blocks. The environment creates opportunities for subtext (a character fidgeting with a wedding ring, a ticking clock, a meal going cold). Physical space constrains and shapes the conversation."

  SC-119:
    name: "Head-Hopping Control"
    measures: "Whether POV shifts between characters within scenes are deliberate and controlled versus accidental and disorienting."
    score_0: "The narrative jumps between multiple characters' thoughts and perceptions within single scenes or paragraphs without transition markers, creating a \"scattergun effect\" that disorients readers. No consistent focal character per scene. Characters' internal thoughts mingle indiscriminately."
    score_5: "Each scene has one clear focal character whose consciousness the reader inhabits. Other characters' states are conveyed through observed behavior, dialogue, and inference rather than direct thought access. POV transitions between scenes use clear structural markers (scene breaks, chapter breaks)."

  SC-120:
    name: "Hook Placement and Density"
    measures: "Whether chapters and scenes end with forward-momentum elements (hooks) that compel continued reading, and whether hook types vary to prevent predictability."
    score_0: "Chapters end at natural stopping points with no forward momentum, giving readers permission to put the book down. Or: every chapter ends with the same type of hook (always cliffhangers, always reveals), becoming predictable."
    score_5: "Hook types vary across chapters (question, revelation, tension escalation, emotional shift, decision, arrival, interruption, threat). Hook density increases in the second half. Each chapter ending provides both scene satisfaction (something happened) and forward momentum (something compels continuation). The strongest hooks appear where reader commitment might flag (middle sections)."

  SC-121:
    name: "Hyphenation Consistency"
    measures: "Whether compound words and phrasal adjectives are hyphenated consistently throughout — the same compound is always hyphenated or always open or always closed, following a single reference dictionary and style guide."
    score_0: "The same compound word appears hyphenated, open, and closed in different locations (\"ice cream,\" \"ice-cream,\" \"icecream\"). Phrasal adjectives are inconsistently hyphenated (\"well-known author\" in one paragraph, \"well known author\" in the next). Age-related expressions use inconsistent patterns."
    score_5: "Every compound word is treated the same way every time it appears. Phrasal adjectives before nouns are hyphenated; the same phrases after verbs are open, per convention. A single reference dictionary governs all ambiguous cases. A style sheet ensures consistency."

  SC-122:
    name: "Imagery-Clarity Balance"
    measures: "Whether poetic, figurative, or complex description maintains enough clarity for the reader to follow the narrative, or whether beauty comes at the expense of comprehension."
    score_0: "Description is so ornate, abstract, or metaphor-heavy that the reader cannot determine what is literally happening in the scene. Beautiful individual sentences do not cohere into a comprehensible narrative. The reader can admire the language but cannot picture the scene or follow the action."
    score_5: "Even the most complex, figurative description maintains a clear through-line—the reader always knows what is literally happening in the scene while simultaneously processing the figurative, atmospheric, and thematic dimensions. Beauty and clarity coexist without sacrifice."

  SC-123:
    name: "In-Scene Object and Action Continuity"
    measures: "Whether objects, character positions, and physical actions remain consistent within individual scenes — whether characters are holding things they picked up, standing when they should be sitting, and located where preceding actions placed them."
    score_0: "Characters hold objects they never picked up, or objects they were holding vanish without being put down. Characters stand up without having sat down, or are suddenly in different positions. Actions within a scene contradict each other (a character exits a room and then continues conversing as if still present). Physical actions are described in impossible sequences."
    score_5: "Every object, character position, and physical action within a scene is accounted for. If a character picks up a weapon, the narrative tracks it until it is put down, dropped, or otherwise disposed of. Characters' physical positions flow logically from their described movements. No action contradicts preceding actions within the same scene."

  SC-125:
    name: "Information Delivery Timing (Rate of Revelation)"
    measures: "Whether information is released at the optimal moment in the narrative -- not too early (losing tension), not too late (causing confusion), and at a pace that maintains reader engagement."
    score_0: "Information is either frontloaded before the reader has context to appreciate it, or withheld so long the reader becomes confused or frustrated. Key details arrive at arbitrary moments unconnected to dramatic need. The rate of revelation is uniform -- no acceleration during high-stakes moments, no deceleration during breathing room."
    score_5: "Information arrives at the moment it becomes narratively necessary and emotionally resonant. The rate of revelation accelerates and decelerates in rhythm with tension. Early chapters prioritize mystery and engagement over comprehensive explanation. Two to three open questions exist at any given time, with answers and new questions arriving in controlled alternation."

  SC-126:
    name: "Information Density Management"
    measures: "Whether the narrative controls how much new information (worldbuilding, backstory, character detail, plot data) is delivered per unit of prose, avoiding both overload and emptiness."
    score_0: "Information arrives in undifferentiated dumps (paragraphs of pure exposition, worldbuilding lectures) or is spread so thin that pages pass without the reader learning anything new. The \"one-thing-at-a-time scene\" dominates."
    score_5: "Every passage does multiple things simultaneously: advancing plot while revealing character while building world while creating mood. Information is woven into action and dialogue rather than delivered in blocks. Dense passages alternate with sparser ones to prevent cognitive overload."

  SC-127:
    name: "Information Density and Reader Trust"
    measures: "Whether the prose trusts the reader to make inferences and draw connections, or whether it over-explains, repeats, hedges, and spoon-feeds information — and conversely, whether it provides enough context for the reader to follow without confusion."
    score_0: "The prose explains everything twice. Subtext is made explicit. Emotions are named after being shown. The same information appears in dialogue, narration, and internal thought. \"He slammed the door. He was angry.\" Or alternatively, critical information is so deeply buried that readers are lost and confused."
    score_5: "The prose trusts readers to infer. Subtext remains sub. Emotions are embodied rather than labeled. Information appears once, in the most effective mode. The iceberg's mass is below the surface. As Hemingway practiced: \"If a writer of prose knows enough of what he is writing about he may omit things that he knows and the reader... will have a feeling of those things.\""

  SC-128:
    name: "Information Management Through POV"
    measures: "Whether the narrative uses POV strategically to control the flow of information to the reader — revealing what's needed when it's needed, creating suspense through withholding, and building understanding through progressive disclosure."
    score_0: "Information flow is uncontrolled — the reader learns everything at once through an omniscient narrator who reveals too much too soon, or the reader is kept artificially ignorant by a narrator who withholds information the POV character possesses (false mystery). No strategic timing of revelations."
    score_5: "POV is used as a precision tool for information control. Limitations of the chosen POV create natural suspense (the character genuinely does not know). Multi-POV structures reveal different facets of events at carefully timed intervals. No false withholding — when information is hidden from the reader, it is because the POV character genuinely lacks it."

  SC-129:
    name: "Interior Monologue Integration"
    measures: "Whether internal thoughts are woven into the narrative seamlessly and purposefully, serving character development and plot advancement rather than creating static rumination."
    score_0: "Internal monologue is absent (creating emotional blankness), excessive (creating static navel-gazing that halts plot momentum), or poorly integrated (jarringly separated from action by italics and thought tags when the narrative could use free indirect discourse). Thoughts do not serve decisions or character development."
    score_5: "Interior monologue is seamlessly woven into action, dialogue, and description. Thoughts serve decisions and reveal character. Deep POV uses free indirect discourse to blend interiority with narration. Direct thought (italicized) is used sparingly for emphasis. Interior monologue creates emotional resonance without halting narrative momentum."

  SC-130:
    name: "Interiority Balance"
    measures: "Whether the narrative provides appropriate access to the POV character's internal experience (thoughts, feelings, memories, reactions) without overwhelming the story's forward momentum or underserving the character's emotional life."
    score_0: "Either no interiority (reads like a screenplay with only dialogue and action) leaving the reader disconnected from the character; or excessive interiority (continuous internal commentary) that bogs down pacing and makes external action feel like slow motion."
    score_5: "Interiority and exteriority are balanced according to genre and story needs (not necessarily 50/50 -- may be 70/30 or 80/20); internal processing occurs at dramatically appropriate moments; interiority reveals what external action cannot; thoughts contradict or complicate dialogue, creating subtext; the character's unique way of processing the world is itself characterizing."

  SC-131:
    name: "Internal Monologue-Dialogue Integration"
    measures: "Whether the interplay between what characters say aloud and what the POV character thinks creates productive tension, irony, or depth rather than redundancy or confusion."
    score_0: "Internal monologue either redundantly restates what was just said in dialogue (\"I hate you,\" she said. She really did hate him.) or is entirely absent during dialogue scenes, leaving the POV character's inner experience invisible. Alternatively, internal monologue overwhelms dialogue, with characters thinking paragraphs between each spoken line, destroying conversational rhythm."
    score_5: "Internal monologue and dialogue work in productive tension. The POV character's thoughts contradict, complicate, or add irony to what they or others say aloud. Internal reactions are brief and sharp during fast exchanges, longer during pauses. The gap between said and thought creates dramatic irony and character depth. Balance shifts appropriately—more interiority during slower scenes, less during rapid exchanges."

  SC-132:
    name: "Internal Rule Consistency (Magic Systems, Technology, Social Rules)"
    measures: "Whether the rules governing the story's speculative or world-specific elements (magic, technology, supernatural abilities, social hierarchies, legal systems, physics) remain consistent once established."
    score_0: "Rules established early in the narrative are violated later without acknowledgment or explanation. Magic systems gain new abilities precisely when the plot requires them. Technology works differently in different scenes. Social rules are enforced selectively based on plot convenience. Limitations and costs established for abilities disappear when they would impede the protagonist."
    score_5: "Every speculative element operates by rules that, once established, remain in force throughout the narrative. When rules appear to be violated, the narrative provides a principled explanation that is consistent with the deeper logic of the system. Limitations are respected even when they create difficulty for the protagonist. The rules have logical second-order effects on the world's society, economy, and culture."

  SC-133:
    name: "Italics Usage Consistency"
    measures: "Whether italics are used consistently and correctly for their designated purposes — internal thoughts, emphasis, foreign words, titles of works, and any other manuscript-specific uses — without overuse or underuse."
    score_0: "Italics usage is inconsistent: sometimes used for thoughts and sometimes not. Entire paragraphs are italicized for emphasis. Foreign words are sometimes italicized and sometimes not. Titles of works receive inconsistent treatment. Italics appear to serve no consistent function."
    score_5: "Italics serve a consistent, identifiable function: direct thoughts in a specific tense/person, emphasis on specific words, foreign words on first use, titles of works. Usage is sparing (one or two instances per page maximum). The reader always knows what italics mean in this manuscript."

  SC-134:
    name: "Line Editing Hierarchy: Clarity, Flow, Polish"
    measures: "Whether the prose achieves all three levels of the line-editing hierarchy — first clarity (the reader understands what's happening), then flow (sentences and paragraphs connect naturally), then polish (language is refined and rhythm is shaped)."
    score_0: "Prose may have moments of beautiful language but the reader frequently loses track of what is happening, who is acting, or where the scene is set. Transitions between sentences and paragraphs are abrupt or missing. Flow is disrupted by unclear references and buried actions."
    score_5: "The reader always understands physical and emotional events (clarity). Sentences and paragraphs flow into each other naturally, with smooth transitions and pacing that matches emotional content (flow). Language is refined — word choice is precise, rhythm is shaped, filler is eliminated (polish)."

  SC-135:
    name: "Literary Causation (Character-Driven)"
    measures: "Whether character change over time serves as a causal engine, with psychological transformation driving subsequent decisions and events, even when external action-oriented causation is minimal."
    score_0: "Characters exist as static vehicles for plot events; no internal change drives external events; character psychology has no visible effect on what happens; the story would be identical if the protagonist were a different person with different psychology."
    score_5: "Small but meaningful shifts in character drive the narrative forward; time and psychological transformation replace action sequences as causal engines; happenstance is used only insofar as it influences subsequent character decisions; character change is earned through prior events and visible in subsequent choices."

  SC-137:
    name: "Maximalist Density and Accumulation"
    measures: "Whether dense, layered description creates meaning through accretion, sensory saturation, and linguistic richness."
    score_0: "Dense description is merely bloated—piling on adjectives and metaphors without coherence, rhythm, or thematic purpose. The accumulation is chaotic rather than orchestrated."
    score_5: "Dense description creates a unified sensory and thematic experience where each detail amplifies the others. Accumulation builds toward an effect that no single detail could achieve alone. The prose has internal rhythm and architecture despite its density. Every element contributes to a cohesive atmospheric and thematic design."

  SC-139:
    name: "Micro-Pacing (Line-Level Tempo Control)"
    measures: "Whether the author controls moment-to-moment reading speed through word choice, sound, and syntax at the individual line level."
    score_0: "Word choice shows no awareness of sound or rhythm. Monosyllabic hard-consonant words appear in contemplative passages; polysyllabic soft words appear in action sequences. The prose has no audible rhythm when read aloud."
    score_5: "Monosyllabic words with hard consonants (crack, slam, jab) accelerate action; polysyllabic words with softer sounds (meandering, luminous, solitude) decelerate for reflection. Word sounds match emotional content. Reading aloud reveals a felt rhythm that embodies the characters' emotional states."

  SC-141:
    name: "Micro-Tension in Expository Passages"
    measures: "Whether exposition passages maintain line-by-line tension through conflicting ideas, emotional undercurrents, or character voice, rather than presenting information flatly."
    score_0: "Exposition passages are emotionally flat. Information is presented matter-of-factly with no undercurrent of tension, conflict, or unease. Expository paragraphs could be removed and inserted elsewhere without any loss of emotional context. The reader's emotional engagement drops during exposition."
    score_5: "Even exposition passages contain emotional tension: conflicting ideas, character anxiety about the information being conveyed, ominous implications of seemingly neutral facts, or voice-driven unease. Information delivery is filtered through character perspective in ways that create micro-tension. Readers remain emotionally engaged even during informational passages."

  SC-142:
    name: "Microtension (Page-Level Engagement)"
    measures: "Whether the narrative maintains curiosity and tension at the page level, even in quiet scenes, through small moments of uncertainty, mismatch, or pressure."
    score_0: "Pages lack any tension, curiosity, or pull. The reader can stop reading at the end of any paragraph without feeling compelled to continue. Scenes are inert."
    score_5: "Every page contains some element of microtension—a question in narration, a mismatch between words and body language, a nearby deadline, a test or choice. The reader feels a continuous pull to the next line."

  SC-144:
    name: "Monologue and Long Speech Management"
    measures: "Whether extended character speeches are earned, purposeful, and broken up effectively rather than reading as lectures or author mouthpieces."
    score_0: "Characters deliver long uninterrupted speeches that read as lectures or author soapboxes. No other character reacts, interrupts, or responds during the speech. The speech doesn't reveal character so much as deliver the author's message. Extended monologues appear without the pressure buildup that would justify them. Formatting doesn't handle multi-paragraph speeches correctly."
    score_5: "When extended speeches occur, they are earned by prior tension buildup (\"like a garden hose, the more pressure, the more dramatic the release\"). Other characters react during or between sections of the speech. The speech reveals character through its content and delivery, not just its information. Multi-paragraph speeches are correctly formatted (no closing quotes until the final paragraph). Monologues are used sparingly and for scenes demanding deep reflection."

  SC-145:
    name: "Mood Transition Smoothness"
    measures: "Whether shifts between different emotional tones (comedy to tragedy, action to intimacy, horror to calm) are handled with transitional craft rather than jarring abruptness."
    score_0: "Mood shifts are abrupt and disorienting. A comedic scene immediately follows a death scene with no transitional element. The emotional whiplash confuses rather than stimulates."
    score_5: "Mood transitions are prepared through foreshadowing, gradual tempo changes, and transitional passages that allow the reader to adjust. The transitions maintain coherence while the tonal variety provides richness."

  SC-147:
    name: "Multi-Character Conversation Management"
    measures: "Whether scenes with three or more speaking characters maintain clarity about who is speaking, give each character a distinct purpose in the conversation, and manage the additional complexity without confusion or monotony."
    score_0: "In multi-character scenes, readers cannot tell who is speaking. Characters have no distinct reason to be in the conversation. Speaker identification requires re-reading. Some characters are present but never speak or react. Dialogue tags become so frequent they overwhelm the exchange. The scene reads as a series of disconnected statements rather than a genuine group conversation."
    score_5: "Each character in a multi-character scene has a distinct voice, a clear purpose for being present, and a recognizable stake in the conversation. Speaker identity is maintained through voice distinction, strategic tags, and action beats without over-tagging. Characters react to each other (agreements, interruptions, sidebar exchanges) rather than simply taking turns. Some characters speak more than others based on personality and stakes. The conversation has a clear dynamic—alliances, opposition, mediators."

  SC-148:
    name: "Narrative Depth Variation"
    measures: "Whether the narrative varies its depth of interiority strategically — going deep during emotionally significant moments and pulling back during transitions and lower-stakes passages."
    score_0: "The narrative maintains a flat, unchanging depth — either always deep (creating exhausting interiority even during mundane moments) or always shallow (failing to exploit emotional peaks). No modulation between action and reflection."
    score_5: "Depth varies dynamically: deep interiority during moments of decision, revelation, or emotional extremity; moderate depth during dialogue and interaction; shallow/distant narration during transitions, time-jumps, and scene-setting. The variation creates rhythm and emphasis."

  SC-149:
    name: "Narrative Economy (Multi-Function Exposition)"
    measures: "Whether exposition passages serve multiple narrative functions simultaneously (revealing character, advancing plot, building atmosphere, establishing theme) rather than serving only the single function of conveying information."
    score_0: "Exposition passages serve a single function: delivering information. Background sections do not reveal character, advance plot, or create tension. Information delivery interrupts rather than enhances the emotional experience. Passages could be extracted as encyclopedia entries without losing their character."
    score_5: "Every exposition passage simultaneously performs at least two functions: conveying information while also revealing character voice, advancing a relationship dynamic, creating tension, establishing mood, or developing theme. Background information is filtered through character perspective in ways that reveal as much about the character as about the subject. No passage exists solely to inform."

  SC-150:
    name: "Narrative Stance/Tone Consistency"
    measures: "Whether the narrator's attitude toward the material — their stance, tone, and emotional relationship to the events — remains consistent and appropriate throughout, or shifts deliberately for effect."
    score_0: "The narrator's attitude toward the material shifts randomly — sardonic in one chapter, earnest in the next, without the story events justifying the change. The narrator's emotional relationship to events is inconsistent (detached about a death, overwrought about a minor inconvenience). Vocabulary and sentence construction do not match the established tone."
    score_5: "The narrator maintains a consistent stance toward the material that establishes reader trust and expectations. When tone shifts occur, they are motivated by story events and clearly signaled. Vocabulary, sentence length, and construction consistently reflect the established tone (dry, wry, urgent, lyrical, etc.)."

  SC-151:
    name: "Narrative Transportation"
    measures: "The degree to which readers experience psychological relocation into the story world through focused attention, emotional engagement, mental imagery, and cognitive detachment from physical reality"
    score_0: "Readers remain fully anchored in physical reality, experiencing no emotional engagement, mental imagery, or attentional absorption. They critically evaluate each claim and feel no connection to the narrative world."
    score_5: "Readers become fully transported — they lose awareness of surroundings, experience vivid mental imagery, feel strong emotions aligned with characters, and temporarily adopt narrative-congruent beliefs. The \"sleeper effect\" causes impact to strengthen over time rather than fade."

  SC-152:
    name: "Narrative Voice Distinctiveness"
    measures: "Whether the prose has a recognizable, authentic voice that builds emotional bonds and turns passive reading into active engagement"
    score_0: "The prose has no identifiable personality or perspective. It reads as generic, interchangeable with any other text. No distinctive word choices, rhythms, observations, or attitude distinguish it. It could have been written by anyone or no one."
    score_5: "The voice is immediately recognizable and authentic — distinctive word choices, sentence rhythms, observations, and attitude create a unique personality on the page. The voice builds emotional bonds with readers, making them feel they are in the presence of a specific, compelling intelligence. The voice lends authenticity that makes characters and events feel real."

  SC-153:
    name: "Narrator-Narratee Relationship"
    measures: "Whether the narrative establishes a clear and consistent relationship between the narrator and their implied audience (narratee), and whether this relationship serves the story."
    score_0: "The narrator's audience is unclear or inconsistent. Sometimes the narrator addresses a specific \"you,\" sometimes they narrate to no one in particular, sometimes they break the fourth wall — without these shifts being meaningful. The narrator explains things the narratee should already know, or fails to explain things the narratee would need."
    score_5: "The narrator-narratee relationship is clear, consistent, and productive. If the narrator addresses a specific audience (a judge, a friend, a future self), this shapes what is explained, what is assumed, and how events are presented. If the narratee is implied rather than explicit, the level of explanation and intimacy remains consistent."

  SC-155:
    name: "Non-Linear Exchange Patterns"
    measures: "Whether dialogue avoids the predictable question-answer \"ping-pong\" pattern where every question receives a direct answer and every statement receives a direct response, instead incorporating the deflections, tangents, topic changes, and non-sequiturs of real conversation."
    score_0: "Every dialogue exchange follows a strict question-answer pattern. Character A asks, Character B answers. Character B asks, Character A answers. No question goes unanswered. No statement is deflected. No topic is changed. The rhythm is predictably linear and regular, lulling readers to sleep."
    score_5: "Characters frequently don't answer questions directly. They deflect with other questions, change subjects, give oblique responses, or ignore the question entirely. Conversations go on tangents that reveal character. Statements provoke unexpected responses. The unpredictability of real conversation is captured—exchanges feel alive precisely because they don't follow a neat pattern. Direct answers are rare and therefore powerful when they arrive."

  SC-157:
    name: "Number Formatting Consistency"
    measures: "Whether numbers are formatted consistently throughout the manuscript — spelled out or numerals, with a consistent rule applied to the same categories of numbers."
    score_0: "Numbers alternate randomly between spelled out and numerals in the same context. \"Ten\" in one paragraph and \"10\" in the next for the same type of quantity. Numbers beginning sentences are in numerals. No consistent rule is discernible."
    score_5: "A single number convention is applied throughout. The same categories of numbers are always treated the same way. Dialogue uses spelled-out numbers consistently. Numbers beginning sentences are always spelled out. Time, dates, and measurements follow their own consistent sub-rules."

  SC-158:
    name: "Objective Correlative"
    measures: "Whether emotions are expressed through concrete external particulars (objects, situations, chains of events) rather than stated directly."
    score_0: "Emotions are stated directly and abstractly (\"she felt sad,\" \"he was angry,\" \"a wave of grief washed over her\") with no concrete external objects, situations, or events that embody the emotion. The reader is told what to feel rather than given materials from which to feel it."
    score_5: "Emotions are never named but are unmistakably evoked through precisely chosen external particulars—objects, physical actions, environmental details, chains of events—that serve as \"the formula of that particular emotion\" (Eliot). The reader experiences the emotion through sensory engagement with concrete details rather than through abstract labels."

  SC-159:
    name: "Objective Correlative in POV"
    measures: "Whether the narrative uses objects, settings, and sensory details as emotional correlatives — conveying the POV character's emotional state through what they notice and how they perceive it, rather than through direct emotional labeling."
    score_0: "Emotional states are named rather than evoked (\"she was sad,\" \"he felt angry\"). The POV character's perceptions do not change based on their emotional state. The environment is described objectively regardless of whether the character is elated or devastated. No correlation between internal state and external perception."
    score_5: "The POV character's emotional state colors their perception of everything. A grieving character notices the emptiness of rooms, dust on photographs, faded colors. An anxious character notices sharp edges, tight spaces, ticking clocks. Emotion is conveyed through the character's selective attention and interpretive lens rather than labels."

  SC-160:
    name: "Omniscient Narrator Voice Distinctiveness"
    measures: "For omniscient narration specifically — whether the omniscient narrator has a distinctive, consistent voice that is clearly separate from any character's voice, providing its own personality, attitude, and commentary."
    score_0: "The omniscient narrator has no distinctive voice, functioning as a generic information conduit. Or the narrator's voice is inconsistent, sometimes sounding like one character, sometimes another, sometimes the author. The narrator provides access to multiple minds without the coherent personality that distinguishes omniscient from head-hopping."
    score_5: "The omniscient narrator is a compelling presence with consistent voice, tone, and attitude. The narrator's commentary, word choice, and perspective are distinct from every character's voice. The narrator's personality creates irony, humor, or authority that enriches the story beyond what any character could provide."

  SC-161:
    name: "On-the-Nose Dialogue Avoidance"
    measures: "Whether dialogue avoids having characters state their thoughts, feelings, motivations, and exposition directly without nuance, indirection, or subtext."
    score_0: "Characters routinely say exactly what they think and feel. Motivations are spelled out explicitly. Emotions are declared rather than shown. Readers can predict every response before characters speak. The dialogue reads as if characters are narrating their internal states to each other."
    score_5: "Characters rarely if ever state their feelings directly. Emotions emerge through word choice, what is avoided, physical behavior, and the gap between statement and action. When direct emotional honesty occurs, it is earned through preceding restraint and creates powerful impact through contrast. Readers must infer character states from behavioral evidence."

  SC-162:
    name: "POV Character Selection Per Scene"
    measures: "Whether each scene is told from the perspective of the character with the most at stake, the most to lose, or the most interesting vantage point on the events."
    score_0: "Scenes are told from arbitrary or default characters' perspectives. Crucial confrontations are narrated by bystanders rather than participants. The character experiencing the most interesting internal conflict is sidelined while a less engaged character narrates."
    score_5: "Each scene's POV character is the person with the most at stake, the most to learn, or the most compelling internal experience of the events. When multiple characters could narrate, the chosen perspective maximizes tension, information control, and emotional impact."

  SC-163:
    name: "POV Consistency"
    measures: "Whether the narrative maintains its chosen POV type, person, depth, and tense consistently throughout, with any shifts being deliberate and clearly signaled."
    score_0: "POV shifts randomly between types (limited suddenly becomes omniscient), person (third drifts into first), depth (deep POV suddenly pulls to distant), or tense (past becomes present) without signals, markers, or apparent purpose. Readers cannot tell whose head they are in."
    score_5: "Every shift in POV type, person, depth, or tense is deliberate, clearly marked, and serves a narrative purpose. Within scenes, the chosen POV is maintained flawlessly. Readers always know whose consciousness they inhabit and when a transition occurs."

  SC-164:
    name: "POV Consistency at Prose Level"
    measures: "Whether the prose maintains consistent point-of-view discipline at the sentence level — staying within a single character's perspective within a scene — or whether it \"head-hops\" between characters' thoughts and perceptions without marking the transition."
    score_0: "The narration jumps between characters' internal states within a single paragraph or scene without transition markers. \"Alice felt relief. Ben wondered if she'd share.\" The reader must re-read passages to determine whose perspective is being represented. The POV character's knowledge is violated — they observe things they couldn't know."
    score_5: "Each scene maintains a consistent POV. Other characters' states are inferred through observable behavior, not reported directly. When POV shifts between scenes or chapters, clear markers (scene breaks, chapter breaks) signal the transition. The POV character's knowledge boundaries are respected. In omniscient POV, perspective shifts are handled with deliberate transitions rather than random jumps."

  SC-165:
    name: "POV Discipline Within Scenes"
    measures: "Whether scenes maintain consistent point of view without unauthorized head-hopping, and whether the chosen POV is exploited fully for its unique advantages."
    score_0: "POV shifts randomly within scenes without scene breaks. The reader receives information the POV character could not know. Head-hopping occurs without purpose. The advantages of the chosen POV are not exploited (e.g., first person without voice distinctiveness; close third without interiority)."
    score_5: "POV is consistent throughout each scene. The reader experiences only what the POV character can perceive, think, and feel. Sensory details, vocabulary, and observation priorities reflect the specific character's personality. POV shifts only occur at scene or chapter breaks with clear re-orientation."

  SC-166:
    name: "POV Information Discipline"
    measures: "Whether the narrative respects the knowledge boundaries of the POV character — only conveying information the character would plausibly know, notice, or think about."
    score_0: "The POV character knows things they have no way of knowing — names of strangers, events happening elsewhere, technical details outside their expertise, other characters' internal states presented as fact. The narrative leaks omniscient information into limited-POV scenes."
    score_5: "Every piece of information in the narrative is something the POV character could plausibly know, perceive, or infer. Unknown characters are described physically until identified. Technical details match the character's expertise. Other characters' emotions are inferred from observable behavior. Gaps in the character's knowledge create productive narrative tension."

  SC-167:
    name: "POV Knowledge Boundary Consistency"
    measures: "Whether the narrative respects the knowledge boundaries inherent in its chosen point of view, avoiding \"head-hopping\" or information leaks across POV boundaries."
    score_0: "A limited-third-person or first-person narrative reveals information the POV character could not know. The narrative slips into another character's thoughts mid-scene without a clear break or POV shift signal. In multiple-POV narratives, the knowledge from one POV character bleeds into scenes from another POV character's perspective. Characters narrate their own unconscious motivations they would not realistically articulate."
    score_5: "The narrative strictly respects its chosen POV constraints. In limited perspectives, the reader sees only what the POV character can see, know, and interpret. POV switches are clearly signaled (chapter breaks, section breaks, formatting cues). Information asymmetry between characters is maintained and exploited for dramatic tension. Each POV voice is distinguishable and consistent."

  SC-168:
    name: "POV Switch Pacing as Hook"
    measures: "Whether POV switches at chapter or scene breaks are used as a pacing tool, creating natural hooks by forcing readers to leave one storyline before returning."
    score_0: "POV switches occur at arbitrary points with no regard for hook potential. Readers switch to a new POV with no tension about the storyline they just left. Or: the hooked storyline isn't returned to for so many chapters that readers forget or stop caring."
    score_5: "POV switches occur at moments of unresolved tension in the departing storyline, creating a natural hook. The hooked storyline is returned to within 1-2 chapters. Each POV's internal pacing works independently while the switching pattern creates inter-storyline tension."

  SC-169:
    name: "POV Transition Craft"
    measures: "Whether transitions between POV characters are clearly marked, smoothly executed, and establish the new POV character's consciousness quickly."
    score_0: "POV transitions are unmarked or poorly marked. Readers must re-read to identify whose perspective they are in. The new POV character's identity is not established in the opening lines of their section. Transitions occur mid-paragraph or mid-sentence without structural markers."
    score_5: "POV transitions use clear structural markers (scene breaks, chapter breaks, section markers). The new POV character's identity and consciousness are established in the opening line or two of each section. Transitions move smoothly through the narrative distance spectrum — pulling back from one character's intimacy, through neutral distance, and into the new character's intimacy."

  SC-170:
    name: "Pacing Rhythm and Variation"
    measures: "Whether the text varies its pace dynamically — alternating between fast and slow, tension and release, action and reflection — to create an emotional rhythm that sustains engagement"
    score_0: "The pace is monotonous — either relentlessly fast (exhausting the reader) or relentlessly slow (boring the reader). No variation exists. No alternation between tension and release. The reader either burns out or tunes out."
    score_5: "Pacing varies dynamically with purpose. Fast-paced sections generate excitement and urgency through short sentences, quick scene shifts, and escalating stakes. Slower sections foster reflection, emotional connection, and character development. The alternation creates a rhythm of tension and release that mirrors a heartbeat. Resolution timing is precisely calibrated — neither rushed nor prolonged."

  SC-171:
    name: "Paragraph Length Variation"
    measures: "Whether paragraph length varies purposefully to control reading pace, emphasis, and visual experience, rather than running at a uniform length."
    score_0: "Every paragraph is approximately the same length (e.g., all 4-5 sentences, or all single sentences), creating visual and rhythmic monotony. One-sentence paragraphs are overused to the point of losing dramatic impact, or dense blocks are unbroken throughout."
    score_5: "Long paragraphs create immersion and complexity for introspection and description; short paragraphs create urgency and punch for action and emphasis; single-sentence paragraphs are reserved for maximum dramatic impact and used sparingly. The visual shape of the page reflects the story's emotional dynamics."

  SC-172:
    name: "Paragraph Structure and Breaks"
    measures: "Whether paragraph breaks serve pacing, clarity, and reader orientation — new paragraphs for new speakers, new actors, new narrative modes, shifts in time/location, and appropriate paragraph length variation for pacing."
    score_0: "Multiple speakers share paragraphs. Wall-of-text paragraphs span entire pages without breaks. Paragraphs break in the middle of a single action or thought for no apparent reason. No variation in paragraph length — all are roughly the same size. Scene changes happen within paragraphs."
    score_5: "Every speaker gets their own paragraph. Paragraph breaks mark shifts in speaker, actor, time, location, or narrative mode. Short paragraphs create urgency; longer ones create reflection. At least one break per page provides visual rest. Single-sentence paragraphs are used sparingly for emphasis."

  SC-173:
    name: "Participial Phrase Accuracy (Simultaneous Action)"
    measures: "Whether present participial phrases (-ing constructions) are used only to describe actions that can logically occur simultaneously with the main clause action, not sequential actions misrepresented as concurrent."
    score_0: "Frequent impossible simultaneous actions: \"Unlocking the door, she went straight to bed.\" \"Walking to the counter, she sat down and ordered.\" Characters perform physically incompatible actions in the same participial construction."
    score_5: "Every participial phrase describes a logically simultaneous action. Sequential actions are expressed with sequential syntax. \"After\" or \"having\" constructions are used where appropriate. No physically impossible concurrent actions."

  SC-174:
    name: "Passive Voice Control"
    measures: "Whether passive voice is used deliberately and sparingly for specific effect (emphasis, mystery, pacing) rather than as a default construction that weakens prose."
    score_0: "Passive voice dominates narration without purpose. \"The door was opened\" where \"she opened the door\" would be stronger. \"The ball was thrown by the boy\" constructions appear frequently. The prose feels distant and indirect because actors are routinely removed from their actions."
    score_5: "Active voice dominates. Passive voice appears only where it serves a specific purpose: to obscure the agent for suspense, to emphasize the recipient of action, to match a character's evasive psychology, or where the actor is genuinely unknown or irrelevant. Every passive construction has a justifiable reason."

  SC-175:
    name: "Pathetic Fallacy Control"
    measures: "Whether the attribution of human emotions to natural/environmental elements is handled with craft and purpose, avoiding mechanical mirroring."
    score_0: "Weather and environment mechanically mirror character emotions in the most predictable way (rain during sadness, sunshine during happiness, storms during anger). The environment functions as a crude emotional amplifier with no subtlety, irony, or counterpoint."
    score_5: "When natural/environmental elements reflect or comment on human emotions, they do so with awareness and nuance—through irony (devastating news on a beautiful day), displacement (calm environment during internal turmoil), or subtle resonance rather than direct mirroring. The writer controls the device rather than defaulting to it unconsciously."

  SC-177:
    name: "Personification Quality"
    measures: "Whether the attribution of human qualities to non-human things creates vivid imagery or has become a mechanical, meaningless verbal habit."
    score_0: "Personification is mechanical and stock (\"the wind whispered,\" \"the sun smiled,\" \"the building loomed menacingly\") with no fresh perception or thematic purpose. Objects are given human traits in the most conventional, unexamined way."
    score_5: "When non-human things are given human attributes, the personification creates a genuinely new perception, serves thematic purpose, or reveals the perceiving character's psychology. The attribution is specific and surprising rather than generic and stock."

  SC-178:
    name: "Physical Grounding and Blocking"
    measures: "Whether characters are physically grounded in space during scenes -- whether the reader can track where characters are, how they move, and how they interact with their physical environment."
    score_0: "Characters float in undefined space (\"white room syndrome\"). No spatial information is provided. During dialogue, characters seem to be disembodied heads. Physical actions, gestures, and environmental interactions are absent or generic."
    score_5: "Characters occupy specific, identifiable spaces. Movement is motivated by character psychology and story needs. Physical actions during dialogue reveal character (idiosyncratic tics, meaningful interactions with objects). The reader can visualize the spatial relationships between characters and their environment without strain."

  SC-179:
    name: "Plot Armor / Consequence Consistency"
    measures: "Whether characters face realistic and consistent consequences for dangerous situations, rather than surviving implausibly due to their narrative importance."
    score_0: "The protagonist survives situations that should be lethal based on the story's own established rules. Injuries that would incapacitate anyone else are shrugged off by main characters. The rules of danger apply asymmetrically — villains and minor characters die from threats that leave the protagonist unscathed with no in-story explanation. Readers can predict character survival based entirely on narrative importance rather than story logic."
    score_5: "Characters face consequences proportional to the dangers they encounter, consistent with the story's own rules. When characters survive dangerous situations, there is a logical explanation grounded in established abilities, preparation, or circumstances. Stakes feel genuine because the narrative enforces its own rules equally on all characters."

  SC-180:
    name: "Point of View Consistency"
    measures: "Whether the narrative maintains a consistent, deliberately chosen point of view that serves as an effective filter for the story's information and experience."
    score_0: "The point of view is inconsistent, accidental, or absent—shifting between characters within scenes without purpose, mixing omniscient and limited perspectives, or providing information the viewpoint character could not know."
    score_5: "The point of view is deliberately chosen, rigorously maintained, and serves as an effective subjective filter that shapes the reader's experience. Any shifts are purposeful and clearly signaled."

  SC-181:
    name: "Power Dynamics in Conversation"
    measures: "Whether dialogue reveals and enacts power relationships between characters through who speaks more, who interrupts, who defers, who evades, who controls topic, and who holds information."
    score_0: "All characters participate equally in conversation regardless of their relative power, status, knowledge, or emotional investment. No character interrupts, dominates, defers, or controls the topic. Power imbalances that should be evident in the scene are invisible in the dialogue. Who speaks most has no relationship to who holds power."
    score_5: "Dialogue enacts power relationships through multiple channels: who speaks more or less, who interrupts, who changes subject, who asks questions vs. who answers, who uses formal vs. informal register, who controls the agenda. A character's silence can dominate a conversation. Power shifts within scenes are reflected in dialogue dynamics. Characters negotiate power through speech even when discussing seemingly neutral topics."

  SC-182:
    name: "Proactive vs. Reactive Character Balance"
    measures: "Whether the POV character actively drives scene events through choices and initiatives rather than passively reacting to circumstances imposed by others, while still allowing genuine reactive processing after disasters."
    score_0: "The character is consistently passive -- bouncing from event to event without initiating action, making choices, or driving the scene forward. \"A pinball bouncing from event to event\" with no stakes, only randomness."
    score_5: "In action scenes, the character proactively pursues goals, confronts obstacles, and makes deliberate choices. In sequel/reaction scenes, the character processes and decides rather than simply enduring. The balance between proactive pursuit and reactive processing creates a rhythm of agency and vulnerability."

  SC-183:
    name: "Prologue Exposition Management"
    measures: "Whether prologues (if present) serve genuine narrative functions beyond frontloading world or character exposition that could be delivered more effectively later."
    score_0: "The prologue is a history/geography lesson establishing the world through exposition dump. It contains no conflict, character engagement, or dramatic stakes. The information in the prologue could be distributed more effectively throughout the narrative. Readers skip the prologue and miss nothing essential."
    score_5: "If present, the prologue introduces a specific dramatic situation (different from Chapter 1) that creates a question or establishes stakes the main narrative will address. It contains its own conflict and character engagement. It provides information the reader genuinely needs before the main narrative begins, in a form that would be awkward to deliver later. Most information about the world and its mechanics is still saved for integrated delivery within the main narrative."

  SC-184:
    name: "Prose Rhythm in Description"
    measures: "Whether descriptive passages employ purposeful variation in sentence length, structure, and cadence to create emotional effects and maintain reader engagement."
    score_0: "Descriptive passages have monotonous sentence length and structure—either all short declarative sentences or all long complex sentences with no variation. The prose has no rhythm, no rise and fall, no deliberate pacing through sentence construction."
    score_5: "Sentence length and structure vary purposefully within descriptive passages. Short sentences create impact, urgency, or emphasis at key moments. Long sentences create atmosphere, contemplation, or sensory immersion. The rhythm of the prose reinforces the emotional content of the description—fast when the scene demands speed, slow when it demands lingering."

  SC-185:
    name: "Prose Stress Pattern Awareness"
    measures: "Whether the author demonstrates awareness of syllabic stress patterns in prose, using natural English stress to create rhythm that supports the narrative's emotional register."
    score_0: "The prose's stress patterns fight against the content. Trochaic (stressed-unstressed) patterns appear where iambic (unstressed-stressed) would flow better. Sentences feel choppy or awkward when read aloud due to clashing stress."
    score_5: "Natural English stress patterns are used to create rhythm that supports content. Two-syllable feet (iambs, trochees) read briskly; anapests slow things down. The prose has a cadence that feels \"right\" when heard, even in silent reading through the \"mind's ear.\""

  SC-186:
    name: "Prose Transparency vs. Opacity (Windowpane vs. Stained Glass)"
    measures: "Where the prose sits on the spectrum from transparent (invisible, reader looks THROUGH the prose to the content) to opaque (ornate, the prose itself IS the content and demands attention as a crafted object), and whether this position is deliberate and consistent."
    score_0: "The prose's position on the transparency-opacity spectrum appears accidental. The writer alternates randomly between invisible and ornate prose with no apparent purpose. Genre-inappropriate: literary fiction that reads like a manual, or thriller prose that reads like Proust. The style-content relationship is unexamined."
    score_5: "The writer has a clear, deliberate position on the transparency-opacity spectrum that serves the work's aims. If transparent: the prose efficiently delivers story without calling attention to itself (Orwell, Hemingway, Leonard). If opaque: the prose rewards attention to its own craft and linguistic texture (Nabokov, Morrison, McCarthy). If the writer modulates between the two, the shifts serve specific narrative purposes."

  SC-187:
    name: "Psychic Distance Management for Exposition"
    measures: "Whether the narrative appropriately modulates the reader's perceptual distance from characters when delivering exposition -- using wider distance for context-setting and closer distance for emotionally charged information."
    score_0: "Exposition is delivered at a single psychic distance regardless of content. Close-POV scenes are interrupted by distant, omniscient-sounding explanatory passages. Jarring shifts between intimate character experience and textbook-style information delivery. The narrator's exposition voice is indistinguishable from an encyclopedia."
    score_5: "Psychic distance widens gracefully for scene-setting and context, then narrows for emotional content and character-filtered information. Exposition at close distance is colored by character voice, perception, and emotional state. Transitions between distances are smooth rather than jarring. The narrative voice in expository passages is consistent with the overall POV strategy."

  SC-188:
    name: "Psychic/Narrative Distance Control"
    measures: "Whether the narrative effectively manages the distance between reader and character consciousness, using the full spectrum from distant/objective to intimate/stream-of-consciousness."
    score_0: "Distance is static (stuck at one level throughout) or shifts jarringly without transition (jumping from distant overview directly to stream of consciousness). No awareness of the distance spectrum. Emotional moments are narrated at a distance; mundane moments are narrated with excessive closeness."
    score_5: "Distance shifts fluidly along the spectrum, matched to narrative need. Emotional peaks use close distance; scene-setting uses far distance. Transitions between levels are gradual (moving one level at a time). The writer demonstrates command of all five levels: (1) far/objective, (2) distant/character-named, (3) moderate/character-felt, (4) close/free indirect, (5) intimate/stream of consciousness."

  SC-189:
    name: "Punctuation Accuracy"
    measures: "Whether commas, periods, semicolons, colons, apostrophes, quotation marks, em dashes, en dashes, hyphens, and ellipses are used correctly and consistently throughout the manuscript."
    score_0: "Widespread punctuation errors: missing commas, incorrect apostrophes (it's/its confusion), misused semicolons, hyphens where em dashes belong, inconsistent ellipsis formatting, unpaired quotation marks."
    score_5: "Punctuation is correct and purposeful throughout. Commas, dashes, and semicolons are used for clarity and rhythm. Ellipses and em dashes follow a consistent style. Apostrophes and quotation marks are correct in every instance."

  SC-190:
    name: "Purple Prose Avoidance"
    measures: "Whether the prose maintains appropriate restraint in its descriptive and figurative language, or whether it tips into purple prose — writing so extravagant, flowery, and overwrought that it draws excessive attention to itself while lacking substance."
    score_0: "The prose is consistently overwrought. Adjectives pile up three or four per noun. Every moment gets the full metaphorical treatment regardless of importance. Descriptions are florid to the point of self-parody. The pace crawls under the weight of unnecessary ornamentation. The voice sounds artificial because the purple prose reflects the author's preening rather than the character's perspective."
    score_5: "Descriptive intensity is calibrated to narrative importance. Ordinary moments get clean, efficient prose. Significant moments may earn more elaborate treatment, but the elaboration adds meaning rather than mere decoration. The writer knows the difference between rich prose (Morrison's lyrical precision) and purple prose (adjective-stuffed decoration that substitutes for substance)."

  SC-191:
    name: "Purple Prose vs. Purposeful Lushness"
    measures: "Whether ornate, elaborate description serves the narrative or exists merely to display the writer's verbal facility."
    score_0: "Description is overwrought—excessive adjectives, exaggerated comparisons, multisyllabic words chosen for sound rather than meaning, elaborate inner monologue that adds nothing. The prose draws attention to itself at the expense of the story. \"Like a cardboard cutout of a celebrity: from a distance it looks convincing, but there's nothing behind it.\""
    score_5: "Even the most elaborate, lush description serves the narrative—creating atmosphere, revealing character, advancing theme, or embodying the story's emotional reality. Ornate prose has \"the elegance and cohesion\" that distinguishes it from purple prose. The verbal richness is inseparable from the story's meaning rather than layered on top of it."

  SC-192:
    name: "Quotation Mark Consistency and Correctness"
    measures: "Whether the manuscript uses consistent quotation mark style (double or single for primary dialogue, the opposite for quotes-within-quotes) and whether curly/smart quotes are used throughout without stray straight quotes."
    score_0: "Mixed straight and curly quotes throughout. Primary dialogue alternates between single and double marks. Quotes within quotes don't use the alternate style. Opening and closing marks face the wrong direction after apostrophes or elisions."
    score_5: "One quote style used consistently throughout. All quotes are curly/smart. Quotes within quotes correctly use the alternate mark. Opening quotes face right, closing quotes face left. No straight quotes appear anywhere in the manuscript."

  SC-193:
    name: "RUE (Resist the Urge to Explain)"
    measures: "Whether the narrative trusts readers to draw their own conclusions from dramatized evidence, or whether it explains the significance of its own scenes, actions, and emotional moments."
    score_0: "The narrative routinely explains the emotional significance of scenes it has just dramatized. Characters articulate their own feelings explicitly. The narrator tells the reader what to think about events. After showing a character's behavior, the text explains what that behavior means. Subtext is immediately surfaced as text."
    score_5: "Dramatized scenes stand on their own without subsequent explanation. Characters' internal states are shown through behavior, dialogue, and physical response without explicit labeling. Readers are trusted to interpret implications, emotional undercurrents, and thematic resonances. Subtext remains subtext. The narrative creates questions rather than answers."

  SC-195:
    name: "Readability of Complex Sentences"
    measures: "Whether complex sentences with multiple clauses, modifiers, or embedded elements remain parseable on first reading — whether syntactic complexity serves the content or obscures it."
    score_0: "Complex sentences lose their subjects, pile up subordinate clauses without anchor points, or require multiple readings to parse. The reader loses the thread of the sentence before reaching its end. Syntactic complexity exists for its own sake rather than serving content."
    score_5: "Complex sentences guide the reader through multiple ideas with clear structural cues. Subjects and verbs remain proximate. Subordinate clauses are positioned for clarity. The reader can follow even lengthy sentences without losing the thread. Complexity matches the complexity of the thought."

  SC-196:
    name: "Reader Ahead of Character Problem"
    measures: "Whether the narrative avoids situations where the reader has already figured out something obvious but the character hasn't, creating false mystery that drags pacing."
    score_0: "The reader figures out obvious conclusions long before characters do, and the narrative treats the character's ignorance as mystery or suspense. Pages are spent with the character confused about something the reader solved chapters ago."
    score_5: "When readers can clearly predict an outcome, the story either subverts expectations or moves forward quickly. True suspense (readers anticipating how plans will play out) is used instead of false mystery (readers waiting for characters to catch up). The distinction between reader-ahead-as-suspense and reader-ahead-as-boredom is maintained."

  SC-197:
    name: "Reader-Character Identification Bond"
    measures: "Whether the narrative establishes sufficient emotional connection between reader and character to sustain investment across the full story."
    score_0: "Reader has no reason to worry about, root for, or be fascinated by the character; no empathy-building techniques employed in opening; character is neither sympathetic, fascinating, nor relatably flawed; bond is attempted through description rather than demonstrated emotion."
    score_5: "Multiple identification techniques are deployed early and layered throughout: sympathy (undeserved misfortune), jeopardy (physical/emotional/reputational danger), likability (demonstrated kindness, humor, competence), fascination (mastery, courage, contradiction), wish-fulfillment, familiarity, relatable goals, and sensory-emotional detail; bond is established before flaws are revealed; even unsympathetic protagonists are compelling through fascination or moral code."

  SC-198:
    name: "Reading Flow State"
    measures: "Whether the text produces an optimal reading experience characterized by absorption, smooth processing, temporal distortion, and intrinsic enjoyment"
    score_0: "Reading feels effortful, choppy, and laborious. The reader is constantly aware of processing difficulty, never loses track of time, and derives no intrinsic pleasure from the reading act itself."
    score_5: "The reader experiences deep absorption, loses awareness of self and time, processes text smoothly and fluently with thoughts/emotions/images emerging spontaneously, and feels optimally challenged. Reading pleasure and motivation to continue are maximized."

  SC-199:
    name: "Redundancy Elimination (Show AND Tell Problem)"
    measures: "Whether the narrative avoids the specific redundancy of showing something through action/dialogue and then immediately explaining what was just shown through narration."
    score_0: "The narrative consistently shows a character's emotion through action, then explains in narration what the reader just witnessed. \"She slammed her fist on the table. She was angry.\" Every implication is over-explained."
    score_5: "When something is shown effectively, the narration trusts the reader to understand it. Telling only restates shown material when it adds genuinely new information, a different perspective, or deeper significance beyond what the action conveyed."

  SC-200:
    name: "Register Appropriateness and Consistency"
    measures: "Whether the prose uses a level of formality (register) appropriate to its narrative context, characters, and genre, and maintains register consistency within scenes while allowing purposeful register shifts across contexts."
    score_0: "Register is inappropriate to the work's setting or genre. Characters speak at the same level of formality regardless of context. A historical novel uses modern slang without ironic purpose. A literary novel reads like a corporate memo. Register shifts happen within single paragraphs without narrative justification."
    score_5: "The prose's register matches its narrative context. Formal and informal language appear in appropriate proportions. Characters code-switch between registers when contexts change (speaking to a friend vs. an authority figure). Register is period-appropriate in historical fiction. The narrator's register suits the narrative stance. Register shifts between characters reflect their distinct social positions and backgrounds."

  SC-201:
    name: "Register and Sociolect Accuracy"
    measures: "Whether characters' speech accurately reflects their socioeconomic class, education, region, age, profession, and cultural background through appropriate register, dialect, and sociolect without resorting to stereotype or caricature."
    score_0: "All characters speak in the same register regardless of background. Alternatively, dialect is rendered as heavy phonetic spelling that reads as mockery or caricature rather than characterization. Professional jargon, generational slang, and class markers are absent or inaccurate. Characters from different backgrounds are linguistically interchangeable."
    score_5: "Each character's register accurately reflects their background without becoming caricature. Dialect is conveyed through syntax, diction, and idiom rather than excessive phonetic respelling. Characters code-switch appropriately between contexts (formal vs. informal, professional vs. personal). Class, education, age, and regional markers emerge naturally through vocabulary and sentence structure. Research-backed authenticity is evident without becoming a linguistics exercise."

  SC-203:
    name: "Retroactive Continuity (Retcon) Avoidance"
    measures: "Whether the narrative avoids retroactively altering or contradicting previously established facts to solve new plot problems."
    score_0: "Previously established facts are silently contradicted to enable new plot developments. Character histories are rewritten without acknowledgment. Events that were established as having happened are treated as if they didn't, or vice versa. The narrative gives the impression that the author forgot what they wrote earlier."
    score_5: "The narrative never silently contradicts its own established facts. When new information recontextualizes earlier events, it does so through legitimate revelation that is consistent with (rather than contradictory to) what came before. Readers who re-read the story find that later revelations enhance rather than undermine earlier passages."

  SC-204:
    name: "Retrospective/Temporal Narrator Distance"
    measures: "Whether the temporal distance between the narrating self and the experiencing self is established, consistent, and productive — particularly in first-person and past-tense narration."
    score_0: "The temporal position of the narrator is unclear or inconsistent. A past-tense narrator sometimes speaks with full hindsight and sometimes seems to not know what will happen next without any clear pattern. The gap between narrating self and experiencing self is neither exploited for irony/reflection nor collapsed for immediacy — it simply is not managed."
    score_5: "The narrator's temporal position is clear and consistent. If retrospective, the gap between narrating self and experiencing self is exploited for dramatic irony, foreshadowing, earned wisdom, or emotional resonance. The narrator's present-tense reflections are distinct from their past-tense experiences. The temporal structure creates meaning."

  SC-205:
    name: "Rhythm Pattern Variety"
    measures: "Whether the narrative alternates between different modes (dialogue, action, reflection, summary) to prevent monotony"
    score_0: "Long stretches of the same mode — pages of unbroken dialogue, or pages of unbroken reflection, or pages of unbroken action; no variation in scene type or length; every chapter follows the same pattern; the story has one \"gear\" and stays in it"
    score_5: "The story alternates between short and long scenes; dialogue, action, reflection, and summary are mixed; scenes are labeled S (short), M (medium), or L (long) and avoid long runs of one size; the pattern of \"three quick beats, then one longer scene to absorb impact\" creates sustainable rhythm; genre-appropriate variation exists between dense and sparse sections"

  SC-206:
    name: "Said Bookism Avoidance"
    measures: "Whether dialogue attribution uses primarily invisible tags (said, asked) rather than conspicuous alternatives (exclaimed, declared, expostulated, hissed, breathed) that draw attention to themselves."
    score_0: "Nearly every dialogue tag uses a creative alternative to \"said\": characters exclaim, declare, retort, snort, bark, growl, muse, opine, and ejaculate their words. Adverbs further ornament tags. The reader notices the tags more than the dialogue."
    score_5: "\"Said\" and \"asked\" dominate dialogue tags. Action beats replace tags where appropriate. Creative alternatives appear rarely and only when justified (a character can \"whisper\" or \"shout\" but not \"smile\" or \"shrug\" a line of dialogue). The reader experiences the dialogue, not the attribution."

  SC-207:
    name: "Scene Anchoring and Spatial Clarity"
    measures: "Whether description provides sufficient orienting detail for the reader to know where they are, when they are, and what the physical space looks like at the start of scenes."
    score_0: "Scenes begin with no spatial or temporal grounding—characters speak and act in a void. The reader cannot picture where the scene takes place, what time it is, or what the physical environment looks like. New scenes begin without any reorientation. (\"White Room Syndrome\" / \"Talking Heads Syndrome\")"
    score_5: "Every scene opens with sufficient anchoring detail—POV, place, and time are established in the first few paragraphs without being heavy-handed. The reader always knows where they are. New locations are introduced with enough specific detail to create a mental image, while familiar locations receive lighter touches."

  SC-208:
    name: "Scene Beat Rhythm"
    measures: "Whether the scene is composed of identifiable beats -- exchanges of action/reaction that create a rhythmic pulse -- rather than undifferentiated narration."
    score_0: "The scene reads as undifferentiated narration without identifiable beats. No clear exchanges of action and reaction. No rhythm of stimulus-response. Events blur together without distinct moments."
    score_5: "Individual beats are clearly identifiable -- each consisting of an action/stimulus followed by a character reaction. Beats build upon each other to create escalation. The rhythm of beats creates momentum, and variation in beat length and intensity prevents monotony."

  SC-209:
    name: "Scene Break and Chapter Break Formatting"
    measures: "Whether scene breaks and chapter breaks are formatted consistently and professionally — using appropriate visual markers, consistent spacing, and following publishing conventions."
    score_0: "Scene breaks are inconsistent — sometimes an extra line, sometimes asterisks, sometimes nothing. Chapter openings lack consistent formatting. First paragraphs after breaks are sometimes indented, sometimes not. The reader cannot always distinguish between scene breaks and formatting errors."
    score_5: "Scene breaks use a consistent visual marker throughout. Chapter breaks are formatted identically. First paragraphs after all breaks are flush-left per convention. The reader always knows when a scene or chapter has changed."

  SC-210:
    name: "Scene Causality (Intra-Scene)"
    measures: "Whether the beats within a scene follow a cause-and-effect logic -- whether each action motivates the next reaction, following Swain's Motivation-Reaction Unit (MRU) structure."
    score_0: "Beats within scenes lack causal connection. Characters act without identifiable motivation. Reactions precede their causes. The physiological sequence (feeling, reflex, rational action) is consistently violated without artistic purpose."
    score_5: "Each beat follows logically from the previous one. External stimuli (motivation) are presented objectively, followed by internal responses (reaction) in the correct physiological order: feeling first, then reflex, then rational action/speech. Motivation and reaction are kept in separate paragraphs for clarity."

  SC-211:
    name: "Scene Emotional Arc"
    measures: "Whether the character's emotional state develops and changes over the course of a single scene rather than remaining flat, and whether that progression is causally connected to scene events."
    score_0: "The character's emotional state is identical at the end of the scene as at the beginning -- flat, plateaued, or randomly oscillating without connection to events. Alternatively, emotional changes are too rapid to be believable (from despair to elation in one scene without extraordinary cause)."
    score_5: "Emotional intensity builds progressively through the scene, connected to turning points and events. Emotional changes follow one of three valid patterns: intensity change (same emotion, increasing strength), emotion switch (one emotion family to another via triggering event), or umbrella arc (multiple emotions accumulating into complex response). The arc feels authentic to the specific character."

  SC-212:
    name: "Scene Ending Quality (Exit Hooks)"
    measures: "Whether scenes end in a way that compels readers to continue -- creating unresolved questions, unfinished business, or new complications rather than resolving neatly."
    score_0: "Scenes consistently end with complete resolution, tying off all threads. No questions remain. No complications arise. Readers have no reason to turn the page beyond mild interest in what happens next."
    score_5: "Scene endings deploy strategic variety among outcome types. The last line occupies the \"power position,\" leaving an impression or hook to the next scene. Questions hang in the air. New complications have been introduced that the character must face. The ending generates enough suspense to compel the reader into the next scene."

  SC-213:
    name: "Scene Internal Pacing Curve"
    measures: "Whether pacing within individual scenes follows a purposeful curve -- typically tightening as the climactic moment approaches and loosening afterward -- rather than maintaining a uniform tempo throughout."
    score_0: "The scene maintains a single unchanging tempo from start to finish. No acceleration toward the turning point. No release afterward. The beat distribution is uniform and monotonous."
    score_5: "Pacing tightens as the scene approaches its climactic moment -- sentences shorten, action quickens, details sharpen. After the turning point, pacing loosens for reaction and processing. The proportional distribution of setup, rising action, climax, and falling action feels purposeful."

  SC-214:
    name: "Scene Pacing Proportionality"
    measures: "Whether the narrative investment (word count, detail, real-time treatment) in each scene is proportional to the scene's dramatic importance rather than uniform across all scenes."
    score_0: "All scenes receive equal narrative investment regardless of importance. Trivial transitions get as much space as climactic confrontations. Important moments are rushed while unimportant moments are lingered over. The proportion between real-time narration and summary is not calibrated to significance."
    score_5: "Critical scenes (conflict, decision, revelation, transformation) receive expanded treatment -- more detail, more real-time narration, more sensory engagement. Less important transitions are compressed into summary. The reader's experience of time matches the story's sense of importance. Description, narration, action, and dialogue are proportioned to maximize each scene's impact."

  SC-215:
    name: "Scene Structure Variety"
    measures: "Whether the narrative deploys different scene structures, lengths, tempos, and types across the work rather than repeating the same structural template for every scene."
    score_0: "Every scene follows the same structural template -- same length, same tempo, same pattern of action-to-reflection, same type of turning point. The reading experience becomes monotonous regardless of content variation. Scene-sequel balance is missing or uniform."
    score_5: "Scenes vary in length, structure, tempo, and type. Action scenes alternate with reflective sequels. Some scenes open in medias res while others build slowly. Dialogue-heavy scenes alternate with action-heavy or introspection-heavy scenes. The structural variety itself creates rhythm and prevents reader fatigue."

  SC-216:
    name: "Scene Transition Craft"
    measures: "Whether transitions between scenes are handled with deliberate craft -- smooth enough to maintain reading flow but clear enough to orient the reader -- rather than being jarring, confusing, or absent."
    score_0: "Transitions are either absent (the reader is suddenly in a new time/place with no orientation) or so heavy-handed (pages of transitional material) that they kill momentum. POV changes occur mid-paragraph without signals."
    score_5: "Transitions use bridging techniques (imagery or thematic echoes between scenes), sensory grounding in the new setting, and clear temporal/spatial orientation. The transition method matches the desired pacing effect: sharp cuts for urgency, gradual transitions for contemplation. Each new scene is established quickly."

  SC-217:
    name: "Scene Transition Quality"
    measures: "Whether transitions between scenes are smooth and purposeful -- using bridging techniques, logical connections, and mood continuity -- rather than jarring or disorienting."
    score_0: "Transitions between scenes are jarring, confusing, or nonexistent. The reader cannot orient themselves in the new scene's time, place, or POV. No logical, thematic, or emotional connection bridges consecutive scenes."
    score_5: "Transitions use bridging techniques (mirrored imagery, thematic echo, emotional continuity). New scenes establish time, place, and POV quickly. The connection between consecutive scenes -- whether causal, thematic, or contrastive -- is clear. Chapter and scene breaks occur at moments that serve pacing."

  SC-218:
    name: "Scene vs. Summary Balance"
    measures: "Whether the text uses an appropriate balance of in-scene writing (real-time dramatic action) and summary/narrative telling to sustain continuous reader engagement"
    score_0: "The text is predominantly summary or exposition with no scenes, creating distance and preventing immersion. Or it is all scene with no variation, exhausting the reader. The balance does not serve reader engagement."
    score_5: "Scenes carry the primary emotional and dramatic weight through real-time action, dialogue, and sensory detail. Summary is used strategically for transitions, time passage, and necessary-but-not-central information. The balance creates continuous engagement through alternation of immersive experience and efficient narration."

  SC-219:
    name: "Scene vs. Summary Deployment"
    measures: "Whether the story appropriately chooses between full dramatization (scene) and narrative compression (summary) for each story event, dramatizing important moments and summarizing less important ones."
    score_0: "Important moments are summarized while trivial events are fully dramatized. Or the entire narrative is either all scene (exhausting, no compression) or all summary (distant, no immersion). The choice between scene and summary appears arbitrary rather than strategic."
    score_5: "Crucial moments of conflict, decision, revelation, and change are fully dramatized in real-time scenes. Transitional periods, routine events, and previously-revealed information are compressed into summary. The ratio feels deliberate and serves the story's genre and emotional needs."

  SC-220:
    name: "Scene-Level Information Management"
    measures: "Whether the scene strategically controls the flow of information -- revealing enough to maintain engagement while withholding enough to sustain curiosity, creating a \"curiosity gap\" between what readers know and what they want to know."
    score_0: "Either all information is dumped at once (eliminating curiosity) or too little is provided (creating confusion rather than mystery). Revelations don't raise new questions. The reader has no information asymmetry to maintain engagement."
    score_5: "Each revelation answers one question while raising new ones. Readers have enough information to understand and care about what's happening, with a crucial piece missing that keeps them reading. Front-loading, gradual revelation, and delayed revelation are deployed strategically. The gap between what readers know and what they want to know is maintained throughout."

  SC-221:
    name: "Scene-Level Plot-Character-Theme Integration"
    measures: "Whether each scene simultaneously advances plot, develops character, and expresses theme -- whether these three dimensions are intertwined rather than operating independently."
    score_0: "Scenes serve only one dimension: pure plot advancement without character development or thematic resonance, or pure character study without plot movement, or thematic lecturing without dramatic action."
    score_5: "Plot events simultaneously reveal character and express theme. The character's internal struggle with their Lie/Truth is externalized through plot conflict. Theme operates as subtext -- never stated explicitly but present as \"the guiding principle.\" Emotional arcs relate to thematic content. The character's scene-level decision reflects their position on the thematic spectrum."

  SC-222:
    name: "Second Person Narration Craft"
    measures: "When second person (\"you\") narration is used, whether it serves a clear purpose beyond novelty and maintains reader engagement rather than alienation."
    score_0: "Second person is used as a gimmick without purpose — the novelty of \"you\" is the only distinction from a first-person narrative. Readers feel commanded rather than immersed. The \"you\" creates alienation because the reader's actual experience contradicts the narrated actions. Or second person is used inconsistently, shifting in and out without purpose."
    score_5: "Second person serves a clear purpose: creating complicity with a morally questionable protagonist, representing dissociation or trauma, universalizing specific experience, or constructing a narrative game with the reader. The \"you\" pronoun creates genuine intimacy or productive discomfort rather than mere novelty."

  SC-223:
    name: "Sense of Wonder and the Numinous"
    measures: "Whether the world evokes genuine wonder, awe, or the feeling of encountering something truly strange and new -- rather than merely presenting a catalog of invented elements."
    score_0: "The world's speculative elements feel mundane, derivative, or exhaustively explained until all mystery is drained. There is no sense of encountering something genuinely new or strange. The world reads like a bureaucratic catalog of invented systems rather than a place of imaginative power."
    score_5: "The world contains elements that genuinely surprise, enchant, or unsettle. Mystery coexists with logic. Not everything is fully explained, and the unexplained spaces invite wonder rather than frustration. The world feels larger and stranger than any single character's understanding of it. As David Farland states: \"It's not magic that the novel needs, it is wonder!\""

  SC-224:
    name: "Sensory Balance Across Modalities"
    measures: "Whether the text engages senses beyond sight, and whether sensory modality selection is purposeful."
    score_0: "Description relies exclusively on visual imagery with no engagement of sound, smell, touch, or taste. Non-visual senses are never invoked, or are invoked only through cliché (\"the smell of coffee\")."
    score_5: "Multiple sensory modalities are engaged strategically, with the dominant sense chosen to serve the scene's emotional and narrative needs. Non-visual senses provide unique information that sight cannot (e.g., recognizing someone by cologne before seeing them, or noticing tension through quality of silence). Sensory foregrounding shifts across scenes based on context."

  SC-225:
    name: "Sensory Embodiment"
    measures: "Whether the prose engages multiple senses to create visceral, embodied reader experience through specific, concrete sensory detail rooted in character perspective"
    score_0: "Description is exclusively visual and generic. No tactile, olfactory, auditory, or gustatory detail is present. The reader cannot physically feel the story world. Sensory descriptions are cliches (\"gentle breeze,\" \"blooming flowers\") that convey nothing specific."
    score_5: "All five senses are engaged strategically. Sensory details are specific, surprising, and rooted in the POV character's experience. Tactile details create embodied immersion. Smell triggers visceral memory responses. The specificity of sensory language maximizes visceral reader reaction. Neuroscience confirms readers' brains respond to sensory language as if experiencing the described sensations."

  SC-226:
    name: "Sensory Engagement"
    measures: "Whether the prose engages multiple senses (sight, sound, smell, taste, touch, kinesthetic) to create immersive experience, or whether it relies almost entirely on visual description."
    score_0: "Description relies entirely on sight. Scenes are described as if viewed through a camera. Sound, smell, taste, touch, and kinesthetic sensation are absent. The world feels flat and visual-only. The reader is a spectator rather than a participant."
    score_5: "Multiple senses are engaged throughout the prose. The reader experiences scenes through sound, smell, taste, touch, and movement as well as sight. Non-visual senses appear naturally through the POV character's experience. Sensory details are specific (not \"it smelled bad\" but what it specifically smelled like). The world feels three-dimensional and inhabitable."

  SC-227:
    name: "Sensory Grounding"
    measures: "Whether scenes engage multiple senses to create immersive physical reality rather than relying solely on visual description or abstract narration."
    score_0: "Scenes lack sensory detail entirely (white room syndrome) or engage only the visual sense superficially. The reader cannot see, hear, smell, feel, or taste the fictional world. Environment feels like a backdrop rather than a lived space."
    score_5: "Scenes engage at least two or three senses naturally through the POV character's experience. Sensory details are specific (not generic), filtered through the character's perception, and contribute to mood, character, or plot. Internal senses (temperature, pressure, heartbeat) supplement the five external senses."

  SC-228:
    name: "Sensory Specificity"
    measures: "Whether sensory details are specific and concrete rather than generic and abstract."
    score_0: "Sensory details are entirely generic (\"beautiful sunset,\" \"gentle breeze,\" \"the forest was beautiful\"), abstract (\"it felt threatening\"), or absent. Details could describe any scene in any setting and carry no information about this particular moment, place, or character."
    score_5: "Every sensory detail is precisely observed, particular to the specific scene, and could not be transplanted to a different context without loss. Details reveal character psychology, advance thematic concerns, or carry narrative weight beyond mere decoration. The reader can reconstruct the specific sensory experience rather than a category of experience."

  SC-229:
    name: "Sensory Specificity and Immersion"
    measures: "Whether the setting is conveyed through specific, multi-sensory detail that creates an embodied reading experience rather than abstract or purely visual description."
    score_0: "Setting description is absent or purely visual and generic. Descriptions are abstract (\"it was a beautiful city\") or limited to sight alone. There is no texture, sound, smell, taste, or temperature. The reader cannot imagine being physically present in the world."
    score_5: "The world is conveyed through all relevant senses -- sight, sound, smell, taste, touch, temperature, proprioception. Descriptions are specific and concrete rather than generic. Sensory details are filtered through character perception and reveal character as well as setting. The reader feels physically transported."

  SC-230:
    name: "Sentence Clarity"
    measures: "Whether each sentence communicates its meaning on first reading — no ambiguous pronoun references, no garden-path constructions, no sentences requiring re-reading to parse, no buried subjects or actions."
    score_0: "Many sentences require re-reading to understand. Pronoun references are ambiguous (\"Claire was worried about her test results, yet excited about going on the date with Josh. It made her toss and turn\"). Modifiers are misplaced. Subjects are buried under qualifying clauses."
    score_5: "Every sentence communicates its meaning immediately. Pronouns have clear antecedents. Modifiers are placed next to what they modify. The subject and action appear early in each sentence. Complex ideas are broken into digestible units."

  SC-231:
    name: "Sentence Fragment Control"
    measures: "Whether sentence fragments are used deliberately for emphasis, pacing, voice, or dialogue naturalism — and whether accidental fragments (unfinished thoughts in narration, dependent clauses standing alone) are absent."
    score_0: "Fragments appear randomly without purpose. Dependent clauses stand alone in narration (\"Because he was tired.\"). The reader cannot tell whether fragments are intentional. Fragments create confusion rather than emphasis."
    score_5: "Fragments are used deliberately and sparingly for emphasis, urgency, or voice. Their meaning is clear from context. Deliberate fragments are distinct from the surrounding complete sentences, creating contrast. Accidental fragments are absent."

  SC-232:
    name: "Sentence Structure Variation (Beyond Length)"
    measures: "Whether the grammatical construction of sentences varies -- not just length but syntactic pattern: subject-first vs. inverted, simple vs. compound vs. complex, declarative vs. interrogative vs. imperative, active vs. passive."
    score_0: "Every sentence follows the same grammatical pattern (e.g., \"He did X. She did Y. They went Z.\") regardless of length variation, creating syntactic monotony."
    score_5: "Sentences vary in construction: some lead with dependent clauses, some with sensory details, some with subjects; questions, fragments, and imperatives appear where emotionally appropriate. The diagnostic (examining five consecutive sentences for identical openings) passes."

  SC-233:
    name: "Sentence Variety and Rhythm"
    measures: "Whether the prose varies sentence length, structure, and opening patterns to create natural rhythm and avoid monotony — mixing short punchy sentences with longer flowing ones, varying sentence openers, and matching rhythm to emotional content."
    score_0: "Sentences are monotonously uniform in length, structure, or opening pattern. Multiple consecutive sentences begin with the same word or pattern (e.g., \"She... She... She...\" or \"He walked... He turned... He looked...\"). Long passages lack any short sentences, or vice versa. No relationship between sentence rhythm and emotional content."
    score_5: "Sentence length varies naturally. Short sentences appear at moments of impact, tension, or revelation. Longer sentences unfold during reflection or description. Sentence openers are varied (subjects, prepositional phrases, participial phrases, adverbial clauses). The rhythm matches the scene's emotional register."

  SC-234:
    name: "Sentence Variety and Rhythmic Variation"
    measures: "Whether the prose varies sentence length, structure, and type to create rhythmic interest, or whether it falls into monotonous repetitive patterns."
    score_0: "Sentences are uniformly the same length and structure. The prose reads like a metronome. Subject-verb-object repeats without variation. No fragments, no complex sentences, no deliberate variation. Alternatively, all sentences are long and complex with no short ones for contrast."
    score_5: "Sentence length and structure vary deliberately. Short sentences create tension, impact, or emphasis. Longer sentences provide reflection, description, or emotional build. The prose has what Gary Provost called \"a pleasant rhythm, a lilt, a harmony.\" Occasionally a sentence \"burns with energy and builds with all the impetus of a crescendo.\" Fragments appear sparingly for emphasis. The overall effect is musical."

  SC-235:
    name: "Sentence-Level Rhythm Variation"
    measures: "Whether sentence length and structure vary enough to create a felt rhythm, avoiding both monotonous uniformity and random chaos."
    score_0: "Sentences are uniformly the same length and structure throughout (all medium-length declarative sentences, or all short fragments, or all long complex sentences), creating a metronomic, flat reading experience."
    score_5: "Short, medium, and long sentences alternate with purposeful variation. Short sentences deliver punch and urgency; long sentences create flow and immersion; the mix creates what Provost calls \"music\" -- a rhythm that pleases the reader's ear and matches the emotional register of the content."

  SC-236:
    name: "Sequel (Reaction) Quality"
    measures: "Whether the narrative provides adequate space for the POV character to process disasters emotionally before making decisions, following the reaction-dilemma-decision pattern rather than skipping directly from disaster to new action."
    score_0: "No sequel exists between scenes. Characters jump from one disaster directly into a new goal without emotional processing, logical deliberation, or decision-making. Alternatively, sequels are present but skip reaction (jumping to decision) or skip dilemma (character knows exactly what to do without weighing options)."
    score_5: "After each significant disaster, the character processes emotionally (reaction), weighs options with genuine uncertainty (dilemma), and commits to a course of action that feels earned given the emotional/logical arc (decision). The sequel's length is proportional to its dramatic importance, with the longest sequel typically at the \"dark night of the soul.\""

  SC-237:
    name: "Setting as Active Element"
    measures: "Whether the physical environment participates in the narrative as a force that affects characters and plot, rather than serving as a passive backdrop."
    score_0: "The setting is a painted backdrop—it exists but has no effect on characters, plot, or theme. Characters could be anywhere and the story would be identical. The environment never resists, enables, threatens, or transforms."
    score_5: "The physical environment actively shapes the narrative—climate, geography, architecture, and objects influence character behavior, create obstacles or opportunities, embody thematic concerns, and evolve alongside the plot. The setting is inseparable from the story being told; transplanting the characters to a different environment would produce a different story."

  SC-238:
    name: "Show vs Tell Calibration"
    measures: "Whether backstory, worldbuilding, and expository information is woven into the narrative through action and dialogue rather than delivered in static blocks that halt momentum."
    score_0: "Backstory arrives in multi-paragraph blocks of pure exposition. Characters deliver speeches of information the reader needs but no character would naturally say. The narrative halts for worldbuilding lectures."
    score_5: "Information is woven into scenes through character action, dialogue that reveals naturally, and sensory detail. The reader learns about the world by watching characters interact with it. Necessary exposition is broken into small pieces distributed across scenes."

  SC-239:
    name: "Show vs. Tell Effectiveness"
    measures: "Whether the text renders experience through concrete sensory detail, action, and implication rather than asserting emotional or thematic content for the reader to accept"
    score_0: "Emotions, character traits, and thematic content are exclusively told through direct assertion. The reader is informed about characters' feelings rather than experiencing them through action, dialogue, sensory detail, or behavior. No implication or inference is required."
    score_5: "The text transmits experience rather than asserting information. Readers feel they experienced events alongside characters through vivid imagery, descriptive verbs, immersive detail, action, dialogue, and interior experience. Important emotional moments, character development scenes, and plot turning points are shown. The reader \"forgets that they're reading.\""

  SC-240:
    name: "Show vs. Tell in Description"
    measures: "Whether the text renders experience through concrete sensory detail and action rather than summarizing or explaining what the reader should understand."
    score_0: "Description consists entirely of summary statements (\"the room was creepy,\" \"she was beautiful,\" \"the city was impressive\"), abstract characterizations, and authorial assertions about qualities the reader should infer from evidence."
    score_5: "Scenes are rendered through specific, observable details that allow readers to experience and interpret for themselves. The writer provides evidence (concrete sensory detail, significant action, telling gesture) and trusts readers to draw conclusions. Abstract qualities are demonstrated rather than asserted."

  SC-241:
    name: "Show/Tell Balance for Pacing Control"
    measures: "Whether the narrative strategically uses both showing (dramatized, expanded) and telling (summarized, compressed) to control pace, rather than defaulting exclusively to one mode."
    score_0: "The narrative is either all showing (every moment dramatized at equal expansion, creating exhausting length) or all telling (everything summarized, creating emotional distance). There is no strategic toggling between modes."
    score_5: "Significant events are shown (dramatized with sensory detail, dialogue, and unfolding action). Context and transitions are told (summarized efficiently). The author recognizes that showing slows pace and creates richness while telling speeds pace and provides efficiency, and toggles deliberately between them."

  SC-242:
    name: "Showing vs Telling Through POV"
    measures: "Whether the narrative leverages POV to show character experience directly rather than telling the reader about it — rendering sensory experience, emotion through behavior, and understanding through implication."
    score_0: "The narrative constantly tells the reader about emotional states (\"she was sad\"), character traits (\"he was brave\"), and judgments (\"it was a beautiful day\") rather than rendering experience through sensory detail, behavior, and implication. The POV is squandered — being inside a character's head produces the same flat reporting as being outside it."
    score_5: "Being inside the POV character's consciousness means the reader experiences the world through that character's senses, associations, and emotional responses. Emotions are shown through physical sensation, behavior, and the objective correlative rather than named. Character traits emerge from choices and observations rather than labels."

  SC-243:
    name: "Showing vs. Telling Balance"
    measures: "Whether the prose effectively uses sensory detail, action, and concrete imagery to immerse readers in experience (showing), while knowing when efficient summary (telling) serves the narrative better — rather than defaulting entirely to one mode."
    score_0: "The prose defaults entirely to telling: \"She was angry. The room was beautiful. He felt sad.\" Emotions are labeled rather than embodied. Alternatively, the prose tries to \"show\" everything including mundane transitions, exhausting the reader with constant sensory overload and never allowing efficient summary."
    score_5: "Key emotional and dramatic moments are shown through concrete detail, action, and sensory imagery. The reader experiences the character's anger through physical manifestation and behavioral change rather than the word \"angry.\" Transitions and less important moments are efficiently told. The writer knows which moments deserve the full showing treatment and which are better summarized."

  SC-244:
    name: "Backstory Integration"
    measures: "Whether character history is revealed through organic narrative techniques rather than expository dumps, and whether revealed backstory serves present-story purposes."
    score_0: "Backstory delivered in large expository blocks, especially in opening chapters; backstory info-dumped through \"as you know, Bob\" dialogue; backstory present but disconnected from present-story tension; too much backstory too soon destroying forward momentum."
    score_5: "Backstory revealed through the \"drip\" technique -- small, strategically placed revelations throughout the narrative; each revelation is triggered by present-story need; backstory emerges through dialogue, physical discovery, character behavior, and triggered memories; revelations build suspense and deepen emotional stakes; the reader learns history just when they most need it."

  SC-245:
    name: "Significant Detail Selection"
    measures: "Whether descriptive details are chosen for their narrative, thematic, or characterological significance rather than being arbitrary or exhaustive."
    score_0: "Details appear to be chosen arbitrarily—random physical attributes listed with no connection to theme, character, or plot. Description reads as an inventory or \"laundry list\" of everything visible rather than a curated selection. No detail carries more weight than any other."
    score_5: "Every detail carries significance beyond its literal content—it reveals character, advances theme, foreshadows plot, or creates atmosphere. The writer has made visible choices about what to include and what to omit. Details that seem incidental on first reading prove meaningful in retrospect. Nothing is described merely because it exists."

  SC-246:
    name: "Silence, Evasion, and Non-Response as Tools"
    measures: "Whether the text effectively uses what characters do not say, refuse to say, or avoid saying as meaningful dialogue tools that reveal character, create tension, and communicate through absence."
    score_0: "Every question receives a direct answer. Every topic is addressed head-on. Characters never avoid, deflect, evade, or stay silent. There is no negative space in the dialogue—every possible response is spoken. The text never uses non-response as communication."
    score_5: "Silence, evasion, deflection, subject changes, and non-answers are deployed as meaningful communication tools. A character's refusal to answer reveals more than any answer could. Silence shifts power dynamics. Pauses create tension. What characters avoid discussing becomes as important as what they say. The text uses em dashes for interruptions, ellipses for trailing off, and narrative description for meaningful silences. Non-response is distinct from oversight—readers understand the character chose not to respond."

  SC-247:
    name: "Sound and Euphony"
    measures: "Whether the prose attends to the sonic qualities of language — consonance, assonance, euphony, cacophony — as elements of craft, or whether sound is accidental."
    score_0: "No awareness of how words sound together. Accidental tongue-twisters or awkward sound collisions throughout. Prose that stumbles when read aloud. No use of consonance, assonance, or other sound devices. The sonic texture is random."
    score_5: "The writer selects words partly for their sonic qualities. Hard consonant sounds (crack, slam, jab) appear in violent or urgent passages. Soft consonants and long vowels (meandering, luminous, solitude) appear in contemplative passages. Strategic repetition of sounds (consonance, assonance) intensifies meaning. Prose reads smoothly aloud. As Francine Prose noted: a sentence you can hardly pronounce without stumbling needs reworking."

  SC-248:
    name: "Spatial Logic and Geography"
    measures: "Whether character positions, movements between locations, and the physical geography of the story world remain consistent and physically plausible."
    score_0: "Characters teleport between locations without accounting for travel time, the layout of buildings or cities contradicts itself between scenes, distances between locations change, landmarks appear and disappear or move, characters are simultaneously described as being in incompatible locations."
    score_5: "The story's geography is internally consistent. Characters move through space in ways that respect established distances and layouts. Travel times are plausible given stated distances and transportation methods. Room layouts, building structures, and city geography remain stable across scenes. A reader could draw a consistent map from the narrative."

  SC-249:
    name: "Specificity of Detail"
    measures: "Whether the fiction deploys concrete, particular, non-interchangeable details rather than generic, category-level descriptions — whether the details could belong only to this story and these characters, or could be swapped into any story without loss."
    score_0: "Descriptions use category-level language: \"a tree,\" \"a house,\" \"a beautiful woman,\" \"a delicious meal.\" Characters notice generic things. Settings could be any city, any forest, any room. Physical details, when present, are drawn from the most common stock images (rain on a windowpane, crackling fire, cobblestone streets). A reader could not reconstruct any unique visual from the prose."
    score_5: "Details are precise, concrete, and non-interchangeable: a specific species of tree with a specific quality of light through its specific leaves, a meal described through particular tastes and textures that reveal character and culture. Physical descriptions include the kind of detail that signals observed reality — asymmetries, imperfections, idiosyncrasies. James Wood's \"thisness\": details that \"draw abstraction towards itself and seem to kill that abstraction with a puff of palpability.\""

  SC-250:
    name: "Spelling and Typo Freedom"
    measures: "Whether the text is free of misspellings, typographical errors, transposed letters, doubled words, missing words, and incorrect homophones."
    score_0: "Multiple spelling errors, typos, wrong homophones (your/you're, their/there/they're, its/it's, affect/effect), doubled words, missing words per chapter. Reads as if spell-check was never run."
    score_5: "Zero or near-zero spelling errors in the entire manuscript. Homophones are correct throughout. No doubled or missing words. Proper nouns and invented words are spelled consistently. Dialect spellings are intentional and consistent."

  SC-251:
    name: "Stakes and Reader Investment"
    measures: "Whether characters have something meaningful to lose and whether the text makes readers care about those potential losses through deeply personal, specific, and universal stakes"
    score_0: "Nothing meaningful is at risk. Characters pursue goals with no sense of what failure would cost. Stakes are abstract, generic, or disconnected from character identity. The reader has no emotional investment in any outcome."
    score_5: "Stakes operate at three levels simultaneously: external (plot-level consequences), personal (relationship and identity costs), and philosophical (thematic meaning). Stakes are deeply specific to individual characters yet tap universal human experiences. Conflicting desires create Sol Stein's \"crucible\" — characters cannot simultaneously achieve competing goals they desperately want."

  SC-252:
    name: "Stream of Consciousness Craft"
    measures: "When stream of consciousness or deep interiority techniques are used, whether they authentically represent the experience of thinking rather than merely being unpunctuated prose."
    score_0: "Stream of consciousness is used as a label for run-on sentences or unpunctuated prose that does not actually represent the experience of thinking. No free association, looping repetition, sensory intrusion, or fragmented syntax that characterizes actual mental experience. Alternatively, it is so formless as to be incomprehensible without conveying character or meaning."
    score_5: "Stream of consciousness authentically renders the experience of thinking — including free association, looping repetition, sensory observation intruding on abstract thought, strange punctuation reflecting mental rhythm, and the character's voice emerging through diction and preoccupation. The technique deepens characterization and thematic resonance."

  SC-253:
    name: "Strong Nouns Over Adjective Padding"
    measures: "Whether the text relies on precise, evocative nouns (and verbs) rather than modifying weak nouns with multiple adjectives."
    score_0: "Weak, generic nouns are propped up by clusters of adjectives (\"the big, old, dark, stone building\"). Description depends on modifier stacking rather than precise naming. Adverbs appear wherever the verb is insufficiently specific."
    score_5: "Nouns are specific enough to carry their own weight without modification (\"the brownstone,\" \"the abbey,\" \"the tenement\"). When modifiers appear, each one adds essential information that the noun alone cannot convey. Verbs are precise enough to make adverbs unnecessary."

  SC-254:
    name: "Style-Content Alignment"
    measures: "Whether the prose style serves and reinforces the content and themes of the work — whether form follows function — or whether style and content are disconnected, with the prose working against what the story is trying to accomplish."
    score_0: "Style and content work at cross-purposes. A story about restraint and repression is written in lush, indulgent prose. A story about chaos and breakdown is written in neat, orderly paragraphs. A comedy uses the sentence structures of a funeral dirge. The writer has a \"style\" that they apply regardless of what the story needs."
    score_5: "Style IS meaning. The prose's rhythm, diction, syntax, and texture reinforce what the story is doing thematically and emotionally. Spare prose serves stories of restraint. Lush prose serves stories of sensory immersion. Fragmented syntax serves stories of psychological disintegration. The writer adapts their style to serve each work's specific needs, as Kevin Barry's hypotactic prose serves elegiac material and Carver's parataxis serves stories of suppressed emotion."

  SC-255:
    name: "Subject-Verb Agreement"
    measures: "Whether subjects and verbs agree in number throughout, including tricky cases with collective nouns, compound subjects, intervening phrases, and indefinite pronouns."
    score_0: "Frequent subject-verb disagreement, especially with collective nouns (\"the group of students were\" when acting as a unit), compound subjects (\"neither the dog nor the cats was\"), and sentences with intervening phrases (\"the list of risks are long\")."
    score_5: "Subject-verb agreement is correct throughout, even in complex constructions. Collective nouns are treated consistently (either singular or plural based on meaning). No agreement errors slip through intervening phrases."

  SC-256:
    name: "Subtext Quality"
    measures: "Whether tension is created through what goes unsaid — the gap between surface dialogue/action and underlying emotional reality."
    score_0: "Everything is stated explicitly; characters say exactly what they mean; there is no gap between surface and depth; dialogue functions purely as information delivery."
    score_5: "Tension lies between the saying, thinking, and doing; characters are riddled with conflict between what they express and what they feel; scenes function on multiple levels simultaneously; the most important information is communicated through implication."

  SC-260:
    name: "Subtext as Pacing Lubricant"
    measures: "Whether the narrative employs subtext (meaning implied but not stated) to maintain intellectual engagement and reading momentum, rather than making everything explicit."
    score_0: "Everything is stated explicitly. Characters say exactly what they mean. The narrator explains every implication. Readers have nothing to interpret, resulting in perceived slowness even during action."
    score_5: "Subtext runs beneath dialogue and narration, engaging readers intellectually. Characters say one thing and mean another. Implications are left for the reader to assemble. This intellectual engagement creates a sense of pace even in contemplative scenes."

  SC-262:
    name: "Subtext as Thematic Vehicle"
    measures: "Whether the work conveys thematic meaning through what is left unsaid, implied, or shown through behavior rather than through surface-level text."
    score_0: "Everything in the work operates at surface level. Characters say exactly what they mean. There is no gap between what is said and what is meant. Dialogue is \"on-the-nose\" -- \"a character speaks with no subtext. They say exactly what they are thinking or feeling in no uncertain terms.\" No thematic meaning exists below the surface text."
    score_5: "Thematic meaning operates primarily beneath the surface. Characters discuss one topic while meaning something else. The gap between behavior and stated intention reveals character truth. \"Subtext collects around what's unsaid, creating meaning through omission.\" As Francine Prose says: \"More is going on under the surface than on it. One mark of badly written dialogue is that it is only doing one thing, at most, at once.\""

  SC-267:
    name: "Synesthesia and Cross-Sensory Imagery"
    measures: "Whether the text uses cross-sensory descriptions (describing one sense in terms of another) to create vivid, unusual sensory experiences."
    score_0: "No cross-sensory description exists. All senses are described in their own conventional terms. Sensory descriptions are siloed and never interact or blend."
    score_5: "Cross-sensory imagery is used purposefully and effectively—sounds have colors, textures have temperatures, smells have shapes. The synesthetic descriptions create genuinely new perceptual experiences for the reader that purely single-sense description could not achieve. The blending feels organic rather than forced."

  SC-268:
    name: "Syntactic Sophistication (Hypotaxis vs. Parataxis)"
    measures: "Whether the writer commands a range of syntactic structures — from simple paratactic sequences to complex hypotactic constructions with subordinate clauses — and deploys them purposefully to create meaning."
    score_0: "Syntax is accidental and uncontrolled. All sentences follow the same clause pattern. The writer shows no awareness of how clause arrangement creates effect. Subordinate clauses appear randomly rather than purposefully. Subject-verb distance is either always minimal or always excessive."
    score_5: "The writer deliberately employs hypotactic structures (complex sentences with subordinate clauses delaying the main clause) to create suspense or intellectual density, and paratactic structures (simple sequential clauses) to create urgency, restraint, or matter-of-factness. The \"fundament\" (subject + predicate) is positioned to control pacing — at the end for suspense, at the beginning for immediacy. Syntactic choices serve the emotional and thematic content of each passage."

  SC-269:
    name: "Temporal Compression and Expansion"
    measures: "Whether the author controls the ratio of narrative time to story time purposefully -- expanding important moments and compressing unimportant ones -- rather than giving equal weight to all time periods."
    score_0: "All time periods receive equal attention regardless of narrative importance. Trivial passages of time are given as much space as pivotal moments, or pivotal moments are compressed to the same density as routine events."
    score_5: "Key moments are expanded with sensory detail and emotional depth; routine periods are compressed or elided entirely. The compression-expansion pattern creates the story's distinctive temporal signature. As Lee Martin notes, the story \"condenses human experience while also expressing the depth of that experience.\""

  SC-270:
    name: "Temporal Specificity in Description"
    measures: "Whether description captures the specific moment in time—time of day, season, weather conditions, stage of an ongoing process—rather than being temporally generic."
    score_0: "Description is temporally unanchored—scenes could take place at any time of day, any season, any stage of an ongoing event. Light, temperature, ambient sounds, and other time-dependent sensory details are absent or generic."
    score_5: "Description is precisely located in time through sensory details that could only exist at that specific moment—the quality of light, the stage of a seasonal process, the ambient sounds of a specific hour. The reader knows not just where they are but when, down to the approximate time of day."

  SC-271:
    name: "Tense Consistency"
    measures: "Whether the narrative maintains consistent verb tense throughout the main storyline, with deliberate shifts only at clear temporal boundaries (flashbacks, flash-forwards, embedded narratives)."
    score_0: "Tense shifts randomly between past and present within scenes, paragraphs, or even sentences. Dialogue tags alternate between \"said\" and \"says\" without pattern. Flashbacks are not differentiated by past perfect. The reader cannot tell whether shifts are intentional."
    score_5: "The main narrative tense is maintained consistently. Flashbacks use past perfect tense (or equivalent temporal marker) to signal the shift. Any intentional tense changes occur at clear structural boundaries and follow a consistent rule. Dialogue tags maintain the same tense throughout."

  SC-272:
    name: "Tense Consistency and Purposefulness"
    measures: "Whether the narrative maintains consistent verb tense within its primary timeline, with any tense shifts serving clear narrative purposes (flashback, commentary, habitual action) rather than occurring accidentally."
    score_0: "Tense shifts randomly within paragraphs and sentences without purpose. Past tense drifts into present and back without signaling timeline changes. Dialogue tags inconsistently use \"said\" versus \"says.\" Flashbacks and present-timeline narration are indistinguishable by tense."
    score_5: "One primary tense is maintained consistently throughout the main narrative. Shifts to other tenses serve clear purposes (recounting past events, future anticipation, habitual actions) and are smoothly signaled. Shifts are rare, brief, and return cleanly to the primary tense."

  SC-273:
    name: "Tense Selection Appropriateness"
    measures: "Whether the chosen narrative tense (past, present, or mixed) serves the story's needs for temporal flexibility, immediacy, and character complexity."
    score_0: "Tense chosen by default or convention without considering its effects on the narrative. Present tense used for a story requiring complex timeline manipulation; past tense used for a story whose power depends on moment-to-moment immediacy."
    score_5: "Tense is chosen deliberately for its effects on the narrative. Present tense creates genuine immediacy for character-driven, compressed-timeline stories. Past tense provides temporal flexibility for complex multi-timeline or retrospective narratives. The tense choice enhances rather than constrains the storytelling."

  SC-274:
    name: "Tension Layering (Multiple Simultaneous Tensions)"
    measures: "Whether scenes carry multiple sources of potential conflict simultaneously (overarching plot tension, interpersonal tension, internal tension) rather than relying on a single conflict source."
    score_0: "Each scene contains only one source of tension or conflict. When that tension resolves, there is nothing else maintaining engagement. Scenes feel thin and one-dimensional."
    score_5: "Scenes layer multiple tension sources: a protagonist rescuing someone from danger (overarching) while disagreeing with a companion (interpersonal) while doubting their own judgment (internal). When one tension resolves, others persist. Reader engagement is maintained through continuous anticipation."

  SC-276:
    name: "Thematic Freshness and Originality"
    measures: "Whether the work explores its theme in a way that feels fresh, specific, and individual rather than generic, cliched, or formulaic."
    score_0: "The theme is a cliche or platitude expressed without originality. \"Love conquers all,\" \"be yourself,\" \"good triumphs over evil\" presented without nuance, complication, or individual perspective. The thematic content could have been generated by assembling common wisdom without any original thought."
    score_5: "The theme explores familiar territory through an original lens that reveals new truths about well-worn subjects. Even universal themes gain specificity through the particular characters and situations. The work offers what Truby calls a \"unique moral vision\" -- not just a moral argument but one shaped by the author's distinctive understanding of the world."

  SC-278:
    name: "Theme-Plot Integration"
    measures: "Whether theme and plot are organically unified such that the plot serves as a metaphor for the thematic content, rather than being separable elements."
    score_0: "Theme and plot exist as separate layers. The plot could be swapped for an entirely different plot without changing the theme, or vice versa. Events happen without thematic significance. As Weiland warns, the story feels \"fragmented or disjointed.\""
    score_5: "Plot functions as \"a metaphor for whatever the character is changing internally, for the story's Lie and Truth.\" Physical events dramatize internal transformation. Neither plot nor theme could exist without the other. The plot is the theme made visible through action."

  SC-280:
    name: "Ticking Clock / Narrative Urgency"
    measures: "Whether the narrative creates a sense of urgency through deadlines, countdowns, or deteriorating situations that pressure characters to act now rather than later."
    score_0: "Characters face no time pressure. There is no reason events must happen now rather than later. The narrative lacks any sense of urgency."
    score_5: "The story creates proportionate urgency -- literal deadlines, deteriorating situations, or emotional windows closing -- that pressures characters into action and accelerates reader engagement. The urgency is organic (arising from story logic) rather than arbitrary."

  SC-281:
    name: "Time Skip Clarity and Justification"
    measures: "Whether jumps in time (ellipsis) are clearly signaled to the reader and justified by the narrative, rather than being confusing or arbitrary."
    score_0: "Time passes without the reader realizing it, causing confusion about when events are happening. Or: every time skip is accompanied by heavy-handed timestamps that interrupt flow. Or: time skips occur at inappropriate moments (mid-scene)."
    score_5: "Time skips are clearly signaled through white space, scene breaks, chapter breaks, or brief orienting phrases. They skip only unimportant time periods. Re-entry after a skip quickly establishes when and where we are. The character connections are strong enough that readers care about what happens on the other side."

  SC-282:
    name: "Timeline and Chronological Coherence"
    measures: "Whether the sequence, duration, and dating of events form a logically consistent timeline that does not contradict itself."
    score_0: "Events happen in impossible sequences (a character reacts to something that hasn't occurred yet), seasons or months contradict each other within the same timeframe, characters age inconsistently, travel times are physically impossible given established distances, the day-of-week progression is mathematically impossible (events assigned to days that don't exist in the described timeframe)."
    score_5: "A reader could construct a complete, non-contradictory timeline from the narrative. Seasonal references, day-of-week mentions, character ages, and duration descriptions all cohere. Even nonlinear narratives maintain internal temporal logic such that all temporal fragments can be reassembled into a consistent chronology."

  SC-283:
    name: "Tonal Control and Modulation"
    measures: "Whether the prose establishes and maintains an appropriate tone — the attitude of the narrator toward story events — and modulates it purposefully when it changes, rather than shifting tone arbitrarily or maintaining a rigid monotone."
    score_0: "Tone lurches between registers without apparent purpose. Serious passages suddenly become flippant. Comic passages turn grim without transition. The reader feels whiplash. Alternatively, the tone is a rigid monotone that never modulates regardless of emotional content. If you throw in a passage outside the tone you've set — a poetic bit in serious prose or a joke in a tragic scene — readers are jolted out of the story."
    score_5: "Tone is established early and maintained as a coherent baseline. When tone shifts, it shifts purposefully — reflecting character development, rising stakes, or changing psychological state (as in Saunders' \"Jon,\" where the narrator's voice becomes progressively more articulate as urgency increases). Tonal modulation is gradual enough that readers feel the shift as narrative progression rather than betrayal. The changing tone reflects a changing narrator responding to events."

  SC-285:
    name: "Turn Variety Across Scenes"
    measures: "Whether the polarity shifts vary in direction, mechanism, and which value changes from scene to scene, preventing monotonous repetition of the same pattern."
    score_0: "Every scene turns the same way -- all revelations, all the same polarity direction, all shifting the same value. The pattern becomes monotonous and predictable."
    score_5: "The direction of polarity shifts alternates across scenes. The mechanism varies (some turns via action, some via revelation, some via change of heart). Different values are at stake in different scenes. The degree of charge increases as the story develops."

  SC-286:
    name: "Unreliable Narrator Cognitive Engagement"
    measures: "Whether an unreliable narrator creates productive cognitive engagement through discrepancies between narration and reality that the reader must actively resolve"
    score_0: "The narrator is unreliable in ways that create only confusion, not engagement. The reader cannot determine what actually happened or has no basis for evaluating reliability. Or the narrator is straightforwardly reliable and the technique is not used."
    score_5: "Unreliable narration creates an interactive reading experience where readers become active participants in deciphering reality. Discrepancies between narrator's statements and other textual evidence prompt critical thinking and close attention to detail. The gap between what the narrator says and what actually happened creates suspense, surprise, and deep cognitive engagement. Awareness of unreliability affects emotional investment through sustained uncertainty about truth."

  SC-287:
    name: "Unreliable Narrator Craft"
    measures: "When unreliable narration is used, whether the unreliability is purposeful, detectable by attentive readers, and serves the story's themes rather than being accidental or meaningless."
    score_0: "The narrator is unreliable accidentally — the author intended reliable narration but created contradictions, impossibilities, or knowledge gaps through carelessness. Alternatively, deliberate unreliability has no payoff — the reader detects the lies but they reveal nothing about the character or world."
    score_5: "Unreliability is constructed with intent. Attentive readers can detect discrepancies between the narrator's account and the implied truth. The gap between what the narrator says and what happened reveals character psychology, thematic meaning, or both. The unreliability has structural consequences — the reader's understanding of events transforms upon recognizing it."

  SC-288:
    name: "Unreliable Narrator Information Control"
    measures: "Whether deliberate narratorial unreliability is well-crafted (clues planted, misdirection purposeful, revelation earned) rather than accidental or clumsy (reader feels cheated, no fair-play clues exist)."
    score_0: "The narrator withholds or distorts information without fair-play clues for the reader. The revelation of unreliability feels like a cheat because no evidence existed to suspect it. Alternatively, the unreliability is so transparent that no productive tension exists. The purpose of the unreliability is unclear beyond generating a twist."
    score_5: "Clues, hints, and subtle indications throughout the story signal that the reader is being deceived, even while being thrown off the scent. The revelation retroactively enriches earlier passages. The unreliability serves the story's thematic concerns (self-deception, trauma, power dynamics). Misdirection is achieved through emphasis and framing rather than outright lying. On rereading, the signs are visible."

  SC-289:
    name: "Verb Strength and Dynamic Action"
    measures: "Whether the prose uses precise, active, dynamic verbs rather than relying on weak verbs propped up by adverbs, or on nominalizations that drain energy from sentences."
    score_0: "Prose relies on \"was,\" \"had,\" \"got,\" \"went,\" and other colorless verbs. Adverbs prop up weak verbs throughout (\"walked slowly,\" \"said angrily\"). Nominalizations convert verbs into nouns requiring helper words (\"made a decision\" instead of \"decided\"). Passive voice obscures agency throughout."
    score_5: "Verbs are precise and dynamic, carrying the weight of the prose (\"sauntered,\" \"snapped,\" \"devoured\" instead of \"walked slowly,\" \"said angrily,\" \"ate quickly\"). Passive voice appears only when the agent is genuinely unknown or when centering the receiver serves the narrative. Adverbs appear only when meaning genuinely shifts (\"almost laughed\" vs. \"ran quickly\")."

  SC-290:
    name: "Vivid and Continuous Dream"
    measures: "Whether the prose creates and sustains what John Gardner called \"a vivid and continuous fictional dream\" — an immersive experience where the reader is regularly presented with \"proofs, in the form of closely observed details, that what is said to be happening is really happening.\""
    score_0: "The prose does not create any sense of immersive experience. Descriptions are abstract or absent. The reader is told what happens but never sees, hears, smells, or feels it. Gardner's \"proofs\" are missing — there are no closely observed details to make the fiction feel real. The reading experience is purely intellectual, with no sensory engagement."
    score_5: "The prose creates a sustained sensory experience. Gardner's two principles are met: the writing is vivid (the reader can see, hear, smell, taste, and feel the fictional world) and continuous (nothing bumps the reader out of the dream through clumsy writing, logical inconsistency, or inappropriate authorial intrusion). The reader has the experience of \"being there.\""

  SC-291:
    name: "Vocabulary and Diction Alignment with POV"
    measures: "Whether the narrative's word choice matches the POV character's education, culture, age, era, and personality — or whether the author's vocabulary bleeds through."
    score_0: "A twelve-year-old narrator uses words like \"juxtaposition\" and \"ephemeral.\" A medieval peasant POV character notices \"mahogany Queen Anne furniture.\" A street-smart character narrates in academic prose. The author's vocabulary and education are visible through every character regardless of their background."
    score_5: "Each POV character's narration reflects their linguistic register — vocabulary, sentence complexity, metaphor sources, and cultural references match their background. A chef notices culinary details; a soldier notices tactical terrain; a child uses simple words and concrete thinking. The author disappears behind the character's voice."

  SC-293:
    name: "Voice Layering (Author/Narrator/Character)"
    measures: "Whether the prose properly distinguishes between and manages the nested layers of voice — authorial voice, narrator voice, and individual character voices — or whether all voices collapse into one undifferentiated register."
    score_0: "All characters, the narrator, and the implied author speak with the same voice. A teenager and a professor use the same vocabulary and syntax. Dialogue and narration are tonally identical. There is no voice differentiation across the cast. The \"Russian nesting doll\" has collapsed into a single layer."
    score_5: "Author voice provides the overarching sensibility. The narrator has a distinct voice suited to the story's needs (omniscient, close third, etc.). Individual characters have recognizable verbal fingerprints — particular vocabulary, syntax, cadence, and speech patterns reflecting their backgrounds, education, and personalities. The writer can shift between character perspectives with distinct vocal signatures. As in Twain, where Tom Sawyer and Huckleberry Finn have different narrators despite the same authorial hand."

  SC-294:
    name: "Weight Distribution (Word Count Proportional to Narrative Importance)"
    measures: "Whether the number of words devoted to an event or topic is proportional to its actual importance in the story."
    score_0: "Trivial events receive extensive coverage while important events are rushed. Extended descriptions of minor characters appear while plot revelations are compressed into single lines. The story's emphasis is misaligned with its actual priorities."
    score_5: "Word count allocation matches narrative importance. Major revelations, turning points, and emotional climaxes receive expansive treatment. Routine transitions, minor events, and setup receive proportionate (smaller) attention. As Fawkes notes: \"The more words you spend talking about something, the more the weight of the story shifts in that direction.\""

  SC-295:
    name: "White Space and Breath Units"
    measures: "Whether the text uses visual white space (paragraph breaks, scene breaks, chapter breaks, dialogue formatting) purposefully to create reading rhythm, emphasis, and rest."
    score_0: "The page is either a solid wall of unbroken text providing no visual rest, or is so fragmented with breaks that no sustained reading flow is possible."
    score_5: "White space functions at multiple levels: line breaks highlight phrases, paragraph breaks create breath pauses, scene breaks provide substantial rest, chapter endings create major pauses. Important moments are surrounded by white space that \"shines a light\" on them. Dialogue formatting creates natural acceleration through vertical reading."

  SC-296:
    name: "Widows and Orphans Control"
    measures: "Whether the final typeset pages avoid isolated lines — widows (last line of a paragraph stranded at the top of a new page) and orphans (first line of a paragraph stranded at the bottom of a page)."
    score_0: "Widows and orphans appear frequently throughout the typeset pages. Single lines sit alone at page tops or bottoms. No effort to control pagination has been made."
    score_5: "No widows or orphans appear in the typeset pages. A minimum of two lines (preferably three) appear at both the top and bottom of every page. Pagination is controlled through tracking, leading, or subtle rewriting."

  SC-297:
    name: "Withholding Discipline (Fair Play Information Control)"
    measures: "Whether information is withheld for legitimate narrative purposes (creating mystery, building suspense, pacing revelation) or withheld artificially to generate false tension (the POV character knows but the reader is denied access without justification)."
    score_0: "The POV character clearly possesses information that is artificially withheld from the reader (e.g., \"She knew what that meant, and it changed everything\" without revealing what). Characters are kept deliberately vague to preserve twists. The narrative creates false mystery by having characters withhold from each other without authentic motivation. The reader feels manipulated rather than intrigued."
    score_5: "Information is withheld only when the POV character also lacks it, or when unreliable narration is a deliberate, well-signaled technique. Mystery derives from genuine unknowns in the story situation rather than from the narrator hiding what characters know. Dramatic irony (reader knowing more than characters) is achieved by showing information, not by narratorial withholding. Twists are earned through misdirection rather than information suppression."

  SC-298:
    name: "Word Choice Precision"
    measures: "Whether the prose uses specific, concrete, and precise words rather than vague, abstract, or generic ones — the right word rather than the almost-right word."
    score_0: "Prose relies on vague, generic terms. \"Things,\" \"stuff,\" \"nice,\" \"good,\" \"bad\" appear frequently. Verbs are weak (was, had, went, got). Nouns are abstract when concrete alternatives exist. Words are imprecise or incorrect for their context."
    score_5: "Every word earns its place. Nouns are specific and concrete. Verbs are dynamic and precise. Abstract language appears only when abstraction is the point. The reader sees, hears, and feels through precise diction rather than generic description."

  SC-299:
    name: "Word-Level Precision (Le Mot Juste)"
    measures: "Whether individual word choices demonstrate precision, with each word being the most exact available term for the intended meaning, connotation, and rhythm."
    score_0: "Words are approximately correct but not precise—near-synonyms are used interchangeably, connotations clash with intended meaning, words are chosen for their sound or impressiveness rather than their exact denotation. The thesaurus has replaced the dictionary."
    score_5: "Every word is the inevitable, irreplaceable choice for its position. Denotation, connotation, rhythm, and sonic compatibility with surrounding language all align. The text could not be improved by substituting any single word with a synonym. The word choices demonstrate what Flaubert meant by \"no such thing as a synonym.\""

  SC-300:
    name: "Worldbuilding Implication Consistency"
    measures: "Whether the second-order effects and societal implications of the story's speculative elements are followed through consistently, rather than existing in isolation from the world they would logically reshape."
    score_0: "A magic system that creates gold exists alongside a non-inflated economy with no explanation. Healing magic exists but characters die of treatable wounds without comment. Telepathy exists but the justice system still relies on witness testimony. Technology that would transform daily life is treated as having no social impact. The world runs exactly like the real world despite containing elements that would fundamentally alter it."
    score_5: "The speculative elements have been thought through to their logical consequences. The world's social structures, economy, politics, daily life, and cultural practices reflect the existence of the speculative elements. When implications are not fully explored (which is acceptable in a narrative), they at least are not contradicted. Characters within the world behave as people who have always lived with these elements would behave."

  SC-301:
    name: "Worldconjuring vs. Worldbuilding (Artistic Integration)"
    measures: "Whether the world serves as art -- evoking emotion, meaning, and aesthetic experience -- rather than functioning merely as a rationalized encyclopedia of invented facts."
    score_0: "The world is a dry catalog of invented facts with no emotional, thematic, or aesthetic dimension. It answers every question about how the world works but never makes the reader feel anything about it. The world is technically complete but artistically empty."
    score_5: "The world evokes emotion, embodies theme, and creates aesthetic experiences that cannot be separated from its factual construction. It functions as what Lincoln Michel calls \"worldconjuring\" -- using hints and literary technique where readers fill gaps collaboratively. As M. John Harrison argued, the best speculative fiction represents \"the triumph of writing over worldbuilding.\" The world is both believable and beautiful."

sentinels:
  CS-001:
    name: "Abandoned Subplot"
    detection: "A subplot is given at least two scenes of dedicated narrative attention and then receives no further mention in the remaining text, with no resolution, deliberate ambiguity signal, or narrative closure."
    why_autocomplete: "LLMs generate scene-to-scene without a structural model of outstanding plot threads. As the context window fills with newer plot developments, earlier subplots lose salience in the attention mechanism and are simply not generated again. This is distinct from a human author's deliberate choice to leave threads open — the AI version shows no signals of intentional ambiguity, the thread simply stops."

  CS-002:
    name: "Abrupt Resolution Without Development"
    detection: "The story accelerates rapidly to resolution in the final ~10%, abandoning multiple established plot threads and resolving the central conflict in a fraction of the space used to establish it. The \"drop ratio\" (unresolved suspenseful elements) is conspicuously high."
    why_autocomplete: "LLM stories exhibited 7-9x higher \"drop ratios\" compared to human stories, indicating \"abrupt resolutions that leave key suspenseful plot elements unresolved.\" The forward-generation architecture means models \"rapidly accelerate over time without fully resolving the plot\" as they approach token limits or feel pressure toward conclusion."

  CS-003:
    name: "Absence of Structural Silence"
    detection: "The narrative never slows down for quiet moments, reflection, or atmospheric pause; every scene is at full dramatic intensity with no valleys between peaks"
    why_autocomplete: "LLMs trained on \"keep it interesting\" advice often generate constant high-intensity content. Human writers understand that \"quiet doesn't mean no tension\" and that valleys are structurally necessary — they allow emotional processing and make the peaks feel higher. A narrative at constant intensity is paradoxically less engaging than one with variation."

  CS-004:
    name: "Absence of Want/Need Tension"
    detection: "The protagonist has no identifiable internal need that conflicts with their external goal; or the protagonist achieves their goal without confronting any internal limitation or false belief; or the Want and Need are identical."
    why_autocomplete: "LLMs generate goal-oriented plot progression (character wants X, pursues X, gets/doesn't get X) because that's the most common narrative pattern in training data. The subtler architecture of Want vs Need -- where pursuing the Want actually reinforces the character's dysfunction -- requires understanding of human psychology that autocomplete cannot model. LLMs resolve conflicts through action rather than internal transformation."

  CS-005:
    name: "Abstract Stakes Only"
    detection: "All stakes are abstract or global (the fate of the world, the future of humanity, the survival of the kingdom) with no specific, personal, concrete consequences for individual characters."
    why_autocomplete: "LLMs can generate grand abstract stakes easily (\"the world will end\") because these are common training data patterns. Generating specific personal stakes (\"she will lose the only person who ever believed in her\") requires deeper character modeling."

  CS-007:
    name: "All Conflict Is External"
    detection: "The protagonist faces only external opposition (fights, chases, obstacles) with no internal psychological conflict, self-doubt, or values-based struggle."
    why_autocomplete: "External conflict is easier to generate because it's action-based and follows clear patterns. Internal conflict requires modeling psychology, generating authentic emotional ambivalence, and sustaining contradictory impulses — tasks where LLMs default to simpler external action."

  CS-008:
    name: "And-Then Plotting"
    detection: "Test every major beat transition by inserting \"therefore\" or \"but\" between them. If the only connector that works is \"and then,\" the story fails the but/therefore test. A story where more than ~25% of beat transitions are \"and then\" connections exhibits this sentinel."
    why_autocomplete: "LLMs generate text by predicting the next likely token based on statistical patterns. This forward-prediction mechanism naturally produces sequential events without establishing causal connections between them. The default LLM output is additive (\"and then this happened\") rather than consequential (\"because of this, that happened\")."

  CS-009:
    name: "Character Wound Never Activated"
    detection: "A character's backstory establishes a psychological wound, trauma, or vulnerability that is never meaningfully tested, exploited, or addressed by the story's conflicts."
    why_autocomplete: "LLMs generate character backstory and plot conflict somewhat independently. The model may establish a character wound (dead parent, past failure, trust issues) without later generating conflicts that specifically target that wound, because the two elements are generated in different context windows."

  CS-010:
    name: "Chekhov's Guns Left Unfired"
    detection: "Elements prominently introduced early in the story (objects, skills, characters, information) are never used or referenced again; the narrative creates expectations it doesn't fulfill"
    why_autocomplete: "LLMs generating long narratives lose track of elements introduced earlier. A gun placed on the mantle in chapter 3 may be forgotten by chapter 30 because the model's attention to early details degrades over long generation spans. Human writers track setups in outlines or revision; LLMs have no such external memory."

  CS-011:
    name: "Clues Without Architecture"
    detection: "A mystery presents clues but they do not form a coherent puzzle — clues point in contradictory directions without resolution, red herrings are never explained, the actual solution ignores most presented evidence, or clues are not distinguishable from random details."
    why_autocomplete: "LLMs can generate individual clue-like details but struggle to maintain the architectural relationship between clues, red herrings, and solution across a full narrative. The arXiv study notes LLMs \"can generate causally sound stories at small scales, but planning with character intentionality and dramatic conflict remains challenging.\""

  CS-012:
    name: "Conflict Contradicts Established Character"
    detection: "A character behaves in ways that directly contradict their established personality, values, or capabilities solely to create conflict — acting stupid, cruel, or reckless when they have been established as thoughtful, kind, or careful."
    why_autocomplete: "LLMs generate scenes semi-independently, and a character's established traits in earlier scenes may not be strongly activated when generating later scenes that need conflict. The model may generate conflict by forcing characters to behave out of character because conflict is the local optimization target."

  CS-014:
    name: "Conflict Resolved by Realization"
    detection: "The climactic conflict is resolved because the protagonist \"realizes\" something (their true feelings, the real problem, what really matters) rather than through action, sacrifice, or confrontation."
    why_autocomplete: "Realization is the cheapest possible resolution — it requires no action, no sacrifice, no external change. LLMs default to epiphany-based resolution because generating an insight is simpler than generating a dramatically complex resolution involving multiple characters, consequences, and trade-offs."

  CS-015:
    name: "Conflict Through Misunderstanding Only"
    detection: "The primary driver of conflict is characters misunderstanding each other, where a single honest conversation would resolve everything."
    why_autocomplete: "Misunderstanding-based conflict is a simple pattern: keep characters from sharing information, then resolve by revealing it. LLMs default to this because it requires minimal psychological modeling — the conflict is mechanical (information withheld) rather than characterological (values in opposition)."

  CS-016:
    name: "Conflict-Free Opening"
    detection: "The first 10% of the story contains no conflict, tension, or opposition of any kind — only scene-setting, character introduction, and worldbuilding."
    why_autocomplete: "LLMs default to extensive scene-setting and character description before introducing any narrative tension, because their training data patterns reward establishing context before conflict. This produces \"leisurely\" openings that human authors are trained to avoid."

  CS-017:
    name: "Consequence-Free Action"
    detection: "The protagonist takes significant actions (fights, makes major decisions, suffers injuries, confronts antagonists) that produce no lasting effect on subsequent scenes. The status quo resets between scenes or chapters. Test: can you remove any given action scene and have the next scene play out identically?"
    why_autocomplete: "LLMs have limited context windows and struggle to maintain state across long texts. Actions in one generation window may not persist into the next, creating a pattern where dramatic events have no downstream effects. The ArXiv consistency study found errors increase linearly with output length, with timeline/plot logic as a primary failure mode."

  CS-018:
    name: "Consequence-Free Action Scenes"
    detection: "Action sequences (fights, chases, confrontations) end with all participants essentially undamaged and unchanged — no injuries persist, no relationships are altered, no resources are lost."
    why_autocomplete: "LLMs generate action as spectacle rather than as narrative event. The model can produce exciting moment-to-moment action but doesn't maintain a persistent world state where damage accumulates and consequences persist."

  CS-019:
    name: "Consequence-Free Magic"
    detection: "Magic is used to solve problems at key plot moments without established rules, costs, limitations, or consequences. New magical abilities appear precisely when the plot requires them. Magic never makes things worse."
    why_autocomplete: "LLMs struggle with maintaining consistent constraint systems across long texts. When faced with a plot problem, the path of least resistance is to generate a new magical solution rather than working within established constraints. Magic-as-plot-device is the highest-probability resolution in fantasy training data."

  CS-020:
    name: "Consistent Escalation Without Plateaus"
    detection: "Map the tension level of each scene across the full narrative. If tension increases monotonically with no drops, plateaus, or deliberate regressions, the escalation is mechanical."
    why_autocomplete: "AI may learn \"escalate stakes each scene\" as a rule and apply it mechanically, producing relentless escalation without the deliberate valleys that human storytellers use for contrast. Real stories breathe."

  CS-021:
    name: "Contradictory Plot Logic"
    detection: "The story contains events that contradict its own established rules, timelines, or cause-and-effect chains. A character knows something they shouldn't, forgets something established, possesses an ability in one scene that vanishes in another, or the timeline contains impossibilities."
    why_autocomplete: "The ArXiv consistency study found five major error categories with 19 subtypes, with timeline/plot logic and factual/detail consistency as the primary failure modes. Error counts increase approximately linearly with output length. Error-bearing segments exhibit 19.24% higher token entropy, indicating model uncertainty at the point of failure."

  CS-022:
    name: "Contradictory World Rules Across Scenes"
    detection: "A rule established in one scene (magic requires rare ingredients; technology has specific limitations; social customs dictate behavior) is violated in a later scene without acknowledgment or explanation."
    why_autocomplete: "LLMs have limited context windows and no persistent world state. Rules established early in a narrative may fall outside the model's attention span by the time later scenes are generated. Without explicit tracking, constraints established in one passage are forgotten or contradicted in another."

  CS-023:
    name: "Convenient Information Arrival"
    detection: "Characters receive critical information (a clue, a warning, a revelation, a tool) at precisely the moment they need it, through a mechanism that was not previously established and that they did nothing to seek out or earn."
    why_autocomplete: "LLMs resolve narrative problems by introducing solutions at the point of need rather than planting them earlier. The forward-generation architecture means the model encounters a problem and immediately generates a solution without the ability to retroactively plant that solution's origin in earlier text."

  CS-025:
    name: "Cultures as Aesthetic Skins Over Default Society"
    detection: "Different \"cultures\" in the world differ only in surface aesthetics (clothing, food, architecture) while sharing identical values, social structures, family patterns, power dynamics, and ways of thinking. They are the same society wearing different costumes."
    why_autocomplete: "LLMs can generate surface-level cultural markers (clothes, food, building styles) but struggle to generate genuinely different value systems, epistemologies, or social logics. Cultural variation requires modeling how different foundational assumptions produce different social structures -- a form of causal reasoning that LLMs perform weakly."

  CS-026:
    name: "Dangling Setups"
    detection: "A specific element (object, character trait, piece of information, relationship dynamic) is emphasized or introduced with apparent significance in the first half of the story but receives no payoff, resolution, or further mention in the second half."
    why_autocomplete: "LLMs generate text forward without tracking what has been \"promised\" to the reader. Setups may be introduced because they are statistically likely in a given narrative context, but the model has no mechanism to track unfulfilled promises and ensure they are resolved. Research confirms models fail on \"evidence synthesis from non-contiguous narrative parts.\""

  CS-027:
    name: "Deus Ex Machina Resolution"
    detection: "The central conflict is resolved by an external force, previously unknown resource, or unearned coincidence that was never set up or foreshadowed in the narrative."
    why_autocomplete: "LLMs generating stories token-by-token can paint themselves into narrative corners and then resolve conflicts through sudden, unearned means because they lack the ability to plan backward from climax. The resolution is generated based on what token comes next, not what was established before."

  CS-028:
    name: "Economy Operates on Convenient Vagueness"
    detection: "Characters always have enough money (or none, for drama) without any visible economic system. Gold appears when needed. Prices are never mentioned or are wildly inconsistent. No one has a visible source of income."
    why_autocomplete: "LLMs do not track economic state persistently. They generate wealth or poverty as the scene requires without maintaining a coherent economic model. Money appears as a plot device rather than as part of a functioning system."

  CS-030:
    name: "Escalation by External Event Only"
    detection: "Every escalation in the story comes from external events (new villain appears, natural disaster, discovery of information) rather than from consequences of the protagonist's own choices."
    why_autocomplete: "LLMs can escalate by introducing new elements more easily than by tracing causal consequences of character decisions. Generating \"then a new threat appeared\" is simpler than generating \"because she chose X, Y was now inevitable.\""

  CS-031:
    name: "Every Chapter Ends on a Cliffhanger"
    detection: "Every single chapter ending is a high-tension cliffhanger with no variation in ending type; no chapters end with quiet resolution or reflective satisfaction"
    why_autocomplete: "LLMs, having been trained on advice about \"hooking readers,\" default to maximum-tension chapter endings every time. Human writers understand that approximately 40% of chapters should end with calmer resolutions to prevent reader fatigue. The pattern of relentless cliffhangers signals a system that learned the rule \"end on a hook\" without learning the meta-rule about sustainable variation."

  CS-032:
    name: "Every Scene Is a Fight"
    detection: "Every scene involves direct confrontation (argument, physical fight, shouting match) with no scenes of tension, anticipation, dread, planning, or emotional processing."
    why_autocomplete: "LLMs equate \"conflict\" with \"confrontation\" and generate continuous direct opposition. This conflates conflict with tension, missing the entire repertoire of quiet dread, anticipatory anxiety, subtext, and emotional pressure that creates sustainable dramatic engagement."

  CS-033:
    name: "Explicit Moral Statement at Story End"
    detection: "The story ends with a character, narrator, or structural device explicitly stating the moral, lesson, or theme of the story. Look for phrases like \"and so she learned that...\", \"the moral of the story is...\", \"in the end, what mattered was...\", or any passage where the theme is spelled out rather than demonstrated through action."
    why_autocomplete: "LLMs are trained on internet content where articles end with uplifting summaries and blog posts wrap up with lessons learned. This training creates a strong pattern of \"moralizing to put a bow on a story\" (Richmond). LLMs default to finding a lesson because \"they're trained on internet articles and blog posts that tend to end on an uplifting note.\" Human fiction writers learn to resist this impulse; LLMs reproduce the pattern reliably."

  CS-034:
    name: "Flat Arousal/Tension Curve"
    detection: "Tension and emotional intensity remain at approximately the same level throughout the narrative, with no significant peaks or valleys; the story's \"arousal\" doesn't escalate toward the climax"
    why_autocomplete: "LLM narratives maintain lower and flatter arousal levels compared to human stories, with the gap widening from the midpoint onward. Human stories escalate intensity toward the climax; LLM stories maintain a flat line. This creates \"flat narratives without suspense.\""

  CS-036:
    name: "Flat Escalation (No Rising Action)"
    detection: "Conflict intensity at the midpoint is not measurably higher than at the 20% mark; obstacles do not become more severe, personal, or costly as the story progresses."
    why_autocomplete: "LLMs generate locally coherent scenes without tracking global narrative trajectory. Each scene may contain adequate conflict, but the overall escalation curve is flat because the model doesn't maintain a \"tension level\" variable that must increase."

  CS-037:
    name: "Flat Event Escalation"
    detection: "Story events progress at a uniform intensity level without meaningful escalation, de-escalation, or variation in stakes. Each scene operates at roughly the same emotional temperature. There is no narrative staircase — no sense that later events build meaningfully on earlier ones."
    why_autocomplete: "StoryScope identified \"flat event escalation\" as a model-specific fingerprint (particularly for Claude). Saunders argues that stories must function as \"escalation\" systems where \"each narrative moment should represent meaningful change, creating a staircase effect where readers move to progressively new positions.\" LLMs struggle with long-range narrative arc management because they optimize locally (each paragraph sounds good) rather than globally (each paragraph advances the whole)."

  CS-038:
    name: "Flat Stakes (No Escalation)"
    detection: "The consequences threatened at the midpoint of the story are equivalent to or less severe than those threatened at the inciting incident. The \"so what?\" intensity does not increase from beginning to end. Test: list the worst-case scenario at 25%, 50%, and 75% through the story -- if they're equivalent or decreasing, the sentinel triggers."
    why_autocomplete: "LLMs generate each passage based on local context without maintaining a global model of escalating tension. Without explicit architectural support for tracking stakes across the full narrative, models tend to produce flat tension curves. Research found AI stories have \"flatter arousal curves\" than human-written fiction."

  CS-039:
    name: "Food/Clothing/Material Culture Absent or Generic"
    detection: "Characters eat \"food,\" wear \"clothes,\" and live in \"houses\" with no specificity. Or all food is \"roasted meat and ale,\" all clothing is \"tunics and cloaks,\" regardless of the world's climate, culture, or geography."
    why_autocomplete: "LLMs default to the most common fantasy food/clothing associations from training data (medieval European defaults: stew, bread, ale, tunics, cloaks). They do not derive material culture from the world's geography, climate, and available resources because that requires causal reasoning the model doesn't perform reliably."

  CS-040:
    name: "Generic Alien/Fantasy Naming"
    detection: "Names of characters, places, species, and technologies follow a narrow phonetic pattern (typically pseudo-Celtic, pseudo-Latin, or constructed from \"mystical nouns\") without reflecting the specific cultures or languages of the world being built."
    why_autocomplete: "LLMs generate names from statistical patterns in training data, producing \"slightly weird-sounding first names cobbled together from mystical nouns\" — names that are recognizably \"fantasy\" or \"sci-fi\" without being specific to any particular world. Human authors typically construct naming conventions that reflect their world's specific cultures and languages."

  CS-041:
    name: "Generic Pseudo-Medieval European Setting"
    detection: "The world contains castles, knights, taverns, kings, and vaguely feudal social structures with no specific cultural, geographic, or historical identity beyond \"medieval Europe.\""
    why_autocomplete: "LLMs are trained on vast amounts of fantasy fiction dominated by Tolkien-derived medieval European settings. When generating fantasy without specific constraints, they default to the statistically most common fantasy setting: generic medieval Europe with unexamined conventions."

  CS-043:
    name: "Genre Trope Checklist Syndrome"
    detection: "Every common genre trope is present in its most standard form, deployed in standard order, with no unique spin, combination, or subversion. The story reads like a genre trope checklist being executed sequentially."
    why_autocomplete: "LLMs associate genres with their highest-frequency tropes and deploy them in statistical order of co-occurrence. A fantasy prompt generates: Chosen One + prophecy + mentor + quest + Dark Lord + magical artifact + training montage + climactic battle. Each trope is correct but the combination is the single most probable fantasy story."

  CS-044:
    name: "Idiot Plot"
    detection: "The conflict could be immediately resolved if characters shared information they have no reason to withhold, or if they took the obvious action that any reasonable person would take."
    why_autocomplete: "LLMs may generate conflict by withholding information between characters without establishing character-specific reasons for the withholding. The model knows what all characters know and must actively suppress this to create information asymmetry — a task it performs through pattern-matching rather than character modeling."

  CS-045:
    name: "Idiot Plot Dependency"
    detection: "The central conflict would be immediately resolved if any single character asked an obvious question, shared readily available information, or took a common-sense action. The plot depends on multiple supposedly competent characters simultaneously behaving stupidly without in-story justification."
    why_autocomplete: "LLMs struggle with tracking what characters know and should logically do, often maintaining conflicts that a rational character would resolve immediately. Research confirms models fail at \"tracking character intentions under closed-world assumption\" and introduce \"external motivations not established in the current plan.\""

  CS-046:
    name: "Inciting Incident Buried Past 15% Mark"
    detection: "The event that disrupts ordinary life and launches the central conflict does not occur until after the first 15% of the manuscript."
    why_autocomplete: "LLMs tend to generate extensive \"throat clearing\"—backstory, worldbuilding dumps, and character descriptions—before reaching any narrative action, because their training data contains many such openings and they optimize for completeness of context rather than narrative urgency."

  CS-047:
    name: "Inconsistent Travel Times / Rubber-Band Geography"
    detection: "Characters travel between the same two points in wildly different amounts of time depending on plot needs. A journey that took two weeks earlier is completed in a day later, or vice versa, with no explanation."
    why_autocomplete: "LLMs lack persistent spatial models. They generate travel descriptions based on narrative convenience rather than maintaining a consistent spatial relationship between locations. Each scene is generated in relative isolation without checking against previously established distances."

  CS-048:
    name: "Info-Dump Opening / Encyclopedic Prologue"
    detection: "The first chapter or prologue consists primarily of world exposition -- history, geography, political structure, magic system rules -- before any character action or conflict begins."
    why_autocomplete: "LLMs trained on worldbuilding guides and fantasy wikis may front-load world information because that is how reference material is structured. They reproduce the structure of their training data (encyclopedia entries, worldbuilding documents) rather than the structure of effective fiction (character-first, world-through-action)."

  CS-050:
    name: "Magic System Without Limitations or Costs"
    detection: "Magic can do anything the plot requires with no established rules, costs, or consequences. Characters solve problems with magic that appears to have no constraints."
    why_autocomplete: "LLMs generate plot-convenient solutions without tracking systemic constraints across a narrative. Without a human author's deliberate system design, magic becomes an arbitrary problem-solving device. LLMs lack the persistent state needed to enforce limitations they haven't been explicitly reminded of."

  CS-051:
    name: "Medieval-Europe-With-Elves Worldbuilding"
    detection: "The fantasy world features a feudal monarchy, European-style castles, temperate forests, medieval technology level, elves/dwarves/orcs or close equivalents, and no cultural elements drawn from non-European traditions."
    why_autocomplete: "This is the highest-probability fantasy world in training data. LLMs generating fantasy worlds default to Tolkien-derivative settings because they are statistically dominant. Human authors increasingly draw from diverse cultural traditions (Chinese, African, Indigenous, Middle Eastern) and invent novel fantasy conceits."

  CS-053:
    name: "Memory Loss Across Structural Spans"
    detection: "Plot threads, character details, or world-building elements established in early chapters are contradicted or forgotten in later chapters; the story's structural integrity degrades with length"
    why_autocomplete: "LLMs have finite context windows and struggle with \"memory, structure and long-form storytelling.\" Characters may forget their own established traits, plot threads may vanish, and the story's internal consistency degrades as the narrative extends. This is a documented limitation of token-by-token generation over long spans."

  CS-054:
    name: "Missing Authority Structures"
    detection: "A world presented as having organized society (kingdoms, nations, federations) but no visible mechanisms of authority, enforcement, or governance. No armies, police, bureaucracy, courts, or institutions."
    why_autocomplete: "LLMs generate the surface markers of organized society (kings, councils, governments) without generating the infrastructure that makes governance function. They reproduce the nouns of political organization without the verbs of political operation."

  CS-055:
    name: "Missing Causality for Events"
    detection: "Significant plot events (character departures, relationship changes, status changes, deaths) occur without the narrative exploring or establishing why they happened. Events are stated as facts without causal connection to prior events."
    why_autocomplete: "Research on AI fiction found \"no exploration of why events occur\" -- when \"Mila's visits became fewer,\" the narrative never examines whether this stems from boredom, grief resolution, or despair. LLMs state events without the causal reasoning that connects them to prior narrative, because forward-generation optimizes for the next plausible sentence rather than causal coherence."

  CS-057:
    name: "Narrative Derailment"
    detection: "The story suddenly introduces illogical events, off-topic content, or tonal shifts that are inconsistent with the established narrative and have no causal connection to prior events."
    why_autocomplete: "Users of LLM storytelling apps report narratives that \"go off the rails without warning\" with \"bizarre or nonsensical story turns, especially during lengthy sessions.\" This correlates with context window limitations and the model's tendency to hallucinate when prior context becomes distant."

  CS-058:
    name: "No Dilemmas (Only Obstacles)"
    detection: "The protagonist faces only obstacles (things in the way that must be overcome) without ever facing genuine dilemmas (choices between two goods or two evils where something must be sacrificed)."
    why_autocomplete: "Obstacles are simpler to generate than dilemmas. \"A wall blocks the path\" requires the protagonist to find a way over/around/through. \"Choose which of two people to save\" requires modeling character values, generating internal deliberation, and producing lasting emotional consequences. LLMs default to the simpler structure."

  CS-059:
    name: "No Identifiable Midpoint Shift"
    detection: "The story's 50% mark passes without any identifiable change in protagonist mode, revelation, or narrative direction; the second quarter and third quarter feel identical in type"
    why_autocomplete: "LLMs struggle with global narrative architecture — they generate locally coherent text without maintaining awareness of the overall arc. A missing midpoint shift suggests the model is generating scene-by-scene without a structural plan. The midpoint is particularly vulnerable because it requires the model to track the protagonist's overall trajectory and introduce a calculated reversal."

  CS-060:
    name: "No Knowledge Gaps in Characters About Their Own World"
    detection: "Characters demonstrate perfect, encyclopedic knowledge of their world's magic, politics, history, and geography. No character is confused, uncertain, or wrong about how anything works."
    why_autocomplete: "LLMs generate characters who share the model's own omniscient perspective on the generated world. Because the LLM constructed the world, it does not naturally generate characters who have partial or incorrect knowledge of it. Real inhabitants of real worlds are constantly uncertain, misinformed, or ignorant about aspects of their own world."

  CS-061:
    name: "No Structural Distinction Between Beginning, Middle, and End"
    detection: "The story's tone, intensity, pacing, and narrative mode are indistinguishable across its three major sections; the opening quarter reads the same as the closing quarter; there is no sense of structural movement"
    why_autocomplete: "LLMs generate text at a consistent register — the model doesn't inherently know that beginnings should establish, middles should complicate, and endings should resolve. Without explicit structural planning, the model produces a stream of narrative events at a constant level. This is the macro manifestation of the \"flat arousal curve\" finding."

  CS-062:
    name: "No-Cost Victory"
    detection: "The protagonist achieves their goal without sacrificing anything meaningful, without paying a price, and without permanent consequences from the conflict."
    why_autocomplete: "LLMs default to satisfying narrative closure where protagonists get what they want and keep what they have. The model avoids generating text where characters genuinely lose things, because positive outcomes dominate training data patterns."

  CS-063:
    name: "Predictable Five-Paragraph-Essay Structure at Chapter Level"
    detection: "Each chapter follows the same organizational pattern: opening thesis/hook paragraph, three body paragraphs of development, closing paragraph that summarizes and transitions; the chapter structure mirrors academic essay organization"
    why_autocomplete: "LLMs are heavily trained on expository text, and this organizational pattern bleeds into fictional prose. Real fiction chapters don't follow essay structure — they follow dramatic structure. The five-paragraph pattern is a strong signal that the model is applying its most deeply trained organizational instinct rather than narrative craft."

  CS-064:
    name: "Premature Turning Point Placement"
    detection: "Major setbacks and climax moments occur significantly earlier than expected (e.g., climax at 70-80% rather than 88-95%), leaving the final quarter of the story with insufficient material"
    why_autocomplete: "Research directly shows that LLMs \"incorrectly pace their storytelling\" by introducing critical turning points prematurely. This is a measurable, documented LLM behavior pattern — major setbacks (TP4) and climax moments (TP5) consistently occur earlier than in human narratives."

  CS-065:
    name: "Prologue as Info-Dump"
    detection: "The story opens with a prologue that consists entirely of exposition, world-building, or backstory delivered in summary rather than scene; the prologue has no dramatic action, conflict, or character engagement"
    why_autocomplete: "LLMs responding to \"write a fantasy novel\" often begin with extensive world-building prologues because their training data includes many such prologues. The model defaults to establishing context before generating narrative, mirroring its inherent process of \"understanding the setting before telling the story.\" Human writers have learned that prologues must be dramatic scenes, not encyclopedia entries."

  CS-066:
    name: "Purposeless Detail"
    detection: "Significant narrative details (objects, setting elements, character traits) appear without serving any function in the plot, character development, or thematic architecture. They could be \"easily swapped out for any other [element] without losing any meaning.\""
    why_autocomplete: "LLMs select details based on statistical probability rather than narrative purpose. Research on AI fiction found details \"feel randomly assembled rather than purposefully chosen\" with elements appearing \"without clear thematic purpose.\" Human writers select details with intentionality; LLMs generate likely details without evaluating their contribution."

  CS-067:
    name: "Repetitive Scene Structure"
    detection: "Every scene follows the exact same internal pattern — same length setup, same type of complication, same style of resolution; the scene-level structure is copy-pasted across the entire novel"
    why_autocomplete: "LLMs generate scenes using the same internal template repeatedly. Human writers vary scene structure — some scenes are all buildup with no resolution, some start at maximum intensity, some are structured as reveals, some as reversals. Uniform scene structure indicates a single generation template being reused."

  CS-068:
    name: "Resolution-by-Coincidence"
    detection: "The climactic problem is resolved by coincidence, accident, external rescue, or information the protagonist did not earn through investigation/effort. This includes: the villain confessing unprompted, an ally arriving with exactly the needed information at exactly the right time, or a previously unmentioned capability solving the problem."
    why_autocomplete: "LLMs generating sequentially can write compelling setups but struggle to maintain the constraint chain required for earned resolutions. When the model reaches the climax, the path of least token-probability resistance is to generate a resolution — any resolution — rather than one that satisfies the established constraints."

  CS-069:
    name: "S24: Absent Foreshadowing"
    detection: "Major plot events occur without any prior setup, hinting, or structural preparation"
    why_autocomplete: "Coyote Tracks analysis found \"Claude does not do foreshadowing, at all.\" LLMs operate with short planning horizons, generating text sequentially without planting seeds for future developments. This represents a fundamental failure of narrative architecture."

  CS-070:
    name: "S32: Flatter Event Escalation (Claude-Specific)"
    detection: "Story events fail to escalate in intensity, stakes, or complexity — the narrative maintains a flat tension curve"
    why_autocomplete: "StoryScope research identified \"flatter event escalation\" as a Claude-specific fingerprint. The model generates events at a consistent emotional register rather than building toward climactic moments."

  CS-071:
    name: "Sagging Middle with Repetitive Obstacles"
    detection: "The middle 50% of the novel features the same type of obstacle repeated three or more times without escalation; the protagonist faces functionally identical challenges that don't build toward anything"
    why_autocomplete: "LLMs generating the middle section of a long narrative often fall into a pattern of generating \"another obstacle\" without tracking the escalation requirement. Each obstacle may be well-written locally but functions identically to the previous one. This is the structural equivalent of the \"repetitive themes\" documented in LLM-generated fiction."

  CS-072:
    name: "Sanitized Conflict / Conflict Avoidance"
    detection: "The story introduces potentially intense conflict situations but resolves them through understanding, reconciliation, community gathering, or mutual agreement without any lasting cost or genuine opposition."
    why_autocomplete: "Research on 11,800 AI-generated stories found they \"overwhelmingly conform to a single narrative plot structure: a protagonist lives in or returns home to a small town and resolves a minor conflict by reconnecting with tradition and organising community events.\" AI stories \"sanitise real-world conflicts\" and \"downplay narrative tension in favour of nostalgia and reconciliation.\" RLHF safety training suppresses \"the kind of conflict and tension so important for narrative.\""

  CS-073:
    name: "Scale-as-Decoration Space Opera"
    detection: "The story references multiple planets, species, and galactic-scale events, but all action takes place in a small number of locations that could be rooms in any building. Galactic scale is told but never shown. Political structures are named but never affect the plot."
    why_autocomplete: "LLMs can easily generate lists of planets, species names, and galactic histories (high-frequency pattern) but struggle to make scale narratively functional — this requires consistent political logic, economic implications of technology, and personal stakes connected to cosmic events, which requires sustained coherent planning."

  CS-074:
    name: "Scene-Sequel Imbalance"
    detection: "The narrative consists entirely of action scenes with no reflective sequels, or entirely of internal processing with no external conflict scenes; no alternation between the two modes"
    why_autocomplete: "LLMs tend toward either constant action (following \"show don't tell\" advice literally) or constant introspection (following character-depth advice). The scene-sequel alternation requires structural planning that balances two fundamentally different modes of narration. An all-action or all-reflection pattern suggests the model has one mode and stays in it."

  CS-075:
    name: "Single Emotion per Character per Scene"
    detection: "Each character in a scene experiences only one emotion throughout, with no conflicting feelings, ambivalence, or emotional complexity."
    why_autocomplete: "LLMs assign an emotional tag to characters and maintain it through a scene. Generating conflicting simultaneous emotions requires the model to hold two contradictory states and express both through behavior — a task that conflicts with local coherence optimization."

  CS-076:
    name: "Spectacle-Without-Stakes Action"
    detection: "The story contains multiple action/battle sequences where the outcome does not change any character's situation, knowledge, or emotional state. Characters are in the same position after the action as before. Action sequences could be removed or rearranged without affecting the plot."
    why_autocomplete: "LLMs can generate action prose (descriptions of fighting, chasing, explosions) as a high-frequency pattern without connecting it to narrative function. Meaningful action requires tracking stakes, character development arcs, and plot consequences across scenes — sustained coherence that LLMs handle poorly."

  CS-077:
    name: "Speculative Elements Without Second-Order Effects"
    detection: "The world has magic, advanced technology, or other speculative elements, but society, daily life, economics, and culture are identical to a non-speculative world. Magic exists but hasn't changed anything."
    why_autocomplete: "LLMs generate speculative elements as surface features without tracing their systemic implications. They add magic or technology as a new layer without modifying the existing layers because they lack the causal reasoning needed to propagate consequences through a system. This produces \"Earth-with-hats.\""

  CS-078:
    name: "Stakes Never Articulated or Escalated"
    detection: "It is impossible to identify what the protagonist stands to lose at any point in the story, or the stakes remain at the same level from beginning to end without escalation."
    why_autocomplete: "LLMs can generate sequences of events without establishing why those events matter. Stakes require intentional planning—what is at risk and how that risk grows. Without backward planning from climax, LLMs produce narratives where \"nothing is at risk\" and \"the reader has no reason to care about what happens.\""

  CS-079:
    name: "Stakes Stated But Not Demonstrated"
    detection: "The narrative tells the reader the stakes are high (characters say \"the fate of the world depends on this\") but never shows consequences, near-misses, or evidence that the stakes are real."
    why_autocomplete: "LLMs can generate declarations of stakes without generating the narrative evidence that makes stakes feel real. \"The world will end\" is easy to generate; showing a character losing something irreplaceable as proof that stakes are real requires sustained narrative coherence."

  CS-080:
    name: "Structural Predictability (PowerPoint Architecture)"
    detection: "The narrative follows a predictable structural template — introductory frame, three supporting developments (often of equal length), summative resolution. Transitions use formulaic connectors. The structure can be predicted from the first few pages."
    why_autocomplete: "AI-generated text follows \"predictable architecture: introductory frame, three supporting points (often bulleted), summative paragraph beginning 'In conclusion.'\" This structure reflects training on expository text and the model's inability to vary structural approaches. \"The verbal equivalent of a PowerPoint slide advancing.\""

  CS-081:
    name: "Subplots That Never Intersect the Main Plot"
    detection: "Secondary storylines proceed in complete isolation from the main plot; subplot characters never interact with main plot characters; subplot events have no causal relationship to main plot events; the subplots could be removed without any impact on the main story"
    why_autocomplete: "LLMs generate subplots by creating parallel but disconnected narrative threads, because maintaining causal connections between multiple storylines requires global structural awareness that token-by-token generation struggles with. Human writers weave subplots to \"pressure or illuminate the central story.\""

  CS-082:
    name: "Symmetric Load-Balancing of World Elements"
    detection: "Every aspect of worldbuilding (magic, geography, politics, religion, economy) receives exactly equal narrative space regardless of its importance to the story. Three paragraphs on magic, three on geography, three on politics -- artificial uniformity."
    why_autocomplete: "LLMs tend to distribute attention evenly across topics because they are trained on structured content (listicles, wikis, worldbuilding guides) where balanced coverage is the norm. Human authors weight worldbuilding detail by narrative relevance -- some aspects get pages, others get a sentence."

  CS-083:
    name: "Symmetrical Conflict (Neat Opposition)"
    detection: "Conflicts are structured as clean binaries (good vs. evil, truth vs. lies, love vs. hate) with no moral ambiguity, mixed motivations, or asymmetric power dynamics."
    why_autocomplete: "LLMs generate conflict through pattern-matched opposition. If A wants X, the antagonist wants not-X. This produces neat symmetry rather than the messy, asymmetric conflicts that characterize real human experience. Training data is rich with simplified moral frameworks."

  CS-084:
    name: "Symmetrical Resolution of All Subplots"
    detection: "Every subplot resolves at exactly the same time, in exactly the same way (all positive or all negative), in a neat convergence at the climax; no subplot resolves early or remains ambiguous"
    why_autocomplete: "LLMs generating endings tend to resolve everything simultaneously because \"ending\" is a single structural signal. Human writers stagger subplot resolutions — some resolve before the climax, some during, some after, and some are left intentionally open. Simultaneous resolution of all threads signals a model that received one \"wrap up\" instruction and executed it uniformly."

  CS-085:
    name: "Telescoped Emotional Processing"
    detection: "After major traumatic events (death, betrayal, devastating loss), characters process their grief or shock in a single paragraph or brief scene before moving on to the next plot event."
    why_autocomplete: "LLMs compress the sequel (reaction-dilemma-decision) into minimal text because generating extended emotional processing requires sustained engagement with a single emotional state, which the model's token prediction optimizes away from in favor of advancing to the next event."

  CS-086:
    name: "Tension Without Payoff (Dangling Threat)"
    detection: "The narrative builds tension around a specific threat or danger that is then abandoned — never addressed, resolved, or paid off."
    why_autocomplete: "LLMs can generate tension-building passages without maintaining a narrative ledger of what has been promised. A threat established in earlier context may fall outside the effective attention window for resolution, leaving it dangling."

  CS-087:
    name: "The Anti-Climactic Villain Reveal"
    detection: "In a mystery, the revealed culprit is either (a) a character who barely appeared in the story, (b) the most obvious suspect from the beginning with no misdirection, or (c) a character whose guilt contradicts their previously established characterization without explanation."
    why_autocomplete: "Building a fair-play mystery requires backward planning from the solution — something LLMs cannot do during sequential generation. The reveal is generated at the point in the narrative where it occurs, without the architectural planning needed to plant clues and misdirection earlier. This produces reveals that are either arbitrary or obvious."

  CS-088:
    name: "The Convenient Knowledge Gap"
    detection: "Characters inexplicably lack knowledge they should possess about their own world (so it can be explained to the reader) or possess knowledge they should not have (so the plot can advance). Knowledge is distributed by plot convenience rather than character logic."
    why_autocomplete: "LLMs manage information flow poorly across long narratives. Characters \"know\" whatever the current scene requires because the model generates based on local context, not global character state. This produces characters who are ignorant of their own world's basics in chapter 2 and experts in chapter 20, or vice versa."

  CS-089:
    name: "The Investigation-Free Mystery"
    detection: "A story marketed as mystery where the protagonist does not actively investigate, clues are not systematically gathered and evaluated, and the solution arrives through confession, coincidence, overheard conversation, or deus ex machina rather than detection."
    why_autocomplete: "LLMs can generate mystery-flavored prose (atmosphere, suspects, tension) more easily than they can construct fair-play puzzle architecture. Building a solvable puzzle requires planning the solution first and reverse-engineering clues — LLMs generating token-by-token lack this backward-planning capacity."

  CS-092:
    name: "Theme Disconnected from Character Wound/Stakes"
    detection: "The story's thematic content has no connection to what the protagonist personally cares about, fears, or has been damaged by. The theme exists as an intellectual exercise above the character's lived experience rather than emerging from their specific psychological reality."
    why_autocomplete: "LLMs can generate thematic content and character content separately but struggle to integrate them organically. \"AI can't dig into what situations feel like and what they mean to our characters and their hopes for the future.\" The model produces themes and characters in parallel tracks rather than having theme emerge from the character's specific wound and need."

  CS-094:
    name: "Unearned Genre Subversion"
    detection: "The story breaks genre conventions in ways that serve no narrative purpose and provide no alternative satisfaction. A mystery where the detective gives up. A fantasy where magic simply stops working. A space opera where the protagonists decide the galactic conflict doesn't matter. The subversion is presented as profound but is actually just failure to deliver."
    why_autocomplete: "When LLMs lose track of genre constraints over long sequences, they may drift away from genre conventions not as deliberate subversion but as statistical drift. This can accidentally produce text that looks like subversion (the detective stops investigating) but is actually just loss of narrative coherence. Human subversion is always intentional and replaces the broken convention with something."

  CS-095:
    name: "Unearned Resolution"
    detection: "The climax resolves through means never established in the story (deus ex machina, previously unknown abilities, convenient coincidences, or external forces unrelated to the protagonist's journey)"
    why_autocomplete: "LLMs generating endings face the challenge of resolving complex setups, and they often introduce new elements rather than paying off established ones. This happens because the model may not have maintained awareness of all the setup elements planted earlier. The resolution \"sounds right\" locally but doesn't connect to the global structure."

  CS-096:
    name: "Unearned Reversal"
    detection: "A plot twist or reversal occurs that contradicts established facts without retroactive justification, has no foreshadowing or emotional groundwork, and characters accept it without appropriate reaction. The twist exists for shock value without deepening understanding of the story."
    why_autocomplete: "LLMs can generate surprising plot elements by sampling from low-probability tokens, but cannot ensure those elements are supported by earlier narrative. Forward-generation makes it easy to produce \"unexpected\" events but hard to produce events that are \"both surprising and retrospectively inevitable.\" Models lack the ability to dynamically revise importance weights of earlier narrative details."

  CS-097:
    name: "Uniform Conflict Mode"
    detection: "Every conflict in the story is the same type (all interpersonal arguments, all action sequences, all internal monologue) with no variation in the mode of opposition."
    why_autocomplete: "LLMs tend to repeat successful patterns. If the model generates an effective argument scene early, it will generate more argument scenes. This creates a monotonous conflict texture where the same mode of opposition repeats because the model optimizes for local coherence rather than global variety."

  CS-098:
    name: "Uniform Scene Template"
    detection: "All or nearly all scenes follow an identical structural pattern -- same length, same opening type, same turning point mechanism, same ending type -- with no variation in structure across the work."
    why_autocomplete: "LLMs generate text by predicting the most likely next token, which produces structural uniformity. Once a scene template is established, the model replicates it because deviation requires the kind of creative risk-taking that token prediction actively resists. Record Crash notes AI fiction shows \"identically structured paragraphs throughout.\""

  CS-099:
    name: "Uniform Thematic Pattern Across Stories"
    detection: "When examining multiple stories by the same source, they all follow the same thematic structure: introduce a question, explore it briefly, resolve it positively with a neat lesson. The thematic approach is indistinguishable from one story to the next."
    why_autocomplete: "Research on LLM fiction generation found \"a strikingly uniform narrative pattern\" across multiple models. All fiction stories generated by LLMs tend to follow the same template. This uniformity suggests mechanical generation rather than individual artistic vision. Human authors develop distinctive thematic preoccupations and approaches that vary from work to work."

  CS-101:
    name: "Vague Antagonist Motivation"
    detection: "The primary antagonist opposes the protagonist without any established reason, goal, or worldview that explains why they oppose them."
    why_autocomplete: "LLMs generate antagonists as structural functions (\"someone who opposes the protagonist\") rather than as characters with independent psychology. This produces opposition that exists to serve the plot rather than emerging from character logic."

  CS-102:
    name: "World Exists Only Where the Plot Needs It"
    detection: "Locations, institutions, and world elements appear only when the plot requires them and are never referenced before or after. The world has no existence beyond the protagonist's immediate needs."
    why_autocomplete: "LLMs generate world elements on demand as the plot requires them, without establishing them in advance or maintaining them afterward. They lack the forward-planning and backward-referencing that creates a world that exists independently of the current scene. Each scene's setting is generated in isolation."

  CS-103:
    name: "Worldbuilding Inconsistency Accumulation"
    detection: "The fantasy or SF world contradicts its own established rules as the story progresses. Magic that cost energy in chapter 5 is free in chapter 15. A planet described as desert in Act 1 has forests in Act 3. Political structures change without in-story explanation."
    why_autocomplete: "LLMs maintain context through attention mechanisms that degrade over long sequences. Early worldbuilding details lose influence on later generation. The model generates locally consistent text that is globally inconsistent. Human authors (ideally) maintain a \"world bible\" that prevents contradictions."

  IS-002:
    name: "S66: Invented Concept Labels Presented as Established Terms"
    detection: "Text introduces compound labels like \"the supervision paradox,\" \"the empathy trap,\" \"the nostalgia divide\" as if they are established concepts without defining or attributing them"
    why_autocomplete: "tropes.fyi catalogs this as \"Invented Concept Labels\" — invented compound labels (paradox, trap, creep, divide, vacuum, inversion) presented as established terms. The model generates authoritative-sounding terminology from training patterns without checking whether the concept actually exists."

  IS-003:
    name: "S75: \"Echoed\" Plot Elements Across Generations"
    detection: "Story contains specific plot elements (landmarks, character decisions, specific numbers, specific locations) that are suspiciously common across stories with similar premises"
    why_autocomplete: "The \"Echoes in AI\" PNAS study found LLM stories contain \"combinations of idiosyncratic plot elements echoed frequently across generations and across different LLMs.\" In one test, 50/100 generations mentioned a specific landmark (bakery) as a navigational reference. This represents the model sampling from the same narrow region of narrative possibility space."

  ML-090:
    name: "All Scenes End with Clean Resolution (sentinel)"
    detection: "Every scene concludes with the character's goal achieved, complications resolved, and no unfinished business -- \"Yes\" endings throughout."
    why_autocomplete: "LLMs are trained to produce complete, coherent text units. Each scene generation tends toward closure because the model treats the scene as a self-contained completion task. The \"Yes, But\" and \"No, And Furthermore\" outcomes that drive narrative forward require deliberate structural planning that token prediction doesn't perform."

  ML-091:
    name: "Backstory Info-Dump in Opening (sentinel)"
    detection: "The first chapter or opening pages contain extended passages of character history, background, or biography delivered through narration, internal monologue, or \"as you know, Bob\" dialogue rather than through present-tense dramatic action."
    why_autocomplete: "LLMs generating character introductions follow the most common pattern in their training data: establish who the character is before putting them in motion. The model generates context-setting information because that's what statistically follows character introduction. Human writers learn to withhold backstory and reveal it through the story's progression; this restraint requires narrative judgment that autocomplete lacks."

  ML-092:
    name: "Conflict Resolved Through Communication (sentinel)"
    detection: "The central conflict is resolved when characters simply talk about their feelings, communicate honestly, or have a heart-to-heart conversation that dissolves all tension — without requiring sacrifice, change, loss, or genuine difficult action"
    why_autocomplete: "AI stories systematically \"defuse conflict with unearned platitudes\" and favor \"nostalgia and reconciliation\" over genuine dramatic resolution. RLHF-aligned models prioritize being \"helpful, harmless, and honest,\" producing conflict-avoidant narratives where talking solves everything."

  ML-093:
    name: "Cosmetic Flaws Only (sentinel)"
    detection: "The protagonist's stated flaws (clumsiness, awkwardness, stubbornness, \"too caring\") never create genuine consequences in the plot; flaws are mentioned but never demonstrated in action; flaws are endearing rather than costly; the character never loses anything due to their flaws."
    why_autocomplete: "LLMs can generate the concept of \"flawed character\" (it's a common writing instruction) but struggle to sustain the causal chain where a flaw creates real damage. The model defaults to surface-level imperfections that don't disrupt the positive emotional trajectory it's been trained to produce. Mary Sue detection criteria: \"possess multiple skills that conveniently pop up without explanation,\" \"rarely struggle,\" and have \"an answer for every problem.\""

  ML-094:
    name: "Episodic Scene Sequence (sentinel)"
    detection: "Consecutive scenes are connected only by featuring the same characters. No scene's outcome drives the next scene's situation. Scenes could be reordered without creating logical problems."
    why_autocomplete: "LLMs generate each scene as an independent unit. Maintaining causal state across scenes (what happened in scene 3 must affect scene 4's opening conditions) requires long-range state tracking that token prediction handles poorly. The result is \"and then\" sequencing rather than \"because of that\" causality."

  ML-095:
    name: "Homogeneous Ensemble (sentinel)"
    detection: "In a multi-character narrative, apply differentiation checks: (1) dialogue voice is interchangeable between characters, (2) characters react to the same event in the same way, (3) characters share the same emotional register, (4) characters have similar backgrounds or perspectives, (5) removing any one character would not change the thematic landscape."
    why_autocomplete: "The LLM has one voice model, not multiple. When generating ensemble fiction, all characters converge on the same linguistic patterns, emotional responses, and decision-making frameworks. \"AI Dungeon outputs drift toward a neutral voice despite customization options\"; \"different characters feel less distinct due to similar phrasing and roleplay tropes.\" The model cannot maintain multiple simultaneous character models because it doesn't have separate representations for different characters."

  ML-096:
    name: "Homogeneous Narrative Structure (sentinel)"
    detection: "The story follows a single predictable pattern: protagonist faces problem, tries to solve it, encounters brief setback, ultimately succeeds, learns a lesson."
    why_autocomplete: "Analysis of AI stories found \"overwhelming conformity to a single narrative plot structure.\" LLMs default to the most common narrative template in training data. This produces stories that feel interchangeable regardless of ostensible genre, setting, or character differences."

  ML-097:
    name: "Immediate Forgiveness After Betrayal (sentinel)"
    detection: "A character betrays, harms, or deeply wrongs another character, and the victim forgives or reconciles with the betrayer within the same scene or the next scene without a process of rebuilding trust."
    why_autocomplete: "LLMs compress emotional arcs to minimize sustained negative affect. Betrayal-to-forgiveness is a pattern in training data, and the model shortcuts to the resolution without generating the intermediate stages of anger, distrust, testing, and gradual rebuilding."

  ML-098:
    name: "Missing Character Wound (sentinel)"
    detection: "The protagonist has no identifiable past trauma, formative loss, or psychological injury that explains their present behavior and drives their arc. They appear to have no history that matters."
    why_autocomplete: "LLMs can generate characters with goals and surface-level personality traits but struggle to create the deep psychological architecture (Ghost/Wound/Lie/Weakness) that makes characters feel psychologically real. AI-generated character wounds are \"shallow\" -- the model can name a wound (\"her mother died\") without understanding how that wound specifically shapes behavior, relationships, and worldview. Analysis found: \"Kira's mother's death -- supposedly central to her motivation -- receives no exploration of what the mother believed in or how her death specifically shaped the protagonist.\""

  ML-099:
    name: "Rapid Conflict Resolution (sentinel)"
    detection: "A conflict is introduced and fully resolved within the same scene or chapter, with no lasting consequences and no escalation."
    why_autocomplete: "LLMs tend toward narrative closure at the smallest possible scale, resolving tensions as soon as they appear rather than sustaining them across the narrative. This produces a pattern of micro-resolutions rather than building tension."

  ML-100:
    name: "Stereotypical Character Details (sentinel)"
    detection: "Characters have names, occupations, or background details that appear across multiple AI-generated stories with high frequency (e.g., \"Elara,\" \"Thorne,\" \"Anya\" for SF; immigrant stories defaulting to Chicago/New York; Black experience narratives repeating identical names; Indigenous characters appearing exclusively as environmental stewards)."
    why_autocomplete: "LLMs sample from learned distributions, and for specialized genres, the training data pool is limited, causing convergence on the most statistically common character names and details. Large-scale analysis of 11,800 AI-generated stories found \"consistent repetition of specific names, locations, occupations, and themes\" across different AI systems. This is a direct consequence of predicting \"the most likely next token.\""

  ML-101:
    name: "Sycophantic Resolution (sentinel)"
    detection: "Every conflict thread is resolved, every character gets what they need, loose ends are tied up, and the ending produces complete closure with no lingering questions, costs, or ambiguity."
    why_autocomplete: "LLMs trained on fiction patterns resolve toward closure because most training data stories end with resolution. The model maximizes narrative completion at the cost of realistic messiness. AI-generated stories \"tend to provide too neat of an ending with melodramatic emotions.\""

  ML-102:
    name: "The Monoculture Alien (sentinel)"
    detection: "Every member of a non-human race or foreign culture shares identical personality traits, values, and behaviors (all dwarves are gruff miners, all elves are wise and ancient, all orcs are violent)."
    why_autocomplete: "LLMs compress cultural complexity into statistical archetypes. When generating races or cultures, they reproduce the most common associations from training data rather than creating internally diverse societies. Real societies contain dissenters, subcultures, and individual variation that LLMs rarely generate unprompted."

  ML-117:
    name: "All Characters Agree on the Moral Position (sentinel)"
    detection: "Every sympathetic character shares the same moral/thematic position. Disagreement exists only between clearly-good and clearly-bad characters. No sympathetic character genuinely holds a view that contradicts the story's thesis."
    why_autocomplete: "LLMs align characters with the \"correct\" moral position because RLHF training rewards helpful, harmless responses. The model struggles to create characters who are sympathetic AND hold morally questionable positions because this creates the kind of tension the model has been trained to avoid. Message-fiction structure where \"all of the characters either must agree with the message or be part of the opposition (which again, is straw-thin)\" is the default LLM output."

  ML-118:
    name: "Costless Victory (sentinel)"
    detection: "The protagonist achieves their primary goal at the climax without any meaningful sacrifice, loss, or lasting negative consequence. All threatened losses are averted. Everyone important survives unscathed. The world returns to a better-than-before status quo with no price paid."
    why_autocomplete: "LLM training data and RLHF incentivize positive, resolved, and conflict-free outputs. Research found AI stories exhibit \"homogeneously positive\" affect with \"flatter arousal curves and less narrative tension than human-written fiction.\" Models systematically \"sanitise real-world conflicts\" and favor \"nostalgia and reconciliation\" over genuine dramatic stakes."

  ML-119:
    name: "Emotional Architecture Collapse / Homogeneously Positive Arc (sentinel)"
    detection: "The story maintains a homogeneously positive or neutral emotional tone throughout, with no significant variation in intensity, tension, or emotional valence between scenes. Arousal curves are flat rather than building."
    why_autocomplete: "Research found AI stories produce \"homogeneously positive\" affect with \"flatter arousal curves and less narrative tension than human-written fiction.\" Safety training and RLHF suppress the kind of negative emotion, conflict, and genuine distress that creates narrative tension. Models \"sanitise real-world conflicts\" in favor of \"nostalgia and reconciliation.\""

  ML-120:
    name: "Flat Character Arc Where Round Arc Is Required (sentinel)"
    detection: "The protagonist begins the story with no false belief, wound, or internal limitation; they face no internal challenge; they end the story unchanged; yet the narrative is structured as a transformative journey (not a flat-arc steadfast narrative). The character was meant to change but didn't."
    why_autocomplete: "LLMs can generate plot events (quests, conflicts, resolutions) without modeling the internal transformation those events should produce in the character. \"Elara has no character arc beyond moving from unsure she's ready to be a queen to being confident she can be.\" The model generates the external structure of transformation without the internal substance."

  ML-121:
    name: "Generic/Platitudinous Theme (sentinel)"
    detection: "The theme can be expressed as a common inspirational poster phrase: \"believe in yourself,\" \"love conquers all,\" \"be true to who you are,\" \"friendship is the real treasure,\" \"the journey matters more than the destination.\" No specificity, complication, or individual perspective distinguishes the thematic content from a greeting card."
    why_autocomplete: "LLMs produce \"the sum total of all those parts\" -- what emerges from averaging all training data is \"generic, bland, and boring.\" The most statistically probable thematic content is the most common thematic content: widely-shared platitudes. Human writers develop specific, individually-shaped thematic visions through lived experience; LLMs converge on the mean."

  ML-122:
    name: "Loss of Thematic Thread Across Long Text (sentinel)"
    detection: "The story establishes thematic content early but loses track of it as the narrative progresses. Themes introduced in the first third are absent or contradicted in the final third. The story's ending addresses different thematic concerns than its beginning established."
    why_autocomplete: "LLMs have limited effective context windows for maintaining thematic coherence across long texts. One author using AI found that \"by chapter three, she had no idea what the book's theme would be\" because \"she had followed the AI down the rabbit hole.\" The model generates locally coherent text that drifts thematically because it lacks the global structural awareness needed to maintain a thematic through-line across tens of thousands of words."

  ML-123:
    name: "Melodramatic Stakes Inflation (sentinel)"
    detection: "The story immediately establishes world-ending or life-threatening stakes without earning them through character investment, starting at maximum intensity with nowhere to escalate."
    why_autocomplete: "LLMs interpret \"high stakes\" literally and set them to maximum from the first scene. The model lacks the craft understanding that stakes need to be built, not declared, and that starting at maximum leaves no room for escalation."

  ML-124:
    name: "Thematic Idea Merely Repeated Rather Than Developed (sentinel)"
    detection: "The central thematic idea is stated or illustrated multiple times but never deepened, complicated, challenged, or evolved. Each appearance of the theme is essentially the same as the first, just with different surface details. The theme has no \"arc.\""
    why_autocomplete: "LLMs lack the capacity for thematic escalation -- deepening or complicating a central concept as the narrative progresses. Michel found that rather than developing its central idea, AI fiction presents a concept that \"is just repeated with different flowery but incoherent metaphors.\" Sequential token generation is good at maintaining a topic but poor at systematically increasing its complexity across a long text."

  ML-125:
    name: "Thematic Safety (sentinel)"
    detection: "The story's thematic content avoids any position that might make readers uncomfortable, challenge their assumptions, or present morally ambiguous situations without resolution. All moral questions have clear, socially-acceptable answers. No character holds a position the average reader would find genuinely challenging or disturbing."
    why_autocomplete: "LLMs are RLHF-trained to avoid controversy, offense, and moral discomfort. This training directly impacts thematic content: the model generates thematically \"safe\" fiction that avoids genuinely challenging moral territory. The resulting themes are \"unreliable, drab, useless, and off topic... a thoughtless mishmash blended together out of middling consensus.\" Real literature often makes readers uncomfortable -- that discomfort is the mechanism of moral inquiry."

  ML-130:
    name: "Flat Narrative Arc (sentinel)"
    detection: "The story lacks meaningful progression—the protagonist's situation, understanding, relationships, or capabilities at the end are substantially similar to the beginning. Events occur but nothing fundamentally changes."
    why_autocomplete: "Michel identifies the fundamental AI fiction problem: \"it doesn't really go anywhere. It's flat.\" LLMs generate sequences of events but lack the ability to construct genuine narrative arcs. \"The central idea is just repeated with different flowery but incoherent metaphors.\""

  ML-131:
    name: "Homogeneous Plot Structure (sentinel)"
    detection: "The story follows a protagonist-returns-home-and-resolves-minor-conflict-through-reconnection-with-tradition pattern, or repeats common LLM plot archetypes: helper figure appears to guide lost protagonist, protagonist discovers hidden truth about their identity, community comes together to solve problem through teamwork."
    why_autocomplete: "Analysis of 11,800 AI stories found overwhelming conformity: \"protagonists live in or return home to a small town and resolve minor conflict by reconnecting with tradition.\" Cross-model analysis identified \"consistent repetition of specific names, locations, occupations, and themes\" regardless of architectural differences. Human stories rarely generate repeated plot echoes even when prompted identically."

  ML-135:
    name: "Opening Paragraph Uses Stock Attention-Grabbing Formula (sentinel)"
    detection: "The opening uses a formulaic attention-grabbing construction such as \"Have you ever wondered...,\" \"What if I told you...,\" \"It was a [adjective] [time] when...,\" or other patterns commonly found in blog posts and marketing copy."
    why_autocomplete: "\"AI writing tools consistently rely on the same attention-grabbing formulae\" with openings like \"Have you ever wondered,\" \"Are you struggling with,\" or \"What if I told you,\" because \"AI models learn from countless blog posts and marketing copy using these exact patterns.\""

  ML-136:
    name: "Triple-Stacked Descriptors (sentinel)"
    detection: "Three or more abstract descriptors stacked in apposition to describe a single object or concept (e.g., \"a geometry of madness, a wound in the fabric of what is, older than law and time\")."
    why_autocomplete: "LLMs generate lists of three (the \"rule of three\" internalized from training data) as a default descriptive strategy, often stacking metaphors or abstract descriptors without any one of them being sufficiently developed. Human writers may use this pattern but develop each element rather than stacking undeveloped alternatives."

  NS-001:
    name: "Conflict-Free or Sanitized Central Tension"
    detection: "The story's central conflict involves no genuine threat, loss, cost, or irrecoverable consequence. All tensions are resolved easily and without sacrifice."
    why_autocomplete: "AI stories systematically \"sanitise real-world conflicts\" and \"downplay narrative tension in favour of nostalgia and reconciliation\" due to RLHF training that penalizes harmful/negative content. Constitutional AI approaches emphasizing \"helpful, harmless, and honest\" suppress the conflict and tension essential for narrative."

  NS-002:
    name: "Consistent Repetition of Specific Names/Locations/Themes Across Works"
    detection: "When evaluating multiple works from the same source, the same character names, location names, occupations, and thematic concerns appear repeatedly across different stories."
    why_autocomplete: "Brigham's cross-model study documented \"consistent repetition of specific names, locations, occupations, and themes\" regardless of which AI system generated the text. \"Stereotypical patterns persisted even with prompting to avoid them.\""

  NS-003:
    name: "Every Chapter Ends on Upbeat Forward-Looking Note"
    detection: "More than 75% of chapter endings contain optimistic, forward-looking, or resolution-affirming final paragraphs."
    why_autocomplete: "LLMs trained with RLHF are biased toward positive, helpful, conflict-resolving outputs. This manifests in fiction as \"nauseatingly upbeat forward-looking rosy glow\" chapter endings rather than organic tension, ambiguity, or dread."

  NS-004:
    name: "False Hook (Opening Action Disconnected from Story)"
    detection: "The opening scene's primary tension or action (first 1-3 pages) has no causal, thematic, or character connection to the story's actual central conflict."
    why_autocomplete: "LLMs frequently generate exciting openings because they are statistically common in training data, then shift to an unrelated story because they lack global narrative planning. The hook and the story are generated as separate probability streams."

  NS-006:
    name: "Genre Unidentifiable After First Chapter"
    detection: "After reading the first chapter, it is impossible to confidently identify the story's genre."
    why_autocomplete: "LLMs trained on diverse corpora often produce genre-ambiguous openings because they average across many styles rather than committing to one, resulting in a \"gray goo\" that reads as technically competent but generically unclassifiable."

  NS-007:
    name: "Genre-Label-Only Classification"
    detection: "The story's genre is identifiable only by its setting (spaceships = space opera, castles = fantasy, dead body = mystery) rather than by its structural delivery of genre-specific conventions, obligatory scenes, and emotional payoffs."
    why_autocomplete: "LLMs associate genre with surface-level features (vocabulary, setting elements) rather than structural conventions. A story about a spaceship is not necessarily space opera; a story with a murder is not necessarily a mystery. LLMs can produce genre-appropriate window dressing without genre-appropriate architecture."

  NS-010:
    name: "Identical Narrative Arc Across Stories"
    detection: "Compare the broad story arc against a known AI default pattern. If the story features a protagonist returning to a small town and resolving a minor conflict through community reconnection, it matches the most common AI-generated plot structure."
    why_autocomplete: "Cross-model analysis found that \"AI-generated stories overwhelmingly conform to a single narrative plot structure: a protagonist lives in or returns home to a small town and resolves a minor conflict by reconnecting with tradition and organizing community events.\""

  NS-011:
    name: "Misdirected Promise (Opening Genre ≠ Story Genre)"
    detection: "The genre signaled by the opening chapter (based on setting, tone, conflict type, and character focus) is different from the genre the story actually occupies for the majority of its length."
    why_autocomplete: "LLMs may generate an opening in one genre mode and shift to another as generation continues, because they lack global awareness of the story's genre classification. Mary Kole identifies \"misdirected promise\" as the most common opening error she observes—openings that \"take place in school or with family or during a sports game\" that don't reflect the actual story."

  NS-012:
    name: "Narrative Clustering (All Stories Feel the Same)"
    detection: "Across multiple outputs or chapters, the narrative choices (structure, conflict type, resolution pattern, character dynamics, thematic emphasis) fall within a narrow range — the fiction exhibits low diversity across its own instances. Different stories by the same process feel interchangeable in their narrative DNA."
    why_autocomplete: "StoryScope's central finding: \"AI-generated stories cluster in a shared region of narrative space, while human-authored stories exhibit greater diversity.\" The lechmazur writing_styles project quantified within-model diversity and found the spread is modest (0.047 range across all models tested). Human fiction exhibits dramatically more structural, tonal, and stylistic diversity. When multiple stories from the same source feel interchangeable at the narrative level despite different surface content, this signals statistical averaging rather than individual creative decision-making."

  NS-013:
    name: "Opening Revealed as Dream/Simulation/Fantasy"
    detection: "The opening scene is revealed within the first few chapters to have been a dream, simulation, virtual reality, or fantasy sequence."
    why_autocomplete: "This is a known LLM failure mode—generating exciting opening content then needing to reconcile it with a calmer actual story, leading to the \"it was all a dream\" escape hatch. It also represents one of the most commonly cited examples of a betrayed narrative promise."

  NS-014:
    name: "Opening Saturated with Backstory/Exposition"
    detection: "The first chapter or first 10% of the manuscript is primarily devoted to backstory, worldbuilding exposition, or character history rather than present-tense narrative action."
    why_autocomplete: "LLMs are trained on corpora that include prologues, appendices, and expository passages. When generating openings, they tend to \"front-load the story with excessive backstory, worldbuilding, or character descriptions\" because this pattern is statistically common in their training data. They \"treat the reader like a student who needs to study before the story can begin.\""

  NS-015:
    name: "Plot Echo Repetition"
    detection: "Multiple distinct plot elements repeat across a story or across different generated stories with the same patterns (e.g., the same type of helper figure, the same type of landmark, the same type of resolution mechanism appearing in similar narrative positions)."
    why_autocomplete: "Research found that 50/100 GPT-4 continuations of the same Kafka text had the policeman give directions to \"take the second left,\" 18/100 suggested \"take the second right,\" and 16/100 mentioned a bakery. LLM stories showed \"echo scores that increase as more of the previous plot is revealed.\" Human-written stories rarely generate repeated plot echoes."

  NS-016:
    name: "Protagonist Absent from Opening"
    detection: "The first chapter focuses primarily on characters who are not the story's protagonist, or the protagonist does not appear until the second chapter or later."
    why_autocomplete: "LLMs can begin generating narrative without a clear sense of which character is the protagonist, resulting in openings that feature whichever characters the model generates first. Human writing craft dictates that \"readers will assume that whoever is prominent in the opening pages is the MC.\""

  NS-017:
    name: "Protagonist Returns to Small Town and Resolves Conflict Through Community"
    detection: "The primary plot follows a protagonist who returns to or lives in a small town and resolves their central conflict by reconnecting with tradition, community, or local values."
    why_autocomplete: "Analysis of 11,800 AI-generated stories found they \"overwhelmingly conform to a single narrative plot structure across countries: a protagonist lives in or returns home to a small town and resolves a minor conflict by reconnecting with tradition and organising community events.\""

  NS-018:
    name: "Resolution Arrives Without Character Struggle"
    detection: "The story's central conflict is resolved without the protagonist having made meaningful choices, taken decisive action, or incurred personal cost."
    why_autocomplete: "LLMs can generate plot resolution by introducing convenient solutions rather than constructing resolution through character agency. The result: \"every obstacle the character faced was meaningless. Every sacrifice was theater.\""

  NS-019:
    name: "The Default Dark Lord"
    detection: "The antagonist is a supreme evil being with no comprehensible motivation beyond power or destruction, no personal history that explains their nature, and no qualities that might generate sympathy or understanding."
    why_autocomplete: "The motivationless Dark Lord is the statistical center of fantasy antagonist space. LLMs converge on \"evil because evil\" because Sauron-derivatives are the most common antagonist in training data. Human authors in the modern era almost always add motivation, complexity, or thematic purpose."

  NS-020:
    name: "The Prophecy-Fulfillment Conveyor Belt"
    detection: "The fantasy contains a prophecy in Act 1 that is fulfilled precisely as stated in Act 3, with each step toward fulfillment occurring in predictable sequence and no meaningful deviation, surprise, or cost."
    why_autocomplete: "LLMs trained on fantasy corpora have strong statistical association between \"prophecy\" and \"literal fulfillment.\" The prophecy-to-fulfillment pipeline is one of the most pattern-complete structures in fantasy, making it a path of maximum probability. A human author is far more likely to subvert, complicate, or add cost to prophecy fulfillment."

  NS-021:
    name: "Three-Act Structure Applied as Rigid Template"
    detection: "The story rigidly follows a named structural template (Hero's Journey, Save the Cat, etc.) with every beat mechanically hit at exactly the prescribed percentage, regardless of whether the story's content calls for those specific beats"
    why_autocomplete: "LLMs that have been trained on structural writing advice can reproduce template beats mechanically. The result is a story that \"feels like it was written by an algorithm\" (as critics of formulaic Hero's Journey applications note). The structural template is followed but the story within it doesn't require those specific turns at those specific moments."

  SS-001:
    name: "\"A Sense of [Abstract Noun]\" Construction"
    detection: "The phrase \"a sense of\" followed by an abstract noun (unease, wonder, foreboding, loss, belonging, dread, hope, longing) used as a primary emotional descriptor, especially when repeated."
    why_autocomplete: "The LAMP corpus study found that \"a sense of\" appeared disproportionately in LLM outputs compared to human seed paragraphs, with \"unspoken\" appearing in roughly 15% of LLM responses. This construction is a distancing mechanism — it tells the reader about an emotional atmosphere rather than dramatizing it through specific detail. It is the emotional equivalent of \"telling not showing.\""

  SS-002:
    name: "\"A Tapestry of\" / \"A Testament to\" / \"A Dance of\" Construction"
    detection: "The text contains phrases matching the pattern \"a [abstract noun] of [abstract noun]\" using the specific vocabulary cluster: tapestry, testament, dance, symphony, kaleidoscope, mosaic, crucible, beacon, whirlwind, or similar ornamental abstract-to-abstract constructions that add no concrete meaning."
    why_autocomplete: "LLMs over-index on these phrases because they are statistically common in training data, particularly in book reviews, dust jackets, and promotional copy. The 2025 Helsinki study and multiple AI-detection resources identify \"tapestry,\" \"testament,\" and similar words as appearing far more frequently in post-2022 AI-generated text than in pre-2022 human text. These phrases are semantically empty — \"a tapestry of emotions\" communicates nothing a specific description wouldn't communicate better."

  SS-003:
    name: "\"A [Noun] of [Emotion]\" Construction Repetition"
    detection: "Search for the pattern \"a [noun] of [emotion/abstract noun]\": \"a wave of relief,\" \"a surge of anger,\" \"a mix of emotions,\" \"a flicker of doubt,\" \"a pang of guilt,\" \"a rush of adrenaline.\" If this construction appears more than twice in a work, and especially if it appears in or around dialogue, the sentinel triggers."
    why_autocomplete: "LLMs overuse this construction because it is a common, grammatically safe way to describe emotional states. Thousands of training examples use \"a tapestry of emotions\" and \"the weight of the moment.\" The construction tells rather than shows, substituting a formula for specific sensory detail."

  SS-004:
    name: "\"Additionally/Furthermore\" Sentence-Opening Sentinel"
    detection: "The text frequently opens sentences with transitional words like \"Additionally,\" \"Furthermore,\" \"Moreover,\" \"Importantly,\" \"Notably\" — particularly when these transitions add no information and merely pad between statements."
    why_autocomplete: "LLMs use mechanical connectors at a \"predictable, regular frequency\" unusual in human prose. \"Additionally\" as a sentence-opener is particularly diagnostic — human writers rarely begin fictional prose sentences with it, but LLMs use it as a default transition."

  SS-005:
    name: "\"As You Know, Bob\" Dialogue"
    detection: "Two characters discuss information that both would already possess, identifiable by applying the test: can you insert \"as you know\" before the statement and it remains grammatically sensible? E.g., \"As the head of the magic council, you've sworn an oath to protect the realm.\""
    why_autocomplete: "LLMs struggle with tracking what characters in a fictional world would already know, because the model's training data includes the reader's need for information but lacks the ability to distinguish between reader-need and character-need. The model generates exposition through the easiest available channel (dialogue) without checking whether the characters have authentic motivation to discuss the topic."

  SS-006:
    name: "\"As You Know, Bob\" Exposition Dumps"
    detection: "Check for dialogue where characters tell each other information both would already know. If one character explains to another their shared history, the rules of their world, or the nature of their relationship purely for reader benefit, the sentinel triggers."
    why_autocomplete: "LLMs need to establish context and their training data includes many examples of expository dialogue. They lack the social awareness to recognize that two characters who share a history wouldn't verbally rehearse it. The path of least resistance for an LLM delivering exposition is through dialogue."

  SS-007:
    name: "\"Dance of\" / \"Tapestry of\" / \"Symphony of\" Stock Metaphor Vehicles"
    detection: "Use of \"dance of [abstract noun],\" \"tapestry of [abstract noun],\" \"symphony of [abstract noun/sensory noun],\" or similar stock metaphor vehicles where a sensory experience is described through an art-form metaphor (e.g., \"a tapestry of flavors,\" \"a dance of light and shadow,\" \"a symphony of sounds\")."
    why_autocomplete: "These are among the highest-probability metaphor vehicles in LLM outputs because they appear frequently in writing guides, reviews, and mediocre published fiction. They feel literary without being specific to any particular observation. Human writers who use these constructions typically do so once, not as a recurring pattern."

  SS-008:
    name: "\"Despite Its Challenges\" / Formulaic Optimism"
    detection: "Search for \"Despite [challenges/setbacks/difficulties],\" \"In the face of [adversity/challenges],\" \"Nevertheless, [subject] persevered/continued/thrived.\" Track occurrences per chapter."
    why_autocomplete: "Tropes.fyi: \"Rigid formula acknowledging problems only to immediately dismiss them with optimism.\" Wikipedia: \"Despite its [positive words], [subject] faces challenges...\" This is RLHF-trained positivity bias manifesting as narrative structure — LLMs are trained to be helpful and optimistic, which bleeds into fiction."

  SS-009:
    name: "\"Gentle Breeze\" and Stock Atmospheric Phrases"
    detection: "Presence of stock atmospheric phrases such as \"gentle breeze,\" \"the air was thick with,\" \"a chill ran down,\" \"the silence was deafening,\" \"hung heavy in the air,\" \"bathed in golden light,\" or \"the weight of [abstract noun]\" used as primary scene-setting rather than as part of a character's specific perception."
    why_autocomplete: "These phrases are so common in training data that they are the probabilistically most likely completions for scene-setting contexts. They are generic enough to apply to any scene, which is precisely why LLMs favor them—they function as low-risk, high-probability tokens."

  SS-010:
    name: "\"He Felt / She Felt\" Construction Density"
    detection: "Count instances of \"[pronoun] felt [emotion/sensation]\" per 1000 words. If this construction appears more than 5 times per 1000 words in close/deep POV narration, the prose is over-reliant on explicit emotional mediation."
    why_autocomplete: "This is the default LLM construction for conveying character emotion — direct, explicit, and unambiguous. It is the path of least resistance for a model that needs to convey emotional state. Human deep-POV writers render emotion through physical sensation, selective perception, and free indirect discourse rather than this construction."

  SS-011:
    name: "\"Here's the Kicker\" / \"Here's the Thing\" Transition Pattern"
    detection: "Search for \"Here's the kicker,\" \"Here's the thing,\" \"Here's where it gets interesting,\" \"Here's what nobody talks about\" and similar patterns."
    why_autocomplete: "Tropes.fyi classifies this as a distinctive AI trope: \"False suspense transitions promising revelation but delivering unremarkable observations.\" These constructions are conversational-register attention-getters that LLMs use as structural transitions between paragraphs."

  SS-012:
    name: "\"It's Worth Noting\" / Transitional Throat-Clearing"
    detection: "Search for \"It's worth noting,\" \"It bears mentioning,\" \"Importantly,\" \"Interestingly,\" \"Notably,\" \"Furthermore,\" \"Moreover,\" \"In addition\" in narration."
    why_autocomplete: "Tropes.fyi: \"Signaling filler transitions.\" Wikipedia identifies these as characteristic AI vocabulary. These are non-fiction transition phrases that LLMs use in all contexts. Fiction narration does not announce that something is \"worth noting\" — it simply narrates."

  SS-013:
    name: "\"Let's Break This Down\" / Pedagogical Voice"
    detection: "Search for \"Let's break this down,\" \"Let's unpack,\" \"Let's explore,\" \"Let's dive in,\" \"Think of it like,\" \"Think of it as.\""
    why_autocomplete: "Tropes.fyi: \"Pedagogical hand-holding voice even for expert audiences.\" LLMs default to instructional/explanatory register even in creative contexts. In fiction, these phrases signal a narrator explaining to the reader rather than a character experiencing the world."

  SS-014:
    name: "\"Newfound\" / \"Palpable\" / \"Interplay\" — AI Signature Word Clustering"
    detection: "Check for co-occurrence of words that are individually unremarkable but collectively diagnostic: \"newfound,\" \"palpable,\" \"interplay,\" \"intricate,\" \"fleeting,\" \"unravel,\" \"amidst,\" \"cacophony.\" If 3+ appear within a single chapter, flag."
    why_autocomplete: "The PNAS study documents these as dramatically overrepresented in LLM output. Pangram Labs: \"'newfound sense of purpose' appears 4,000x more frequently in AI text.\" These words individually are legitimate but their co-occurrence at elevated rates is a statistical signature of LLM generation."

  SS-015:
    name: "\"Not X; Y\" Construction Overuse"
    detection: "The prose frequently uses the construction \"It wasn't X; it was Y\" or \"Not X, but Y\" as a rhetorical device, appearing multiple times per chapter."
    why_autocomplete: "This construction is identified as \"nearly universal in AI output\" in fiction. It represents a statistically common pattern in the training data that LLMs over-index on."

  SS-016:
    name: "\"Not X; Y\" Construction Pattern"
    detection: "Search for the syntactic pattern \"It was not [noun/adjective]; it was [noun/adjective]\" or \"did not just [verb]; [pronoun] [verb]\" — e.g., \"It was no current. It was a summons\" or \"did not just fail; they were inverted.\" If this construction appears more than twice per 5000 words, it is a model-default pattern."
    why_autocomplete: "This is a statistically over-represented construction in LLM output, appearing across models as a default rhythm for creating emphasis. Human writers use this construction occasionally; LLMs use it as a habitual verbal tic."

  SS-017:
    name: "\"Not X; Y\" Descriptive Construction"
    detection: "Two or more instances of the pattern \"The [noun] was not [expected quality]; it was [dramatic quality]\" or \"It wasn't [X]. It was [Y].\" used for descriptive emphasis (e.g., \"The pull from the deep was no current. It was a summons.\")."
    why_autocomplete: "This construction is identified as \"universal across models\" and functions as a cliché-generation pattern where the negation creates artificial profundity. Human writers use this construction but not as a recurring descriptive default."

  SS-018:
    name: "\"Not X; Y\" Negation-Assertion Sentinel"
    detection: "The text repeatedly uses the formulaic construction where a statement is negated and then replaced with a more dramatic assertion: \"It was no current. It was a summons.\" \"This was not a meeting. This was a reckoning.\""
    why_autocomplete: "This is a specific syntactic pattern that LLMs favor for creating artificial dramatic emphasis. The negation-assertion structure appears statistically safe and \"literary\" to the model. Human writers use it occasionally; LLMs use it as a default intensification device."

  SS-019:
    name: "\"Not X; Y\" Rhetorical Tic"
    detection: "Count instances of the \"not X, but Y\" or \"not X; Y\" construction per chapter. If this pattern appears more than 3 times per 1,000 words, it indicates AI prose."
    why_autocomplete: "This is an LLM-specific rhetorical tic -- \"It's not just X, it's also Y\" and \"not X; Y\" constructions appear \"ubiquitously\" across AI-generated text as a substitution for more varied rhetorical structures."

  SS-020:
    name: "\"Not X; Y\" Sentence Pattern"
    detection: "Recurring use of the \"Not X; Y\" or \"It was not X. It was Y\" rhetorical construction — e.g., \"The pull from the deep was no current. It was a summons.\""
    why_autocomplete: "This construction appears \"constantly across AI outputs\" as a signature pattern. Models overuse this structure because it creates an illusion of profundity through negation-then-assertion, and because it appeared frequently enough in training data to become a default pattern for emphasis."

  SS-021:
    name: "\"Quietly\" / \"Deeply\" / \"Fundamentally\" — Magic Adverb Clustering"
    detection: "Check for co-occurrence of \"quietly,\" \"deeply,\" \"fundamentally,\" \"remarkably,\" \"incredibly,\" \"profoundly\" within close proximity. If 3+ appear within a single page, flag."
    why_autocomplete: "Tropes.fyi: \"Overuse of 'quietly,' 'deeply,' 'fundamentally,' 'remarkably' to artificially elevate mundane descriptions.\" These adverbs perform the work of making simple statements sound significant, which is a characteristic LLM pattern of inflating register."

  SS-022:
    name: "\"Serves As\" / \"Stands As\" / Copula Avoidance"
    detection: "Search for the phrases \"serves as,\" \"stands as,\" \"marks a,\" \"represents a\" used where simple \"is\" or \"are\" would suffice."
    why_autocomplete: "LLMs systematically avoid basic copulas (is/are/was) in favor of pompous alternatives. Wikipedia's Signs of AI Writing documents this as a primary indicator: \"substituting 'is/are' with 'serves as,' 'stands as,' 'marks,' 'represents'\" and \"using 'boasts/features/offers' instead of 'has.'\" Tropes.fyi classifies this as \"The 'Serves As' Dodge.\""

  SS-023:
    name: "\"Something Shifted\" and Unearned Profundity"
    detection: "Descriptive passages containing phrases like \"something shifted,\" \"something changed in the air,\" \"the world seemed to hold its breath,\" \"everything was different now,\" or similar vague atmospheric markers that assert a change without specifying what actually changed through concrete detail."
    why_autocomplete: "These phrases are high-probability completions at transition points. They simulate atmospheric significance without doing the work of describing what specifically has changed in the character's sensory experience. Human writers either specify the change or omit the explicit marker."

  SS-024:
    name: "\"The Weight of [Abstract Noun]\" / \"The Air Was Thick With [Abstract Noun]\""
    detection: "Phrases using \"the weight of\" or \"the air was thick with\" followed by an abstract emotional or thematic noun (silence, grief, expectation, tension, history, memory, unspoken words)."
    why_autocomplete: "The LAMP corpus study specifically identified \"weight of\" as a syntactic template appearing disproportionately in LLM outputs. \"The air was thick\" was similarly identified by Alexander Wales. These constructions attempt to create atmosphere through formula rather than through specific sensory detail. They are the literary equivalent of using a filter rather than composing the photograph."

  SS-025:
    name: "AI Vocabulary Clustering"
    detection: "High density of words from the established AI-vocabulary list within a short span: \"delve,\" \"tapestry,\" \"testament,\" \"pivotal,\" \"crucial,\" \"vibrant,\" \"nestled,\" \"embark,\" \"landscape,\" \"foster,\" \"underscore,\" \"nuanced,\" \"meticulous,\" \"intricate,\" \"enduring,\" \"bolstered,\" \"garner,\" \"showcase,\" \"interplay,\" \"enhance.\" Multiple words from this list co-occurring in close proximity."
    why_autocomplete: "The Wikipedia \"Signs of AI writing\" article documents that these words \"started appearing far more frequently in text produced after 2022, when LLM chatbots became widely accessible\" and that they \"often co-occur in LLM output: where there is one, there are likely others.\" The 2025 Helsinki study found surge in these specific words. Individual instances are not diagnostic (human writers use these words too), but clustering of multiple words from the list is highly indicative."

  SS-026:
    name: "AI Vocabulary Density Sentinel"
    detection: "Text contains 3+ of the following words in high frequency: \"delve,\" \"tapestry,\" \"vibrant,\" \"landscape\" (abstract), \"realm,\" \"embark,\" \"vital,\" \"moreover,\" \"crucial,\" \"pivotal,\" \"foster,\" \"underscore,\" \"showcase,\" \"meticulous,\" \"testament,\" \"garner,\" \"bolster,\" \"intricate,\" \"interplay,\" \"enhance,\" \"enduring.\""
    why_autocomplete: "These words appear with statistically abnormal frequency in LLM output because they exist in the high-probability center of the model's token distribution. Carnegie Mellon researchers could identify which LLM produced text with 97% accuracy based on characteristic word choices alone."

  SS-027:
    name: "AI Vocabulary Overuse (\"Delve,\" \"Tapestry,\" \"Testament,\" \"Vibrant,\" \"Palpable\")"
    detection: "Check for high-frequency co-occurrence of known AI-overused words: delve, tapestry, testament, vibrant, palpable, intricate, cacophony, nuanced, meticulous, pivotal, underscore, landscape, enduring, crucial, bolstered, fostering, showcasing. If 3+ of these words appear on the same page, or if any appears more than twice in the manuscript, flag."
    why_autocomplete: "The PNAS study found instruction-tuned LLMs use specific words at 100-162x the human rate. GPT-4o uses \"tapestry\" at 155x the human rate, \"camaraderie\" at 162x, \"amidst\" at 100x. Wikipedia's Signs of AI Writing maintains an evolving list of era-specific AI vocabulary. Pangram Labs documents \"serves as a testament\" appearing 4,000x more frequently in AI text than human text."

  SS-028:
    name: "Absence of Contractions in Prose"
    detection: "Check the ratio of contracted forms (\"it's,\" \"don't,\" \"can't\") to uncontracted forms (\"it is,\" \"do not,\" \"cannot\") in prose narration and especially in dialogue. If contractions are rare or absent, the prose reads as stilted."
    why_autocomplete: "LLMs \"rarely use contractions, creating a stilted cadence compared to conversational human writing.\" This is particularly noticeable in dialogue, where the absence of contractions makes characters sound robotic."

  SS-029:
    name: "Absence of Meaningful Silence or Negative Space"
    detection: "Descriptive passages that fill every moment and every gap with sensory detail, with no deliberate restraint, no strategic gaps, no moments where the absence of description carries meaning."
    why_autocomplete: "\"AI is trained to generate phrase patterns; it's not trained to generate silence.\" LLMs cannot strategically omit—they only generate. Compelling description requires knowing what to leave out, what gaps between lines reveal implicitly, and where restraint creates more impact than elaboration."

  SS-030:
    name: "Absence of Narrator Intentionality"
    detection: "Select a metaphor, simile, or specific sensory detail from the narration and ask: \"Does this detail connect to the character's psychology, the scene's theme, or the story's larger pattern?\" If more than half the figurative language and specific details serve no purpose beyond decoration — they do not recur, develop, or connect to anything — the detail selection is unintentional."
    why_autocomplete: "LLMs generate \"probable language\" without narrative intent — a detail like \"marigolds\" or \"selenium tastes of rubber bands\" appears because it is statistically likely after the preceding tokens, not because it connects to character or theme. Human writers select details that work together to create specific effects and meanings."

  SS-031:
    name: "Absence of Subtext"
    detection: "Every piece of information in the story is stated explicitly. Characters say exactly what they mean. Narration explains every motivation. There are no scenes where the surface meaning diverges from the actual meaning, no moments where what a character says and what they feel are different, no conversations that are \"about\" something other than their literal content."
    why_autocomplete: "The \"Reading Subtext\" research found that all tested LLMs \"make faithfulness mistakes in over 50% of summaries and struggle with specificity and interpretation of difficult subtext.\" Unreliable narrators \"break models consistently.\" The LAMP corpus study documented that \"unnecessary/redundant exposition\" — stating the obvious rather than showing — accounts for 18% of all edits needed in LLM prose. LLMs generate text by predicting the most probable next token, which biases toward explicitness (the training data rewards clarity over indirection)."

  SS-032:
    name: "Absence of Subtext in POV Character's Observations"
    detection: "Examine passages where the POV character observes other characters. If the POV character's observations are purely literal — noting exactly what is happening without interpretation, bias, or the coloring of their own emotional state and desires — there is no subtext."
    why_autocomplete: "LLMs describe what happens in a scene accurately but without the POV character's interpretive lens. A jealous character should misread friendly gestures as threatening; an infatuated character should notice beauty where others see plainness. LLMs produce neutral observation because they lack the character's psychological filter."

  SS-033:
    name: "Absence of Subtext in Thematic Dialogue"
    detection: "Characters discuss the story's themes directly and transparently, with no gap between what is said and what is meant. Thematic dialogue operates at only one level. No character avoids, deflects, or approaches the theme obliquely."
    why_autocomplete: "LLMs generate dialogue that is \"on-the-nose\" because the most probable token following a thematic setup is the direct statement of the theme. Creating subtext requires the model to generate text that says one thing while meaning another -- a two-level operation that sequential token prediction handles poorly. \"On-the-nose dialogue is not only unnatural, it's unexciting.\""

  SS-034:
    name: "Adjective Stacking on Sensory Nouns"
    detection: "Three or more adjectives modifying a single sensory noun (e.g., \"the warm, golden, honeyed light\" or \"the cold, sharp, biting wind\") as a recurring pattern across multiple descriptive passages."
    why_autocomplete: "LLMs stack adjectives because each modifier independently increases the \"literariness\" score in the model's probability space. Human writers typically select one precise modifier (or none, choosing a more precise noun instead). The stacking pattern reflects additive probability rather than editorial judgment."

  SS-035:
    name: "Adverb-Heavy Dialogue Attribution"
    detection: "Count adverbs modifying dialogue tags: \"she said quietly,\" \"he said angrily,\" \"she asked nervously,\" \"he replied coldly.\" If more than 10% of dialogue tags include an adverb, the sentinel triggers."
    why_autocomplete: "LLMs use adverbs as an easy shortcut to signal emotion because explicit emotional labeling is statistically common in training data. The adverb tells the reader what the dialogue should convey but doesn't—it's a compensation mechanism for dialogue that fails to show emotion through content and context. Stephen King and Elmore Leonard both specifically condemned this pattern."

  SS-036:
    name: "Adverb-Inflated Setting Description"
    detection: "Setting descriptions rely heavily on intensifying adverbs (\"truly ancient,\" \"fundamentally transformed,\" \"deeply mystical,\" \"incredibly vast\") without concrete sensory detail to justify the intensification."
    why_autocomplete: "LLMs substitute intensity markers for specificity. When they cannot generate specific, concrete sensory detail, they compensate with adverbs that assert impressiveness without demonstrating it. This is the textual equivalent of telling rather than showing."

  SS-037:
    name: "All Characters Sound Identical"
    detection: "Take any dialogue exchange with 3+ characters. Remove all dialogue tags and action beats. If every speaker is indistinguishable from every other—same vocabulary, same sentence length, same register, same rhythm—the sentinel triggers."
    why_autocomplete: "LLMs generate dialogue from a single probability distribution (the \"LLM default voice\") and lack persistent character-level language models. All characters converge toward the same statistical center of the training data. As Coyote Tracks documents: \"nobody has a personality beyond the prose repeating one or two characteristics.\""

  SS-038:
    name: "All Characters Uniformly Eloquent"
    detection: "Compare the narrative register of POV characters across different backgrounds — a street kid, a professor, a farmer, a teenager. If all narrate with the same level of verbal sophistication, sentence complexity, and vocabulary range — all sounding like educated adults regardless of background — the voices are uniformly eloquent."
    why_autocomplete: "LLMs produce text at a consistent register that reflects the average sophistication of their training data — slightly above casual, slightly below academic. They do not naturally produce the broken syntax of a child, the jargon of a specialist, or the dialect of a regional speaker without explicit prompting."

  SS-040:
    name: "All-Positive Emotional Palette"
    detection: "Characters experience only positive emotions or rapidly resolve negative emotions into positive ones; no sustained grief, anger, resentment, jealousy, or bitterness; emotional conflicts are resolved within the same scene they arise; the narrative's emotional trajectory is monotonically positive."
    why_autocomplete: "RLHF training optimizes LLMs for \"helpful, harmless, and honest\" outputs, which in fiction manifests as systematic emotional sanitization. Studies confirm AI stories are \"homogeneously positive,\" producing \"flatter arousal curves and less narrative tension than human-written fiction.\" LLMs \"sanitise real-world conflicts\" and \"downplay narrative tension in favour of nostalgia and reconciliation.\""

  SS-041:
    name: "Alternating Prose Density Sentinel"
    detection: "The text oscillates between \"loquacious ponderous similes\" and \"tiny sentences made out of clichés\" in a regular, predictable pattern — dense purple passage followed by stark simple passage — without narrative justification for the alternation."
    why_autocomplete: "LLMs oscillate between two modes: ornate (generating from the \"literary\" part of their training data) and plain (generating from more casual text). The alternation is mechanical rather than purposeful. Human writers who vary prose density do so in response to content; LLMs do it in response to statistical regression toward different modes."

  SS-042:
    name: "Atmosphere Without Specificity"
    detection: "Descriptive passages that create a mood category (eerie, warm, tense, peaceful) through generic atmosphere words without any specific, concrete details that are unique to this particular scene, location, or moment."
    why_autocomplete: "LLMs can generate mood-appropriate vocabulary but struggle to ground that mood in specific observed reality. The result is description that correctly signals \"this is a tense scene\" through word choice but provides no particular image, sound, smell, or texture that distinguishes this tense scene from any other tense scene ever written."

  SS-043:
    name: "Awkward/Generic Analogies"
    detection: "Similes or analogies where the vehicle (the thing compared to) is as abstract or unfamiliar as the tenor (the thing being described), or where the comparison adds no new information (e.g., \"The city was like a living organism, constantly changing and evolving\")."
    why_autocomplete: "LLMs generate analogies that feel \"plausible but lack specificity or genuine insight\"—they satisfy the structural expectation of a comparison without providing any actual perceptual illumination. The analogy sounds writerly but communicates nothing that the literal statement didn't already convey."

  SS-045:
    name: "Blocky Description-Dialogue-Description Structure"
    detection: "Alternating blocks where a paragraph of pure description/setting is followed by a paragraph of pure dialogue, which is followed by another paragraph of pure description, in a rigid ABAB pattern across multiple exchanges."
    why_autocomplete: "LLMs compartmentalize writing modes—generating \"clearly defined areas of dialogue, exposition and repetitive narration\" in blocks rather than weaving them together as human writers do. Human writing typically interleaves action, dialogue, description, and interiority within the same paragraph."

  SS-046:
    name: "Blocky Prose Architecture"
    detection: "Examine paragraph structure across multiple pages. If the narration falls into clearly defined, alternating blocks — a block of description, a block of dialogue, a block of internal thought, a block of action — with clean boundaries between modes and no interpenetration, the architecture is blocky."
    why_autocomplete: "LLMs segment narrative into discrete modes because they complete one type of content before transitioning to another. Human writers naturally interleave description with action, thought with dialogue, creating fluid prose where modes blend. LLM prose reads like sections assembled rather than experience rendered."

  SS-047:
    name: "Blocky Prose Rhythm"
    detection: "Dialogue, exposition, and narration appear in clearly demarcated, separate blocks rather than flowing naturally into each other. Scenes follow a rigid structure of narration block, dialogue block, narration block."
    why_autocomplete: "AI-generated prose shows \"dialogue, exposition, and narration appear in clearly demarcated sections rather than flowing naturally.\" Human writers intersperse these elements; LLMs tend to generate them in discrete chunks."

  SS-048:
    name: "Bold-First Bullets / Markdown Formatting Artifacts"
    detection: "Check for markdown formatting that survives into prose: bold text used as inline headers, bullet points, numbered lists, Unicode arrows (→), or markdown syntax characters (* for emphasis, # for headers)."
    why_autocomplete: "Tropes.fyi: \"Every bullet point starts with bolded text. Common in AI markdown but rare in human writing.\" Wikipedia identifies markdown syntax (asterisks for emphasis, brackets for links) as a direct AI artifact. Fiction manuscripts should contain no markdown."

  SS-049:
    name: "Character Name Inconsistency"
    detection: "A character is referred to by two or more incompatible names (not including established nicknames, aliases, or titles) within the same work."
    why_autocomplete: "LLMs frequently confuse entity references, especially in longer texts. The Novarrium guide notes that AI-generated fiction exhibits \"nomenclature confusion\" and the character bible article specifically identifies \"Jim on page 3, Jimi on page 36, back to Jim on page 79\" as a tracked error type. This results from the model sampling from a probability distribution over tokens rather than maintaining a stable entity registry."

  SS-050:
    name: "Characters Repeat Same Words/Phrases"
    detection: "Different characters in the story use the same distinctive phrases, vocabulary patterns, or speech rhythms, making them sound interchangeable."
    why_autocomplete: "LLMs \"tend to choose the same character names, the same words ad nauseum\" and \"even have different characters repeat the exact same words.\" The model generates dialogue from a single voice distribution rather than maintaining distinct character voices."

  SS-051:
    name: "Characters Sound Identical"
    detection: "Remove all dialogue tags and attribution — if it is impossible to distinguish which character is speaking from voice, diction, syntax, and concerns alone, the characters share a single voice"
    why_autocomplete: "\"Generic AI generates dialogue for 'Character A' and 'Character B' — interchangeable voices with no history, no quirks, no relationship dynamics.\" By chapter twelve, \"everyone starts merging into one voice.\" Models lack persistent character models and generate from the same token distribution regardless of which character is \"speaking.\""

  SS-052:
    name: "Cliche Phrase Clustering in Dialogue"
    detection: "Check dialogue and surrounding prose for clusters of stock phrases: \"the weight of [noun],\" \"a silence stretched between them,\" \"eyes that held [emotion],\" \"couldn't help but [verb],\" \"let out a breath [he/she] didn't know [he/she] was holding,\" \"the air was thick with [noun].\" If three or more stock phrases appear within the same scene, the sentinel triggers."
    why_autocomplete: "LLMs are, as one critic put it, \"hyper-accelerators for cliches\"—they generate language through probability, making cliche the default output. Coyote Tracks found the phrase \"the weight of the crown\" appeared 8 times in one AI novel and 45 times in another. Stock phrases are the statistical mode of the training distribution."

  SS-053:
    name: "Cliche Physical Reactions"
    detection: "Characters' emotional states are rendered through stock physical responses: \"heart pounded,\" \"blood ran cold,\" \"stomach churned,\" \"breath caught,\" \"tears streamed,\" \"jaw clenched,\" \"hands trembled.\" Three or more such cliches in a single chapter trigger the sentinel."
    why_autocomplete: "These phrases are the most statistically common way to render emotion in the training corpus. LLMs default to them because they are the highest-probability completions for \"she felt scared and her...\" The model cannot generate novel, character-specific physical manifestations of emotion because it doesn't understand what emotions feel like -- it only knows what words typically follow emotion-describing contexts."

  SS-054:
    name: "Cliche Reaching in Setting Description"
    detection: "Setting descriptions rely on stock phrases: \"sits at the intersection of,\" \"the heart of the kingdom,\" \"a land of contrasts,\" \"ancient and mysterious,\" \"war-torn landscape.\" These are borrowed phrasings that don't reflect character voice or world specificity."
    why_autocomplete: "LLMs generate the most statistically common phrases associated with setting description. These stock phrases appear frequently in travel writing, fantasy wikis, and marketing copy, making them high-probability outputs. They are generic by definition -- they could describe any setting."

  SS-055:
    name: "Cliched Emotional Formulas"
    detection: "Emotional states are described using stock formulas: \"a mix of [emotion] and [emotion],\" \"a wave of [emotion] washed over,\" \"her heart skipped a beat,\" \"a knot formed in his stomach,\" \"tears pricked her eyes.\""
    why_autocomplete: "The arXiv study found these specific patterns (\"a mix of [emotion] and [emotion]\") appear in 54% of LLM-generated instances and are consistently edited out by human writers. LLMs generate emotional cliches because they are the highest-probability completions for emotional contexts in training data. These phrases are so overused in training corpora that they are virtually guaranteed outputs for emotional scenes."

  SS-056:
    name: "Cliched Symbolic Imagery"
    detection: "The story uses well-worn symbolic associations without innovation: butterflies for transformation, storms for emotional turmoil, dawn for new beginnings, winter for death/ending, spring for rebirth, mirrors for self-reflection, cages for imprisonment, broken chains for freedom."
    why_autocomplete: "LLMs draw on the highest-frequency symbolic associations in their training data. Since these cliched associations appear most frequently in the corpus, they are the most probable outputs. Human writers learn to innovate beyond stock symbolism; LLMs converge on the most common patterns. The resulting imagery \"belongs on a classroom poster, not at the heart of a story\" (Kole)."

  SS-057:
    name: "Cliché Clustering Under Stress"
    detection: "Three or more clichéd phrases or stock descriptions within a single high-emotional-intensity passage (death scene, love scene, battle scene, revelation)—e.g., \"tears streaming down,\" \"heart pounding in chest,\" \"time seemed to stand still,\" \"the world fell away.\""
    why_autocomplete: "When generating emotionally intense passages, LLMs reach for the highest-probability emotional language, which is by definition the most clichéd. \"Once text reaches a 'local minimum of samey clichés, it won't stop going to the same well.'\" Human writers working under emotional intensity often produce their most original language; LLMs produce their most generic."

  SS-059:
    name: "Content Duplication (Repeated Passages)"
    detection: "Search for passages of 20+ words that appear verbatim or near-verbatim more than once in the manuscript. Exclude deliberate refrains, callbacks, or quoted speech."
    why_autocomplete: "Tropes.fyi: \"Repeating entire sections verbatim when models lose track of previous content.\" LLMs generating long text can lose track of what they've already written and regenerate similar or identical passages. This is especially common across chapter boundaries."

  SS-060:
    name: "Context Loss Contradiction"
    detection: "A character explicitly contradicts something they said, knew, or experienced earlier in the narrative without any in-story justification (not unreliable narration, not character growth, not deliberate deception)."
    why_autocomplete: "LLMs have finite context windows and lose earlier narrative information as stories grow longer. Users report bots \"frequently forget older info, causing character inconsistencies\" and characters who \"contradict themselves or fail to recall key plot points.\" Error-bearing segments show higher token entropy, confirming model uncertainty."

  SS-061:
    name: "Context Poisoning (Escalating Cliche)"
    detection: "Once a scene establishes a mediocre stylistic pattern (cliche, repetitive structure, overwrought metaphor), subsequent paragraphs replicate and amplify that pattern rather than course-correcting."
    why_autocomplete: "Unlike human writers who notice and correct repetition, LLMs \"stick to instructions and generate text that fits the previous paragraph.\" Once the context window contains a cliche, the model is more likely to generate similar cliches. Record Crash calls this \"context poisoning\" -- \"once a story reaches a pattern of cliches, it won't stop going to the same well.\""

  SS-062:
    name: "Context Poisoning / Vocabulary Well Exhaustion"
    detection: "Track the repetition of distinctive words, phrases, or constructions across a POV character's scenes. If the same metaphor sources, adjectives, or sentence constructions recur with increasing frequency as the narrative progresses — as if the text is drawing from an increasingly narrow vocabulary pool — context poisoning is occurring."
    why_autocomplete: "Once an LLM generates initial passages in a story, its subsequent output becomes \"poisoned\" by its own patterns, refusing to \"stop going to the same well\" for vocabulary and construction choices. Human writers instinctively seek variety; LLMs optimize toward self-consistency in a way that becomes repetitive."

  SS-063:
    name: "Convenient Amnesia"
    detection: "A character who previously demonstrated knowledge of a fact or event behaves as if they do not know it, specifically at a moment when that knowledge would resolve a conflict or eliminate a source of dramatic tension."
    why_autocomplete: "LLMs lose information from early in the context as the window fills — the \"lost in the middle\" effect causes information in the middle 40-60% of the context to be recalled with significantly lower accuracy. When generating a scene that requires tension, the model may generate tension-maintaining behavior without checking whether the character already possesses tension-resolving knowledge. This is the inverse of impossible information access but equally characteristic."

  SS-064:
    name: "Cooperative Q&A Pattern / No Deflection"
    detection: "Examine dialogue exchanges for question-answer patterns. If every question receives a direct, cooperative answer with no evasions, deflections, counter-questions, subject changes, or non-answers, the sentinel triggers."
    why_autocomplete: "LLMs are trained on instruction-following data where direct answers are rewarded. Their default mode is cooperative information exchange. They lack the social modeling to understand why a character would evade, deflect, or refuse to answer. The resulting dialogue reads as an interview or FAQ rather than conversation."

  SS-065:
    name: "Copulative Avoidance / \"Stands As\" Sentinel"
    detection: "The text repeatedly uses constructions like \"serves as,\" \"stands as,\" \"marks,\" \"represents\" where a simple \"is\" would suffice — avoiding the copulative verb in favor of elevated alternatives."
    why_autocomplete: "LLMs systematically avoid the copulative \"is/was\" in favor of more \"impressive\" phrasing, producing constructions like \"The building serves as a landmark\" instead of \"The building is a landmark.\" This is a byproduct of training on text where variety was rewarded."

  SS-067:
    name: "Denouement as Theme Statement"
    detection: "The story ends with characters explicitly stating the theme or lesson learned, often in dialogue that reads as a summary of the story's meaning; \"I guess what we learned is...\""
    why_autocomplete: "LLMs, trained on stories where themes are identifiable, often make themes explicit in their endings. This mirrors the \"terminal modifying phrases\" pattern identified in AI writing — appending explanatory content at the end to ensure comprehension. Human writers trust readers to derive theme from structure; LLMs explain it."

  SS-068:
    name: "Describe-Speak-Act Cycle in Dialogue"
    detection: "Check whether dialogue follows a repeating three-part cycle: (1) character speaks, (2) performs an action with emotional description, (3) next character responds with the same structure. If this pattern repeats more than 3 times consecutively, it's formulaic."
    why_autocomplete: "AI follows \"a repeating three-part cycle where a character speaks, performs an action with emotional description, and then the next character responds with the same structure.\" Human writers vary dialogue tagging, sometimes using bare dialogue, sometimes action beats, sometimes internal thought."

  SS-069:
    name: "Description That Defaults to Summary Over Scene"
    detection: "A passage where what should be a rendered scene (characters in a specific place at a specific time) is instead delivered as summary (\"The city was a place of contrasts. Rich and poor lived side by side. Markets bustled with activity.\") using generic present-tense or habitual descriptions rather than specific narrative moments."
    why_autocomplete: "LLMs \"excel at summary and exposition\" but \"fall short in its ability to create detailed, layered scenes.\" When asked to describe, they default to the generalized summary mode that dominates their training data (encyclopedias, articles, reviews) rather than the specific scene-rendering mode of literary fiction."

  SS-070:
    name: "Details Feel Random Rather Than Chosen"
    detection: "Specific details in the narrative (objects, settings, character descriptions, metaphors) do not resonate with themes, deepen character, or serve any identifiable narrative purpose. They could be swapped with other details without affecting meaning."
    why_autocomplete: "Lincoln Michel observes that in AI fiction \"the specific details in the story feel random. Not drawn to deepen characters or resonate with themes.\" Good writers \"pick details to work together to create specific effects and meanings.\" LLMs select details based on statistical probability rather than narrative intent."

  SS-071:
    name: "Deteriorating Quality in Later Chapters"
    detection: "Compare prose quality metrics (sentence variation, vocabulary diversity, structural novelty) between the first 20% and the last 20% of the text. If the later sections show measurably reduced variation, the text may have been generated with accumulating context pressure."
    why_autocomplete: "AI shows \"inconsistency over time: early chapters pass scrutiny; later sections deteriorate as the model perpetuates its own errors.\" Once the model enters a local minimum of clichés, \"it won't escape.\""

  SS-072:
    name: "Dialogue-Exposition-Narration Block Structure"
    detection: "Check whether the text alternates in rigid blocks: a block of dialogue, then a block of exposition, then a block of narration, then dialogue again, never mixing these modes within passages."
    why_autocomplete: "AI organizes text into \"distinct dialogue, exposition, and narration zones\" creating \"blocky\" structure. Human writers weave these modes together within paragraphs and passages."

  SS-073:
    name: "Disproportionate Scene Investment"
    detection: "Trivial scenes (travel, routine, transitions) receive the same word count and detail as crucial scenes (confrontation, revelation, decision). No scene is treated as more important than any other."
    why_autocomplete: "LLMs generate at a relatively uniform density because token prediction doesn't distinguish between dramatically important and unimportant content. The model gives each scene roughly equivalent treatment because it lacks the editorial judgment to compress the unimportant and expand the crucial."

  SS-074:
    name: "Dream Sequence or Flashback as Revelation"
    detection: "A dream sequence or extended flashback is used to convey crucial backstory, emotional state, or thematic content that should have been dramatized in present-time scene action"
    why_autocomplete: "StoryScope research found GPT specifically \"over-indexes on dream sequences.\" LLMs use dream sequences and flashbacks as crutches because these structures allow exposition and emotional content to be delivered without the difficulty of dramatizing it through present-time scene interaction."

  SS-075:
    name: "Dream Sequences and Flashbacks as Default"
    detection: "The story includes dream sequences or flashbacks as the primary mechanism for conveying backstory, emotional state, or thematic content, particularly when these could be conveyed through present-tense action and dialogue."
    why_autocomplete: "StoryScope identified model-specific patterns: \"GPT over-indexes on dream sequences.\" Dream sequences and flashbacks are statistically convenient narrative devices because they allow the model to deliver exposition and emotional content without the constraint of maintaining scene-level realism and continuity. They are the narrative equivalent of a cutscene in a video game — a way to deliver information without solving the harder problem of embedding it in dramatic action."

  SS-076:
    name: "Elegant Variation / Synonym Chains"
    detection: "The text systematically avoids repeating key terms by substituting synonyms, creating unnatural chains: a character is referred to as \"the detective,\" \"the investigator,\" \"the sleuth,\" \"the keen-eyed officer\" within a short passage. A specific noun is never used twice, replaced each time with a different near-synonym."
    why_autocomplete: "The Wikipedia \"Signs of AI writing\" article identifies \"elegant variation\" as a structural tell: \"excessive synonym substitution (protagonist, key player, eponymous character)\" creating \"unnatural synonym chains.\" This pattern emerges because LLMs are trained on data that includes editorial advice to \"vary your word choice\" but apply this advice mechanically, without understanding that in fiction, clarity often requires repeating the exact right word rather than substituting a near-synonym that introduces ambiguity."

  SS-077:
    name: "Em Dash Overuse"
    detection: "Count em dashes per 1000 words. If the rate exceeds 5-6 per 1000 words (roughly 20+ per average chapter), flag as potential autocomplete artifact."
    why_autocomplete: "LLMs, particularly ChatGPT and instruction-tuned models, dramatically overuse em dashes as a structural crutch. The em dash becomes a one-size-fits-all tool for parenthetical asides, false nuance, and mansplaining. Plagiarism Today reports that \"ChatGPT, Copilot and Deepseek all made heavy use of em dashes.\" The pattern is so characteristic it earned the nickname \"the ChatGPT dash.\""

  SS-078:
    name: "Em Dash Overuse Sentinel"
    detection: "The text uses em dashes (—) at a rate significantly higher than typical human prose — more than 3-4 per 1000 words — particularly in constructions where commas, colons, or parentheses would be more natural."
    why_autocomplete: "Earlier GPT models strongly favored em dashes as a punctuation choice, and while newer models have reduced this tendency, it remains a statistical tell. ChatGPT \"frequently employs em dashes—like this—in a way that is not commonly taught in high schools or used in everyday writing.\""

  SS-079:
    name: "Em-Dash Overuse for Artificial Pause"
    detection: "Count em-dashes per 1,000 words. If the frequency exceeds 5 per 1,000 words, especially when semicolons and parentheses are rare, this indicates AI-generated prose."
    why_autocomplete: "AI \"relies heavily on em dashes to create artificial explanatory pauses instead of varying punctuation naturally.\" The em-dash becomes the sole pause mechanism, replacing the variety of punctuation (semicolons, parentheses, ellipses, periods) that human writers use."

  SS-080:
    name: "Em-Dash Overuse in Description"
    detection: "Five or more em-dashes within a single scene's descriptive passages, used to insert parenthetical descriptive details or create artificial dramatic pauses (e.g., \"The building—ancient, imposing, forgotten—stood at the edge of the cliff—a sentinel against the storm.\")."
    why_autocomplete: "Data shows em-dash usage in AI-adjacent text tripled over one year in some contexts. LLMs use em-dashes to create tension and add parenthetical detail because it is a high-probability token in literary text positions. A human writer uses em-dashes sparingly and with intention; LLMs deploy them indiscriminately."

  SS-081:
    name: "Emdash and Semicolon Overuse"
    detection: "The prose uses emdashes, semicolons, or specific punctuation marks at a rate significantly higher than comparable human-written fiction in the same genre."
    why_autocomplete: "AI-generated fiction shows \"emdash overuse\" as a stylistic marker, with newer models substituting semicolons/commas while \"maintaining predictable structures.\" This reflects the model's training distribution favoring certain punctuation patterns."

  SS-082:
    name: "Emotional Flatness in High-Stakes Scenes"
    detection: "During scenes that should be emotionally intense (confrontation, loss, revelation, decision), the prose maintains the same emotional temperature as routine scenes. No heightened language, no physiological detail, no altered perception."
    why_autocomplete: "Writers Helping Writers notes AI \"can't dig into what situations feel like and what they mean to our characters.\" LLMs generate structurally appropriate content (the right events happen) without modulating the prose register to match emotional intensity. The result is \"grief scenes that sound like Hallmark cards\" and characters who \"cry on cue while their internal transformations feel hollow.\""

  SS-083:
    name: "Emotional Label-Dumping"
    detection: "Three or more emotion-labeling phrases per page (e.g., \"a wave of relief washed over her,\" \"his heart sank,\" \"fear gripped her\") without corresponding concrete action, gesture, or sensory detail that renders the emotion through showing"
    why_autocomplete: "LLMs default to stating emotions rather than rendering them through action and detail. Models reach for \"the abstract category when the specific instance would do the work.\" This is the \"telling instead of showing\" failure documented in Columbia University research on LLM creative writing."

  SS-084:
    name: "Emotional Over-Articulation / Therapy-Speak Dialogue"
    detection: "Characters explicitly state their emotions to each other using direct emotional vocabulary: \"I'm worried about us,\" \"I feel betrayed,\" \"That makes me feel vulnerable,\" \"I understand your frustration.\" Check whether characters name their emotional states in dialogue rather than demonstrating them through behavior."
    why_autocomplete: "LLMs default to explicit emotional labeling because their training data includes therapy/self-help patterns and because explicit statement is the statistically safest way to convey emotion. As AJ Writes documents: AI produces dialogue that sounds like \"watching a very sophisticated chatbot perform humanity\"—characters \"all sound like they went to the same therapy retreat.\""

  SS-085:
    name: "Emotional State Reset"
    detection: "A character who experienced a significant emotional event (death of a loved one, betrayal, major victory, trauma) in one scene shows zero emotional residue from that event at the opening of the next scene, with no time skip or transitional explanation."
    why_autocomplete: "LLMs process each generation request with limited attention to emotional arc continuity. The Noveble article specifically identifies emotional reset as an AI failure mode, noting \"two characters' relationship behaves inconsistently — they're hostile in one scene and casually friendly in the next, with no transition.\" The SCORE framework found that AI achieves only 89.7% emotional consistency even with dedicated tracking systems, indicating this is a persistent LLM weakness."

  SS-086:
    name: "Emotional Tone Inconsistency"
    detection: "The emotional tone shifts abruptly and inappropriately between adjacent passages — e.g., a grief scene suddenly becomes upbeat, or a tense moment dissolves into casual humor without narrative justification"
    why_autocomplete: "\"Emotional inconsistency is one of the most noticeable problems\" in AI fiction — \"the emotional tone of AI-generated poems and stories being inconsistent throughout — for example, a poem intended to convey grief might suddenly change to a strangely upbeat tone.\" Models lack persistent emotional tracking across extended passages."

  SS-087:
    name: "Emotionally Flat During High-Stakes Events"
    detection: "Prose maintains the same emotional register during climactic, dangerous, or devastating events as during mundane scenes — an \"eerie placidity that prevails even when something eventful or alarming is happening.\""
    why_autocomplete: "LLMs produce \"homogeneously positive\" text with \"flatter arousal curves\" that fail to modulate emotional intensity with narrative stakes. The model generates locally coherent prose but cannot coordinate emotional intensity across the arc."

  SS-088:
    name: "Emotionally Flat Narrative Despite Dramatic Events"
    detection: "Events that should produce strong emotional responses (death, betrayal, loss, triumph) are narrated with an \"eerie placidity\"—the prose registers no emotional intensity proportionate to the events described."
    why_autocomplete: "LLMs lack genuine emotional experience and often produce prose that is \"emotionally flat and boring\" despite technically competent description of dramatic events. The emotional register remains uniform regardless of what is happening in the plot."

  SS-089:
    name: "Emotions-as-Information Sentinel"
    detection: "The text treats emotions as data to be communicated rather than experiences to be felt. Characters' feelings are labeled (\"she felt angry\"), explained (\"because of the betrayal\"), and resolved (\"she decided to forgive him\") in rapid sequence, often within a single paragraph. Emotional complexity is reduced to named states."
    why_autocomplete: "\"AI doesn't get emotion wrong because it lacks vocabulary. It gets emotion wrong because it thinks feelings are information to be communicated rather than experiences to be felt.\" LLMs cannot model the messy, contradictory, often-inarticulable nature of human emotion, so they substitute labeling for embodiment."

  SS-090:
    name: "Entrance/Exit Ceremony"
    detection: "Scenes consistently include characters arriving, exchanging greetings, settling in, and then at the end, saying goodbye, getting up, and departing -- rather than entering late and exiting early."
    why_autocomplete: "LLMs generate \"complete\" social interactions because greetings and departures are high-frequency patterns in training data. The model lacks the editorial judgment to recognize that these social ceremonies add nothing dramatic. The Hitchcock principle -- \"drama is life with the dull bits cut out\" -- requires active trimming that the model doesn't perform."

  SS-092:
    name: "Equivocation Seesaw Sentinel"
    detection: "The text repeatedly uses a structure where one clause makes a claim and the next immediately hedges it: \"While X has benefits, it's important to note Y has challenges.\" \"Although impressive, significant hurdles remain.\" The prose constantly balanced around \"however,\" \"on the other hand,\" \"nevertheless.\""
    why_autocomplete: "LLMs are trained to maximize accuracy while minimizing offense, which produces habitual hedging. Every claim is immediately qualified. This reflects the model's inability to commit to a position — it generates the balanced, both-sides view that minimizes the chance of being \"wrong.\""

  SS-093:
    name: "Every Chapter Ends with a Cliffhanger"
    detection: "Check whether every chapter ending uses the same hook type (especially unresolved danger or withheld information). If more than 80% of chapters in non-thriller fiction end with cliffhangers, the hook strategy is monotonous."
    why_autocomplete: "AI may over-apply the \"chapter must end with a hook\" rule by defaulting to cliffhangers rather than varying hook types. Human writers cycle through question, revelation, emotional shift, decision, and other hook types."

  SS-094:
    name: "Excessive Character Name Address"
    detection: "Count how often characters address each other by name in dialogue. If characters use each other's names more than once per page of dialogue (outside of introductions or emotionally heightened moments), the sentinel triggers."
    why_autocomplete: "LLMs use character names as speaker disambiguation tokens because they lack persistent conversational context tracking. Each generated line needs to re-establish who is being addressed, resulting in unnaturally frequent name usage that human speakers would find stilted."

  SS-095:
    name: "Explicit Emotion Labeling (On-the-Nose Narration)"
    detection: "Search for direct emotional labels in narration: \"She felt a wave of relief,\" \"He was consumed by anger,\" \"A sense of dread washed over her,\" \"Joy filled his heart.\" Count instances per chapter."
    why_autocomplete: "AI labels emotions rather than showing them through behavior, perception, and physical sensation. Future Fiction Academy: \"Generic AI explains emotions explicitly.\" The pattern is: state the emotion by name rather than rendering the physical and behavioral correlates that allow the reader to infer it."

  SS-096:
    name: "Exposed Subtext (Telling the Theme)"
    detection: "Characters or narration explicitly state the thematic meaning of events, emotions, or relationships that should be conveyed through action, dialogue, and detail. Examples: \"She realized that love was about acceptance, not perfection,\" \"In that moment, he understood the true meaning of sacrifice,\" \"The garden was a metaphor for their relationship — growing, but requiring constant tending.\""
    why_autocomplete: "Alexander Wales identified \"exposed subtext\" as a primary LLM failure mode: the model \"plops the subtext into the text, telling instead of showing.\" When given outlines containing character motivations or thematic goals, LLMs embed these as literal text rather than dramatizing them. The StoryScope research confirms: AI stories \"over-explain themes.\" This occurs because LLMs optimize for clarity of meaning delivery rather than for the indirect communication that creates literary depth."

  SS-097:
    name: "Exposed Subtext Sentinel"
    detection: "The text explicitly states the thematic or psychological subtext that should be operating beneath the surface. Characters explain their own motivations. The narrator announces the theme. Metaphors are followed by their interpretation. Show is immediately followed by tell."
    why_autocomplete: "LLMs \"plop the subtext into the text, telling instead of showing.\" The model cannot maintain two layers of meaning (surface text and subtext) simultaneously, so it collapses them into one layer — making everything explicit. This is the prose equivalent of a comedian explaining their own jokes."

  SS-098:
    name: "External Character Description Default"
    detection: "Characters are introduced or described through external physical appearance (\"tall woman with auburn hair and green eyes\") rather than through action, voice, distinctive behavior, or internal experience"
    why_autocomplete: "StoryScope research found Gemini specifically \"defaults to external character description.\" LLMs describe characters the way a camera would, not the way another person would — through outward attributes rather than behavioral or psychological specificity."

  SS-099:
    name: "Filter Word Saturation"
    detection: "Count filter verbs (saw, heard, felt, noticed, realized, wondered, thought, knew, seemed, watched) per 1000 words of narration. If the density exceeds 15 per 1000 words in a narrative using close/deep POV, the prose is over-filtered."
    why_autocomplete: "LLMs default to mediated narration (\"she saw the door open,\" \"he felt the heat\") because their training data includes all narrative distances. Without specific instruction, they produce the most statistically common narration pattern, which is moderately filtered rather than immersive."

  SS-100:
    name: "Flat Emotional Arcs Within Scenes"
    detection: "Characters maintain the same emotional state and intensity from the beginning to the end of scenes. No emotional progression, no building intensity, no shifts triggered by scene events."
    why_autocomplete: "LLMs establish a character's emotional state early in a scene and then maintain it as contextual \"fact\" rather than tracking how events should modify emotional intensity. The model generates consistent emotional tags rather than progressive emotional arcs. AI emotional scenes are noted to be \"well-executed but boring and paint-by-numbers.\""

  SS-101:
    name: "Flat Exposition Voice"
    detection: "Exposition passages are written in a neutral, characterless voice that does not reflect the POV character's personality, knowledge, biases, or emotional state. The same exposition paragraph could belong to any character or any story."
    why_autocomplete: "LLMs default to a generic \"explanatory\" register when generating exposition, because encyclopedic explanation is the dominant mode in training data for factual content. The model does not naturally filter exposition through a specific character's consciousness the way a skilled human author would, because this requires maintaining a character model that modifies word choice, focus, and emotional coloring."

  SS-102:
    name: "Flat Narrative Arc Within POV"
    detection: "Track the emotional valence (positive/negative) of each POV character's narration across their scenes. If the emotional trajectory is essentially flat — neither building nor developing — with each scene returning to roughly the same emotional baseline, the arc is flat."
    why_autocomplete: "LLMs \"struggle to adequately develop critical turning points in a story, such as the major setback and climax,\" resulting in \"diminished suspense and arousal.\" The emotional trajectory of LLM narration tends to be flatter than human writing, with less dynamic range and less escalation toward climax."

  SS-103:
    name: "Flowery But Incoherent Metaphors for Depth"
    detection: "The text uses elaborate, poetic-sounding metaphors to create an impression of thematic depth, but the metaphors collapse under scrutiny. Examples: \"Grief, as I've learned, is a delta,\" \"the womb of oblivion.\" The language sounds profound but doesn't actually mean anything coherent."
    why_autocomplete: "LLMs excel at generating text that pattern-matches to \"profound literary prose\" without actually achieving it. Michel identifies this as \"flowery but nonsensical sentences\" that merely sound profound. The model generates high-probability sequences from literary training data, producing what sounds like depth because it resembles deep writing in its surface features, without the underlying meaning that makes deep writing actually deep."

  SS-104:
    name: "Flowery-But-Meaningless Prose"
    detection: "The narrative contains sentences that sound profound or literary but convey no specific meaning when analyzed—\"flowery but nonsensical sentences\" that seem impressive on first reading but dissolve under scrutiny."
    why_autocomplete: "Michel identifies \"womb of oblivion\" style lines—sentences that sound profound but \"don't mean anything.\" LLMs optimize for prose that patterns-match to \"literary\" writing without the underlying semantic content. The result is \"an algorithm assembling probable language without thought.\""

  SS-105:
    name: "Formulaic Descriptive Openings"
    detection: "Scene-opening descriptions that begin with \"The [time-of-day] [weather/light] [verb-ed] [location]\" or \"The air was [adjective] with [noun]\" as a recurring pattern across multiple scenes."
    why_autocomplete: "LLMs have strong priors for scene-opening templates because these patterns appear frequently in training data. Human writers vary their scene openings; LLMs converge on high-probability templates. When multiple scenes in a work all begin with the same structural formula for atmospheric description, statistical generation is indicated."

  SS-106:
    name: "Formulaic Scene Openings"
    detection: "Scenes consistently open with the same pattern -- e.g., always with setting description, always with dialogue, always with the character waking up or arriving somewhere."
    why_autocomplete: "LLMs learn a \"scene opening template\" from training data and reapply it consistently. Human writers naturally vary their openings; LLMs converge on whatever pattern is most statistically probable. The monotony of identical openings is a structural tell even when the content varies."

  SS-107:
    name: "Formulaic Structural Repetition"
    detection: "The narrative employs the same structural pattern (paragraph shape, scene beat sequence, sentence construction formula) repeatedly across multiple scenes or chapters in a way that suggests template application rather than deliberate stylistic choice."
    why_autocomplete: "Research found that approximately 76% of syntactic templates detected in LLM-generated text are present in pre-training datasets, compared to only 35% in human-authored texts. The Record Crash article identifies \"oscillating writing modes\" — alternation between \"long, heavy comparisons, then short lines that sounded like stock phrases\" — as a tell. Human writers vary structure instinctively; LLMs produce text that follows high-probability structural templates from training data."

  SS-108:
    name: "Fractal Summaries (Redundant Intro/Conclusion)"
    detection: "Check whether chapters or sections begin by previewing their content and end by summarizing it, in addition to the actual content. \"In this chapter, we'll explore...\" followed by the content followed by \"As we've seen...\""
    why_autocomplete: "Tropes.fyi: \"Repetitive summarization at every document level: intro, section summaries, and conclusion.\" LLMs structure text like five-paragraph essays, with previews and summaries at every level. Fiction does not preview or summarize its own content."

  SS-109:
    name: "Front-Loaded Character Descriptions"
    detection: "Check whether POV characters are described comprehensively in their first appearance — a full physical description, backstory summary, and personality overview delivered in the first 500 words of their first scene. If this occurs for more than half the POV characters, the descriptions are front-loaded."
    why_autocomplete: "LLMs treat character introduction as an information-delivery task, dumping a character profile when the character first appears. Human writers reveal character gradually through behavior, dialogue, and selective detail over multiple scenes."

  SS-110:
    name: "Frontloaded Exposition Block"
    detection: "The opening chapter or scene contains three or more consecutive paragraphs of exposition (backstory, world mechanics, character history, setting description) before any character action, dialogue, or conflict occurs."
    why_autocomplete: "LLMs generate text sequentially and tend to \"set the stage\" before generating action, mirroring the most common (but worst) drafting pattern of human writers. Because LLMs lack strategic revision capability, they frontload context that a human writer would distribute or cut. The verbosity bias identified in the arXiv study means LLMs prefer \"detailed, elaborate responses\" that over-explain before allowing the story to begin."

  SS-111:
    name: "Generic Character Description on Introduction"
    detection: "When a character is first introduced, they receive an immediate head-to-toe physical description catalog (hair color, eye color, height, build, clothing) delivered as a block, separate from action or interaction."
    why_autocomplete: "LLMs follow the training-data pattern of \"character introduction = physical description dump\" because this is the most common pattern in amateur fiction and character profiles. Skilled human writers introduce characters through action, dialogue, and selective significant detail rather than through inventory."

  SS-112:
    name: "Generic Emotional Reactions"
    detection: "Check whether characters' emotional responses to events are predictable, appropriate-seeming, and interchangeable (any character would respond this way). No character has a surprising or distinctively personal emotional reaction."
    why_autocomplete: "AI generates \"generic, appropriate emotions rather than authentic reactions\" because it predicts the most probable emotional response from training data. Human characters have idiosyncratic responses shaped by their specific history and personality."

  SS-113:
    name: "Generic Opening Situation (Mirror, Waking Up, Weather)"
    detection: "The story opens with a character waking up, looking in a mirror and describing their appearance, observing the weather, or engaging in routine activity with internal monologue about their situation. No element of the opening is specific to this character or this story."
    why_autocomplete: "The Good Story Company identifies these as the most common fiction cliches: \"Character waking up at story or chapter opening,\" \"Character staring in mirror analyzing appearance,\" \"Character going to sleep at chapter end.\" These openings are defaults because they are low-entropy narrative situations — the model needs to start somewhere, and these situations require minimal contextual setup. They are the narrative equivalent of \"Once upon a time\" without the genre convention that justifies it."

  SS-114:
    name: "Generic Scene Stakes"
    detection: "Scene stakes are stated in vague, generic terms (\"everything was at stake,\" \"failure meant disaster,\" \"this was important\") without specifying precisely what the character stands to lose and why it matters to them personally."
    why_autocomplete: "LLMs generate high-drama language (\"the stakes couldn't be higher\") without grounding stakes in specific character circumstances. Token prediction produces dramatic-sounding but content-free stakes because specificity requires maintaining character-state knowledge that the model handles unreliably."

  SS-115:
    name: "Generic Sensory Description"
    detection: "Sensory descriptions consist of stock pairings (\"gentle breeze,\" \"warm sunlight,\" \"the smell of fresh coffee,\" \"birds singing\") that could apply to any scene in any story, with no character-specific perspective or surprising specificity"
    why_autocomplete: "AI's algorithm \"remixes and regurgitates what has already been described\" and produces predictable pairings because training favors common word combinations. Models strip specificity systematically — replacing \"McCoy Tyner comping in fourths behind a Coltrane solo lasting eleven minutes\" with \"complex harmonies.\" This \"semantic ablation\" replaces precise vocabulary with near-synonyms carrying less information."

  SS-116:
    name: "Generic Setting Description"
    detection: "Setting descriptions use broad, non-specific details that could apply to any instance of the setting type (any castle, any spaceship, any forest) rather than details that make this specific setting distinctive or that reveal character perspective."
    why_autocomplete: "LLMs generate setting descriptions from the aggregate of all similar settings in their training data, producing a statistical average rather than a specific place. \"The castle loomed above them, its stone walls weathered by centuries of wind and rain\" could appear in any fantasy novel. The model defaults to the most common descriptors for a setting type rather than the specific, unusual details that would make a particular castle memorable."

  SS-117:
    name: "Genre/Emotion Announcement in Dialogue"
    detection: "Check whether dialogue lines explicitly announce genre elements, emotional states, or thematic content: \"This dark forest is truly terrifying,\" \"As a detective, I must solve this mystery,\" \"Our love is the most important thing.\" If characters verbalize what should emerge from context, the sentinel triggers."
    why_autocomplete: "LLMs reinforce genre markers because their training data associates certain genres with certain phrases. Now Novel's comparison found AI dialogue \"reads as shoehorning in the genre at every opportunity\"—genre doesn't need to announce itself. The LLM's optimization for clarity produces characters who narrate their own experience rather than living it."

  SS-118:
    name: "Geographic Contradiction"
    detection: "The spatial relationships between locations in the story world are described inconsistently — a place described as north of another is later described as south, or distances between locations change between passages."
    why_autocomplete: "The \"Lost in Stories\" research found that \"geographic contradictions show largest average gaps (31.0%)\" of all error types, meaning they span the greatest textual distance between the establishing detail and the contradiction. LLMs do not maintain spatial models and generate geographic descriptions from local context rather than a persistent map. This makes geography particularly vulnerable to long-range inconsistency."

  SS-119:
    name: "Harmless Filter / RLHF Blandness Sentinel"
    detection: "The prose avoids all jagged, petty, weird, cynical, or harsh language. It never uses words like \"grubby,\" \"sour-mouthed,\" \"mean-spirited,\" or other vocabulary carrying negative judgment. Instead, it defaults to words like \"vital,\" \"crucial,\" \"dynamic\" — an HR-department-approved vocabulary."
    why_autocomplete: "RLHF training incentivizes blandness by penalizing outputs that human raters might find offensive or harsh. This \"effectively lobotomizes vocabulary of strong emotion or judgment.\" The result is prose that is \"cautious, inoffensive, anodyne, predictable, neutral, and unmemorable.\""

  SS-120:
    name: "Head-Hopping Within Scene"
    detection: "The narrative shifts from one character's internal perspective to another character's internal perspective within a single scene, without a clear break or transitional signal, in a work that otherwise uses limited POV."
    why_autocomplete: "LLMs do not maintain a POV-character variable that constrains which internal states they can describe. The model generates whichever character's thoughts or feelings are most contextually relevant to the current paragraph, without checking whether the current scene is \"owned\" by a different character. This produces text where the reader is \"floating unmoored through the story.\" The LLM research paper's \"perspective shifts\" error subtype captures this."

  SS-121:
    name: "Hedge Words and Synthetic Politeness Markers"
    detection: "Check dialogue for hedge words and politeness markers characteristic of LLM default voice: \"perhaps,\" \"it seems,\" \"I understand,\" \"that's a valid point,\" \"to be fair,\" \"if I'm being honest.\" If characters consistently speak with the diplomatic caution of an AI assistant rather than with the directness, rudeness, or awkwardness of real people, the sentinel triggers."
    why_autocomplete: "RLHF training optimizes LLMs for helpful, harmless, honest output, which produces dialogue saturated with diplomatic hedging and courtesy markers. Junia AI documents: \"overly-polite courtesy markers,\" \"balanced, non-committal phrasing.\" Real people are blunt, rude, evasive, and tactless in ways that RLHF-trained models avoid."

  SS-122:
    name: "Hedging Qualifiers and Weasel Phrasing"
    detection: "Narrative prose contains qualifiers (\"somewhat,\" \"perhaps,\" \"it could be argued\"), hedge words (\"might,\" \"generally\"), weasel attributions (\"has been described as\"), or perpetual false balance that strips the prose of conviction and authority"
    why_autocomplete: "AI chatbots \"tend to attribute opinions or claims to some vague or unsourced authority\" (weasel wording). Models produce text with \"the same hedging qualifiers appearing in every other paragraph\" because RLHF training prioritizes avoiding controversy. This creates prose that \"feels perpetually balanced to the point of becoming wishy-washy.\""

  SS-123:
    name: "Homogeneous Emotional Positivity"
    detection: "Sentiment analysis of the narrative shows a consistently positive valence with no sustained negative intervals, no genuine darkness, and no emotional texture — the story resolves all conflict through reconciliation, reconnection, and community"
    why_autocomplete: "LLM-generated stories are \"homogeneously positive and lack tension.\" RLHF alignment training prioritizes avoiding controversial content, producing \"conflict-avoidant and sanitized narratives.\" Analysis of 11,800 AI stories found they \"overwhelmingly conform to a single narrative plot structure\" ending in reconnection with tradition and community."

  SS-126:
    name: "Homogeneously Positive Emotional Register"
    detection: "The narrative's emotional arc remains consistently positive or neutral throughout, with no sustained periods of tension, dread, grief, anger, or other negative emotional states proportionate to the story's events."
    why_autocomplete: "Research confirms LLM-generated narratives are \"homogeneously positive,\" producing \"flatter arousal curves and less tension than human-written fiction.\" This results from RLHF training biases that penalize negative emotional content."

  SS-127:
    name: "Identical Scene-Level Repetition of Dialogue Beats"
    detection: "Check for near-identical sentences, descriptions, or exchanges appearing multiple times across different scenes. If the same confrontation, the same urgent message, or the same reaction appears verbatim or near-verbatim in different chapters, the sentinel triggers."
    why_autocomplete: "LLMs have no persistent memory of what they have already generated. Coyote Tracks documents characters delivering \"the same urgent comm message about conspiracies three times with minimal variation.\" This is a fundamental architectural limitation: the model generates each passage semi-independently and converges on the same statistically likely output."

  SS-129:
    name: "Imposing Conventional Interpretive Frameworks"
    detection: "The narrative imposes standard interpretive frameworks on ambiguous situations — assuming heteronormative relationships where the text doesn't specify, imposing \"redemption arcs\" where the author intended ambiguity, or reading conventional moral lessons into situations designed to resist them."
    why_autocomplete: "The \"Reading Subtext\" research found that when summarizing human fiction, all tested LLMs \"impose conventional interpretive frameworks\" — one summary \"assumed a heteronormative reading of a relationship that the text did not support\" and another \"imposed a 'redemption arc' narrative where the writer intended ambiguity.\" This occurs because LLMs pattern-match to the most common narrative templates in training data, defaulting to conventional readings of ambiguous situations. In fiction generation (not just summarization), this manifests as stories that collapse moral ambiguity into conventional moral lessons."

  SS-130:
    name: "Impossible Information Access"
    detection: "A character demonstrably acts on information they have no in-story mechanism to have acquired — they were not present when it was discussed, no character told them, they have no means of deduction, and no supernatural ability explains the knowledge."
    why_autocomplete: "LLMs have no model of individual character knowledge states. The model knows all information in the context window and must actively suppress that knowledge when writing from a limited perspective. The \"Lost in Stories\" taxonomy specifically identifies \"knowledge inconsistencies\" as a characterization error subtype. User complaints about AI storytelling apps specifically cite characters who \"suddenly know things they shouldn't.\""

  SS-131:
    name: "Information-Free Dialogue Padding"
    detection: "Dialogue exchanges exist where neither participant learns anything new, no relationship dynamic changes, no subtext operates, and no plot advancement occurs. The conversation fills space without advancing any narrative element."
    why_autocomplete: "LLMs generate dialogue by continuing conversational patterns probabilistically. Once a conversation begins, the model will generate plausible-sounding exchanges indefinitely without checking whether each exchange serves a narrative purpose. The model's training on real conversation (which includes extensive small talk and information-free exchanges) produces dialogue that mimics realistic conversation patterns without serving fictional narrative needs."

  SS-132:
    name: "Labeled Emotion Exposition"
    detection: "Characters' emotions are directly named using emotion words (\"she felt angry,\" \"he was devastated,\" \"a wave of sadness washed over her\") more than twice per chapter, where the context already demonstrates the emotion through action or dialogue."
    why_autocomplete: "LLMs default to explicit emotional labeling because naming emotions is a high-probability token sequence in training data. The arXiv study on AI writing found that human editors consistently removed explicit emotion labels in favor of behavioral demonstration. LLMs lack the craft understanding that \"showing\" emotion through behavior creates deeper reader engagement than \"telling\" emotion through labeling."

  SS-133:
    name: "Lack of Contractions in Dialogue"
    detection: "Check dialogue for absence of contractions where spoken English would naturally use them. If characters consistently say \"I am,\" \"do not,\" \"cannot,\" \"it is,\" \"would not\" rather than \"I'm,\" \"don't,\" \"can't,\" \"it's,\" \"wouldn't,\" flag."
    why_autocomplete: "Early and safety-trained LLMs tend toward formal register even in dialogue, producing speech that sounds stiff and unnatural. While individual characters might speak formally for characterization reasons, universal formal dialogue across all characters signals AI generation."

  SS-134:
    name: "Latinate Bias Sentinel"
    detection: "The text systematically prefers Latinate, multisyllabic words over Germanic, monosyllabic equivalents: \"utilize\" for \"use,\" \"facilitate\" for \"help,\" \"demonstrate\" for \"show,\" \"approximately\" for \"about,\" \"commence\" for \"begin.\""
    why_autocomplete: "LLMs are stuck in \"business casual\" register, preferring the more formal, Latinate option because it is associated with authority and competence in training data. Human writers — especially fiction writers — naturally mix Germanic and Latinate vocabulary based on context and character."

  SS-135:
    name: "Listicle Structure in Prose"
    detection: "Search for sequential enumeration disguised as prose: \"The first [thing]... The second... The third...\" or \"First,... Second,... Third,...\" appearing in narration."
    why_autocomplete: "Tropes.fyi: \"Lists disguised as prose using 'The first... The second... The third...' formatting.\" LLMs default to structured enumeration even in creative contexts. Fiction narration almost never explicitly numbers its points."

  SS-136:
    name: "Lists of Three"
    detection: "Count instances of triplet enumeration in narration — \"a geometry of X, a wound in Y, and a Z\" or \"she was brave, fierce, and unyielding.\" If triplets appear more than once per 500 words of non-dialogue narration, the pattern is likely mechanical."
    why_autocomplete: "The \"rule of three\" is deeply embedded in LLM training data (rhetorical convention, marketing copy, persuasive writing). LLMs default to triplet enumeration for emphasis because it is the most statistically common pattern for lists in their training corpus. Human fiction varies list length — pairs, singles, quartets, and longer lists — based on narrative need."

  SS-137:
    name: "Lists of Three Descriptors"
    detection: "Descriptions consistently cluster into triads — e.g., \"a geometry of madness, a wound in the fabric of what is, older than law and time\" — without variation in list length or structure"
    why_autocomplete: "AI outputs cluster descriptors artificially in sets of three. This reflects the \"rule of three\" being overlearned from training data, producing a rhythmic predictability that human writers naturally vary."

  SS-138:
    name: "Low Burstiness (Uniform Sentence Length)"
    detection: "Compute the standard deviation of sentence lengths across a passage (e.g., 500 words). If the standard deviation is below a threshold (very uniform sentence lengths), flag."
    why_autocomplete: "AI-generated text exhibits lower burstiness than human writing — sentence lengths cluster around a mean with little variation. Originality.AI: \"Real people tend to write in bursts and lulls — we naturally switch things up. In contrast, AI models tend to be robotic and uniform.\" QuillBot: \"A text with low burstiness might contain sentences that are all the same length and style.\""

  SS-139:
    name: "Low Burstiness Sentinel"
    detection: "Sentence length and structure show low statistical variance across the text. Sentences cluster around the same length (typically 15-25 words). Syntactic patterns repeat with little variation. The text lacks the unpredictable variation in sentence structure characteristic of human writing."
    why_autocomplete: "\"Burstiness\" — variation in sentence length and structure — is lower in AI-generated text than in human writing. Human writing \"typically exhibits perplexity scores ranging from 20 to 50, reflecting the 'chaos' and unpredictability of human thought.\" LLMs produce more uniform, predictable sentence structures."

  SS-140:
    name: "Low Entropy / High Predictability Prose"
    detection: "The prose uses exclusively common word choices, conventional syntax, and safe constructions. Every sentence follows the most probable word sequence. No surprising vocabulary, unusual phrasing, or distinctive construction appears anywhere."
    why_autocomplete: "University of Mannheim research measured LLM story continuations having \"two to four times lower entropy than human fiction, with the gap widening after RLHF.\" Models converge on \"the statistically average way of expressing any given idea\" because they have \"no internal reason to prefer a specific or unusual expression over a generic one.\" RLHF annotators under time pressure prefer immediately clear text over material rewarding sustained reading."

  SS-141:
    name: "Low Epistemic Marker Density Sentinel"
    detection: "The text shows unusually low frequency of epistemic markers (words expressing uncertainty, possibility, or degree of knowledge: \"might,\" \"perhaps,\" \"seems,\" \"I think,\" \"probably,\" \"as if,\" \"sort of\") and discourse markers (\"well,\" \"you know,\" \"I mean,\" \"like\") compared to human prose."
    why_autocomplete: "Research shows ChatGPT essays have \"substantially fewer epistemic markers\" compared to human writing, which \"exhibited higher usage of modals, epistemic markers, and discourse markers.\" Human writing integrates \"more personal references and features of involvement, making their writing more nuanced.\""

  SS-142:
    name: "Memory/Continuity Failures Across Scenes"
    detection: "Characters forget established information, relationships, or events from earlier in the narrative; characters reintroduce themselves to people they've already met; character traits established in one chapter disappear in another; backstory details contradict between scenes."
    why_autocomplete: "LLMs have limited context windows and process text sequentially. As narrative length increases, earlier character information falls out of effective context. User reports from AI storytelling platforms: \"the AI forgets established character traits as stories grow longer\"; \"eventually, your character cards are ignored\"; bots \"tend to forget previous messages causing inconsistencies.\" NoCha benchmark: accuracy drops from 59.8% on sentence-level to 41.6% on tasks requiring synthesis across narrative distances."

  SS-143:
    name: "Metaphor Spam in Final Sentences"
    detection: "Scene-ending or paragraph-ending sentences that contain two or more metaphors or similes stacked together where the rest of the paragraph contained zero or one (e.g., a plain paragraph ending with \"like a forgotten melody, dissolving into the tapestry of night\")."
    why_autocomplete: "LLMs produce a \"poisoned output\" effect where metaphors cluster at emphatic positions (sentence-final, paragraph-final) because training data associates these positions with heightened language. The concentration creates \"eyeball kicks\" that prioritize impressiveness over clarity."

  SS-144:
    name: "Metronomic Sentence Length"
    detection: "Measure the word count of 10+ consecutive sentences. If the coefficient of variation (standard deviation / mean) is below 0.15, the sentences are suspiciously uniform."
    why_autocomplete: "LLMs optimize for consistent clarity and grammatical correctness, producing sentences that avoid extremes of very short or very long. The result is text with low burstiness -- perfectly even sentence variation that feels \"smooth but oddly mechanical.\""

  SS-145:
    name: "Mid-Narrative Detail Drift"
    detection: "Factual details that are established early in the work (within the first 20% of the text) contradict details that appear late in the work (in the final 30%), with the contradictions concentrated in the kinds of specific details (names, numbers, physical attributes, geography) that require exact recall rather than general understanding."
    why_autocomplete: "This pattern directly maps to the \"lost in the middle\" and context degradation effects documented in LLM research. The \"Lost in Stories\" paper found that \"errors accumulate approximately linearly with output length\" and \"concentrate in narrative middle (40-60% range).\" Context degradation research shows \"effective capacity is usually 60 to 70% of the advertised maximum.\" Human writers working from notes or memory have different error distributions — their errors are more random, while LLM errors systematically increase with distance from introduction."

  SS-147:
    name: "Missing Sequel / No Emotional Processing"
    detection: "Characters jump directly from one disaster to the next goal without any emotional reaction, deliberation, or decision-making between scenes."
    why_autocomplete: "LLMs trained on action-heavy fiction tend to skip sequel beats because they are less \"dramatic\" and harder to generate convincingly. The model optimizes for forward momentum at the expense of psychological plausibility. Grief scenes in AI fiction \"sound like Hallmark cards\" when they are attempted."

  SS-148:
    name: "Monotone Emotional Register Sentinel"
    detection: "All characters express emotions with the same vocabulary, syntax, and intensity level. A teenager and a professor grieve the same way on the page. Dialogue lacks individual emotional fingerprints. Emotions are labeled rather than embodied differently per character."
    why_autocomplete: "LLMs have a single \"voice\" that they apply to all characters because they lack the ability to maintain distinct psycholinguistic models for multiple fictional personalities simultaneously. The result is that \"a teenager and a professor use the same vocabulary and syntax\" — the LLM's default neutral register."

  SS-149:
    name: "Monotonous Descriptive Rhythm"
    detection: "Five or more consecutive descriptive sentences with the same approximate word count (within 20% variation) and the same grammatical structure (e.g., all Subject-Verb-Object or all \"The [noun] [verb] [prepositional phrase]\")."
    why_autocomplete: "Human writers naturally vary sentence length and structure. LLMs tend toward \"uniform sentence length, paragraph rhythm, and cadence\" because each sentence is generated with similar probability distributions. The monotony is a byproduct of statistical generation rather than deliberate style."

  SS-150:
    name: "Monotonous Sentence Cadence"
    detection: "Measure sentence length variation across five consecutive paragraphs of narration. If the standard deviation of sentence length is less than 3 words (most sentences are roughly the same length), the cadence is monotonous."
    why_autocomplete: "LLMs tend toward a \"droning\" rhythm, producing sentences of similar length and structure. Human writers naturally vary sentence length for pacing, emphasis, and emotional effect — short sentences for tension, long sentences for reflection, fragments for impact."

  SS-151:
    name: "Narrative Tells Emotions Instead of Enacting Them"
    detection: "The predominant method of conveying character emotion is through direct naming (\"She felt angry,\" \"He was devastated,\" \"Joy filled her heart\") rather than through behavior, dialogue, physical sensation, or dramatic situation. More than half of emotional moments are rendered through telling."
    why_autocomplete: "Telling emotion is the shortest path between the concept of emotion and its expression in text. LLMs, optimized for fluent next-token prediction, default to the most direct rendering. Showing emotion requires understanding how a specific emotion manifests in a specific person in a specific situation -- a multi-layered inference the model cannot perform. \"We're told everything and shown nothing. Beyond that, note the utter lack of concrete imagery.\""

  SS-152:
    name: "Nauseatingly Upbeat Scene Endings"
    detection: "Check the final paragraph of each scene or chapter. If more than 70% end on an optimistic, resolved, or forward-looking note — with the character finding hope, making a plan, or feeling better — regardless of the story's actual emotional trajectory, this is a tonal uniformity signal."
    why_autocomplete: "LLMs trained with RLHF have a strong bias toward positive outcomes and emotional resolution. They resist leaving characters in unresolved negative states because training rewards helpful, positive outputs. Real fiction frequently ends scenes on unresolved conflict, dread, confusion, or despair."

  SS-153:
    name: "Neat Resolution / Anti-Ambiguity Sentinel"
    detection: "Every emotional, thematic, or narrative thread is explicitly resolved. Endings wrap up cleanly. Characters state what they've learned. Ambiguity is eliminated rather than cultivated. The text avoids leaving anything unresolved, unexplained, or open to interpretation."
    why_autocomplete: "LLMs are trained on text where \"completeness\" is valued, and endings that \"close the loop\" score well with evaluators. The model treats open-endedness as incompleteness rather than as a deliberate artistic choice. \"Ideas get sorted into sections too quickly... endings arrive softly and close the loop without pushing anything forward.\""

  SS-154:
    name: "Negative Parallelism Default (\"Not Just X, But Also Y\")"
    detection: "The prose systematically uses the construction \"not just X, but also Y\" or \"not merely X, but Y\" or \"it wasn't X — it was Y\" as a primary rhetorical structure for emphasis and revelation."
    why_autocomplete: "The Wikipedia \"Signs of AI writing\" article identifies two forms of negative parallelism as structural tells: \"Not only...but...\" constructions that clear up \"imaginary misconceptions\" and \"It's not..., it's...\" constructions that explicitly deny a first characteristic. These patterns appear because LLMs have been trained on persuasive and explanatory text that uses this structure to create emphasis. In fiction, the construction reads as authorial editorializing rather than narrative showing."

  SS-155:
    name: "Negative Parallelism Pattern (\"Not X — It's Y\")"
    detection: "Search for the construction \"It's not X — it's Y\" or \"Not X. Y.\" especially using em dashes. If this pattern appears more than once per 1000 words, flag."
    why_autocomplete: "Tropes.fyi identifies \"Negative Parallelism\" as the #1 AI writing trope: \"The 'It's not X — it's Y' pattern using em dashes to create false profundity through reframing. Extremely common in AI output.\" Wikipedia similarly documents \"Not X, but Y\" as a primary AI writing indicator."

  SS-156:
    name: "No Character Has a Distinct Voice"
    detection: "The narrative voice and all character dialogue share the same register, vocabulary level, and speech patterns. The narrator and all characters sound like the same person."
    why_autocomplete: "LLMs generate all text from a single probability distribution, meaning narrator voice and character voices tend to converge. The result is a story where \"the LLM has no character or voice\" and characters are \"even less of a character\" than the narrator."

  SS-157:
    name: "No Open Questions"
    detection: "At any given point in the narrative, the reader has no unanswered questions about what is happening, why it matters, or what will happen next. All information is delivered proactively before the reader has reason to wonder about it."
    why_autocomplete: "LLMs generate text by completing patterns, which means they tend to close informational loops as quickly as possible. The model's training on clear, complete explanations (documentation, articles, textbooks) makes it probabilistically favor answering questions immediately rather than holding them open for narrative tension. This eliminates the curiosity engine that drives reader engagement."

  SS-158:
    name: "No Recovery Beats Between Action Sequences"
    detection: "Check whether consecutive high-intensity scenes occur without any intervening reflection, processing, or lower-intensity scene. Three or more consecutive action scenes with no sequel/reaction is a red flag."
    why_autocomplete: "AI trained on action-heavy fiction may generate continuous escalation without understanding the psychological need for processing. Human writers instinctively provide recovery because they themselves need to process the emotion."

  SS-159:
    name: "No Silence or Non-Response in Dialogue"
    detection: "Check whether every line of dialogue receives a verbal response. If no character ever stays silent, declines to respond, changes the subject without answering, or is described as not speaking when a response is expected, the sentinel triggers."
    why_autocomplete: "LLMs are trained on turn-taking data where every prompt receives a response. They have no model of strategic silence or meaningful non-response. AJ Writes: \"AI fills silences with meaning when silence IS the meaning.\" The cooperative turn-taking default of instruction-tuned models makes silence invisible to the generator."

  SS-160:
    name: "No Subtext in Dialogue"
    detection: "Characters in conflict always say exactly what they mean, feel, and want; there is no gap between surface meaning and underlying intention; no character ever conceals, deflects, or implies."
    why_autocomplete: "Subtext requires the model to generate text that means something different from what it literally says — a dual-signal task where the surface text and underlying meaning must diverge. LLMs optimize for clear communication, making subtext architecturally difficult."

  SS-161:
    name: "Nominalization Overuse"
    detection: "Count nominalizations (nouns derived from verbs/adjectives: destruction, deforestation, pollution, implementation, utilization, consideration) per 1000 words. If the rate exceeds 1.5-2x the baseline for the genre, flag."
    why_autocomplete: "The PNAS study found instruction-tuned LLMs use nominalizations at 1.5-2x the human rate. This creates an \"informationally dense, noun-heavy style\" that diverges from natural fiction prose. BubbleCow identifies nominalizations as a concision target: \"'make a decision' -> 'decide,' 'conduct an analysis' -> 'analyze.'\""

  SS-162:
    name: "Normative Interpretation Imposition"
    detection: "The narrative imposes conventional or expected interpretive frameworks on situations that the story's own logic suggests should be more complex or ambiguous. E.g., imposing a redemption arc where the story logic suggests moral ambiguity, or imposing romantic reading of a relationship the text does not support."
    why_autocomplete: "The Resultsense study found LLMs \"impose conventional interpretive frameworks on unconventional material\" -- e.g., assuming a heteronormative reading or imposing a \"redemption arc\" where the text intended ambiguity. This is a direct consequence of statistical prediction: conventional interpretations are higher-probability than unconventional ones, so the model gravitates toward the most common narrative patterns in its training data."

  SS-163:
    name: "Object Teleportation"
    detection: "An object that was described as being in a specific location, or in a character's possession, appears in a different location or in a different character's possession with no described transfer."
    why_autocomplete: "LLMs do not track object state (held, dropped, placed, destroyed) across paragraphs. The SCORE framework specifically addresses this with \"Dynamic State Tracking\" that monitors \"object and character states (active, lost, destroyed)\" because unexplained reactivation of objects is a common AI error. The Writer's Digest example (\"Is he still holding the gun?\") illustrates the scene-level version; the LLM version extends across chapters."

  SS-164:
    name: "Obstacles Without Consequences"
    detection: "Characters encounter obstacles that are overcome without struggle, hard choices, or lasting consequences. The obstacles exist but the character simply navigates past them."
    why_autocomplete: "LLMs generate obstacles because they recognize they should exist structurally, but then resolve them easily because the model is optimizing for forward narrative movement. Hardy's example: \"Reaching the oracle wasn't hard, because no matter how difficult those obstacles might have seemed, they caused no struggle or challenge.\""

  SS-165:
    name: "On-the-Nose Dialogue (No Subtext)"
    detection: "Characters state their emotions, intentions, and motivations directly in dialogue. There is no gap between what characters say and what they mean. No tension exists between surface and depth."
    why_autocomplete: "LLMs generate the most probable next token, which means characters say what needs to be communicated rather than what a psychologically real person would say. Creating subtext requires withholding information -- generating tokens that don't directly convey the intended meaning -- which conflicts with the model's optimization for clarity and coherence."

  SS-166:
    name: "Oscillating Prose Modes"
    detection: "The prose alternates between two distinct registers within scenes -- overwrought purple prose and terse, cliched action sentences -- without a consistent narrative voice."
    why_autocomplete: "Record Crash identifies this as a primary AI fiction tell: \"loquacious ponderous similes and tiny sentences made out of cliches.\" LLMs lack a stable authorial voice and instead sample from different stylistic registers in their training data, producing an inconsistent mixture that no single human author would produce."

  SS-167:
    name: "Overexplicit Emotional Narration"
    detection: "Check whether the narrator explicitly labels characters' emotions after showing them through action (\"She slammed the door. She was furious.\"). If emotional labels follow demonstrated emotions more than 50% of the time, the prose is over-explaining."
    why_autocomplete: "AI hedges against reader misunderstanding by making emotion explicit through both showing and telling, creating the \"show AND tell\" redundancy that Fawkes identifies as a specific pacing problem. Human writers trust the reader."

  SS-168:
    name: "Overwrought Purple Prose"
    detection: "Descriptions use multiple layered metaphors, excessive adjectives/adverbs, and ornate language for mundane scenes — e.g., \"Her heaving bosom was constrained by the tight bodice of her gown, like two trembling doves longing to take flight\""
    why_autocomplete: "\"Modern AI tools generate purple prose because they are trained on predictive text patterns, often favoring flowery, and cliché adjectives.\" GPT-4o specifically uses more purple prose than other models. LLM texts are \"typically full of redundant exposition, overwrought metaphors, and florid descriptions.\""

  SS-169:
    name: "Oxford Comma Consistency as Mechanical Tell"
    detection: "Check whether the Oxford comma is used with 100% consistency throughout. If present in every single list without exception, the consistency is atypical of human writing."
    why_autocomplete: "AI \"uses Oxford commas consistently, contrasting with human inconsistency.\" Human writers tend to have preferred usage but occasionally deviate based on rhythm, emphasis, or inattention. Perfect consistency is a statistical anomaly."

  SS-170:
    name: "Parallel Structure Overuse in Description"
    detection: "Three or more instances within a single scene of descriptive parallelism following the pattern \"No [X]. No [Y]. Just [Z]\" or \"It was [X]. It was [Y]. It was [Z]\" or any similar anaphoric structure used for atmospheric emphasis."
    why_autocomplete: "LLMs reflexively deploy parallel structures for emphasis because these patterns score high in training data labeled as \"good writing.\" The construction \"No [X]. No [Y]. Just [Z]\" is identified as a formulaic AI pattern that \"creates artificial tension and drama in 90% of unnecessary cases.\""

  SS-171:
    name: "Participial Phrase Overuse in Action Beats"
    detection: "Count the frequency of present participial phrases (-ing constructions) used as action beats around dialogue: \"she said, turning toward the window,\" \"he muttered, running a hand through his hair,\" \"she whispered, pulling her coat tighter.\" If these appear at two to five times the rate of other beat constructions, the sentinel triggers."
    why_autocomplete: "Research documents that AI-generated text uses participial phrases at two to five times the rate found in human-written text. The construction \"main clause + comma + -ing verb phrase\" is a statistically overrepresented pattern in LLM output because it is a common, grammatically safe way to attach action to dialogue."

  SS-172:
    name: "Passive Protagonist Throughout Scenes"
    detection: "The POV character consistently reacts to events rather than initiating them. Other characters or circumstances drive every scene while the protagonist observes, endures, or follows."
    why_autocomplete: "LLMs tend to generate reactive prose because the most common narrative pattern in training data is \"something happened, then the character responded.\" Generating proactive characters requires the model to plan future events (what the character will attempt) before describing them, which conflicts with left-to-right token generation."

  SS-173:
    name: "Perfectly Smooth Transitions"
    detection: "Check whether every paragraph transition uses formulaic connective phrases (\"However,\" \"Moreover,\" \"Additionally,\" \"Furthermore,\" \"In contrast\"). Count the frequency of such transitions per page."
    why_autocomplete: "AI generates \"clear topic sentences, perfect transitions, tidy conclusions\" that create \"rigid, unnatural scaffolding.\" Human writing has rougher, more organic transitions that sometimes surprise or disorient slightly."

  SS-174:
    name: "Personality Reset Between Scenes"
    detection: "Compare the POV character's voice, preoccupations, and emotional state at the end of one of their scenes with the beginning of their next scene. If the character's emotional arc, vocabulary evolution, or psychological state shows no carry-over — as if each scene starts from a default template — a personality reset has occurred."
    why_autocomplete: "LLMs process each prompt with limited context about character state across scenes. A character who was devastated at the end of chapter 3 may narrate chapter 7 with no residual grief, fear, or changed worldview because the model has no persistent character state."

  SS-175:
    name: "Personality Trait Reversal Without Arc"
    detection: "A character exhibits a personality trait (brave, cowardly, kind, cruel, cautious, reckless) that is the opposite of a previously established trait, with no intervening events that could plausibly explain the change."
    why_autocomplete: "LLMs generate character behavior based on local context and \"character archetype\" patterns in training data, not from a persistent model of the specific character. The \"Lost in Stories\" taxonomy identifies \"skill fluctuations\" and \"forgotten abilities\" as characterization subtypes. The Novarrium guide notes that in AI fiction, \"personality traits shift without development.\" The model may generate a brave action because the scene pattern (climax, danger) triggers brave-character patterns, regardless of whether this character was established as timid."

  SS-176:
    name: "Physical Description Contradiction"
    detection: "A character's physical attributes (eye color, hair color, height, handedness, distinguishing marks) are described differently in two or more passages with no narrative explanation for the change."
    why_autocomplete: "LLMs lose track of specific physical details as context windows fill. The \"Lost in Stories\" research found that \"Factual & Detail Consistency\" errors (including \"appearance mismatches\") are one of the two dominant failure modes in LLM fiction. The model generates plausible-sounding descriptions from its training distribution rather than maintaining fidelity to previously established details."

  SS-177:
    name: "Positive-Outcome Bias in Narrative Trajectory"
    detection: "Classify the emotional trajectory of the overall narrative. If the story follows a consistently positive arc (difficulty leading to triumph, sadness leading to acceptance, conflict leading to resolution) without any sustained negative movement, despair-without-hope sections, or ambiguous endings, the trajectory shows positive-outcome bias."
    why_autocomplete: "LLMs \"augment the human bias\" toward positive outcomes, generating \"Man in Hole\" arcs more than half the time and nearly excluding narratives with negative endings (\"Riches to Rags,\" \"Oedipus\"). This reflects RLHF training that rewards positive, helpful outputs."

  SS-178:
    name: "Present Participial Clause Overuse"
    detection: "Count present participial phrases (opening -ing clauses) per 1000 words. If the rate exceeds approximately 8-10 per 1000 words (roughly 2-5x the human baseline), flag."
    why_autocomplete: "The PNAS study found that instruction-tuned LLMs use present participial clauses at 2-5x the human rate. GPT-4o specifically uses them at 5.3x the human frequency (Cohen's d=1.38). This is one of the strongest statistical discriminators between LLM and human text."

  SS-179:
    name: "Promotional Language in Narration Sentinel"
    detection: "The narration uses language that sounds like marketing copy: \"boasts a,\" \"vibrant,\" \"showcasing,\" \"exemplifies,\" \"commitment to,\" \"groundbreaking,\" \"renowned,\" \"diverse array.\" Characters or settings are described with the vocabulary of a tourism brochure or press release."
    why_autocomplete: "LLMs are trained on massive amounts of web content, much of which is promotional. When describing fictional places or characters, the model reaches for promotional vocabulary because it dominates the training data's descriptive register. Human fiction writers rarely describe a character's house as \"boasting\" a garden."

  SS-180:
    name: "Protagonist Described as Determined/Brave/Kind Without Demonstration"
    detection: "The narrative or other characters describe the protagonist using positive abstract adjectives (determined, brave, kind, clever, compassionate) that are not supported by specific on-page actions demonstrating those qualities."
    why_autocomplete: "LLMs can generate character descriptions (telling) more easily than the specific dramatic situations that demonstrate those qualities (showing). The model knows that protagonists are typically described as brave or determined and generates those descriptors as part of character establishment, but fails to create the challenging situations where bravery or determination would be meaningfully tested and displayed."

  SS-181:
    name: "Purple Prose / Ornamental Metaphor Overload"
    detection: "Consecutive sentences each contain a different metaphor, simile, or ornamental comparison. Metaphors are mixed (incompatible vehicles in close proximity). Descriptive language is consistently elevated above what the scene requires. Words are chosen for sonic impressiveness rather than precision (\"utilize\" for \"use,\" \"commence\" for \"begin\")."
    why_autocomplete: "The LAMP corpus study identified \"purple prose\" as one of seven major categories of AI writing problems. The Countercraft MFA vs. LLM analysis found that AI fiction's \"Womb of Oblivion\" lines are \"incredibly easy to write because, well, they don't mean anything — you can swap around the words at will.\" Alexander Wales identified purple prose as a primary LLM failure mode: the model tends toward \"overwrought metaphors and florid descriptions used excessively.\" EQ-Bench explicitly penalizes \"excessive vocabulary flourishes that don't contribute to writing quality\" and \"relentlessly poetic prose that borders on incoherence.\""

  SS-182:
    name: "Purple Prose / Overwrought Metaphor Sentinel"
    detection: "The text consistently produces florid, overwrought descriptions with stacked metaphors, excessive adjectives, and ornate language regardless of the scene's emotional importance. Every room is described as if it were the most significant room in literature."
    why_autocomplete: "LLMs are \"trained on the entire internet including fanfiction, amateur blogs, and old Victorian books\" and the model is \"a predictive engine that guesses that the word after 'eyes' should be 'sparkling' or 'orbs.'\" The model defaults to ornate description because flowery language appears extensively in training data."

  SS-183:
    name: "Purple Prose in Expository Passages"
    detection: "Exposition passages contain \"excessively elaborate writing\" with overwrought metaphors, florid descriptions, and ornamental language that calls attention to its own style rather than serving the narrative. E.g., \"The sobs emerged from this deep well of unspoken expectations, leaving behind a residue of weary resilience and a few hopeful echoes yet unwilling to completely extinguish.\""
    why_autocomplete: "The arXiv study identifies this as a systematic LLM pattern: \"excessively elaborate writing that disrupts narrative flow by attracting undue attention to its flamboyant style.\" Human writers consistently simplified such passages (e.g., the above example was edited to: \"She cried. She cried deep from this well of scraped knees she bandaged alone and birthdays she missed to work.\"). The verbosity bias in LLM training causes models to generate elaboration where simplicity would be more effective."

  SS-184:
    name: "Purple Prose in Wonder Scenes"
    detection: "Scenes meant to evoke sense of wonder are delivered through excessive metaphor stacking, grandiose abstract nouns (\"tapestry,\" \"symphony,\" \"cascade\"), and adjective overload rather than concrete sensory detail or emotional grounding in character experience."
    why_autocomplete: "LLMs have strong statistical associations between \"wonder\" and purple prose vocabulary. The training data is dense with overwrought descriptions of fantastical sights. LLMs default to ornamental language rather than the specific, concrete detail that actually produces wonder in readers."

  SS-186:
    name: "Reconciliation Without Reckoning"
    detection: "Characters who are in conflict reach resolution without either party confronting the genuine source of their disagreement; conflicts end through generic expressions of understanding (\"I see what you mean now,\" \"I'm sorry,\" \"Let's move forward together\") without specific acknowledgment of what went wrong or what changed."
    why_autocomplete: "LLMs optimize for resolution. The training process rewards positive, helpful outcomes. In fiction, this manifests as conflicts that dissolve rather than resolve -- characters skip the painful, specific work of reckoning with their differences and jump to generic reconciliation language. AI-generated narratives \"overwhelmingly conform to a single narrative plot structure where protagonists resolve minor conflicts through reconnecting with tradition and organizing community events.\""

  SS-187:
    name: "Redundant Emotional Telling After Showing"
    detection: "Search for patterns where emotion is shown through behavior or dialogue and then immediately restated explicitly — e.g., \"Her hands trembled as she set down the cup. She was terrified.\" If the explicit emotional label follows a behavioral or physical rendering in more than 30% of emotional moments, this is a redundancy pattern."
    why_autocomplete: "LLMs hedge toward completeness by both showing and telling emotion, as if uncertain the shown emotion was sufficient. Human writers in close POV trust the reader to interpret behavioral cues without following them with explicit labels."

  SS-188:
    name: "Redundant Explanation After Demonstration"
    detection: "A scene or passage demonstrates something through action, dialogue, or behavior, and then a subsequent sentence or paragraph explicitly explains what was just shown (e.g., showing a character slamming a door, then writing \"She was clearly furious\")."
    why_autocomplete: "The arXiv taxonomy identified 18% of all LLM edits as \"Unnecessary/Redundant Exposition\" -- text that \"restated the obvious or provided details that add little value.\" LLMs generate redundant explanation because their probability model favors completeness and explicit closure over reader inference. This pattern directly violates the RUE (Resist the Urge to Explain) principle."

  SS-189:
    name: "Relationship State Incoherence"
    detection: "Two characters' relationship (romantic, hostile, familial, professional) is portrayed inconsistently between scenes — enemies become friends or vice versa between chapters with no intervening events or transition."
    why_autocomplete: "LLMs generate character interactions based on local context and archetypal relationship patterns rather than a persistent relationship model. The Novarrium guide specifically identifies this: \"enemies become friends (or vice versa) between chapters with no transition\" and \"family structures become confused.\" The Noveble article documents this as a common user complaint: \"relationship continuity where characters who broke up act like they are together.\""

  SS-190:
    name: "Repeated Emotional Tags Instead of Emotional Arcs"
    detection: "Characters are tagged with the same emotion repeatedly throughout a scene (\"she felt nervous... she was nervous... her nervousness grew...\") rather than showing emotional progression through changing behavior, thought, and physiological response."
    why_autocomplete: "LLMs maintain character emotional states as repeated tokens rather than modeling emotional progression. The model generates \"she felt X\" declarations because they are syntactically simple and contextually consistent. The more complex craft of showing emotional change through behavior requires multi-paragraph planning."

  SS-191:
    name: "Repetitive Generic Action Beats"
    detection: "Search for high-frequency generic action beats: nodded, smiled, sighed, raised an eyebrow, let out a breath, shook their head, bit their lip, crossed their arms, ran a hand through their hair. If the same three to five beats repeat throughout dialogue scenes, the sentinel triggers."
    why_autocomplete: "LLMs draw from a narrow palette of action beats because these are the most statistically common in training data. They lack the scene-specific imagination to generate beats that arise from the particular environment and emotional context. Descriptionary: \"If you searched your manuscript for 'sighing' and words used to replace sighing, you'll find more than you thought.\" AI text shows structural repetition like \"She sighs, a mixture of relief and anticipation\" followed by \"She murmurs, a mixture of joy and love.\""

  SS-192:
    name: "Repetitive Information Delivery"
    detection: "The same piece of information (a character trait, a world fact, a plot point) is conveyed more than once through different means (narration, then dialogue, then internal thought) without additional nuance or context each time."
    why_autocomplete: "The arXiv study found LLMs exhibit \"verbosity bias\" causing them to \"fill text with redundant exposition.\" Token prediction favors restating safe, established information over generating new content. The \"repeat curse\" in LLMs causes generated text to loop through high-probability phrases and restate established facts. This is a mathematical artifact of the decoding process, not a craft choice."

  SS-193:
    name: "Repetitive Looping"
    detection: "The narrative repeats the same information, event description, or character introduction verbatim or near-verbatim within a span of text where the repetition serves no rhetorical, structural, or thematic purpose."
    why_autocomplete: "Self-reinforcing repetition is a well-documented failure mode of neural text generation. Apple ML Research found that \"models have a preference to repeat the previous sentence, and sentence-level repetitions have a self-reinforcement effect where the more times a sentence is repeated in context, the higher the probability of continuing to generate that sentence.\" User complaints about AI Dungeon specifically cite that \"when hitting continue it tends to repeat literally everything from the story.\""

  SS-194:
    name: "Repetitive Name/Location/Occupation Defaults"
    detection: "Characters are given the same limited set of names, placed in the same limited set of locations, or assigned the same limited set of occupations regardless of story context — e.g., immigrant narratives default to Chicago and New York, characters are disproportionately writers or professors"
    why_autocomplete: "Research found \"consistent repetition of specific names, locations, occupations, and themes\" across five different AI systems regardless of architectural differences. This represents the model's probability distribution concentrating on the most common training data examples rather than generating contextually appropriate variety."

  SS-195:
    name: "Repetitive Sentence Openings (Anaphora Without Purpose)"
    detection: "Count consecutive sentences beginning with the same word (typically \"She,\" \"He,\" \"The,\" \"It\"). If 4+ consecutive sentences share the same opening word, flag. Also check paragraph openings — if 3+ consecutive paragraphs open with the same word, flag."
    why_autocomplete: "While human authors occasionally fall into this pattern, LLMs do it systematically due to their token-by-token generation process. Sandra Gerth: \"If more than two [paragraphs in a row] start with the same one, switch it up.\" The pattern is particularly characteristic when combined with uniform sentence length."

  SS-196:
    name: "Repetitive Syntactic Patterns"
    detection: "The prose exhibits the same sentence structures repeated across multiple paragraphs—particularly the \"Not X; Y\" construction, lists of three, or rigid topic-sentence/evidence/summary paragraph structure."
    why_autocomplete: "AI-generated prose relies on \"formulaic sentence structures\" with \"common templates including the 'From X to Y' construction and heavy use of present participial phrases\" at \"two to five times the rate found in human-written text.\" Human writers instinctively vary their constructions; LLMs default to predictable patterns."

  SS-197:
    name: "Rule of Three Overuse Sentinel"
    detection: "The text repeatedly uses three-item lists — \"adjective, adjective, and adjective\" or \"phrase, phrase, and phrase\" — as a dominant structural pattern, appearing in more than 20% of descriptive or analytical passages."
    why_autocomplete: "LLMs overuse the tricolon (rhetorical device presenting concepts in threes) because the training data contains many examples of this persuasive technique and the model treats it as a default organizational structure. Human writers use tricolons occasionally; LLMs use them reflexively."

  SS-198:
    name: "Rule-Violating Convenience"
    detection: "An established rule of the story's world (magical limitation, physical law, social norm, technological constraint) is violated at a moment that conveniently resolves a plot problem, without the violation being treated as significant or extraordinary by the narrative."
    why_autocomplete: "LLMs lack a formal world-rule registry and generate resolutions based on pattern-matching to \"problem solved\" training examples rather than checking whether the solution is consistent with established constraints. The EV Editing article calls these \"loopholes\" — \"bending previously established rules to resolve impossible situations.\" Sanderson's First Law articulates why this is unsatisfying: the reader's understanding of the resolution mechanism is proportional to their satisfaction with it."

  SS-199:
    name: "Rule-of-Three Default"
    detection: "Description, exposition, or emotional content is consistently delivered in three-item lists: \"adjective, adjective, adjective\" or \"short phrase, short phrase, and short phrase.\" The triadic structure appears in nearly every descriptive passage."
    why_autocomplete: "The Wikipedia \"Signs of AI writing\" article identifies \"Rule of Three\" as a structural tell: \"adjective, adjective, adjective\" patterns and \"short phrase, short phrase, and short phrase\" used to \"make superficial analysis appear comprehensive.\" Hunting the Muse identifies \"Rule of three applied unnecessarily\" as one of six key AI writing tells. Human prose uses varied list lengths (two items, four items, single items expanded) and varies rhythm; LLM prose defaults to three because it is the most statistically common rhetorical list length in training data."

  SS-200:
    name: "Rule-of-Three Lists in Scene Description"
    detection: "Description, action, and emotional beats consistently appear in lists of exactly three items (\"The room was dark, cold, and silent. She felt fear, confusion, and determination.\")."
    why_autocomplete: "LLMs overuse the \"rule of three\" because it is a statistically common pattern in training data. Record Crash identifies this pattern specifically: \"Lists of exactly three items (e.g., 'geometry of madness, a wound in the fabric of what is, older than law and time').\" This produces description that sounds processed rather than observed."

  SS-201:
    name: "S10: \"Crucial\" / \"Pivotal\" / \"Vital\" Significance Inflation"
    detection: "Text uses \"crucial,\" \"pivotal,\" or \"vital\" to describe the importance of events, moments, or information"
    why_autocomplete: "ChatGPT uses \"crucial\" for everything—Max Planck research showed \"crucial\" increased 2.6 percentage points corpus-wide post-ChatGPT. These words inflate the significance of mundane events. They are part of a broader pattern of \"undue emphasis on significance\" documented on Wikipedia's AI writing page."

  SS-202:
    name: "S11: \"Serves As\" / \"Stands As\" / \"Marks\" Copula Avoidance"
    detection: "Text systematically replaces \"is\" or \"are\" with \"serves as,\" \"stands as,\" \"marks,\" or \"represents\""
    why_autocomplete: "Wikipedia identifies this as a specific AI writing indicator: \"Avoidance of Copulas.\" LLMs replace simple \"is/are\" with pompous alternatives and substitute \"has\" with \"features,\" \"boasts,\" or \"offers.\" This creates unnecessarily inflated prose."

  SS-203:
    name: "S12: \"Unspoken\" as Emotional Modifier"
    detection: "Text uses \"unspoken\" to describe understanding, agreements, tension, or communication between characters"
    why_autocomplete: "The CHI 2025 study found \"unspoken\" appeared in 15% of AI-generated fiction outputs. It functions as a shortcut for implying depth of relationship without actually rendering that depth through dialogue and action."

  SS-204:
    name: "S13: \"Air Was Thick\" / \"Hung in the Air\" / \"Eyes Darting\""
    detection: "Text contains \"the air was thick,\" \"hung in the air,\" or \"eyes darting\" as descriptions of tension or unease"
    why_autocomplete: "The CHI 2025 study specifically identified these as \"peculiar and uncommon phrases\" that LLMs generate with disproportionate frequency. They function as canned atmospheric descriptions that substitute for actual scene-building."

  SS-205:
    name: "S14: Uniform Sentence Length (Low Burstiness)"
    detection: "Burstiness score (standard deviation of sentence lengths / mean sentence length) is below 0.30 across a passage of 500+ words"
    why_autocomplete: "Human writing scores 0.60-1.00+ for burstiness while AI writing scores 0.15-0.30. LLMs produce text with suspiciously uniform sentence lengths because they optimize for smooth, predictable prose. Humans naturally alternate between short, punchy sentences and longer, complex ones."

  SS-206:
    name: "S15: Every Scene/Chapter Ends Positively"
    detection: "More than 80% of scenes or chapters end on a resolved, optimistic, or forward-looking note"
    why_autocomplete: "The Creativindie analysis found AI produces \"nauseatingly upbeat forward-looking rosy glow\" at chapter endings. StoryScope found AI stories are \"homogeneously positive and lack tension.\" RLHF introduces 29-41% bias toward positive framing. Scenes that resolve completely eliminate the tension that makes readers turn pages."

  SS-207:
    name: "S16: Characters State Their Emotions Directly"
    detection: "Characters say things like \"I feel scared,\" \"I'm angry,\" \"That makes me happy,\" or the narrator states \"She felt afraid,\" \"He was filled with rage\" — more than twice per scene"
    why_autocomplete: "Columbia University researchers documented LLM creative writing consistently \"tells instead of shows,\" stating emotions rather than rendering through action. The model \"reaches for the explicit statement every time—it is the prose equivalent of a comedian who explains the punchline.\" This is the most fundamental craft failure in AI fiction."

  SS-208:
    name: "S17: \"Quietly\" and Other Atmosphere-Manufacturing Adverbs"
    detection: "Text uses \"quietly,\" \"softly,\" \"gently,\" \"slowly,\" \"deeply,\" \"fundamentally,\" or \"remarkably\" as filler adverbs to inflate mundane descriptions"
    why_autocomplete: "tropes.fyi catalogs this as \"Quietly and Other Magic Adverbs\" — overusing adverbs to artificially elevate mundane descriptions. Example: \"quietly orchestrating workflows, decisions, and interactions.\" These adverbs manufacture false depth without adding meaning."

  SS-209:
    name: "S18: Identical Character Voices"
    detection: "Remove dialogue attribution and character dialogue is not distinguishable — all characters use the same vocabulary level, sentence structure, and emotional register"
    why_autocomplete: "Multiple sources confirm this is one of the most consistent AI fiction failures. ChatGPT \"tends to write very on-the-nose dialogue with no difference between character voices.\" Writers report \"every character sounds like the same person at a dinner party\" and that readers complained characters \"all sound like they're reading from the same self-help book.\""

  SS-210:
    name: "S19: Repeated Exact Phrases Across Passages"
    detection: "The same multi-word phrase (4+ words) appears verbatim in multiple non-adjacent passages without being a deliberate motif"
    why_autocomplete: "Coyote Tracks analysis found one AI novel used \"the weight of the crown pressed down upon her\" repeatedly. Another found \"Talia's voice crackles over the comm, her tone urgent\" used verbatim multiple times. AI \"amplifies rather than corrects\" repetitive phrasing once it enters a \"local minimum.\" Human writers instinctively refresh vocabulary when noticing repetition."

  SS-211:
    name: "S1: \"Delve\" and \"Delve Into\""
    detection: "Text contains the word \"delve\" or the phrase \"delve into\""
    why_autocomplete: "\"Delve\" was the most infamous AI tell, going from an uncommon English word to appearing in a staggering percentage of AI-generated text. Max Planck Institute research showed its usage surged 50%+ in published text post-ChatGPT. PubMed studies found \"delves\" appeared 25x more than pre-LLM trends predicted."

  SS-212:
    name: "S20: \"The Result? [One-word answer].\" Self-Posed Rhetorical Questions"
    detection: "Text contains self-posed rhetorical questions followed by an immediate one-word or one-phrase answer (e.g., \"The result? Devastating.\" \"The goal? Survival.\" \"The truth? Simple.\")"
    why_autocomplete: "tropes.fyi catalogs this as a specific trope: \"The X? A Y.\" — self-posed rhetorical questions answered immediately for dramatic effect. This is a structural pattern LLMs use to simulate punchy, insightful prose."

  SS-213:
    name: "S21: \"Here's the Thing\" / \"Here's the Kicker\" False Suspense"
    detection: "Text uses \"here's the thing,\" \"here's the kicker,\" \"where it gets interesting,\" or \"what most people miss\" as narrative transitions"
    why_autocomplete: "tropes.fyi catalogs this as false suspense transitions promising revelations for unremarkable observations. These are conversational markers from blog posts and podcasts that leak into fiction prose through training data."

  SS-214:
    name: "S23: \"Despite Its Challenges...\" Formulaic Acknowledgment-Dismissal"
    detection: "Text follows the pattern \"Despite [acknowledged problem], [subject] continued to [positive outcome]\" or \"Despite these challenges, [optimistic conclusion]\""
    why_autocomplete: "tropes.fyi catalogs this as a rigid formula acknowledging problems then immediately dismissing them. Wikipedia's AI writing guide identifies \"outline-like conclusions\" following this exact formula. It represents the model's inability to sit with unresolved tension."

  SS-215:
    name: "S25: Present Participle (\"-ing\") Phrase Stacking"
    detection: "Text frequently appends present participle phrases to the end of sentences (e.g., \"She walked down the hall, noting the peeling wallpaper, wondering about the building's history, highlighting the importance of preservation\")"
    why_autocomplete: "Wikipedia identifies present participle phrases appended to sentences as a specific AI writing tell. stryng.io documents this as a major readability problem. AI uses gerunds and present participles to connect ideas, producing monotonous grammatical structures."

  SS-216:
    name: "S26: \"Bustling\" as Default City Descriptor"
    detection: "Text uses \"bustling\" to describe cities, markets, streets, or crowds"
    why_autocomplete: "Appears on virtually every AI overused-words list. Functions as a default descriptor for any urban or commercial space regardless of whether the scene calls for crowdedness. Part of the \"promotional/advertisement language\" pattern."

  SS-217:
    name: "S27: \"Meticulous\" / \"Meticulously\" as Default Care Descriptor"
    detection: "Text uses \"meticulous\" or \"meticulously\" to describe care, attention, or precision"
    why_autocomplete: "Appears on every comprehensive AI word list. The Max Planck study showed it surged dramatically post-ChatGPT. Functions as a generic intensifier for care or precision when specific details would be more effective."

  SS-218:
    name: "S28: \"Landscape\" as Abstract Metaphor"
    detection: "Text uses \"landscape\" metaphorically to describe abstract domains (e.g., \"the political landscape,\" \"the emotional landscape,\" \"navigate the landscape of\")"
    why_autocomplete: "tropes.fyi catalogs this alongside \"tapestry\" as ornate nouns substituting for simpler words. Part of the broader pattern of using spatial metaphors for non-spatial concepts. Appears on virtually every AI word list."

  SS-219:
    name: "S29: Sanitized Villain Behavior"
    detection: "Antagonists who should be dangerous, manipulative, or morally complex are portrayed with only surface-level aggression — shouting and open hostility instead of subtle menace, psychological manipulation, or genuine moral darkness"
    why_autocomplete: "Research found models replace sophisticated villainy with \"direct, shallow aggression\" due to safety alignment. Characters who should be \"a tense battle of wits\" become \"shouting matches\" with \"open insults.\" Average role-playing fidelity drops from 3.21 (moral paragons) to 2.61 (villains). Traits like \"Deceitful\" and \"Manipulative\" score worst."

  SS-220:
    name: "S2: \"A Testament To\""
    detection: "Text contains the phrase \"a testament to\" or \"stands as a testament\""
    why_autocomplete: "Identified across multiple curated lists as a phrase that appears with disproportionate frequency in LLM output. Co-occurs with other LLM vocabulary markers. Wikipedia's AI writing guide lists it as a high-density AI vocabulary indicator."

  SS-221:
    name: "S30: \"Moreover\" / \"Furthermore\" / \"Additionally\" as Paragraph Openers"
    detection: "Multiple paragraphs in prose fiction begin with transitional adverbs like \"Moreover,\" \"Furthermore,\" \"Additionally,\" \"Consequently,\" \"Subsequently\""
    why_autocomplete: "These are academic/expository transitions that have no place in fiction prose. They are described as \"the verbal equivalent of a PowerPoint slide advancing.\" Every final paragraph of ChatGPT writing begins with \"In conclusion.\" This represents the academic/informational training data leaking into fiction."

  SS-222:
    name: "S31: Dream Sequences as Default Narrative Device (GPT-Specific)"
    detection: "Story contains a dream sequence as a narrative device without clear thematic purpose"
    why_autocomplete: "StoryScope research identified \"over-indexing on dream sequences\" as a GPT-specific fingerprint. Dream sequences allow LLMs to generate atmospheric prose without maintaining narrative causality or continuity."

  SS-223:
    name: "S33: External Character Description as Default (Gemini-Specific)"
    detection: "Characters are primarily described through external physical attributes rather than through action, thought, or dialogue"
    why_autocomplete: "StoryScope research identified \"default to external character description\" as a Gemini-specific fingerprint. This represents a shallow approach to characterization — describing what characters look like rather than who they are."

  SS-224:
    name: "S34: \"Unwavering\" / \"Indelible\" / \"Profound\" Intensity Inflation"
    detection: "Text uses \"unwavering,\" \"indelible,\" or \"profound\" to describe character traits, impacts, or experiences"
    why_autocomplete: "These appear consistently on AI vocabulary lists as words that inflate intensity. They function as generic intensifiers that substitute for specific description. Part of the broader \"significance inflation\" pattern where everything is described in superlative terms."

  SS-225:
    name: "S35: \"Interplay\" / \"Intricacies\" / \"Multifaceted\" Complexity Signaling"
    detection: "Text uses \"interplay,\" \"intricacies,\" \"multifaceted,\" or \"nuanced\" to assert complexity rather than demonstrating it"
    why_autocomplete: "These words signal complexity without delivering it. They appear on every AI word list. The model uses them to claim depth where none exists — saying something is \"nuanced\" instead of actually being nuanced. This is the verbal equivalent of telling vs showing applied to intellectual content."

  SS-226:
    name: "S36: \"Navigate\" / \"Navigating\" as Life Metaphor"
    detection: "Text uses \"navigate\" or \"navigating\" to describe dealing with non-physical challenges (e.g., \"navigating the complexities of,\" \"navigating grief,\" \"navigating her new role\")"
    why_autocomplete: "Consistently appears on AI word lists. Part of the broader spatial-metaphor-for-abstract-concept pattern. The 500-word list includes \"Navigate the complexities\" and \"Navigate the landscape\" as specific AI phrases."

  SS-227:
    name: "S37: \"Embark on a Journey\" / Journey Metaphor"
    detection: "Text uses \"embark on a journey\" or \"journey\" as a metaphor for any process of change or exploration"
    why_autocomplete: "Appears on multiple AI word lists. \"Journey\" is one of the most overused ChatGPT words, applied to any process regardless of whether travel is involved. The 500-word list includes \"Embark on a journey\" as a specific AI phrase."

  SS-228:
    name: "S38: \"Resonates\" / \"Reverberate\" for Emotional Impact"
    detection: "Text uses \"resonates\" or \"reverberates\" to describe emotional or thematic impact"
    why_autocomplete: "Both appear on comprehensive AI word lists. They function as generic descriptors for emotional significance. Part of the broader pattern of using physical-sensation metaphors for abstract emotional states without grounding them in specific sensory experience."

  SS-229:
    name: "S39: \"Shed Light On\" / \"Shed Light\""
    detection: "Text uses \"shed light on\" to describe revelation or explanation"
    why_autocomplete: "Appears on curated AI word lists as a high-frequency LLM phrase. Functions as a cliche transition that substitutes for actually explaining how understanding was achieved."

  SS-230:
    name: "S3: \"Tapestry\" as Metaphor"
    detection: "Text uses \"tapestry\" as a metaphor for something interconnected (e.g., \"a tapestry of,\" \"rich tapestry,\" \"the tapestry of human experience\")"
    why_autocomplete: "Consistently appears on every curated list of LLM overused words. Used to describe anything interconnected regardless of context. tropes.fyi catalogs it as a specific AI writing trope alongside \"landscape,\" \"paradigm,\" \"synergy,\" and \"ecosystem.\""

  SS-231:
    name: "S40: \"Unlock\" / \"Unlock the Power of\" / \"Unlock the Potential\""
    detection: "Text uses \"unlock\" metaphorically to describe accessing abilities, understanding, or potential"
    why_autocomplete: "Appears on every AI word list. Part of the broader pattern of using mechanical/technological metaphors for human processes. The 500-word list includes \"Unlock the power of\" and \"Unlock the potential\" as specific AI phrases."

  SS-232:
    name: "S41: \"Unveil\" / \"Uncover\" Discovery Language"
    detection: "Text uses \"unveil\" or \"uncover\" to describe discoveries, revelations, or presentations"
    why_autocomplete: "Both appear on comprehensive AI word lists. They function as artificially dramatic alternatives to simpler words like \"found,\" \"discovered,\" or \"showed.\" Part of the grandiosity pattern."

  SS-233:
    name: "S42: \"In Today's [Fast-Paced/Digital/Modern] World\" Opening"
    detection: "Text begins with or contains \"in today's [adjective] world,\" \"in a world where,\" or \"as we navigate the complexities of\""
    why_autocomplete: "Identified across multiple sources as perhaps the most recognizable AI writing opener. Blake Stockton's red-flag list includes \"In today's fast-paced [world/landscape/business environment]\" as a top-tier indicator."

  SS-234:
    name: "S43: \"Let's Dive In\" / \"Let's Break It Down\" / \"Let's Unpack This\""
    detection: "Text uses \"let's dive in,\" \"let's break it down,\" \"let's unpack this,\" or \"let's explore\" as narrative transitions"
    why_autocomplete: "tropes.fyi catalogs this as a specific trope: pedagogical voice implying readers need hand-holding. These are podcast/blog transitions that have no place in fiction prose. They break the fictional frame by addressing the reader in an instructional register."

  SS-235:
    name: "S44: \"Imagine a World Where...\" Futurism Opening"
    detection: "Text uses \"imagine a world where\" or \"imagine if\" as a narrative framing device"
    why_autocomplete: "tropes.fyi catalogs this as a classic futurism opener. Blake Stockton's list includes \"Imagine a world where\" as business hype language. It's a default opening for speculative scenarios that substitutes for actually building a world."

  SS-236:
    name: "S45: Absence of Continuity Errors of the Right Kind"
    detection: "Text has zero continuity errors but also zero instances of planted details paying off later — perfect consistency with no narrative threading"
    why_autocomplete: "AI within its context window produces internally consistent text because each token is generated in sequence. But the absence of continuity errors combined with the absence of long-range narrative threading (Chekhov's guns, planted clues, setup/payoff) indicates local coherence without global design. Human authors make small continuity errors but execute large-scale narrative architecture."

  SS-237:
    name: "S46: \"Fostering\" / \"Foster\" as Default Growth Verb"
    detection: "Text uses \"foster\" or \"fostering\" to describe any kind of development, growth, or encouragement"
    why_autocomplete: "Wikipedia's AI writing guide includes \"fostering\" in its high-density AI vocabulary list. The 500-word list includes \"Foster a culture of\" and \"Foster the development\" as specific AI phrases. \"Foster\" surged ninefold in post-2022 academic text per PubMed analysis."

  SS-238:
    name: "S47: \"Showcasing\" / \"Underscores\" / \"Highlights\" Commentary Language"
    detection: "Text uses \"showcasing,\" \"underscores,\" or \"highlights\" to describe narrative events as if they are exhibits or arguments rather than lived experiences"
    why_autocomplete: "PubMed studies found \"showcasing\" surged ninefold and \"underscores\" surged ninefold post-ChatGPT. These are commentary words that treat events as evidence for a thesis rather than as narrative. They break the fictional frame by adopting the stance of an external analyst."

  SS-239:
    name: "S48: Cluster Co-occurrence of AI Vocabulary"
    detection: "Three or more known AI-associated words (from the standard lists: delve, tapestry, crucial, vibrant, bustling, meticulous, foster, underscore, landscape, pivotal, intricate, nuanced, multifaceted, testament, navigate, embark, journey, resonate, etc.) appear within the same 500-word passage"
    why_autocomplete: "Individual AI-associated words prove nothing in isolation. But their \"combinatorial clustering\" — \"delve\" alongside \"crucial,\" \"underscore,\" \"intricate,\" \"foster,\" \"tapestry\" — becomes unmistakable. An edit introducing lots of these words, lots of times, is one of the strongest tells for AI use."

  SS-240:
    name: "S49: \"Something Shifted\" / \"Everything Changed\" Unearned Transition"
    detection: "Text uses vague narrative transitions like \"something shifted,\" \"everything changed,\" \"in that moment, everything was different\" without specifying what shifted or changed"
    why_autocomplete: "The Field Guide to AI Slop identifies these as \"unearned profundity\" — serious, narrative-shifting transitions that come out of nowhere. The model generates atmosphere without content. These transitions promise significance without delivering it."

  SS-241:
    name: "S4: Excessive Em Dash Usage"
    detection: "Em dash frequency exceeds 8 per 1,000 words in prose passages (human baseline mean is 3.23, range 0.33-17.12)"
    why_autocomplete: "Research paper \"The Last Fingerprint\" measured em dash frequency across 12 LLMs and found systematic overuse. GPT-4.1 produced 10.62/1K words, Claude Opus 4.6 produced 9.09/1K words. The em dash is \"markdown leaking into prose—the smallest surviving unit of the structural orientation that LLMs acquire from markdown-saturated training corpora.\" RLHF amplifies this because evaluators reward organized-looking prose."

  SS-242:
    name: "S50: Tense Inconsistency Within Passages"
    detection: "Text shifts between past and present tense within a passage without deliberate narrative purpose"
    why_autocomplete: "The CHI 2025 taxonomy identifies \"Tense Inconsistency\" as one of seven categories of AI writing problems, defined as \"unintended shifts between past, present, and future tenses.\" LLMs generate text locally and may shift tense when the most probable next token happens to be in a different tense."

  SS-243:
    name: "S51: Purple Prose and Overwrought Description"
    detection: "Descriptions use excessive adjectives, ornate metaphors, and elaborate figurative language where simpler language would be more effective — text is \"purple as an eggplant stomping grapes\""
    why_autocomplete: "The CHI 2025 taxonomy identifies \"Purple Prose\" as a category: \"excessively elaborate writing that disrupts narrative flow.\" AI default is ornate prose because RLHF annotators rate elaborate language higher than simple language. The model has learned that \"flowery is good\" without understanding that restraint can be more powerful."

  SS-244:
    name: "S52: No Character Makes a Morally Questionable Choice"
    detection: "Across the full text, no protagonist or significant character makes a decision that is morally ambiguous, selfish, cruel, deceptive, or otherwise ethically problematic"
    why_autocomplete: "RLHF safety training systematically penalizes morally questionable content. Research found a \"monotonic decline in role-playing fidelity as character morality decreases.\" The result is fiction where all characters are essentially good people who make essentially good choices — fiction without moral friction."

  SS-245:
    name: "S53: Dialogue Lacks Subtext (Characters Say What They Mean)"
    detection: "In emotionally charged scenes, characters state their feelings, intentions, and analyses directly rather than talking around the real subject, deflecting, lying, or using implication"
    why_autocomplete: "AI models are \"designed to respond to a prompt, an imperative\" and cannot \"be oblique or indirect.\" Multiple sources confirm: AI makes characters \"sound like chatbots having feelings — explaining emotions instead of implying them, filling every silence with exposition.\" Human dialogue is characterized by the gap between what is said and what is meant."

  SS-246:
    name: "S54: No Character Has a Backstory That Causes Present Pain"
    detection: "Characters lack psychological depth from past experiences. Backstory either doesn't exist or is mentioned without affecting present behavior, decisions, or emotional responses"
    why_autocomplete: "Coyote Tracks found characters who \"don't truly grapple with their past, because they have no backstory apart from 'the bad guys killed her mom.'\" Characters are \"never faced with heart-wrenching choices.\" AI generates characters as functional roles rather than as people shaped by their histories."

  SS-247:
    name: "S55: Excessive Elegant Variation (Synonym Substitution)"
    detection: "Text avoids repeating any word by substituting increasingly obscure synonyms for the same referent (e.g., \"the protagonist,\" \"the key player,\" \"the eponymous character,\" \"the central figure\" all referring to the same person)"
    why_autocomplete: "Wikipedia identifies \"Elegant Variation\" as a specific AI writing indicator: excessive synonym substitution to avoid word repetition. LLMs are trained to maximize lexical diversity at the sentence level, leading to different terms for the same entity that create confusion rather than clarity."

  SS-248:
    name: "S56: \"Forged in the Crucible of\" and Metaphorical Overreach"
    detection: "Text uses overextended metaphors like \"forged in the crucible of,\" \"beacon of hope,\" \"symphony of [noun]\" where the metaphorical vehicle overwhelms the tenor"
    why_autocomplete: "Coyote Tracks found the phrase \"She had been forged in the crucible of her family's tragedy\" in an AI novel that hadn't yet developed that tragedy thematically. \"Crucible,\" \"beacon,\" \"symphony,\" and \"gossamer\" all appear on AI word lists as metaphor vehicles that LLMs deploy regardless of thematic appropriateness."

  SS-249:
    name: "S57: \"Whispering\" / \"Murmuring\" as Default Dialogue Tag"
    detection: "A disproportionate number of dialogue tags use \"whispered,\" \"murmured,\" \"breathed\" instead of \"said\""
    why_autocomplete: "The lechmazur writing styles study found Claude 3 \"overwhelmingly\" favored the word \"whisper.\" Creative dialogue tags are a known AI fiction pattern, with the model avoiding the neutral \"said\" in favor of more dramatic alternatives, paralleling a known beginner-writer mistake that AI has inherited from training data."

  SS-250:
    name: "S59: \"It's Worth Noting\" / \"It's Important to Note\" / \"Notably\""
    detection: "Text contains hedging/transition phrases like \"it's worth noting,\" \"it's important to note,\" \"notably,\" \"it bears mentioning,\" \"importantly,\" \"interestingly\""
    why_autocomplete: "tropes.fyi catalogs this as a specific trope: filler transitions that disconnect ideas without real logical flow. The Slop Score uses these phrases as part of its detection metrics. They are essay/report transitions that have no place in fiction prose."

  SS-251:
    name: "S5: \"Not X, It's Y\" / Negative Parallelism Pattern"
    detection: "Text contains the construction \"It's not X — it's Y\" or \"Not X, but Y\" used for rhetorical reframing, especially with em dashes, more than once per 2,000 words"
    why_autocomplete: "tropes.fyi catalogs this as the #1 most common AI writing trope. The Slop Score weights \"Not-x-but-y Contrast Patterns\" at 25% of its composite detection metric. The pattern manufactures false profundity through surprising reframes."

  SS-252:
    name: "S60: 76%+ Syntactic Templates Match Pre-Training Data"
    detection: "The syntactic structures (part-of-speech patterns) in the text match patterns found in common pre-training datasets at a rate significantly above the 35% baseline found in human text"
    why_autocomplete: "Research found that LLMs frequently generate text containing syntactic templates from their pre-training data — about 76% of detected templates in model-generated text were present in pre-training datasets, compared to only 35% in human text. This indicates the model is reproducing learned structures rather than generating novel ones."

  SS-253:
    name: "S61: Homogeneously Positive Emotional Valence"
    detection: "The overall emotional trajectory of the text is uniformly positive — setbacks are temporary, characters maintain optimism, and the narrative tone rarely dips into genuine despair, bitterness, or ugliness"
    why_autocomplete: "StoryScope found stories are \"homogeneously positive and lack tension.\" RLHF introduces 29-41% bias toward positive framing. Research confirmed \"positive endings dominate\" across all LLMs with \"negative endings rare across all models.\" The model has been trained to prefer positive outcomes."

  SS-254:
    name: "S62: Near-Uniform Earnestness (Absence of Irony)"
    detection: "The text maintains earnest, sincere tone throughout with no irony, sarcasm, deadpan humor, or tonal subversion"
    why_autocomplete: "The lechmazur writing styles study found \"near-uniform earnestness (99.8%); irony and ambiguity essentially trace-level\" across all LLMs tested. Irony requires the reader to understand that the surface meaning differs from the intended meaning — a form of subtext that LLMs systematically struggle with."

  SS-255:
    name: "S63: High Register as Universal Default"
    detection: "All prose, including dialogue, internal monologue, and narration, maintains a consistently high/formal register with no colloquial, informal, or vulgar language"
    why_autocomplete: "The lechmazur study found \"high register universal default\" with \"colloquial absent\" across all LLMs. This results from training on formal text and RLHF annotators preferring polished prose. Human writers naturally mix registers — characters speak informally, narrators shift between registers for effect."

  SS-256:
    name: "S64: \"Fractal Summary\" Structure (Tell-Do-Retell)"
    detection: "Text follows the pattern of announcing what will happen, narrating it happening, then summarizing what happened — at multiple levels of the narrative"
    why_autocomplete: "tropes.fyi catalogs this as \"Fractal Summaries\" — \"What I'll tell you; what I'm telling you; what I told you\" applied at every level. This is an essay/lecture structure that has leaked into fiction from instructional training data."

  SS-257:
    name: "S65: \"Treasure Trove\" / \"Game Changer\" / \"Cutting-Edge\" Hype Language"
    detection: "Text uses marketing/hype language like \"treasure trove,\" \"game changer,\" \"cutting-edge,\" \"groundbreaking,\" or \"revolutionary\" in narrative prose"
    why_autocomplete: "These appear on every AI word list. They are promotional language that has leaked into fiction from marketing training data. tropes.fyi catalogs this as business hype/sales language including \"Revolutionizing the way,\" \"A game-changer for,\" \"Supercharge your.\""

  SS-258:
    name: "S67: \"Gentle Breeze\" / \"Blooming Flowers\" / Generic Nature Description"
    detection: "Nature descriptions use stock imagery like \"gentle breeze,\" \"blooming flowers,\" \"sun-dappled,\" \"crystal clear water\" without specific, observed detail"
    why_autocomplete: "CRAFT Literary identifies AI relying on \"overly familiar phrases like 'gentle breeze' and 'blooming flowers' — descriptions so commonplace they're essentially meaningless.\" The algorithm \"works by predicting commonly occurring phrase patterns\" from training data, making specific or surprising descriptions nearly impossible."

  SS-259:
    name: "S68: \"Dance\" as Default Metaphor for Interaction"
    detection: "Text describes interactions, negotiations, or conflicts as a \"dance\" or \"delicate dance\""
    why_autocomplete: "AI Phrase Finder identifies ChatGPT frequently describing elements working together as engaging in a \"dance\" — \"The two companies engaged in a delicate dance of negotiation.\" This is a dead metaphor deployed automatically regardless of context."

  SS-260:
    name: "S69: Continuity Collapse in Long-Form Fiction"
    detection: "Physical descriptions change (eye color, hair, height), personality traits shift without development, characters know things they shouldn't, or world rules established early are violated later"
    why_autocomplete: "Every AI writing tool struggles with maintaining story consistency across long-form narratives. ChatGPT's context window means it \"forgets earlier chapters by Chapter 5.\" Physical descriptions change, personality traits shift without development, and world rules get violated. \"A magic system that requires incantations suddenly allows silent casting.\""

  SS-261:
    name: "S6: Tricolon/Rule-of-Three Abuse"
    detection: "Text uses three-item lists in prose (adjective, adjective, adjective / phrase, phrase, and phrase) more than twice per 1,000 words"
    why_autocomplete: "tropes.fyi identifies this as \"Tricolon Abuse\" — overuse of rule-of-three patterns, often extended to four or five items. AI uses these to inflate superficial analyses and create false rhetorical weight. Wikipedia's AI writing guide also flags this."

  SS-262:
    name: "S70: \"Robust\" / \"Compelling\" / \"Daunting\" Generic Modifiers"
    detection: "Text uses \"robust,\" \"compelling,\" or \"daunting\" as generic modifiers divorced from specific meaning"
    why_autocomplete: "These appear on virtually every AI word list. They function as generic positive/negative modifiers that signal nothing specific. Max Planck research showed \"robust\" and \"pivotal\" surged 50%+ post-ChatGPT."

  SS-263:
    name: "S71: Existential Themes as Default Subject Matter"
    detection: "Story defaults to existential/philosophical themes (meaning of life, identity, consciousness, what it means to be human) when no specific thematic direction is established"
    why_autocomplete: "The lechmazur writing styles study found \"existential themes dominate universally\" across all LLMs tested. This represents the model defaulting to the most \"literary-seeming\" theme rather than engaging with specific, grounded human situations. It's the thematic equivalent of semantic ablation."

  SS-264:
    name: "S72: Missing Cause-and-Effect Chains"
    detection: "Characters achieve outcomes without the narrative explaining how. Goals are accomplished without showing the work, investigation, or struggle required."
    why_autocomplete: "Coyote Tracks identified this as a fundamental AI fiction failure: \"How does Jack get from confronting the gangsters to bringing them to justice? What evidence did he find?\" The model generates outcomes without constructing the logical chains that connect problems to solutions."

  SS-265:
    name: "S73: Protagonist Lacks Agency / Is Passive Observer"
    detection: "The protagonist does not actively make choices that drive the plot. Events happen to them rather than because of them. They observe and react rather than initiate."
    why_autocomplete: "Coyote Tracks found \"Kira's personal stakes never change. She doesn't grow, she doesn't learn anything... she's never faced with heart-wrenching choices.\" AI generates characters as recipients of plot events rather than as agents who drive events through their choices and flaws."

  SS-266:
    name: "S74: Conflict Avoidance / Characters Too Nice"
    detection: "Characters avoid genuine interpersonal conflict. Disagreements resolve quickly. No character acts selfishly, cruelly, or dishonestly toward others. All interactions are pleasant or formally antagonistic with no messy middle ground."
    why_autocomplete: "LLMs are trained to be helpful and pleasant, which leaks into character behavior. Research confirmed models show \"risk-averse tendencies, potentially diluting conflict or avoiding genre-appropriate darkness.\" Characters default to pleasant interactions because the model's preference training favors agreeable outputs."

  SS-267:
    name: "S76: \"Effortlessly\" / \"Seamlessly\" False Ease Descriptors"
    detection: "Text uses \"effortlessly\" or \"seamlessly\" to describe achievements, transitions, or integrations"
    why_autocomplete: "Both appear on AI word lists. They describe outcomes as easy when the difficulty and effort involved in achieving them is precisely what makes them narratively interesting. They eliminate the friction that creates compelling fiction."

  SS-268:
    name: "S77: Bold-First Bullet Points / Markdown Formatting in Prose"
    detection: "Text contains markdown formatting artifacts: bold text, bullet points, numbered lists, headers, or emoji in what should be continuous prose fiction"
    why_autocomplete: "tropes.fyi catalogs \"Bold-First Bullets\" and Wikipedia identifies markdown usage as AI writing indicators. These are direct artifacts of the markdown-heavy training data leaking into text output. ChatGPT favors lists due to RLHF training."

  SS-269:
    name: "S79: Absence of Hedging / Epistemic Markers"
    detection: "Narrator or characters never express genuine uncertainty, qualification, or \"I think\" / \"maybe\" / \"perhaps\" — all statements are delivered with equal confidence"
    why_autocomplete: "Research found ChatGPT essays demonstrate \"significantly lower frequency of interactional metadiscourse like hedges, boosters, and attitude markers.\" Human writing includes epistemic markers reflecting genuine uncertainty and personal engagement. AI text has a \"more impersonal, expository tone\" with \"fewer engagement markers.\""

  SS-270:
    name: "S7: \"The Weight of\" / \"A Sense of\" / \"A Mix of\" Emotional Formulas"
    detection: "Text uses formulas like \"the weight of [noun],\" \"a sense of [emotion],\" \"a mix of [emotion] and [emotion]\" to describe emotional states"
    why_autocomplete: "CHI 2025 research specifically identified that \"a mix of [X] and,\" \"sense of,\" and \"weight of\" appear disproportionately in AI-generated fiction compared to human writing. One AI novel used \"the weight of the crown\" 45 times in 16 chapters. These are emotional shorthand that substitutes for rendering."

  SS-271:
    name: "S80: Simile Density (\"Like a...\")"
    detection: "Text contains similes at a rate exceeding one per 200 words, particularly using \"like a [noun]\" constructions with increasingly strained comparisons"
    why_autocomplete: "Coyote Tracks noted AI fiction has \"almost every noun preceded by an adjective, actions described with similes.\" AI Phrase Finder documented ChatGPT's tendency to describe everything through comparison metaphors — navigation metaphors, dance metaphors, tapestry metaphors. The model generates comparisons as its default mode of description rather than rendering things directly."

  SS-272:
    name: "S8: \"Nestled\" in Geographic Description"
    detection: "Text uses \"nestled\" to describe the location of a place (e.g., \"nestled in the heart of,\" \"nestled among the hills\")"
    why_autocomplete: "Multiple sources identify \"nestled\" as a signature ChatGPT word, particularly in travel-style writing. It appears on virtually every overused-words list. The word is used by ChatGPT to describe every restaurant, town, or attraction regardless of whether nesting is an apt metaphor."

  SS-273:
    name: "S9: \"Vibrant\" as Default Descriptor"
    detection: "Text uses \"vibrant\" to describe communities, cultures, atmospheres, or colors without specific grounding"
    why_autocomplete: "Appears on every comprehensive AI word list. Wikipedia flags it as both \"promotional/advertisement language\" and \"high-density AI vocabulary.\" It functions as a generic positive descriptor that substitutes for actual characterization."

  SS-274:
    name: "Said-Bookism / Ornate Dialogue Tags"
    detection: "Check for creative dialogue tag verbs beyond said/asked/whispered/shouted: \"he exclaimed,\" \"she retorted,\" \"he opined,\" \"she breathed,\" \"he intoned,\" \"she mused.\" If more than 20% of dialogue tags use ornate alternatives, the sentinel triggers."
    why_autocomplete: "LLMs trained on fiction data have absorbed both the \"said-bookism\" tradition and the modern \"said-only\" convention, but many models default to variety-seeking in tags because varied vocabulary scores well in language model objectives. The result is tag overuse that marks the text as generated rather than crafted."

  SS-275:
    name: "Scene-Level Information Dump"
    detection: "A scene's primary function is to deliver information to the reader through characters explaining things to each other (maid-and-butler dialogue), extended internal exposition, or narrator-directed lectures."
    why_autocomplete: "LLMs handle information delivery more reliably than dramatization because exposition is structurally simpler than conflict. When the model needs to convey plot information, it defaults to the most direct method (characters stating facts) rather than embedding information in dramatic action."

  SS-276:
    name: "Scenes Without Polarity Shifts"
    detection: "Multiple scenes end with the same value-charge they began with -- activity occurs but nothing meaningful changes for the character."
    why_autocomplete: "LLMs can generate surface-level activity (dialogue, description, movement) without tracking the underlying value states that give scenes dramatic purpose. The model produces content that looks like a scene but is actually a \"nonevent\" in McKee's terms."

  SS-277:
    name: "Self-Answering Rhetorical Questions (\"The X? A Y.\")"
    detection: "Search for the pattern of a short rhetorical question followed immediately by its one-word or one-phrase answer: \"The result? Devastating.\" \"The truth? Nobody cared.\""
    why_autocomplete: "Tropes.fyi identifies this as a distinctive AI construction: \"Self-posed rhetorical questions answered immediately, asking questions nobody asked for dramatic effect.\" This creates manufactured tension that reads as artificial."

  SS-278:
    name: "Self-Contained Scene Syndrome Sentinel"
    detection: "Each generated scene or passage functions as a \"standalone\" piece rather than a fragment that depends on surrounding context. Scenes include their own setup, development, and mini-resolution without relying on information from previous or subsequent scenes."
    why_autocomplete: "LLMs generate text within a context window and optimize for local coherence rather than global narrative dependency. Each passage tries to be self-sufficient because the model cannot guarantee what came before or will come after. Human fiction scenes are deliberately incomplete — they depend on the reader's accumulated knowledge from earlier scenes."

  SS-279:
    name: "Semantic Ablation"
    detection: "Proper nouns are replaced with category labels (\"a famous musician\" instead of naming them), precise vocabulary with vague near-synonyms (\"complex harmonies\" instead of \"comping in fourths\"), and vivid metaphors with conventional similes. The text is systematically less specific than the situation demands."
    why_autocomplete: "Models strip precision systematically through \"semantic ablation\" — replacing specifics with generics at every level. \"Instead of 'McCoy Tyner comping in fourths behind a Coltrane solo lasting eleven minutes,' models produce generic 'complex harmonies.'\" Unusual phrasing has low probability and is systematically avoided."

  SS-280:
    name: "Semantic Ablation Sentinel"
    detection: "The text systematically replaces specific, concrete, unusual, or high-entropy language with generic, safe, common alternatives. Unconventional metaphors are smoothed to standard ones. Domain-specific jargon is replaced with generic equivalents. Precise adjectives become \"important,\" \"significant,\" or \"beautiful.\""
    why_autocomplete: "Semantic ablation is \"the algorithmic erosion of high-entropy information\" — a structural byproduct of greedy decoding and RLHF that strips away rare, precise, and complex tokens to maximize statistical probability. The model gravitates toward the center of the distribution, discarding \"tail\" data."

  SS-281:
    name: "Sensing Without Sensing Sentinel"
    detection: "The text makes sensory claims that demonstrate statistical association rather than embodied understanding. \"Silk\" is always \"smooth.\" Spider webs are always \"delicate.\" Rain is always \"cleansing.\" Sensory descriptions consist of the most statistically common adjective paired with each noun rather than fresh, specific, experiential observation."
    why_autocomplete: "LLMs associate sensory descriptors through co-occurrence statistics rather than embodied experience. They pair \"silk\" with \"smooth\" because that pairing appears most frequently in training data, not because they have touched silk. Human writers who have touched silk might note its coolness, its tendency to catch on rough skin, or its surprising weight — observations that come from embodied experience rather than word association."

  SS-282:
    name: "Sensory Detail Without POV Integration"
    detection: "Sensory details that describe the environment objectively (as a camera would perceive it) rather than through a specific character's perception, in a narrative that otherwise uses close third or first person."
    why_autocomplete: "LLMs produce description from a detached, encyclopedic perspective because their training data includes vast amounts of non-fiction description. The AI \"cannot make intentional choices about which details matter thematically or structurally\" and defaults to neutral observation rather than character-filtered perception."

  SS-283:
    name: "Sensory Inventory Pattern"
    detection: "Three or more senses catalogued in sequence within a single paragraph using a one-sentence-per-sense structure (e.g., \"She could see... She could hear... She could smell... The air tasted of... The surface felt...\")."
    why_autocomplete: "LLMs internalize writing advice like \"use all five senses\" from training data and apply it as a checklist rather than letting sensory detail arise organically from the scene. Human writers typically emphasize one sensory modality per narrative moment, making their descriptions more selective and naturalistic."

  SS-284:
    name: "Setup Without Payoff / Payoff Without Setup"
    detection: "The scene introduces elements (objects, character traits, setting details) that never become relevant, or delivers dramatic moments that depend on information never established."
    why_autocomplete: "LLMs generate scene-local content without tracking the broader narrative web of setups and payoffs. Objects described in one scene are not tracked for later discharge. Climactic moments may reference information the model generated on the fly rather than information properly set up. This reflects the model's inability to plan across scene boundaries."

  SS-285:
    name: "Seven Deadly Static Scene Types"
    detection: "The scene is identifiable as one of the seven \"nothing happens\" types: daily routine, backstory dump, chitchat, excessive description, pointless internal monologue, been-there-done-that repetition, or \"just killing time\" filler."
    why_autocomplete: "Each of these seven types represents a common LLM failure mode. Daily routines and chitchat are statistically common in training data. Backstory dumps arise from the model's need to establish context. Excessive description results from the model generating tokens without tracking dramatic purpose. LLMs cannot self-diagnose \"is something happening in this scene?\""

  SS-286:
    name: "Simultaneous Name Overload"
    detection: "Three or more new character names, place names, or invented terms are introduced within a single paragraph or page without contextual scaffolding."
    why_autocomplete: "LLMs generate world-detail enthusiastically because worldbuilding terminology is well-represented in their training data (fantasy/SF novels, wikis, worldbuilding guides). The model lacks awareness of reader cognitive load and will happily introduce the Harroti of Cantara wielding their Werdle engines in the service of the Thane of Merkulos -- all in one sentence. This overwhelms working memory capacity (4-5 items)."

  SS-287:
    name: "Single-Trait Character Repetition"
    detection: "A character's defining trait (determined, brave, kind, mysterious) is stated or demonstrated more than 5 times without variation, nuance, or complication. The narrative repeatedly tells the reader the same thing about the character."
    why_autocomplete: "LLMs maintain character consistency through repetition rather than through accumulated complexity. When a character is established as \"determined,\" the model generates additional instances of determination because that's the highest-probability completion for that character context. Analysis found all AI protagonists \"share identical traits: they're 'determined' to the point of obsession, with this single characteristic repeated relentlessly throughout their narratives.\""

  SS-288:
    name: "Stacked Sensory Details"
    detection: "Check whether multiple sensory modalities (sight, sound, smell, touch, taste) are invoked in rapid succession within single passages, rather than selecting one or two effective sensory details."
    why_autocomplete: "AI over-applies the workshop advice \"use sensory details to immerse the reader\" by stacking multiple senses simultaneously. Human writers usually emphasize one sensory modality per moment."

  SS-290:
    name: "Stock Emotional Physicality"
    detection: "Characters express emotions exclusively through a fixed inventory of stock physical reactions: hearts pounding, stomachs churning, breaths catching, fists clenching, jaws tightening, tears streaming, hands trembling, eyes widening, blood running cold, shivers running down spines."
    why_autocomplete: "These are the most statistically common physical-emotional associations in fiction training data. LLMs default to them because they are the highest-probability completions for emotional scenes. Human writers who are paying attention to their craft find character-specific, situation-specific physical expressions of emotion — a character who expresses anxiety by reorganizing their desk, or grief by forgetting to eat. The stock reactions convey generic emotion; specific reactions convey character."

  SS-291:
    name: "Story Reads Like Plot Summary Rather Than Lived Experience"
    detection: "The narrative tells what happened rather than rendering scenes—it summarizes events, reports emotions, and explains motivations rather than dramatizing them through action, dialogue, and sensory detail."
    why_autocomplete: "LLMs \"summarize or describe the premise rather than launching into a narrative\" and struggle with \"show, don't tell\"—\"failing to convey character emotion and plot advancement through action and dialogue alone, instead relying on exposition and telling.\""

  SS-292:
    name: "Subject-Verb-Object Sentence Pattern Lock"
    detection: "Check whether 5+ consecutive sentences follow the same grammatical pattern (e.g., all subject-first declaratives: \"He did X. She did Y. They went Z.\")."
    why_autocomplete: "LLMs default to the most common English sentence structure (SVO declarative) and rarely vary into inverted constructions, leading questions, fragments, or imperative forms. The syntactic uniformity persists even when sentence length varies."

  SS-293:
    name: "Subtext Vacuum Sentinel"
    detection: "The text explicitly states the emotional meaning or thematic significance of every scene, image, or exchange — leaving nothing for the reader to infer. Jokes are explained. Themes are announced. After \"He looked at the door,\" the text adds \"feeling a strong desire to leave.\""
    why_autocomplete: "LLMs treat ambiguity, omission, and ellipsis as failure states. They are trained to be \"helpful\" and \"complete,\" which means they connect every logical step and spell out every implication. Human fiction lives in subtext — what is left unsaid, implied, or suggested. LLMs fill every gap."

  SS-294:
    name: "Subtext-Free Dialogue"
    detection: "All dialogue in a scene is \"on the nose\" -- characters say exactly what they mean with no gap between statement and intent, no evasion, no misdirection, no unspoken implications. Every exchange functions purely as information transfer."
    why_autocomplete: "LLMs generate dialogue by predicting the most probable response to a conversational prompt, which favors direct, clear communication over the indirection, subtext, and strategic omission that characterize authentic human conversation. The Resultsense study found LLMs consistently \"flatten subtext into surface-level observation.\""

  SS-295:
    name: "Swings Between Ponderous Similes and Cliche Short Lines"
    detection: "The prose alternates rhythmically between \"long, heavy comparisons\" (extended similes/metaphors) and \"short lines that sound like stock phrases\" in a predictable cadence."
    why_autocomplete: "AI-generated fiction \"often swings between two modes: long, heavy comparisons, then short lines that sound like stock phrases.\" This reflects the model's attempt to pattern-match to \"literary\" and \"punchy\" prose styles without integrating them organically."

  SS-297:
    name: "Symmetrical Dialogue Exchanges"
    detection: "In dialogue scenes, check whether speaker turns alternate perfectly (A-B-A-B) with each turn being roughly the same length. No interruptions, overlaps, trailing off, or monologues."
    why_autocomplete: "AI generates \"extremely curt exchanges\" with \"artificial 'cliffhanger' endings on dialogue\" and an even back-and-forth pattern. Human dialogue is messier -- people interrupt, monologue, trail off, talk past each other."

  SS-298:
    name: "Talking Heads Without Physical Grounding"
    detection: "Find dialogue passages of 10+ consecutive lines with no action beats, no setting detail, no physical description, and no internal monologue. If characters exist as pure disembodied voices for extended stretches, the sentinel triggers."
    why_autocomplete: "LLMs tend to generate dialogue as a sequence of alternating speech acts without the physical-world modeling needed to intersperse environmental detail, body language, and spatial awareness. The model generates text token by token and the easiest continuation of a dialogue line is another dialogue line."

  SS-299:
    name: "Tell-Over-Show Emotional Declarations"
    detection: "Search for patterns of the form \"[Character] felt [emotion]\" or \"[Character] was [emotional adjective]\" — e.g., \"She felt a deep sense of loss,\" \"He was overwhelmed with joy,\" \"A wave of sadness washed over her.\" If these direct emotional declarations outnumber emotion shown through behavior, sensation, or objective correlative by more than 2:1, the narration is tell-heavy."
    why_autocomplete: "LLMs gravitate toward explicit emotional labeling because it is the most statistically direct way to convey character state. Human writers in deep POV render emotion through physical sensation, selective perception, and behavior. LLMs lack the experiential grounding to default to embodied emotional rendering."

  SS-300:
    name: "Telling-Then-Showing Redundancy"
    detection: "A passage where an emotion or quality is first stated abstractly and then immediately illustrated with sensory detail (e.g., \"She was terrified. Her hands trembled as she reached for the door.\") creating a tell-then-show redundancy where the showing makes the telling unnecessary."
    why_autocomplete: "LLMs frequently produce both the abstract statement and the concrete illustration because both patterns score highly independently. Human writers who have internalized \"show don't tell\" typically omit the telling once the showing is adequate. The redundancy suggests a system that cannot evaluate whether the abstract statement is made redundant by the concrete detail."

  SS-301:
    name: "The \"As You Know, Bob\" Exposition Dump"
    detection: "Characters explain their world's history, magic system, political structure, or technology to each other in dialogue despite both characters already knowing this information, purely for the reader's benefit."
    why_autocomplete: "LLMs need to convey worldbuilding information and default to the highest-probability delivery method: dialogue. \"As you know, Bob\" is the easiest way to insert exposition because it requires no scene construction, no character ignorance to justify, and no action to embed information within."

  SS-303:
    name: "The Non-Barking Dog Void"
    detection: "The story's world and characters react to extraordinary events with insufficient surprise, fear, wonder, or adjustment. Characters encounter aliens, magic, galactic threats, or impossible crimes and respond with casual competence rather than appropriate emotional reaction."
    why_autocomplete: "LLMs generate character responses based on narrative convention rather than psychological realism. In training data, protagonists frequently handle extraordinary situations competently (they are protagonists), so the model generates competence without the emotional texture of encountering the genuinely extraordinary. Human authors ground wonder, horror, and confusion in character experience."

  SS-304:
    name: "The Tonally Flat Genre Execution"
    detection: "The story maintains a single emotional register throughout regardless of genre-appropriate tonal variety. A mystery that is uniformly somber without moments of levity. A space opera that is uniformly exciting without moments of reflection. A fantasy that is uniformly wondrous without moments of danger."
    why_autocomplete: "LLMs establish a tone early and maintain it through statistical momentum — once a \"dark mystery\" tone is established, the model continues generating tokens in that register. Human authors instinctively vary tone to create contrast (Lee Kelly: \"whenever a book scene is scary and funny, or embarrassing and tense, the sequence reads far more interesting\")."

  SS-305:
    name: "Thematic Thesis Statement"
    detection: "The narrative contains explicit statements of its own themes, morals, or intended takeaways, either through narrator commentary or through characters who articulate the story's meaning directly. E.g., \"And in that moment, she realized that the real treasure was the friends she'd made along the way.\""
    why_autocomplete: "LLMs gravitate toward explicit thematic closure because their training data includes countless stories with stated morals, book summaries that articulate themes, and literary analysis that extracts meaning. The model conflates the analytical process of identifying themes with the creative process of embodying them through narrative, producing text that tells the reader what to think rather than dramatizing the theme for the reader to discover."

  SS-306:
    name: "Theme Stated Through Character Speech Rather Than Dramatized"
    detection: "A character delivers a speech, monologue, or dialogue passage that directly articulates the story's theme or moral position, particularly if the speech is positioned climactically and the other characters respond with agreement or transformation."
    why_autocomplete: "LLMs default to having characters verbalize meaning rather than demonstrate it through action, because generating dialogue about ideas is mechanically easier than constructing dramatic sequences whose meaning emerges from structure. The LLM produces characters as \"mouthpieces\" because it generates text sequentially and the most probable next token after a climactic moment is a speech, not a silent action."

  SS-307:
    name: "Therapy-Speak Resolution"
    detection: "Characters resolve conflicts by articulating their feelings directly, validating each other's emotions, and reaching mutual understanding through explicit emotional processing language (\"I hear you,\" \"I feel seen,\" \"That must have been hard for you\")."
    why_autocomplete: "LLMs trained on internet text (including therapy content, self-help, and relationship advice) default to therapeutic communication patterns when resolving interpersonal conflict. This produces resolutions that feel like therapy sessions rather than dramatic scenes."

  SS-308:
    name: "Three-Item List Pattern"
    detection: "Check for recurring structures where descriptions or examples come in lists of exactly three. Count occurrences per chapter."
    why_autocomplete: "AI defaults to the rhetorical \"rule of three\" from training data, producing \"lists of exactly three items\" as a tic rather than a deliberate stylistic choice. Human writers vary list lengths based on content needs."

  SS-309:
    name: "Throat-Clearing World Introduction"
    detection: "The narrative opens with a general statement about the world before getting to anything specific. \"In a world where magic is real...\" or \"In the kingdom of [Name], there existed...\""
    why_autocomplete: "LLMs reproduce the most common opening structures from their training data. \"In a world where...\" is among the most statistically frequent openings for fantasy and sci-fi content. The model generates the most probable opening tokens rather than a distinctive, character-grounded entry point."

  SS-310:
    name: "Tidy Resolution / Positive Ending Default"
    detection: "The story resolves all conflicts neatly, characters achieve understanding or reconciliation, and the ending is unambiguously positive with no residual tension, ambiguity, or cost. All threads are \"wrapped up with a bow.\""
    why_autocomplete: "The lechmazur writing_styles research documents that positive endings dominate for every LLM model tested, with near-uniform earnest stance (~99.8%). The StoryScope research found that AI stories \"favor tidy, single-track plots\" and systematically avoid narrative tension, \"sanitising real-world conflicts\" and \"downplaying narrative tension in favour of nostalgia and reconciliation.\" Human fiction exhibits significantly more ending-valence diversity and ambiguity."

  SS-311:
    name: "Timeline Impossibility"
    detection: "Two events that are both described as occurring at specific times or in a specific sequence could not both be true — a character is in two places at once, a duration between events is physically impossible, or calendar/seasonal references are self-contradicting."
    why_autocomplete: "LLMs do not maintain an internal timeline model. The \"Lost in Stories\" research found timeline errors are one of the two dominant failure modes in LLM fiction, with six subtypes (absolute time contradictions, duration issues, simultaneity problems, etc.). The Penguin Random House copy editor specifically identifies impossible journeys (breakfast in Philadelphia, lunch in Boston) and lunar cycle errors (two full moons within a week) as the types of errors that require dedicated tracking."

  SS-312:
    name: "Treadmill Effect Sentinel"
    detection: "The text hovers over the same ideas at a pragmatic level, restating and rephrasing rather than introducing new information. Paragraphs feel like they are saying the same thing in different words. The rate of new information revelation is very slow despite high word count."
    why_autocomplete: "The autoregressive nature of LLMs means the model \"knows next word from latest word, not final destination.\" It has no thesis to argue toward, no revelation to build toward. It generates plausible-next-sentences that are locally coherent but globally static. The result is prose that feels busy but goes nowhere."

  SS-313:
    name: "Tricolon Abuse (Rule of Three Overuse)"
    detection: "Count instances where three parallel elements appear in sequence (whether words, phrases, clauses, or sentences). If tricolons appear more than 3-4 times per 1000 words, or if multiple tricolons cluster within a single paragraph, flag."
    why_autocomplete: "LLMs overuse the rule-of-three pattern as a structural default. Tropes.fyi documents this: \"A single tricolon is elegant; three back-to-back tricolons are a pattern recognition failure.\" The pattern is often extended to four or five items. It creates a \"singsong\" quality that signals AI composition."

  SS-314:
    name: "Uniform Character Voice"
    detection: "Apply the \"cover the name\" test to dialogue passages: remove all dialogue attribution and check if speakers can be identified by voice alone. If three or more characters' dialogue lines could be freely swapped without detection, the sentinel fires."
    why_autocomplete: "LLMs produce text from a single statistical voice distribution. Without extremely specific prompting, all characters converge on the model's default register -- polite, competent, inoffensive. The \"default output of any LLM is an average of its training data -- competent, inoffensive, and utterly without personality.\" This is a fundamental architectural limitation: the model has one voice, not many."

  SS-315:
    name: "Uniform Confidence in World Description"
    detection: "Every piece of world information is presented with identical certainty. There are no mysteries, no \"nobody knows why,\" no contested histories, no unreliable cultural narratives. The world is presented as completely known."
    why_autocomplete: "LLMs generate text with uniform confidence because they predict the most likely next token. They do not naturally generate epistemic uncertainty, contested knowledge, or acknowledged gaps in understanding. Real worlds are full of things that \"nobody really knows\" or \"scholars disagree about.\""

  SS-316:
    name: "Uniform Narrative Stance (Earnest, Single-POV, Past Tense, Reliable, High Register)"
    detection: "The story uses the default LLM configuration: third-person limited, past tense, single-POV, reliable narrator, high register, earnest tone, with no variation, experiment, or justification for these choices. All five defaults are present simultaneously."
    why_autocomplete: "The lechmazur writing_styles analysis of 400 stories per LLM documents these as near-universal defaults: past tense (~100%), linear chronology (82-99%), single-POV (93-100%), reliable narration (near-universal), high register (default), \"near-uniformly earnest\" stance (~99.8%). Human fiction exhibits dramatically more variation across all these dimensions. The simultaneous presence of all five defaults, with no deviation, is the equivalent of the prose choosing the most statistically probable option at every structural decision point."

  SS-317:
    name: "Uniform Paragraph Length"
    detection: "Measure the line/word count of 10+ consecutive paragraphs. If all paragraphs are within 20% of the median length, the variation is insufficient."
    why_autocomplete: "AI maintains near-identical paragraph lengths across entire pieces, contrasting with human writers who vary paragraph architecture based on emotional and pacing needs. Detection tools flag this as a strong AI signal."

  SS-318:
    name: "Uniform Sentence Beginnings Sentinel"
    detection: "A high proportion of sentences begin with the same grammatical construction — typically subject-verb (\"She walked,\" \"He noticed,\" \"The room was\") or the same word/phrase. More than 30% of sentences in a passage begin with the same pattern."
    why_autocomplete: "LLMs tend to fall into repetitive sentence-opening patterns because each sentence is generated based on local context, and the most statistically probable next-sentence-beginning after a completed sentence is often the same construction that began the previous one."

  SS-319:
    name: "Uniform Sentence Length in Dialogue"
    detection: "Measure the variance in sentence/line length within dialogue exchanges. If dialogue lines cluster tightly around a mean length with minimal variation (no short punchy lines, no long complex ones, no fragments), the sentinel triggers."
    why_autocomplete: "LLMs produce text with statistically averaged sentence length because their generation process optimizes for the most probable next token across the entire training distribution. Junia AI: LLM default voice shows \"similar sentence lengths throughout,\" \"predictably-wrapping paragraphs,\" and \"absence of fragmented sentences.\" Human dialogue rhythm requires deliberate variation."

  SS-320:
    name: "Vague Attribution (\"Experts say,\" \"It is often thought\")"
    detection: "Search for \"experts say,\" \"experts argue,\" \"observers note,\" \"industry reports suggest,\" \"it is often thought,\" \"one could argue,\" \"many believe.\" Any appearance in fiction narration (not dialogue) is a flag."
    why_autocomplete: "Tropes.fyi: \"Invoking unnamed 'experts,' 'observers,' 'industry reports' without specificity.\" Wikipedia: \"'Industry reports,' 'Observers have cited,' 'Experts argue.'\" These constructions are from non-fiction AI output that leaks into fiction when the LLM shifts register."

  SS-321:
    name: "Verbatim Scene/Paragraph Repetition"
    detection: "Entire paragraphs, sentences, or descriptive passages appear verbatim or near-verbatim in multiple locations in the text. Characters restate their own dialogue from earlier scenes. Descriptions of recurring settings are copy-pasted rather than varied."
    why_autocomplete: "LLMs can fall into \"repetition loops\" where previously generated text becomes the highest-probability completion for similar contexts. The \"Repeat Curse\" in LLMs results in \"restating earlier text almost verbatim\" and \"when hitting continue it tends to repeat literally everything.\" This is a direct consequence of autoregressive generation: text that already exists in the context has elevated probability of being generated again."

  SS-322:
    name: "View-From-Nowhere Setting Description"
    detection: "Setting is described from a disembodied, omniscient perspective with no character viewpoint filtering the information. The narration reads like a guidebook or documentary voiceover rather than someone's lived experience of a place."
    why_autocomplete: "LLMs default to an institutional, encyclopedia-like voice when describing settings. They describe places as collections of facts rather than as experienced through a particular consciousness. The \"AI tells\" rubric identifies this as \"View from Nowhere\" -- narrative lacking a situated narrator with stake in events."

  SS-323:
    name: "Visually-Dominant Description Without Other Senses"
    detection: "All setting description is visual. There are no sounds, smells, tastes, temperatures, textures, or bodily sensations. The world reads like a painting rather than a place you could stand in."
    why_autocomplete: "LLMs are trained primarily on text that describes visual appearances (the most commonly described sense in prose). They significantly undergenerate non-visual sensory information because visual description is statistically dominant in training data. The model defaults to what has been described most often."

  SS-324:
    name: "Vocabulary Homogeneity Across Diverse Characters"
    detection: "All characters in the fiction use the same vocabulary level, sentence complexity, and register. A child speaks with the same diction as a professor. A blue-collar worker uses the same abstract language as a philosopher. There is no vocabulary variation tied to character identity."
    why_autocomplete: "Stylometric research found that human writers demonstrate \"cognitive complexity in their word choices\" informed by \"semantic memory, lived experiences, and an awareness of audience expectations.\" LLMs produce prose that follows \"a narrow and uniform pattern\" because all output flows from the same statistical model. When all characters sound the same, it indicates that character voice is being generated by the same process rather than being differentiated by the writer's understanding of how different people speak and think."

  SS-325:
    name: "White Room Dialogue (Talking Heads)"
    detection: "Dialogue exchanges occur with zero physical grounding -- no blocking, no description, no environmental interaction, no sensory detail. Characters are disembodied voices."
    why_autocomplete: "LLMs default to generating dialogue without spatial context because dialogue is the most common training text pattern. Physical grounding requires maintaining spatial state across paragraphs, which token prediction handles poorly. The result is what Fawkes calls \"heads floating in space, talking.\""

  SS-326:
    name: "White Room Syndrome"
    detection: "Scenes take place in ungrounded space—readers cannot determine whether they are indoors or outdoors, day or night, or in any identifiable location because setting details are absent."
    why_autocomplete: "LLMs can generate dialogue and action without anchoring it in physical space, producing scenes that float in a contextless void. Human writers ground scenes in sensory detail; LLMs may omit this when optimizing for plot advancement."

  SS-327:
    name: "Worldbuilding Lecture Passage"
    detection: "A passage of three or more sentences explains world mechanics (magic systems, technology, political structure, history) in a voice indistinguishable from a textbook or encyclopedia entry, with no character perspective, emotional coloring, or narrative urgency."
    why_autocomplete: "LLMs excel at generating encyclopedic explanations because this closely matches their training distribution (Wikipedia, textbooks, reference material). When asked to build a fictional world, the model defaults to the expository mode most heavily represented in its training data rather than generating the harder, craft-intensive incluing approach."

  SS-328:
    name: "Zero Subtext — Everything Is On-the-Nose"
    detection: "For each dialogue exchange, check: does any character say exactly what they mean with no indirection, deflection, or gap between statement and intention? If characters consistently state motivations, feelings, and agendas directly, the sentinel triggers."
    why_autocomplete: "LLMs optimize for clarity and information transfer. Subtext requires modeling the gap between what a character would say and what they mean, which requires a theory of mind the LLM lacks. The LLM's probability distribution favors the most direct, clear expression of any given meaning. Now Novel's comparison found AI \"tells readers exactly what's happening and why\" while human dialogue \"suggests rather than states.\""
